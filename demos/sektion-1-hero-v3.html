<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAISON AURÉLIE · Atelier für Trauringe</title>
<!--
  ============================================================
  VARIANTE: sektion-1-hero-v3
  TRAGENDE IDEE: KEIN 3D. Editorial, vollflächiger Makro-Platzhalter
                 (aspect-ratio + dezenter Verlauf, klar als Platzhalter
                 markiert), gestaffelter Serif-Headline-Reveal,
                 magnetischer CTA-Button (Versatz <= 8px), Cursor-Maske
                 (weiche Aufhellung folgt der Maus).
  TECHNIK: Reines CSS/JS, keine WebGL-Abhaengigkeit. Reveal per
           IntersectionObserver-freiem Transition-on-load mit
           gestaffeltem delay; reduced-motion zeigt alles sofort.
           Magnet-Effekt nur bei Feinzeiger. Cursor-Maske per
           radial-gradient + custom property.
  PRODUKTIONSPFAD: Next.js Server Component fuer Markup; Makro durch
           next/image (priority) ersetzen; Reveal via Framer Motion
           staggerChildren; Magnet-CTA als Client-Component mit
           useMotionValue/spring; next/font lokal.
  ============================================================
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- PROD: next/font lokal statt Google-Fonts-<link> -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --obsidian:    oklch(0.16 0.006 270);
  --ink:         oklch(0.21 0.008 270);
  --offwhite:    oklch(0.96 0.004 90);
  --muted:       oklch(0.72 0.01 90);
  --gold:        oklch(0.72 0.10 85);
  --gold-bright: oklch(0.82 0.09 82);
  --gold-deep:   oklch(0.58 0.09 78);
  --platinum:    oklch(0.80 0.008 250);
  --hairline:    oklch(0.30 0.01 270 / 0.6);
  --focus:       oklch(0.82 0.09 82);
  --mx:50%; --my:40%;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--obsidian);color:var(--offwhite);
  font-family:'Inter',system-ui,sans-serif;line-height:1.6;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
.hero{
  position:relative;min-height:100vh;min-height:100svh;
  display:flex;flex-direction:column;isolation:isolate;
}
/* Vollflaechiger Makro-Platzhalter */
.macro{
  position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(80% 60% at 30% 30%, oklch(0.34 0.05 85 / 0.55), transparent 60%),
    radial-gradient(70% 70% at 80% 75%, oklch(0.28 0.04 78 / 0.5), transparent 60%),
    linear-gradient(135deg, oklch(0.20 0.01 270), oklch(0.14 0.006 270));
}
.macro::after{
  /* Platzhalter-Kennzeichnung */
  content:"PLATZHALTER · Makroaufnahme Diamant (PROD: next/image)";
  position:absolute;left:clamp(1rem,4vw,2rem);bottom:clamp(1rem,4vw,2rem);
  font-size:0.66rem;letter-spacing:0.16em;text-transform:uppercase;
  color:oklch(0.72 0.01 90 / 0.55);
}
/* Cursor-Maske: weiche Aufhellung folgt der Maus */
.cursor-mask{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(26rem 26rem at var(--mx) var(--my),
    oklch(0.96 0.004 90 / 0.10), transparent 60%);
  mix-blend-mode:screen;
}
.nav{
  position:relative;z-index:3;display:flex;align-items:center;
  justify-content:space-between;gap:1rem;
  padding:clamp(1rem,2.5vw,1.75rem) clamp(1.25rem,4vw,3rem);
}
.wordmark{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(1.15rem,2.4vw,1.5rem);letter-spacing:0.14em}
.nav-links{display:none;gap:clamp(1.5rem,3vw,2.5rem);list-style:none;font-size:0.82rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.nav-links a{padding:0.5rem 0;display:inline-block}
.nav-links a:hover,.nav-links a:focus-visible{color:var(--gold-bright)}
.btn-termin{border:1px solid var(--hairline);padding:0.65rem 1.25rem;border-radius:999px;font-size:0.8rem;letter-spacing:0.08em;text-transform:uppercase;min-height:44px;display:inline-flex;align-items:center;transition:border-color .25s,color .25s}
.btn-termin:hover,.btn-termin:focus-visible{border-color:var(--gold);color:var(--gold-bright)}

.hero-body{position:relative;z-index:2;flex:1;display:grid;align-items:center;padding:clamp(1.5rem,5vw,4rem)}
.hero-copy{max-width:46rem}
.kicker{font-size:0.78rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:1.25rem}
h1{
  font-family:'Cormorant Garamond',serif;font-weight:400;
  font-size:clamp(2.8rem,9vw,6rem);line-height:1.02;
  letter-spacing:-0.01em;margin-bottom:1.5rem;
}
h1 .line{display:block;overflow:hidden}
h1 .line > span{display:block}
h1 em{font-style:italic;color:var(--gold-bright)}
.lede{color:var(--muted);font-size:clamp(1rem,1.5vw,1.18rem);max-width:32rem;margin-bottom:2rem}

/* Gestaffelter Reveal */
.reveal{opacity:0;transform:translateY(1.1em);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)}
.hero.is-in .reveal{opacity:1;transform:none}
.hero.is-in .reveal{transition-delay:var(--d,0s)}

.cta-wrap{display:inline-block}
.cta{
  display:inline-flex;align-items:center;gap:0.7rem;
  background:var(--gold);color:var(--obsidian);font-weight:600;font-size:0.95rem;
  padding:0.95rem 1.85rem;border-radius:999px;min-height:44px;
  will-change:transform;transition:background .25s;
}
.cta:hover,.cta:focus-visible{background:var(--gold-bright)}
.cta svg{width:1.1em;height:1.1em}

:focus-visible{outline:2px solid var(--focus);outline-offset:3px;border-radius:4px}
@media (min-width:62rem){.nav-links{display:flex}}
@media (prefers-reduced-motion: reduce){
  .reveal{opacity:1;transform:none;transition:none}
  .cursor-mask{display:none}
  .cta{transition:none}
}
</style>
</head>
<body>
<main class="hero" id="hero">
  <div class="macro" aria-hidden="true"></div>
  <div class="cursor-mask" aria-hidden="true"></div>

  <header class="nav">
    <a class="wordmark reveal" style="--d:.05s" href="#" aria-label="MAISON AURÉLIE Startseite">MAISON AURÉLIE</a>
    <nav aria-label="Hauptnavigation">
      <ul class="nav-links">
        <li><a class="reveal" style="--d:.1s" href="#">Trauringe</a></li>
        <li><a class="reveal" style="--d:.15s" href="#">Verlobung</a></li>
        <li><a class="reveal" style="--d:.2s" href="#">Atelier</a></li>
        <li><a class="reveal" style="--d:.25s" href="#">Düsseldorf</a></li>
      </ul>
    </nav>
    <a class="btn-termin reveal" style="--d:.3s" href="#termin">Termin</a>
  </header>

  <div class="hero-body">
    <div class="hero-copy">
      <p class="kicker reveal" style="--d:.2s">Atelier für Trauringe</p>
      <h1>
        <span class="line"><span class="reveal" style="--d:.35s">Gold, das</span></span>
        <span class="line"><span class="reveal" style="--d:.5s">Ihre <em>Geschichte</em></span></span>
        <span class="line"><span class="reveal" style="--d:.65s">trägt.</span></span>
      </h1>
      <p class="lede reveal" style="--d:.8s">Wir fertigen Trauringe in Handarbeit. Profil, Legierung und Diamant entstehen im Gespräch, mit Ruhe und ohne Eile.</p>
      <span class="cta-wrap reveal" style="--d:.95s">
        <a class="cta" id="magnet" href="#termin">
          Trauring-Beratung
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </a>
      </span>
    </div>
  </div>
</main>

<script>
const hero=document.getElementById('hero');
const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const coarse=window.matchMedia('(pointer: coarse)').matches;

/* Reveal beim Laden ausloesen */
requestAnimationFrame(()=>requestAnimationFrame(()=>hero.classList.add('is-in')));

if(!reduce && !coarse){
  /* Cursor-Maske */
  hero.addEventListener('pointermove',(e)=>{
    const r=hero.getBoundingClientRect();
    hero.style.setProperty('--mx',((e.clientX-r.left)/r.width*100)+'%');
    hero.style.setProperty('--my',((e.clientY-r.top)/r.height*100)+'%');
  },{passive:true});

  /* Magnetischer CTA, Versatz auf <= 8px begrenzt */
  const magnet=document.getElementById('magnet');
  const MAX=8;
  magnet.addEventListener('pointermove',(e)=>{
    const r=magnet.getBoundingClientRect();
    let dx=(e.clientX-(r.left+r.width/2))*0.3;
    let dy=(e.clientY-(r.top+r.height/2))*0.3;
    dx=Math.max(-MAX,Math.min(MAX,dx));
    dy=Math.max(-MAX,Math.min(MAX,dy));
    magnet.style.transform=`translate(${dx}px,${dy}px)`;
  });
  magnet.addEventListener('pointerleave',()=>{magnet.style.transform='';});
}
</script>
</body>
</html>
