<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAISON AURÉLIE · Glanz, der bleibt</title>
<!--
  ============================================================
  VARIANTE: sektion-1-hero-v5
  TRAGENDE IDEE: Kinetische Typografie (Wort fuer Wort einschwebende
                 Serif-Headline) plus goldener Partikel-Staub als
                 Canvas-2D (kein WebGL noetig), dunkel-cinematisch.
                 Bei reduced-motion: Partikel aus, Text sofort sichtbar.
  TECHNIK: Reines Canvas 2D fuer den Staub (kein WebGL/Three),
           pixelRatio gecappt, rAF-Pause bei visibilitychange,
           reduced-motion-Guard. Kinetik per CSS-Keyframes mit
           gestaffeltem delay. Kein Drag noetig, touch-freundlich.
  PRODUKTIONSPFAD: Next.js Server Component fuer Markup; Partikel-
           Canvas als Client-Component (useEffect + rAF, Cleanup);
           Headline-Kinetik via Framer Motion staggerChildren;
           next/font lokal.
  ============================================================
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- PROD: next/font lokal statt Google-Fonts-<link> -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --obsidian:    oklch(0.16 0.006 270);
  --ink:         oklch(0.21 0.008 270);
  --offwhite:    oklch(0.96 0.004 90);
  --muted:       oklch(0.72 0.01 90);
  --gold:        oklch(0.72 0.10 85);
  --gold-bright: oklch(0.82 0.09 82);
  --gold-deep:   oklch(0.58 0.09 78);
  --platinum:    oklch(0.80 0.008 250);
  --hairline:    oklch(0.30 0.01 270 / 0.6);
  --focus:       oklch(0.82 0.09 82);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:radial-gradient(120% 100% at 50% 110%, oklch(0.20 0.01 270), var(--obsidian) 60%);
  color:var(--offwhite);font-family:'Inter',system-ui,sans-serif;line-height:1.6;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
.hero{position:relative;min-height:100vh;min-height:100svh;display:flex;flex-direction:column;isolation:isolate}
canvas#dust{position:absolute;inset:0;z-index:0;width:100%;height:100%;display:block;pointer-events:none}

.nav{
  position:relative;z-index:3;display:flex;align-items:center;justify-content:space-between;gap:1rem;
  padding:clamp(1rem,2.5vw,1.75rem) clamp(1.25rem,4vw,3rem);
}
.wordmark{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(1.15rem,2.4vw,1.5rem);letter-spacing:0.14em}
.nav-links{display:none;gap:clamp(1.5rem,3vw,2.5rem);list-style:none;font-size:0.82rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.nav-links a{padding:0.5rem 0;display:inline-block}
.nav-links a:hover,.nav-links a:focus-visible{color:var(--gold-bright)}
.btn-termin{border:1px solid var(--hairline);padding:0.65rem 1.25rem;border-radius:999px;font-size:0.8rem;letter-spacing:0.08em;text-transform:uppercase;min-height:44px;display:inline-flex;align-items:center;transition:border-color .25s,color .25s}
.btn-termin:hover,.btn-termin:focus-visible{border-color:var(--gold);color:var(--gold-bright)}

.hero-body{position:relative;z-index:2;flex:1;display:grid;place-items:center;text-align:center;padding:clamp(1.5rem,5vw,4rem);pointer-events:none}
.hero-copy{max-width:48rem}
.kicker{font-size:0.78rem;letter-spacing:0.24em;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem}
h1{
  font-family:'Cormorant Garamond',serif;font-weight:400;
  font-size:clamp(3rem,11vw,7rem);line-height:1.0;
  letter-spacing:-0.01em;margin-bottom:1.5rem;
}
h1 .w{display:inline-block;opacity:0;transform:translateY(0.5em) rotate(2deg);filter:blur(6px);animation:rise .9s cubic-bezier(.2,.7,.2,1) forwards;animation-delay:var(--d,0s)}
h1 em{font-style:italic;color:var(--gold-bright)}
@keyframes rise{to{opacity:1;transform:none;filter:none}}
.lede{color:var(--muted);font-size:clamp(1rem,1.5vw,1.18rem);max-width:34rem;margin:0 auto 2rem;opacity:0;animation:fade 1s ease forwards .9s}
@keyframes fade{to{opacity:1}}
.cta{
  pointer-events:auto;display:inline-flex;align-items:center;gap:0.7rem;
  background:var(--gold);color:var(--obsidian);font-weight:600;font-size:0.95rem;
  padding:0.95rem 1.85rem;border-radius:999px;min-height:44px;
  opacity:0;animation:fade 1s ease forwards 1.1s;transition:transform .25s,background .25s;
}
.cta:hover,.cta:focus-visible{background:var(--gold-bright);transform:translateY(-2px)}
.cta svg{width:1.1em;height:1.1em}

:focus-visible{outline:2px solid var(--focus);outline-offset:3px;border-radius:4px}
@media (min-width:62rem){.nav-links{display:flex}}
@media (prefers-reduced-motion: reduce){
  h1 .w{opacity:1;transform:none;filter:none;animation:none}
  .lede,.cta{opacity:1;animation:none}
  .cta{transition:none}
}
</style>
</head>
<body>
<main class="hero" id="hero">
  <canvas id="dust" aria-hidden="true"></canvas>

  <header class="nav">
    <a class="wordmark" href="#" aria-label="MAISON AURÉLIE Startseite">MAISON AURÉLIE</a>
    <nav aria-label="Hauptnavigation">
      <ul class="nav-links">
        <li><a href="#">Kollektion</a></li>
        <li><a href="#">Trauringe</a></li>
        <li><a href="#">Haus</a></li>
        <li><a href="#">Düsseldorf</a></li>
      </ul>
    </nav>
    <a class="btn-termin" href="#termin">Termin</a>
  </header>

  <div class="hero-body">
    <div class="hero-copy">
      <p class="kicker">Glanz, der bleibt</p>
      <h1>
        <span class="w" style="--d:.0s">Für</span>
        <span class="w" style="--d:.12s">den</span>
        <span class="w" style="--d:.24s"><em>Moment,</em></span>
        <span class="w" style="--d:.4s">der</span>
        <span class="w" style="--d:.52s">zählt.</span>
      </h1>
      <p class="lede">Trauringe und Schmuck, der einem Leben standhält. Beratung in Ruhe, hier in Düsseldorf.</p>
      <a class="cta" href="#termin">
        Trauring-Beratung
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    </div>
  </div>
</main>

<script>
const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const canvas=document.getElementById('dust');
const ctx=canvas.getContext('2d');
let dpr=Math.min(window.devicePixelRatio||1,2);
let W=0,H=0,particles=[],running=true,raf=0;

function resize(){
  W=canvas.clientWidth;H=canvas.clientHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const count=Math.round(Math.min(W,1600)/12); /* dichte-adaptiv */
  particles=[];
  for(let i=0;i<count;i++){
    particles.push({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*1.6+0.4,
      vx:(Math.random()-0.5)*0.12,
      vy:-(Math.random()*0.25+0.05),
      a:Math.random()*0.5+0.15,
      tw:Math.random()*Math.PI*2
    });
  }
}

function frame(){
  if(!running) return;
  raf=requestAnimationFrame(frame);
  ctx.clearRect(0,0,W,H);
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.tw+=0.04;
    if(p.y< -5){p.y=H+5;p.x=Math.random()*W;}
    if(p.x<-5)p.x=W+5; if(p.x>W+5)p.x=-5;
    const alpha=p.a*(0.6+0.4*Math.sin(p.tw));
    ctx.beginPath();
    ctx.fillStyle=`oklch(0.82 0.09 82 / ${alpha.toFixed(3)})`;
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  }
}

if(!reduce){
  resize();
  window.addEventListener('resize',resize,{passive:true});
  frame();
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){running=false;cancelAnimationFrame(raf);}
    else if(!running){running=true;frame();}
  });
}else{
  /* reduced-motion: Partikel aus, Canvas leer/unsichtbar */
  canvas.style.display='none';
}
</script>
</body>
</html>
