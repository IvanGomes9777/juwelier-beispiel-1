<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!--
  VARIANTE: Sektion 5 — Manufaktur / Meisteratelier-Story · v5 "Werkstatt-Mosaik mit Reveal"
  TRAGENDE IDEE: Ein ruhiges Bildmosaik der Werkstatt, dessen Bildunterschriften beim
                 Scrollen nacheinander aufgedeckt werden. Details statt Hochglanz: Feile,
                 Lupe, Werktisch. USP: gelebtes Handwerk im eigenen Meisteratelier.
  TECHNIK: CSS-Grid-Mosaik (auto-fit / dense, verschiedene Spannweiten), aspect-ratio
           gegen CLS. IntersectionObserver enthuellt Bildunterschriften gestaffelt.
           prefers-reduced-motion / kein JS: alle Unterschriften sofort sichtbar.
  PRODUKTIONSPFAD: PROD -> next/font lokal. Mosaik aus CMS-Galerie. Werkstatt-Platzhalter
           durch echte Detailfotos (gleiche Seitenverhaeltnisse, definierte Maße) ersetzen.
-->
<title>MAISON AURÉLIE · Aus der Werkstatt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- PROD: next/font lokal statt Google-Fonts-<link> -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --obsidian:    oklch(0.16 0.006 270);
  --ink:         oklch(0.21 0.008 270);
  --offwhite:    oklch(0.96 0.004 90);
  --muted:       oklch(0.72 0.01 90);
  --gold:        oklch(0.72 0.10 85);
  --gold-bright: oklch(0.82 0.09 82);
  --gold-deep:   oklch(0.58 0.09 78);
  --platinum:    oklch(0.80 0.008 250);
  --hairline:    oklch(0.30 0.01 270 / 0.6);
  --focus:       oklch(0.82 0.09 82);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--obsidian);color:var(--offwhite);font-family:"Inter",system-ui,sans-serif;line-height:1.6;overflow-x:hidden}
.section{padding:clamp(3rem,8vw,7rem) clamp(1.25rem,5vw,4rem)}
.shell{max-width:1440px;margin:0 auto}
.intro{max-width:60ch;margin:0 auto clamp(2.5rem,6vw,4rem);text-align:center}
.kicker{font-size:clamp(0.72rem,1.6vw,0.82rem);letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
h2{font-family:"Cormorant Garamond",Georgia,serif;font-weight:500;font-size:clamp(2rem,5.5vw,3.4rem);line-height:1.08;color:var(--offwhite)}
.lede{margin-top:1rem;color:var(--muted);font-size:clamp(0.98rem,2.1vw,1.12rem)}
.lede strong{color:var(--platinum);font-weight:600}

.mosaic{display:grid;gap:clamp(0.75rem,1.6vw,1.25rem);
  grid-template-columns:repeat(auto-fit,minmax(min(100%,260px),1fr));grid-auto-flow:dense}
@media(min-width:760px){
  .tile.wide{grid-column:span 2}
  .tile.tall{grid-row:span 2}
}
.tile{position:relative;border-radius:6px;overflow:hidden;border:1px solid var(--hairline);aspect-ratio:4/3}
.tile.tall{aspect-ratio:4/3}
@media(min-width:760px){.tile.tall{aspect-ratio:auto}}
.ph{position:absolute;inset:0}
.ph-a{background:radial-gradient(120% 90% at 30% 25%, oklch(0.32 0.03 80 / 0.55), transparent 60%),linear-gradient(150deg,var(--ink),var(--obsidian) 72%)}
.ph-b{background:radial-gradient(120% 90% at 70% 30%, oklch(0.30 0.025 60 / 0.5), transparent 62%),linear-gradient(200deg,var(--ink),var(--obsidian) 75%)}
.ph-c{background:radial-gradient(110% 95% at 45% 70%, oklch(0.34 0.03 90 / 0.5), transparent 60%),linear-gradient(120deg,var(--ink),var(--obsidian) 70%)}
.ph-d{background:radial-gradient(130% 100% at 60% 15%, oklch(0.29 0.02 70 / 0.5), transparent 58%),linear-gradient(170deg,var(--ink),var(--obsidian) 74%)}
.ph-frame{position:absolute;inset:clamp(12px,2vw,20px);border:1px solid color-mix(in oklch,var(--gold-deep),transparent 55%);border-radius:3px;pointer-events:none}
.ph-mark{position:absolute;right:10px;top:10px;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);background:oklch(0.16 0.006 270 / 0.6);padding:4px 8px;border-radius:4px;border:1px solid var(--hairline)}

.cap{position:absolute;left:0;right:0;bottom:0;padding:clamp(0.9rem,2.5vw,1.4rem);
  background:linear-gradient(0deg, oklch(0.16 0.006 270 / 0.92), oklch(0.16 0.006 270 / 0.5) 60%, transparent);
  opacity:0;transform:translateY(14px);transition:opacity .7s ease,transform .7s ease}
.cap.in{opacity:1;transform:none}
.cap .t{font-family:"Cormorant Garamond",Georgia,serif;font-weight:500;font-size:clamp(1.1rem,2.6vw,1.5rem);color:var(--offwhite)}
.cap .d{margin-top:0.2rem;color:var(--muted);font-size:clamp(0.84rem,1.8vw,0.94rem)}
:focus-visible{outline:2px solid var(--focus);outline-offset:3px;border-radius:3px}
@media (prefers-reduced-motion: reduce){.cap{opacity:1;transform:none;transition:none}}
</style>
</head>
<body>
<main>
<section class="section" aria-labelledby="s5-title">
  <div class="shell">
    <div class="intro">
      <p class="kicker">Eigenes Meisteratelier in Düsseldorf</p>
      <h2 id="s5-title">Aus unserer Werkstatt</h2>
      <p class="lede">
        <strong>Familienbetrieb seit 1968.</strong> Keine Hochglanzkulisse, sondern der
        Werktisch, an dem jedes Stück von Hand entsteht. Ein paar Eindrücke.
      </p>
    </div>

    <div class="mosaic" role="list" aria-label="Eindrücke aus der Werkstatt">
      <figure class="tile wide tall" role="listitem">
        <div class="ph ph-a"></div><div class="ph-frame"></div>
        <span class="ph-mark" aria-hidden="true">Platzhalter</span>
        <figcaption class="cap"><span class="t">Der Werktisch</span><span class="d">Wo seit 1968 gefeilt und gefasst wird.</span></figcaption>
      </figure>
      <figure class="tile" role="listitem">
        <div class="ph ph-b"></div><div class="ph-frame"></div>
        <span class="ph-mark" aria-hidden="true">Platzhalter</span>
        <figcaption class="cap"><span class="t">Die Feile</span><span class="d">Jede Kante entsteht von Hand.</span></figcaption>
      </figure>
      <figure class="tile" role="listitem">
        <div class="ph ph-c"></div><div class="ph-frame"></div>
        <span class="ph-mark" aria-hidden="true">Platzhalter</span>
        <figcaption class="cap"><span class="t">Unter der Lupe</span><span class="d">Steine fassen wir einzeln.</span></figcaption>
      </figure>
      <figure class="tile" role="listitem">
        <div class="ph ph-d"></div><div class="ph-frame"></div>
        <span class="ph-mark" aria-hidden="true">Platzhalter</span>
        <figcaption class="cap"><span class="t">Das Edelmetall</span><span class="d">Geschmolzen, gewalzt, geformt.</span></figcaption>
      </figure>
      <figure class="tile wide" role="listitem">
        <div class="ph ph-a"></div><div class="ph-frame"></div>
        <span class="ph-mark" aria-hidden="true">Platzhalter</span>
        <figcaption class="cap"><span class="t">Die Politur</span><span class="d">Geduld, bis das Licht ruhig zurückkommt.</span></figcaption>
      </figure>
      <figure class="tile" role="listitem">
        <div class="ph ph-c"></div><div class="ph-frame"></div>
        <span class="ph-mark" aria-hidden="true">Platzhalter</span>
        <figcaption class="cap"><span class="t">Die Skizze</span><span class="d">Jeder Entwurf existiert nur einmal.</span></figcaption>
      </figure>
    </div>
  </div>
</section>
</main>

<script>
(function(){
  var caps = Array.prototype.slice.call(document.querySelectorAll('.cap'));
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduce){ caps.forEach(function(c){ c.classList.add('in'); }); return; }

  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }
    });
  },{threshold:0.35, rootMargin:'0px 0px -6% 0px'});
  caps.forEach(function(c){ io.observe(c); });
})();
</script>
</body>
</html>
