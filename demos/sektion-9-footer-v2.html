<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!--
  VARIANTE: Sektion 9 — Footer · v2 "Minimal zentriert"
  TRAGENDE IDEE: Reduktion als Luxus. Eine grosse zentrierte Wordmark traegt die Sektion,
                 darunter eine kompakte Rechts- und Kontaktzeile. Viel Ruhe, kein Raster.
  TECHNIK: Flow-Layout, zentriert, Hairline-Trenner ober- und unterhalb der Linkzeile,
           Touch-Ziele >=44px durch Inline-Flex, Fokus sichtbar, NAP konsistent,
           prefers-reduced-motion respektiert.
  PRODUKTIONSPFAD: PROD -> next/font lokal statt Google-Fonts-<link>. Rechtstext-Links nach
           rechtstexte-website-compliance.md verdrahten.
-->
<title>MAISON AURÉLIE · Footer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- PROD: next/font lokal statt Google-Fonts-<link> -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --obsidian:    oklch(0.16 0.006 270);
  --ink:         oklch(0.21 0.008 270);
  --offwhite:    oklch(0.96 0.004 90);
  --muted:       oklch(0.72 0.01 90);
  --gold:        oklch(0.72 0.10 85);
  --gold-bright: oklch(0.82 0.09 82);
  --gold-deep:   oklch(0.58 0.09 78);
  --platinum:    oklch(0.80 0.008 250);
  --hairline:    oklch(0.30 0.01 270 / 0.6);
  --focus:       oklch(0.82 0.09 82);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--obsidian);
  color:var(--offwhite);
  font-family:"Inter",system-ui,sans-serif;
  line-height:1.6;
  overflow-x:hidden;
}
footer{
  padding:clamp(3.5rem,9vw,7rem) clamp(1.25rem,5vw,4rem) clamp(1.75rem,4vw,2.5rem);
  text-align:center;
}
.shell{max-width:1000px;margin:0 auto}
.wordmark{
  font-family:"Cormorant Garamond",Georgia,serif;
  font-weight:500;
  font-size:clamp(2.4rem,8vw,5rem);
  letter-spacing:0.06em;
  line-height:1.02;
  color:var(--offwhite);
}
.wordmark span{color:var(--gold)}
.tag{
  margin:1rem auto 0;
  color:var(--muted);
  font-size:clamp(0.9rem,1.9vw,1.05rem);
  max-width:46ch;
}
address{
  font-style:normal;
  margin-top:clamp(2rem,5vw,3rem);
  padding-top:clamp(2rem,5vw,3rem);
  border-top:1px solid var(--hairline);
  color:var(--muted);
  font-size:clamp(0.92rem,2vw,1.02rem);
  line-height:1.8;
}
address a{color:var(--offwhite);text-decoration:none;display:inline-flex;align-items:center;min-height:44px}
address a:hover{color:var(--gold-bright)}
.dot{color:var(--gold-deep);padding:0 0.5rem}
.legal{
  margin-top:clamp(2rem,5vw,3rem);
  padding-top:clamp(1.5rem,4vw,2rem);
  border-top:1px solid var(--hairline);
}
.legal ul{
  list-style:none;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:0.25rem 1.5rem;
}
.legal a{
  color:var(--muted);
  text-decoration:none;
  font-size:clamp(0.84rem,1.7vw,0.92rem);
  display:inline-flex;
  align-items:center;
  min-height:44px;
}
.legal a:hover{color:var(--offwhite)}
.copy{margin-top:1rem;color:var(--muted);font-size:clamp(0.8rem,1.6vw,0.88rem)}
a:focus-visible{outline:2px solid var(--focus);outline-offset:3px;border-radius:3px}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<footer aria-labelledby="ft-heading">
  <div class="shell">
    <h2 id="ft-heading" class="wordmark">MAISON <span>AURÉLIE</span></h2>
    <p class="tag">Feine Uhren und Schmuck in Düsseldorf.</p>

    <address>
      MAISON AURÉLIE, Königsallee 1, 40212 Düsseldorf
      <br>
      <a href="tel:+492110000000">+49 211 000000</a>
      <span class="dot" aria-hidden="true">·</span>
      <a href="mailto:kontakt@maison-aurelie.example">kontakt@maison-aurelie.example</a>
    </address>

    <div class="legal">
      <!-- PROD: Rechtstexte nach rechtstexte-website-compliance.md -->
      <nav aria-label="Rechtliche Hinweise">
        <ul>
          <li><a href="#impressum">Impressum</a></li>
          <li><a href="#datenschutz">Datenschutz</a></li>
          <li><a href="#agb">AGB</a></li>
          <li><a href="#widerruf">Widerruf</a></li>
          <li><a href="#cookies">Cookie-Einstellungen</a></li>
        </ul>
      </nav>
      <p class="copy">© 2026 MAISON AURÉLIE, Düsseldorf</p>
    </div>
  </div>
</footer>
</body>
</html>
