<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!--
  VARIANTE: Sektion 5 — Manufaktur / Meisteratelier-Story · v4 "Editorial-Zitat & Stat-Counter"
  TRAGENDE IDEE: Ein grosses, ruhiges Zitat des Meisters traegt die Sektion. Darunter
                 belegen drei animierte Kennzahlen die Substanz: Jahre, Anfertigungen,
                 Meister. USP: Haltung statt Werbung, Zahlen statt Versprechen.
  TECHNIK: Vollflaechiges Editorial-Layout. Stat-Counter zaehlen per requestAnimationFrame
           hoch, sobald sichtbar (IntersectionObserver). Werkstatt-Platzhalter als ruhiger
           Hintergrund mit Verlauf. prefers-reduced-motion / kein JS: Endwerte stehen sofort.
  PRODUKTIONSPFAD: PROD -> next/font lokal. Zahlen und Zitat aus CMS. Hintergrund-Platzhalter
           durch echtes, abgedunkeltes Werkstattfoto (definierte Maße, kein CLS) ersetzen.
-->
<title>MAISON AURÉLIE · Worte des Meisters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- PROD: next/font lokal statt Google-Fonts-<link> -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --obsidian:    oklch(0.16 0.006 270);
  --ink:         oklch(0.21 0.008 270);
  --offwhite:    oklch(0.96 0.004 90);
  --muted:       oklch(0.72 0.01 90);
  --gold:        oklch(0.72 0.10 85);
  --gold-bright: oklch(0.82 0.09 82);
  --gold-deep:   oklch(0.58 0.09 78);
  --platinum:    oklch(0.80 0.008 250);
  --hairline:    oklch(0.30 0.01 270 / 0.6);
  --focus:       oklch(0.82 0.09 82);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--obsidian);color:var(--offwhite);font-family:"Inter",system-ui,sans-serif;line-height:1.6;overflow-x:hidden}

.stage{position:relative;min-height:100svh;min-height:100vh;display:flex;align-items:center;
  padding:clamp(3.5rem,9vw,8rem) clamp(1.25rem,5vw,4rem);overflow:hidden}
.bg{position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(140% 100% at 75% 15%, oklch(0.28 0.02 80 / 0.5), transparent 55%),
    linear-gradient(160deg, var(--ink), var(--obsidian) 70%);
}
.bg-tag{position:absolute;right:14px;bottom:14px;z-index:1;font-size:0.66rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);background:oklch(0.16 0.006 270 / 0.6);padding:5px 9px;border-radius:4px;border:1px solid var(--hairline)}
.shell{position:relative;z-index:1;max-width:1100px;margin:0 auto;width:100%}

.kicker{font-size:clamp(0.72rem,1.6vw,0.82rem);letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:clamp(1.5rem,4vw,2.5rem)}
blockquote{margin:0;max-width:20ch}
.quote{
  font-family:"Cormorant Garamond",Georgia,serif;font-weight:500;
  font-size:clamp(2rem,7vw,5.2rem);line-height:1.04;letter-spacing:0.005em;
  color:var(--offwhite);max-width:18ch;
}
.quote .em{color:var(--gold-bright)}
figcaption{margin-top:clamp(1.5rem,4vw,2.5rem);display:flex;flex-direction:column;gap:0.2rem}
.attr-name{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(1.2rem,3vw,1.7rem);color:var(--platinum)}
.attr-role{font-size:0.82rem;letter-spacing:0.13em;text-transform:uppercase;color:var(--muted)}

.stats{position:relative;z-index:1;background:var(--obsidian);
  padding:clamp(2.5rem,7vw,5rem) clamp(1.25rem,5vw,4rem);
  border-top:1px solid var(--hairline)}
.stats-grid{max-width:1100px;margin:0 auto;display:grid;gap:clamp(2rem,5vw,3rem);
  grid-template-columns:repeat(auto-fit,minmax(min(100%,220px),1fr))}
.stat{text-align:center}
.num{font-family:"Cormorant Garamond",Georgia,serif;font-weight:500;
  font-size:clamp(2.8rem,8vw,4.6rem);line-height:1;color:var(--gold-bright);
  font-variant-numeric:tabular-nums;letter-spacing:0.01em}
.num .suffix{font-size:0.5em;color:var(--gold);margin-left:0.1em}
.stat .label{margin-top:0.65rem;color:var(--muted);font-size:clamp(0.9rem,2vw,1rem);
  letter-spacing:0.08em;text-transform:uppercase}
.stat .sub{margin-top:0.3rem;color:var(--muted);font-size:0.84rem;opacity:0.8}
:focus-visible{outline:2px solid var(--focus);outline-offset:3px;border-radius:3px}
</style>
</head>
<body>
<main>
<section aria-labelledby="s5-quote">
  <div class="stage">
    <div class="bg" aria-hidden="true"></div>
    <span class="bg-tag" aria-hidden="true">Platzhalter · Werkstatt-Hintergrund</span>
    <div class="shell">
      <p class="kicker">Familienbetrieb seit 1968 · Düsseldorf</p>
      <figure>
        <blockquote>
          <p class="quote" id="s5-quote">
            Wir verkaufen kein Stück, das wir nicht <span class="em">selbst</span> gefertigt hätten.
          </p>
        </blockquote>
        <figcaption>
          <span class="attr-name">Friedrich Aurélie</span>
          <span class="attr-role">Meister, zweite Generation</span>
        </figcaption>
      </figure>
    </div>
  </div>

  <div class="stats">
    <div class="stats-grid" id="stats">
      <div class="stat">
        <p class="num"><span class="count" data-to="57" data-suffix="">0</span></p>
        <p class="label">Jahre Werkstatt</p>
        <p class="sub">gegründet 1968</p>
      </div>
      <div class="stat">
        <p class="num"><span class="count" data-to="9400" data-suffix="+">0</span></p>
        <p class="label">Anfertigungen</p>
        <p class="sub">von Hand, im Haus</p>
      </div>
      <div class="stat">
        <p class="num"><span class="count" data-to="3" data-suffix="">0</span></p>
        <p class="label">Meister</p>
        <p class="sub">dritte Generation</p>
      </div>
    </div>
  </div>
</section>
</main>

<script>
(function(){
  var counts = Array.prototype.slice.call(document.querySelectorAll('.count'));
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function fmt(n){ return n.toLocaleString('de-DE'); }
  function setFinal(){
    counts.forEach(function(el){
      el.textContent = fmt(parseInt(el.getAttribute('data-to'),10)) + (el.getAttribute('data-suffix')||'');
    });
  }
  if(reduce){ setFinal(); return; }

  function animate(el){
    var to = parseInt(el.getAttribute('data-to'),10);
    var suffix = el.getAttribute('data-suffix')||'';
    var dur = 1500, start = null;
    function step(ts){
      if(start === null) start = ts;
      var t = Math.min((ts - start)/dur, 1);
      var eased = 1 - Math.pow(1 - t, 3);
      el.textContent = fmt(Math.round(to * eased)) + suffix;
      if(t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){ animate(e.target); io.unobserve(e.target); }
    });
  },{threshold:0.5});
  counts.forEach(function(el){ io.observe(el); });
})();
</script>
</body>
</html>
