<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!--
  VARIANTE: Sektion 1 · Hero · v6 "Echter Ring, interaktiv inszeniert"
  TRAGENDE IDEE: Das reale Freisteller-Foto des Solitär-Rings als Hauptdarsteller auf
    Obsidian. Pointer-Tilt (3D-Neigung), cursorgeführter Gold-Glint, Diamant-Funkeln
    (Canvas 2D), Tiefenschatten und magnetischer CTA "Trauring-Beratung".
  TECHNIK: Reines CSS/JS, kein WebGL nötig. Optionaler Laufzeit-Weiß-Knockout via Canvas
    (nur wenn Bild same-origin lesbar, z. B. über http). Bild: assets/ring.png.
  PRODUKTIONSPFAD (Next.js/R3F): Ring als next/image (AVIF/WebP, transparenter Freisteller,
    art-directed per <picture>), Tilt/Glint via motion/react useMotionValue + springs,
    Funkeln als <Canvas>-Layer oder CSS, prefers-reduced-motion respektiert. Weiß-Knockout
    entfällt in PROD (dort liegt der Freisteller bereits transparent vor).
  HINWEIS: assets/ring.png durch das echte Foto ersetzen. Ideal transparenter Hintergrund;
    weißer Hintergrund wird (über http) automatisch entfernt, offline ggf. als Foto gezeigt.
-->
<title>MAISON AURÉLIE · Trauringe &amp; Verlobung</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<!-- PROD: next/font lokal statt Google-Fonts-CDN -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --obsidian:    oklch(0.16 0.006 270);
    --ink:         oklch(0.21 0.008 270);
    --offwhite:    oklch(0.96 0.004 90);
    --muted:       oklch(0.72 0.01 90);
    --gold:        oklch(0.72 0.10 85);
    --gold-bright: oklch(0.82 0.09 82);
    --gold-deep:   oklch(0.58 0.09 78);
    --platinum:    oklch(0.80 0.008 250);
    --hairline:    oklch(0.30 0.01 270 / 0.6);
    --focus:       oklch(0.82 0.09 82);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--obsidian);
    color:var(--offwhite);
    font-family:"Inter",system-ui,sans-serif;
    line-height:1.5;
    overflow-x:hidden;
    min-height:100svh;
  }
  a{color:inherit;text-decoration:none}
  :focus-visible{outline:2px solid var(--focus);outline-offset:3px;border-radius:4px}

  /* ---------- Top-Nav ---------- */
  .nav{
    position:relative;z-index:5;
    display:flex;align-items:center;justify-content:space-between;gap:1rem;
    padding:clamp(1rem,2.5vw,1.6rem) clamp(1.1rem,4vw,3rem);
  }
  .wordmark{
    font-family:"Cormorant Garamond",serif;font-weight:500;
    font-size:clamp(1.15rem,2.4vw,1.5rem);letter-spacing:.14em
  }
  .nav-links{display:none;gap:2rem;font-size:.92rem;color:var(--muted)}
  .nav-links a:hover{color:var(--offwhite)}
  .nav-cta{
    display:inline-flex;align-items:center;min-height:44px;padding:0 1.15rem;
    border:1px solid var(--hairline);border-radius:999px;font-size:.9rem;
    transition:border-color .25s ease,color .25s ease
  }
  .nav-cta:hover{border-color:var(--gold);color:var(--gold-bright)}
  @media (min-width:62rem){.nav-links{display:flex}}

  /* ---------- Hero-Grid ---------- */
  .hero{
    position:relative;
    min-height:calc(100svh - 5rem);
    display:grid;gap:clamp(1.5rem,4vw,3rem);
    grid-template-columns:1fr;
    align-items:center;
    padding:clamp(1.25rem,4vw,3rem) clamp(1.1rem,5vw,4rem) clamp(2.5rem,6vw,4rem);
  }
  @media (min-width:60rem){
    .hero{grid-template-columns:1.05fr 1fr}
  }

  /* Cursor-Spotlight (radiale Aufhellung folgt der Maus) */
  .spot{
    position:absolute;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(40rem 40rem at var(--mx,70%) var(--my,40%),
      oklch(0.30 0.03 85 / 0.35), transparent 60%);
    transition:background .12s linear;
  }

  /* ---------- Copy ---------- */
  .copy{position:relative;z-index:2;max-width:34rem}
  .eyebrow{
    font-size:.82rem;letter-spacing:.2em;text-transform:uppercase;
    color:var(--gold-bright);margin-bottom:1.1rem
  }
  h1{
    font-family:"Cormorant Garamond",serif;font-weight:500;
    font-size:clamp(2.6rem,7vw,4.8rem);line-height:1.02;letter-spacing:-.01em;
    margin-bottom:1.2rem
  }
  h1 .em{font-style:italic;color:var(--gold-bright)}
  .lede{color:var(--muted);font-size:clamp(1rem,2.2vw,1.15rem);max-width:42ch;margin-bottom:1.9rem}
  .actions{display:flex;flex-wrap:wrap;gap:.9rem;align-items:center}
  .btn-primary{
    display:inline-flex;align-items:center;justify-content:center;
    min-height:48px;padding:0 1.5rem;border-radius:999px;
    background:var(--gold);color:oklch(0.18 0.02 80);font-weight:600;
    will-change:transform;transition:background .25s ease
  }
  .btn-primary:hover{background:var(--gold-bright)}
  .btn-ghost{
    display:inline-flex;align-items:center;min-height:48px;padding:0 1rem;
    color:var(--muted)
  }
  .btn-ghost:hover{color:var(--offwhite)}

  /* ---------- Ring-Bühne ---------- */
  .stage-wrap{position:relative;z-index:2;display:grid;place-items:center}
  .stage{
    position:relative;width:min(86vw,30rem);aspect-ratio:1/1;
    perspective:1100px;
  }
  .tilt{
    position:absolute;inset:0;display:grid;place-items:center;
    transform-style:preserve-3d;
    transition:transform .18s ease-out;
    will-change:transform;
  }
  .ring{
    width:84%;height:84%;object-fit:contain;
    transform:translateZ(40px);
    filter:drop-shadow(0 26px 30px oklch(0 0 0 / 0.55));
  }
  /* Gold-Glint: wandernde, weich maskierte Aufhellung über dem Ring */
  .glint{
    position:absolute;inset:7%;border-radius:50%;mix-blend-mode:screen;
    pointer-events:none;transform:translateZ(60px);
    background:radial-gradient(8rem 8rem at var(--gx,40%) var(--gy,35%),
      oklch(0.92 0.08 85 / 0.55), transparent 65%);
    transition:background .12s linear;
  }
  .sparkle{position:absolute;inset:0;transform:translateZ(70px);pointer-events:none}
  /* Bodenreflex / Schatten */
  .floor{
    position:absolute;left:50%;bottom:4%;width:62%;height:7%;transform:translateX(-50%);
    background:radial-gradient(closest-side, oklch(0 0 0 / 0.55), transparent);
    filter:blur(6px);
  }

  /* CSS-Platzhalter-Ring, falls assets/ring.png fehlt */
  .ring-fallback{
    width:70%;height:70%;transform:translateZ(40px);
    display:grid;place-items:center;position:relative
  }
  .ring-fallback .band{
    position:absolute;bottom:4%;width:64%;aspect-ratio:1/1;border-radius:50%;
    border:14px solid transparent;
    background:
      linear-gradient(var(--ink),var(--ink)) padding-box,
      conic-gradient(from 200deg, var(--gold-deep), var(--gold-bright), var(--gold), var(--gold-deep)) border-box;
  }
  .ring-fallback .stone{
    position:absolute;top:2%;width:34%;aspect-ratio:1/1;border-radius:8px 8px 50% 50%;
    background:
      conic-gradient(from 90deg, oklch(0.96 0.02 250), oklch(0.82 0.02 250), oklch(0.98 0 0), oklch(0.78 0.03 250), oklch(0.96 0.02 250));
    box-shadow:0 0 18px oklch(0.9 0.05 250 / 0.5);
    clip-path:polygon(50% 0,100% 38%,82% 100%,18% 100%,0 38%);
  }
  .ph-note{position:absolute;bottom:-1.7rem;left:0;right:0;text-align:center;
    font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

  .scrollhint{
    position:absolute;left:50%;bottom:1.1rem;transform:translateX(-50%);z-index:2;
    font-size:.74rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)
  }

  @media (prefers-reduced-motion:reduce){
    .tilt{transition:none !important}
    .spot,.glint{transition:none}
  }
</style>
</head>
<body>
  <header class="nav">
    <a class="wordmark" href="#">MAISON AURÉLIE</a>
    <nav class="nav-links" aria-label="Hauptnavigation">
      <a href="#">Trauringe</a>
      <a href="#">Uhren</a>
      <a href="#">Schmuck</a>
      <a href="#">Manufaktur</a>
    </nav>
    <a class="nav-cta" href="#termin">Termin</a>
  </header>

  <main class="hero" id="hero">
    <div class="spot" aria-hidden="true"></div>

    <div class="copy">
      <p class="eyebrow">Verlobung &amp; Trauringe</p>
      <h1>Ein Versprechen, <span class="em">in Gold gefasst</span>.</h1>
      <p class="lede">Solitär in 750 Gelbgold, von Hand gefasst in unserem Meisteratelier. Lassen Sie sich zu zweit beraten, in Ruhe und ohne Eile.</p>
      <div class="actions">
        <a class="btn-primary" id="cta" href="#termin">Trauring-Beratung</a>
        <a class="btn-ghost" href="#kollektion">Kollektion ansehen</a>
      </div>
    </div>

    <div class="stage-wrap">
      <div class="stage" id="stage">
        <div class="tilt" id="tilt">
          <img class="ring" id="ring" src="assets/ring.png" alt="Solitär-Verlobungsring in 750 Gelbgold mit Brillant" />
          <div class="glint" aria-hidden="true"></div>
          <canvas class="sparkle" id="sparkle" aria-hidden="true"></canvas>
          <div class="floor" aria-hidden="true"></div>
        </div>
      </div>
    </div>

    <p class="scrollhint" aria-hidden="true">Scrollen</p>
  </main>

<script>
(() => {
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const coarse = window.matchMedia('(pointer: coarse)').matches;
  const hero = document.getElementById('hero');
  const spot = hero.querySelector('.spot');
  const tilt = document.getElementById('tilt');
  const glint = hero.querySelector('.glint');
  const ring = document.getElementById('ring');
  const stage = document.getElementById('stage');

  /* ---- Ring-Bild laden: Fallback + optionaler Weiß-Knockout ---- */
  ring.addEventListener('error', () => {
    // assets/ring.png fehlt -> eleganter CSS-Platzhalter
    ring.style.display = 'none';
    const fb = document.createElement('div');
    fb.className = 'ring-fallback';
    fb.innerHTML = '<div class="band"></div><div class="stone"></div>' +
      '<div class="ph-note">Platzhalter · assets/ring.png einsetzen</div>';
    tilt.insertBefore(fb, tilt.querySelector('.glint'));
  });
  ring.addEventListener('load', () => {
    // Weißen Hintergrund entfernen, wenn die Pixel lesbar sind (http). Offline (file://)
    // wirft getImageData ggf. einen Sicherheitsfehler -> dann Bild unverändert zeigen.
    try {
      const w = ring.naturalWidth, h = ring.naturalHeight;
      if (!w || !h) return;
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const ctx = c.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(ring, 0, 0);
      const img = ctx.getImageData(0, 0, w, h);
      const d = img.data;
      let changed = false;
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], g = d[i+1], b = d[i+2];
        // nahezu weiß -> transparent; weicher Rand für Anti-Aliasing
        const m = Math.min(r, g, b);
        if (r > 238 && g > 238 && b > 238) { d[i+3] = 0; changed = true; }
        else if (m > 224) { d[i+3] = Math.max(0, d[i+3] - (m - 224) * 6); changed = true; }
      }
      if (changed) {
        ctx.putImageData(img, 0, 0);
        ring.src = c.toDataURL('image/png');
      }
    } catch (e) {
      /* file://-Taint: Foto unverändert anzeigen, kein Abbruch */
    }
  }, { once:false });

  /* ---- Cursor-Spotlight + Pointer-Tilt + Glint ---- */
  if (!reduce && !coarse) {
    let raf = 0, tx = 0, ty = 0, cx = 0, cy = 0;
    const onMove = (e) => {
      const r = hero.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width;
      const py = (e.clientY - r.top) / r.height;
      spot.style.setProperty('--mx', (px*100).toFixed(1) + '%');
      spot.style.setProperty('--my', (py*100).toFixed(1) + '%');

      const s = stage.getBoundingClientRect();
      const sx = (e.clientX - s.left) / s.width - 0.5;   // -0.5..0.5
      const sy = (e.clientY - s.top) / s.height - 0.5;
      tx = Math.max(-1, Math.min(1, sx)) * 14;            // rotateY
      ty = Math.max(-1, Math.min(1, sy)) * -14;           // rotateX
      glint.style.setProperty('--gx', (40 + sx*55).toFixed(1) + '%');
      glint.style.setProperty('--gy', (35 + sy*55).toFixed(1) + '%');
      if (!raf) raf = requestAnimationFrame(apply);
    };
    const apply = () => {
      raf = 0;
      cx += (tx - cx) * 0.18; cy += (ty - cy) * 0.18;
      tilt.style.transform = `rotateY(${cx.toFixed(2)}deg) rotateX(${cy.toFixed(2)}deg)`;
      if (Math.abs(tx-cx) > 0.05 || Math.abs(ty-cy) > 0.05) raf = requestAnimationFrame(apply);
    };
    hero.addEventListener('pointermove', onMove);
    hero.addEventListener('pointerleave', () => {
      tx = ty = 0; if (!raf) raf = requestAnimationFrame(apply);
    });
  } else if (!reduce && coarse) {
    // Mobile: sanftes Schweben statt Drag (kein Scroll-Footgun)
    let t = 0, raf = 0;
    const float = () => {
      t += 0.016;
      tilt.style.transform = `rotateY(${Math.sin(t)*5}deg) rotateX(${Math.cos(t*0.8)*3}deg)`;
      raf = requestAnimationFrame(float);
    };
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) { cancelAnimationFrame(raf); raf = 0; }
      else if (!raf) raf = requestAnimationFrame(float);
    });
    raf = requestAnimationFrame(float);
  }

  /* ---- Magnetischer CTA (subtil, <= 8px) ---- */
  if (!reduce && !coarse) {
    const cta = document.getElementById('cta');
    cta.addEventListener('pointermove', (e) => {
      const r = cta.getBoundingClientRect();
      const dx = (e.clientX - (r.left + r.width/2)) / (r.width/2);
      const dy = (e.clientY - (r.top + r.height/2)) / (r.height/2);
      cta.style.transform = `translate(${(dx*8).toFixed(1)}px, ${(dy*8).toFixed(1)}px)`;
    });
    cta.addEventListener('pointerleave', () => { cta.style.transform = ''; });
  }

  /* ---- Diamant-Funkeln (Canvas 2D) ---- */
  const canvas = document.getElementById('sparkle');
  if (!reduce) {
    const ctx = canvas.getContext('2d');
    let W, H, dpr, sparks = [], raf = 0, running = true;
    const DPR = () => Math.min(window.devicePixelRatio || 1, 2);
    function resize(){
      dpr = DPR();
      const r = stage.getBoundingClientRect();
      W = r.width; H = r.height;
      canvas.width = Math.round(W*dpr); canvas.height = Math.round(H*dpr);
      canvas.style.width = W+'px'; canvas.style.height = H+'px';
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    function spawn(){
      // Funken im oberen Bereich (Diamant-Zone)
      sparks.push({
        x: W*(0.34 + Math.random()*0.32),
        y: H*(0.16 + Math.random()*0.24),
        r: 1 + Math.random()*2.4,
        life: 0, max: 40 + Math.random()*40,
        rot: Math.random()*Math.PI
      });
      if (sparks.length > 26) sparks.shift();
    }
    function star(x,y,r,a,rot){
      ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
      ctx.globalAlpha = a;
      ctx.fillStyle = 'oklch(0.97 0.03 90)';
      ctx.beginPath();
      for(let i=0;i<4;i++){
        ctx.rotate(Math.PI/2);
        ctx.moveTo(0,0);
        ctx.quadraticCurveTo(r*0.18, r*0.18, 0, r);
        ctx.quadraticCurveTo(-r*0.18, r*0.18, 0, 0);
      }
      ctx.fill(); ctx.restore();
    }
    let acc = 0;
    function frame(){
      if(!running) return;
      ctx.clearRect(0,0,W,H);
      acc++; if (acc % 7 === 0) spawn();
      for (const s of sparks){
        s.life++;
        const t = s.life/s.max;
        const a = Math.sin(Math.min(1,t)*Math.PI);  // ein/aus
        star(s.x, s.y, s.r*(0.6+a), a*0.9, s.rot + t*1.2);
      }
      sparks = sparks.filter(s => s.life < s.max);
      raf = requestAnimationFrame(frame);
    }
    const io = new IntersectionObserver((es)=>{
      es.forEach(e=>{
        running = e.isIntersecting && !document.hidden;
        if (running && !raf){ raf = requestAnimationFrame(frame); }
        else if (!running){ cancelAnimationFrame(raf); raf = 0; }
      });
    });
    document.addEventListener('visibilitychange', ()=>{
      if (document.hidden){ running=false; cancelAnimationFrame(raf); raf=0; }
      else { running=true; if(!raf) raf=requestAnimationFrame(frame); }
    });
    window.addEventListener('resize', resize);
    resize(); io.observe(stage); raf = requestAnimationFrame(frame);
  }
})();
</script>
</body>
</html>
