<!DOCTYPE html>
<html lang="de">
<head>
<!-- MAISON VEYRA · Hero-Option 5 "Mosaic" — Bento-Bildraster mit Headline-Overlay und
     Lauftext. Modern, editorial/Galerie. -->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VEYRA — Hero 5 · Mosaic</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#0D0B0A;--fg:#F4ECE1;--muted:#A89E8E;--gold:#C9A45B;--line:rgba(244,236,225,.14);--ease:cubic-bezier(.22,1,.36,1)}
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:"Inter",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
  .badge{position:fixed;left:14px;bottom:14px;z-index:50;background:var(--fg);color:var(--bg);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;opacity:.85}
  .hero{min-height:100vh;display:flex;flex-direction:column;padding:clamp(20px,3vw,32px);gap:clamp(14px,2vw,20px)}
  .top{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;padding:clamp(10px,3vh,30px) 6px 0}
  .top .eb{font-family:"JetBrains Mono",monospace;font-size:.72rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin:0}
  .top h1{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:clamp(2.4rem,6vw,5rem);line-height:1.0;margin:10px 0 0;max-width:18ch}
  .top h1 em{font-style:italic;color:var(--gold)}
  .top .cta{display:inline-flex;align-items:center;min-height:50px;padding:0 26px;border-radius:999px;border:1px solid var(--line);font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;transition:background .3s,color .3s;white-space:nowrap}
  .top .cta:hover{background:var(--fg);color:var(--bg)}
  .grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:1.3fr 1fr;gap:clamp(12px,1.4vw,18px);min-height:54vh}
  .tile{position:relative;border-radius:18px;overflow:hidden;background:#141009}
  .tile img{width:100%;height:100%;object-fit:cover;transition:transform .9s var(--ease)}
  .tile:hover img{transform:scale(1.07)}
  .tile .cap{position:absolute;left:14px;bottom:12px;z-index:2;font-family:"JetBrains Mono",monospace;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:#fff;mix-blend-mode:difference}
  .tile.big{grid-column:span 2;grid-row:span 2}
  .tile.wide{grid-column:span 2}
  @media (max-width:820px){
    .grid{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(3,1fr)}
    .tile.big{grid-column:span 2;grid-row:span 1}.tile.wide{grid-column:span 2}
  }
  .marquee{overflow:hidden;white-space:nowrap;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:12px 0}
  .marquee .tr{display:inline-flex;gap:40px;animation:m 24s linear infinite;font-family:"Cormorant Garamond",serif;font-size:1.3rem;color:var(--muted)}
  .marquee .tr span{display:inline-flex;gap:40px;align-items:center}
  .marquee .tr i{color:var(--gold);font-style:normal}
  @keyframes m{to{transform:translateX(-50%)}}
  @media (prefers-reduced-motion:reduce){.tile img,.marquee .tr{animation:none !important;transition:none !important}}
</style>
</head>
<body>
<span class="badge">Hero 5 · Mosaic</span>
<section class="hero">
  <div class="top">
    <div>
      <p class="eb">Maison Veyra · Düsseldorf</p>
      <h1>Vier Welten, <em>ein Haus</em>.</h1>
    </div>
    <a class="cta" href="#">Alles entdecken</a>
  </div>
  <div class="grid">
    <a class="tile big" href="#"><img src="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=1300&q=80&auto=format&fit=crop" alt="Feiner Goldschmuck" /><span class="cap">Schmuck</span></a>
    <a class="tile" href="#"><img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=800&q=80&auto=format&fit=crop" alt="Solitär-Ring" /><span class="cap">Trauringe</span></a>
    <a class="tile" href="#"><img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800&q=80&auto=format&fit=crop" alt="Feine Uhr" /><span class="cap">Uhren</span></a>
    <a class="tile wide" href="#"><img src="https://images.unsplash.com/photo-1602173574767-37ac01994b2a?w=1100&q=80&auto=format&fit=crop" alt="Edelstein" /><span class="cap">Diamanten</span></a>
  </div>
  <div class="marquee" aria-hidden="true">
    <div class="tr">
      <span>Haute Joaillerie <i>·</i> Horlogerie <i>·</i> Trauringe nach Maß <i>·</i> Atelier am Rhein <i>·</i> Seit 1968 <i>·</i></span>
      <span>Haute Joaillerie <i>·</i> Horlogerie <i>·</i> Trauringe nach Maß <i>·</i> Atelier am Rhein <i>·</i> Seit 1968 <i>·</i></span>
    </div>
  </div>
</section>
</body>
</html>
