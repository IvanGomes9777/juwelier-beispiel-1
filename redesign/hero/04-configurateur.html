<!DOCTYPE html>
<html lang="de">
<head>
<!-- MAISON VEYRA · Hero-Option 4 "Configurateur" — Ring-Buehne + Material-Selektor, der
     den Akzent live aendert. Inspiration: webgi-jewelry. -->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VEYRA — Hero 4 · Configurateur</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#0E0C0A;--fg:#F4ECE1;--muted:#A89E8E;--accent:#C9A45B;--line:rgba(244,236,225,.16);--ease:cubic-bezier(.22,1,.36,1);--t:340ms}
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;background:
      radial-gradient(900px 600px at 78% 30%,rgba(201,164,91,.12),transparent 60%),var(--bg);
    color:var(--fg);font-family:"Inter",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background var(--t)}
  .badge{position:fixed;left:14px;bottom:14px;z-index:50;background:var(--fg);color:var(--bg);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;opacity:.85}
  .hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:clamp(30px,5vw,70px);padding:clamp(80px,10vh,120px) clamp(24px,6vw,90px) 60px}
  @media (max-width:880px){.hero{grid-template-columns:1fr;text-align:center}}
  .eb{font-family:"JetBrains Mono",monospace;font-size:.74rem;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin:0 0 20px;transition:color var(--t)}
  h1{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:clamp(2.6rem,6vw,5rem);line-height:1.02;margin:0 0 20px}
  h1 em{font-style:italic;color:var(--accent);transition:color var(--t)}
  .lead{color:var(--muted);max-width:42ch;margin:0 0 30px;font-size:1.06rem}
  @media (max-width:880px){.lead{margin-left:auto;margin-right:auto}}
  .config{display:flex;flex-direction:column;gap:14px}
  @media (max-width:880px){.config{align-items:center}}
  .config .ctitle{font-family:"JetBrains Mono",monospace;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  .swatches{display:flex;gap:14px}
  .swatches button{width:50px;height:50px;border-radius:50%;border:2px solid transparent;cursor:pointer;position:relative;transition:transform .2s var(--ease),border-color var(--t);box-shadow:inset 0 0 0 1px rgba(0,0,0,.25)}
  .swatches button:hover{transform:translateY(-3px)}
  .swatches button[aria-pressed="true"]{border-color:var(--fg)}
  .swatches button .nm{position:absolute;top:58px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:.7rem;letter-spacing:.05em;color:var(--muted)}
  .sw-gelb{background:radial-gradient(circle at 35% 30%,#F6DC97,#C99A4E)}
  .sw-weiss{background:radial-gradient(circle at 35% 30%,#F4F6F9,#B9C0CC)}
  .sw-rose{background:radial-gradient(circle at 35% 30%,#EDC9B8,#C98E76)}
  .sw-platin{background:radial-gradient(circle at 35% 30%,#EAECEF,#9098A2)}
  .cta{display:inline-flex;align-items:center;min-height:52px;padding:0 28px;border-radius:999px;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600;background:var(--accent);color:#1c1407;margin-top:34px;transition:background var(--t),transform .15s}
  @media (max-width:880px){.cta{margin-left:auto;margin-right:auto}}
  .cta:active{transform:scale(.97)}
  .stage{position:relative;justify-self:center;width:min(82vw,460px);aspect-ratio:1;border-radius:30px;overflow:hidden;box-shadow:0 50px 100px -50px rgba(0,0,0,.8)}
  .stage img{width:100%;height:100%;object-fit:cover}
  .stage .glow{position:absolute;inset:0;mix-blend-mode:soft-light;background:radial-gradient(circle at 50% 42%,var(--accent),transparent 60%);opacity:.7;transition:background var(--t)}
  .stage .ring{position:absolute;inset:0;border:1px solid var(--line);border-radius:30px;pointer-events:none}
  @media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>
<span class="badge">Hero 4 · Configurateur</span>
<section class="hero">
  <div>
    <p class="eb">Atelier · nach Maß</p>
    <h1>Ihr Ring, <em>Ihr Material</em>.</h1>
    <p class="lead">Wählen Sie das Edelmetall und sehen Sie den Ton in Echtzeit. In Produktion als 3D-Konfigurator (WebGL).</p>
    <div class="config">
      <span class="ctitle">Material wählen</span>
      <div class="swatches" role="group" aria-label="Material">
        <button class="sw-gelb" aria-pressed="true" data-accent="#C9A45B" aria-label="Gelbgold"><span class="nm">Gelbgold</span></button>
        <button class="sw-weiss" aria-pressed="false" data-accent="#AEB6C2" aria-label="Weißgold"><span class="nm">Weißgold</span></button>
        <button class="sw-rose" aria-pressed="false" data-accent="#D2A088" aria-label="Roségold"><span class="nm">Roségold</span></button>
        <button class="sw-platin" aria-pressed="false" data-accent="#AAB2BD" aria-label="Platin"><span class="nm">Platin</span></button>
      </div>
    </div>
    <a class="cta" href="#">Jetzt konfigurieren</a>
  </div>
  <div class="stage">
    <img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=1200&q=80&auto=format&fit=crop" alt="Solitär-Ring" />
    <div class="glow" aria-hidden="true"></div>
    <div class="ring" aria-hidden="true"></div>
  </div>
</section>
<script>
(function(){
  var sw=document.querySelectorAll(".swatches button");
  sw.forEach(function(b){b.addEventListener("click",function(){
    sw.forEach(function(x){x.setAttribute("aria-pressed","false");});
    b.setAttribute("aria-pressed","true");
    document.documentElement.style.setProperty("--accent",b.getAttribute("data-accent"));
  });});
})();
</script>
</body>
</html>
