images.unsplash.com/photo-1547996160-81dfa63595aa?w=1100&q=80&auto=format&fit=crop\" data-cap=\"Uhren|Automatik\"><span class=\"ix\">03<\/span> Automatik<\/a><\/li>\n      <\/ul>\n      <h4>Service<\/h4>\n      <ul><li><a class=\"sub\" href=\"#\" data-img=\"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=1100&q=80&auto=format&fit=crop\" data-cap=\"Service|Revision\"><span class=\"ix\">04<\/span> Revision &amp; Ankauf<\/a><\/li><\/ul>\n    <\/div>\n  <\/div>\n  <div class=\"rcol\"><div class=\"preview\"><img id=\"previewImg\" src=\"\" alt=\"Vorschau\" /><\/div><div class=\"pcap\"><em id=\"capKicker\"><\/em><b id=\"capTitle\"><\/b><\/div><\/div>\n<\/div>\n<header class=\"topbar\"><a class=\"brand\" href=\"#\">VEYRA<\/a><button id=\"ovlOpen\" aria-expanded=\"false\" aria-controls=\"ovl\"><span class=\"dot\"><\/span> Men\u00fc<\/button><\/header>\n<div class=\"ovl\" id=\"ovl\" aria-hidden=\"true\">\n  <div class=\"x\"><span class=\"brand\" style=\"font-family:'Cormorant Garamond',serif;font-size:1.4rem;letter-spacing:.2em;color:var(--fg)\">VEYRA<\/span><button id=\"ovlClose\" aria-label=\"Schlie\u00dfen\">&times;<\/button><\/div>\n  <div class=\"grp\"><div class=\"glabel\"><a href=\"#\">Schmuck<\/a><\/div><div class=\"links\"><a href=\"#\">Ringe<\/a><a href=\"#\">Halsketten<\/a><a href=\"#\">Ohrringe<\/a><a href=\"#\">Armb\u00e4nder<\/a><\/div><\/div>\n  <div class=\"grp\"><div class=\"glabel\"><a href=\"#\">Trauringe<\/a><\/div><div class=\"links\"><a href=\"#\">Konfigurator<\/a><a href=\"#\">Materialien<\/a><a href=\"#\">Solit\u00e4re<\/a><\/div><\/div>\n  <div class=\"grp\"><div class=\"glabel\"><a href=\"#\">Uhren<\/a><\/div><div class=\"links\"><a href=\"#\">Damenuhren<\/a><a href=\"#\">Herrenuhren<\/a><a href=\"#\">Service<\/a><\/div><\/div>\n  <div class=\"grp\"><div class=\"glabel\"><a href=\"#\">Atelier<\/a><\/div><\/div>\n  <div class=\"grp\"><div class=\"glabel\"><a href=\"#\">Maison<\/a><\/div><\/div>\n<\/div>\n<div class=\"main\"><section class=\"hero\"><div class=\"fallback\" id=\"fb\"><img src=\"https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=1600&q=80&auto=format&fit=crop\" alt=\"\"/><\/div><canvas id=\"gem\"><\/canvas>\n  <div class=\"inner\">\n    <p class=\"eb rise\"><span class=\"ln\"><\/span> Maison Veyra \u00b7 Brillant 1,02 ct<\/p>\n    <h1 class=\"rise d1\">Echtes <em>Feuer<\/em>.<\/h1>\n    <p class=\"lead rise d2\">Physikalisch gerenderter Brillant: Brechung, Dispersion, Bloom in Echtzeit. Cursor bewegen.<\/p>\n    \n    <div class=\"actions rise d3\"><a class=\"cta solid\" href=\"#\">Diamanten ansehen<\/a><a class=\"cta ghost\" href=\"#\">Beratung<\/a><\/div>\n  <\/div>\n  <span class=\"hint\">WebGL \u00b7 Echtzeit-Brechung<\/span>\n<\/section><\/div><script>\n(function(){\n  var sidebar=document.getElementById(\"sidebar\"),scrim=document.getElementById(\"scrim\"),flyout=document.getElementById(\"flyout\"),\n      panelTitle=document.getElementById(\"panelTitle\"),previewImg=document.getElementById(\"previewImg\"),\n      capKicker=document.getElementById(\"capKicker\"),capTitle=document.getElementById(\"capTitle\");\n  var items=document.querySelectorAll(\".navitem[data-panel]\"),panels=document.querySelectorAll(\".panel\"),closeTimer=null,current=null;\n  function setPreview(url,cap){if(url&&previewImg.getAttribute(\"src\")!==url){previewImg.style.opacity=0;var p=new Image();p.onload=function(){previewImg.src=url;previewImg.style.opacity=1;};p.src=url;}\n    if(cap){var s=cap.split(\"|\");capKicker.textContent=s[0]||\"\";capTitle.textContent=s[1]||\"\";}}\n  function openPanel(key,btn){current=key;panels.forEach(function(p){p.classList.toggle(\"show\",p.getAttribute(\"data-key\")===key);});\n    items.forEach(function(b){b.classList.toggle(\"active\",b===btn);b.setAttribute(\"aria-expanded\",b===btn?\"true\":\"false\");});\n    var a=document.querySelector('.panel[data-key=\"'+key+'\"]');panelTitle.textContent=btn?btn.textContent.replace(\"\\u2192\",\"\").trim():key;\n    setPreview(a.getAttribute(\"data-default\"),a.getAttribute(\"data-cap\"));flyout.classList.add(\"open\");scrim.classList.add(\"open\");}\n  function closePanel(){flyout.classList.remove(\"open\");scrim.classList.remove(\"open\");current=null;\n    items.forEach(function(b){b.classList.remove(\"active\");b.setAttribute(\"aria-expanded\",\"false\");});}\n  items.forEach(function(btn){var key=btn.getAttribute(\"data-panel\");\n    btn.addEventListener(\"mouseenter\",function(){clearTimeout(closeTimer);openPanel(key,btn);});\n    btn.addEventListener(\"click\",function(){current===key?closePanel():openPanel(key,btn);});\n    btn.addEventListener(\"focus\",function(){openPanel(key,btn);});});\n  document.querySelectorAll(\".panel a.sub\").forEach(function(a){a.addEventListener(\"mouseenter\",function(){setPreview(a.getAttribute(\"data-img\"),a.getAttribute(\"data-cap\"));});});\n  function leave(){closeTimer=setTimeout(closePanel,160);}\n  sidebar.addEventListener(\"mouseleave\",leave);flyout.addEventListener(\"mouseleave\",leave);\n  sidebar.addEventListener(\"mouseenter\",function(){clearTimeout(closeTimer);});flyout.addEventListener(\"mouseenter\",function(){clearTimeout(closeTimer);});\n  scrim.addEventListener(\"click\",closePanel);document.getElementById(\"panelClose\").addEventListener(\"click\",closePanel);\n  document.addEventListener(\"keydown\",function(e){if(e.key===\"Escape\")closePanel();});\n  var ovl=document.getElementById(\"ovl\");\n  document.getElementById(\"ovlOpen\").addEventListener(\"click\",function(){ovl.classList.add(\"open\");ovl.setAttribute(\"aria-hidden\",\"false\");this.setAttribute(\"aria-expanded\",\"true\");});\n  document.getElementById(\"ovlClose\").addEventListener(\"click\",function(){ovl.classList.remove(\"open\");ovl.setAttribute(\"aria-hidden\",\"true\");});\n})();\n<\/script><script type=\"module\">\nimport * as THREE from 'three';\nimport { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';\nimport { ConvexGeometry } from 'three/addons/geometries/ConvexGeometry.js';\nimport { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';\nimport { RenderPass } from 'three/addons/postprocessing/RenderPass.js';\nimport { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';\nimport { OutputPass } from 'three/addons/postprocessing/OutputPass.js';\n\n  function brilliantGeometry(){\n    const pts=[],R=1.0,NG=16,NT=8,tableR=0.56,tableY=0.42,culetY=-0.92,crownMidR=0.9,crownMidY=0.2,TAU=6.28318;\n    for(let i=0;i<NT;i++){const a=i/NT*TAU;pts.push(new THREE.Vector3(Math.cos(a)*tableR,tableY,Math.sin(a)*tableR));}\n    for(let i=0;i<NG;i++){const a=(i+0.5)/NG*TAU;pts.push(new THREE.Vector3(Math.cos(a)*crownMidR,crownMidY,Math.sin(a)*crownMidR));}\n    for(let i=0;i<NG;i++){const a=i/NG*TAU;pts.push(new THREE.Vector3(Math.cos(a)*R,0,Math.sin(a)*R));}\n    pts.push(new THREE.Vector3(0,culetY,0));\n    return new ConvexGeometry(pts);\n  }\n  function diamondMaterial(color){\n    const m=new THREE.MeshPhysicalMaterial({color:color||0xffffff,metalness:0,roughness:0,transmission:1,ior:2.42,thickness:1.1,envMapIntensity:1.8,reflectivity:1,specularIntensity:1,attenuationColor:new THREE.Color(color||0xffffff),attenuationDistance:6});\n    if('dispersion' in m)m.dispersion=5.0; return m;\n  }\n  function sparkleField(n,rad){\n    const pos=new Float32Array(n*3);\n    for(let i=0;i<n;i++){const r=rad+Math.random()*rad*0.9,th=Math.random()*6.283,ph=Math.acos(2*Math.random()-1);\n      pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);pos[i*3+2]=r*Math.cos(ph);}\n    const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));\n    return new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:0.045,transparent:true,opacity:0.8,blending:THREE.AdditiveBlending,depthWrite:false}));\n  }\n\nconst canvas=document.getElementById('gem'),fb=document.getElementById('fb'),reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;\ntry{\n  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});\n  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.15;\n  const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(40,1,0.1,100);camera.position.set(0,0.1,5);\n  const pmrem=new THREE.PMREMGenerator(renderer);scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;\n  const gem=new THREE.Mesh(brilliantGeometry(),diamondMaterial(0xffffff));gem.scale.setScalar(1.35);scene.add(gem);\n  const l1=new THREE.PointLight(0xffffff,26,30,2);l1.position.set(3,4,3);scene.add(l1);\n  const l2=new THREE.PointLight(0xbfe6ff,18,30,2);l2.position.set(-4,-1,3);scene.add(l2);\n  const composer=new EffectComposer(renderer);composer.addPass(new RenderPass(scene,camera));\n  composer.addPass(new UnrealBloomPass(new THREE.Vector2(1,1),0.6,0.5,0.85));composer.addPass(new OutputPass());\n  function rs(){const w=canvas.clientWidth,h=canvas.clientHeight;if(!w||!h)return;renderer.setSize(w,h,false);composer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}\n  addEventListener('resize',rs);rs();setTimeout(rs,150);\n  let tx=0,ty=0,rx=0,ry=0;addEventListener('pointermove',e=>{const r=canvas.getBoundingClientRect();tx=((e.clientX-r.left)/r.width-0.5);ty=((e.clientY-r.top)/r.height-0.5);});\n  let run=true,t=0,started=false,raf;document.addEventListener('visibilitychange',()=>{run=!document.hidden;if(run&&!raf)loop();});\n  function loop(){raf=requestAnimationFrame(loop);if(!run){raf=0;return;}t+=0.016;ry+=((tx*0.9)-ry)*0.06;rx+=((ty*0.6)-rx)*0.06;\n    if(!reduce)gem.rotation.y+=0.006;gem.rotation.x=rx;gem.position.y=Math.sin(t*0.7)*0.04;\n    l1.position.set(Math.cos(t)*4,3,Math.sin(t)*4);l2.position.set(Math.cos(t+2.2)*4,-1.5,Math.sin(t+2.2)*4);\n    camera.position.x=tx*0.5;camera.position.y=0.1-ty*0.3;camera.lookAt(0,0,0);composer.render();\n    if(!started){started=true;if(fb)fb.style.display='none';}}\n  loop();\n}catch(e){if(canvas)canvas.style.display='none';console.error(e);}\n<\/script><\/body><\/html>"},
{t:"02 \u00b7 Configurateur",d:"webgi-Stil: realistischer 3D-Ring, Stein- + Metallwahl live, hell/minimal, Scroll-Hinweis.",h:"<!DOCTYPE html><html lang=\"de\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><title>VEYRA \u2014 02 \u00b7 Configurateur<\/title><link rel=\"preconnect\" href=\"https://fonts.googleapis.com\" /><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin /><link href=\"https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap\" rel=\"stylesheet\" /><script type=\"importmap\">{\"imports\":{\"three\":\"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js\",\"three/addons/\":\"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/\"}}<\/script><style>:root{--bg:#EEF0F2;--panel:#FAFBFC;--panel-2:#E6E9ED;--fg:#1B2128;--muted:#6B7681;--accent:#33414D;--accent2:#586773;--line:rgba(27,33,40,.13);--scrim:rgba(27,33,40,.35);--on-accent:#FAFBFC;--sw:252px;--ease:cubic-bezier(.22,1,.36,1);--t:340ms}\n  *,*::before,*::after{box-sizing:border-box}\n  html{scroll-behavior:smooth}\n  body{margin:0;background:var(--bg);color:var(--fg);font-family:\"Inter\",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}\n  a{color:inherit;text-decoration:none} img{display:block;max-width:100%}\n  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}\n  .badge{position:fixed;left:14px;bottom:14px;z-index:300;background:var(--fg);color:var(--bg);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;opacity:.9}\n\n  /* ===== Sidebar (gewaehlte Navbar: 6+5+8) ===== */\n  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sw);z-index:95;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:30px 24px}\n  .sidebar .brand{fo =\"false\" aria-label=\"Smaragd\" style=\"background:radial-gradient(circle at 35% 30%,#a6ecd0,#3fae86)\"><\/button><\/div><\/div><div class=\"grp\"><span class=\"pt\">Metall<\/span><div class=\"sw\" id=\"metsw\" role=\"group\" aria-label=\"Metall\"><button data-c=\"#E8EAEE\" data-r=\"0.18\" aria-pressed=\"true\" aria-label=\"Wei\u00dfgold\" style=\"background:radial-gradient(circle at 35% 30%,#f4f6f9,#b9c0cc)\"><\/button><button data-c=\"#E6C079\" data-r=\"0.22\" aria-pressed=\"false\" aria-label=\"Gelbgold\" style=\"background:radial-gradient(circle at 35% 30%,#f6dc97,#c99a4e)\"><\/button><button data-c=\"#E7B79F\" data-r=\"0.22\" aria-pressed=\"false\" aria-label=\"Ros\u00e9gold\" style=\"background:radial-gradient(circle at 35% 30%,#edc9b8,#c98e76)\"><\/button><button data-c=\"#DCE0E6\" data-r=\"0.14\" aria-pressed=\"false\" aria-label=\"Platin\" style=\"background:radial-gradient(circle at 35% 30%,#eaecef,#9098a2)\"><\/button><\/div><\/div><\/div><\/div><div class=\"scrollcue\"><span class=\"d\"><\/span>Start scrolling<\/div><\/section><\/div><script>\n(function(){\n  var sidebar=document.getElementById(\"sidebar\"),scrim=document.getElementById(\"scrim\"),flyout=document.getElementById(\"flyout\"),\n      panelTitle=document.getElementById(\"panelTitle\"),previewImg=document.getElementById(\"previewImg\"),\n      capKicker=document.getElementById(\"capKicker\"),capTitle=document.getElementById(\"capTitle\");\n  var items=document.querySelectorAll(\".navitem[data-panel]\"),panels=document.querySelectorAll(\".panel\"),closeTimer=null,current=null;\n  function setPreview(url,cap){if(url&&previewImg.getAttribute(\"src\")!==url){previewImg.style.opacity=0;var p=new Image();p.onload=function(){previewImg.src=url;previewImg.style.opacity=1;};p.src=url;}\n    if(cap){var s=cap.split(\"|\");capKicker.textContent=s[0]||\"\";capTitle.textContent=s[1]||\"\";}}\n  function openPanel(key,btn){current=key;panels.forEach(function(p){p.classList.toggle(\"show\",p.getAttribute(\"data-key\")===key);});\n    items.forEach(function(b){b.classList.toggle(\"active\",b===btn);b.setAttribute(\"aria-expanded\",b===btn?\"true\":\"false\");});\n    var a=document.querySelector('.panel[data-key=\"'+key+'\"]');panelTitle.textContent=btn?btn.textContent.replace(\"\\u2192\",\"\").trim():key;\n    setPreview(a.getAttribute(\"data-default\"),a.getAttribute(\"data-cap\"));flyout.classList.add(\"open\");scrim.classList.add(\"open\");}\n  function closePanel(){flyout.classList.remove(\"open\");scrim.classList.remove(\"open\");current=null;\n    items.forEach(function(b){b.classList.remove(\"active\");b.setAttribute(\"aria-expanded\",\"false\");});}\n  items.forEach(function(btn){var key=btn.getAttribute(\"data-panel\");\n    btn.addEventListener(\"mouseenter\",function(){clearTimeout(closeTimer);openPanel(key,btn);});\n    btn.addEventListener(\"click\",function(){current===key?closePanel():openPanel(key,btn);});\n    btn.addEventListener(\"focus\",function(){openPanel(key,btn);});});\n  document.querySelectorAll(\".panel a.sub\").forEach(function(a){a.addEventListener(\"mouseenter\",function(){setPreview(a.getAttribute(\"data-img\"),a.getAttribute(\"data-cap\"));});});\n  function leave(){closeTimer=setTimeout(closePanel,160);}\n  sidebar.addEventListener(\"mouseleave\",leave);flyout.addEventListener(\"mouseleave\",leave);\n  sidebar.addEventListener(\"mouseenter\",function(){clearTimeout(closeTimer);});flyout.addEventListener(\"mouseenter\",function(){clearTimeout(closeTimer);});\n  scrim.addEventListener(\"click\",closePanel);document.getElementById(\"panelClose\").addEventListener(\"click\",closePanel);\n  document.addEventListener(\"keydown\",function(e){if(e.key===\"Escape\")closePanel();});\n  var ovl=document.getElementById(\"ovl\");\n  document.getElementById(\"ovlOpen\").addEventListener(\"click\",function(){ovl.classList.add(\"open\");ovl.setAttribute(\"aria-hidden\",\"false\");this.setAttribute(\"aria-expanded\",\"true\");});\n  document.getElementById(\"ovlClose\").addEventListener(\"click\",function(){ovl.classList.remove(\"open\");ovl.setAttribute(\"aria-hidden\",\"true\");});\n})();\n<\/script><script type=\"module\">\nimport * as THREE from 'three';\nimport { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';\nimport { ConvexGeometry } from 'three/addons/geometries/ConvexGeometry.js';\n\n  function brilliantGeometry(){\n    const pts=[],R=1.0,NG=16,NT=8,tableR=0.56,tableY=0.42,culetY=-0.92,crownMidR=0.9,crownMidY=0.2,TAU=6.28318;\n    for(let i=0;i<NT;i++){const a=i/NT*TAU;pts.push(new THREE.Vector3(Math.cos(a)*tableR,tableY,Math.sin(a)*tableR));}\n    for(let i=0;i<NG;i++){const a=(i+0.5)/NG*TAU;pts.push(new THREE.Vector3(Math.cos(a)*crownMidR,crownMidY,Math.sin(a)*crownMidR));}\n    for(let i=0;i<NG;i++){const a=i/NG*TAU;pts.push(new THREE.Vector3(Math.cos(a)*R,0,Math.sin(a)*R));}\n    pts.push(new THREE.Vector3(0,culetY,0));\n    return new ConvexGeometry(pts);\n  }\n  function diamondMaterial(color){\n    const m=new THREE.MeshPhysicalMaterial({color:color||0xffffff,metalness:0,roughness:0,transmission:1,ior:2.42,thickness:1.1,envMapIntensity:1.8,reflectivity:1,specularIntensity:1,attenuationColor:new THREE.Color(color||0xffffff),attenuationDistance:6});\n    if('dispersion' in m)m.dispersion=5.0; return m;\n  }\n  function sparkleField(n,rad){\n    const pos=new Float32Array(n*3);\n    for(let i=0;i<n;i++){const r=rad+Math.random()*rad*0.9,th=Math.random()*6.283,ph=Math.acos(2*Math.random()-1);\n      pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);pos[i*3+2]=r*Math.cos(ph);}\n    const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));\n    return new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:0.045,transparent:true,opacity:0.8,blending:THREE.AdditiveBlending,depthWrite:false}));\n  }\n\nconst canvas=document.getElementById('gem'),reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;\ntry{\n  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});\n  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;\n  const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(40,1,0.1,100);camera.position.set(0,0.3,5.2);\n  const pmrem=new THREE.PMREMGenerator(renderer);scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;\n  const ring=new THREE.Group();\n  const bandMat=new THREE.MeshStandardMaterial({color:0xE8EAEE,metalness:1,roughness:0.18});\n  const band=new THREE.Mesh(new THREE.TorusGeometry(1.0,0.16,32,96),bandMat);ring.add(band);\n  const cup=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.19,0.16,18),bandMat);cup.position.y=1.02;ring.add(cup);\n  for(let i=0;i<4;i++){const a=i/4*6.283;const pr=new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.022,0.24,8),bandMat);pr.position.set(Math.cos(a)*0.15,1.18,Math.sin(a)*0.15);ring.add(pr);}\n  const dia=new THREE.Mesh(brilliantGeometry(),diamondMaterial(0xffffff));dia.scale.setScalar(0.46);dia.position.y=1.22;ring.add(dia);\n  ring.position.y=-0.5;scene.add(ring);\n  const l1=new THREE.PointLight(0xffffff,22,30,2);l1.position.set(3,4,3);scene.add(l1);\n  const l2=new THREE.PointLight(0xffffff,14,30,2);l2.position.set(-3,-1,3);scene.add(l2);\n  function rs(){const w=canvas.clientWidth,h=canvas.clientHeight;if(!w||!h)return;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}\n  addEventListener('resize',rs);rs();setTimeout(rs,150);\n  let tx=0,ty=0,rx=0,ry=0;addEventListener('pointermove',e=>{const r=canvas.getBoundingClientRect();tx=((e.clientX-r.left)/r.width-0.5);ty=((e.clientY-r.top)/r.height-0.5);});\n  document.querySelectorAll('#metsw button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('#metsw button').forEach(x=>x.setAttribute('aria-pressed','false'));b.setAttribute('aria-pressed','true');bandMat.color.set(b.dataset.c);bandMat.roughness=parseFloat(b.dataset.r);}));\n  document.querySelectorAll('#gemsw button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('#gemsw button').forEach(x=>x.setAttribute('aria-pressed','false'));b.setAttribute('aria-pressed','true');dia.material.color.set(b.dataset.c);dia.material.attenuationColor.set(b.dataset.c);if(b.dataset.accent)document.documentElement.style.setProperty('--accent',b.dataset.accent);}));\n  let run=true,raf;document.addEventListener('visibilitychange',()=>{run=!document.hidden;if(run&&!raf)loop();});\n  function loop(){raf=requestAnimationFrame(loop);if(!run){raf=0;return;}ry+=((tx*0.9)-ry)*0.06;rx+=((ty*0.5)-rx)*0.06;\n    if(!reduce)ring.rotation.y+=0.006;ring.rotation.x=0.12+rx;camera.position.x=tx*0.5;camera.lookAt(0,0,0);renderer.render(scene,camera);}\n  loop();\n}catch(e){if(canvas)canvas.style.display='none';console.error(e);}\n<\/script><\/body><\/html>"},
{t:"03 \u00b7 Couleur",d:"Brillant mit Edelstein-Farbwahl + Drag-to-rotate, Bloom.",h:"<!DOCTYPE html><html lang=\"de\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><title>VEYRA \u2014 03 \u00b7 Couleur<\/title><link rel=\"preconnect\" href=\"https://fonts.googleapis.com\" /><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin /><link href=\"https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap\" rel=\"stylesheet\" /><script type=\"importmap\">{\"imports\":{\"three\":\"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js\",\"three/addons/\":\"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/\"}}<\/script><style>:root{--bg:#06090E;--panel:#0B1118;--panel-2:#111A24;--fg:#EAF1F8;--muted:#8B9AAB;--accent:#8FD0E6;--accent2:#5A93B0;--line:rgba(234,241,248,.12);--scrim:rgba(2,4,8,.6);--on-accent:#06101A;--sw:252px;--ease:cubic-bezier(.22,1,.36,1);--t:340ms}\n  *,*::before,*::after{box-sizing:border-box}\n  html{scroll-behavior:smooth}\n  body{margin:0;background:var(--bg);color:var(--fg);font-family:\"Inter\",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}\n  a{color:inherit;text-decoration:none} img{display:block;max-width:100%}\n  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}\n  .badge{position:fixed;left:14px;bottom:14px;z-index:300;background:var(--fg);color:var(--bg);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;opacity:.9}\n\n  /* ===== Sidebar (gewaehlte Navbar: 6+5+8) ===== */\n  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sw);z-index:95;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:30px 24px}\n  .sidebar .brand{font-family:\"Cormorant Garamond\",serif;font-size:1.7rem;font-weight:600;letter-spacing:.24em;color:var(--fg)}\n  .sidebar .brand small{display:block;font-family:\"Inter\",sans-serif;font-size:.58rem;letter-spacing:.36em;color:var(--muted);margin-top:8px}\n  .sidebar nav{margin-top:42px;display:flex;flex-direction:column;gap:2px}\n  .navitem{position:relative;display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;background:none;border:none;cursor:pointer;color:var(--muted);font-family:inherit;font-size:.98rem;text-align:left;padding:11px 0 11px 18px;transition:color var(--t),padding var(--t) var(--ease)}\n  .navitem::before{content:\"\";position:absolute;left:0;top:50%;width:7px;height:1.5px;background:var(--accent);transform:translateY(-50%) scaleX(0);transform-origin:left;transition:transform var(--t) var(--ease)}\n  .navitem .car{opacity:0;transition:opacity var(--t);font-family:\"JetBrains Mono\",monospace;color:var(--accent)}\n  .navitem:hover,.navitem.active{color:var(--fg);padding-left:24px}\n  .navitem:hover::before,.navitem.active::before{transform:translateY(-50%) scaleX(1)}\n  .navitem[data-panel]:hover .car,.navitem.active .car{opacity:1}\n  .sidebar .cta{margin-top:22px;display:inline-flex;justify-content:center;border:1px solid var(--line);border-radius:999px;padding:12px;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--fg);transition:background var(--t),color var(--t),border-color var(--t)}\n  .sidebar .cta:hover{background:var(--accent);color:var(--on-accent);border-color:var(--accent)}\n  .sidebar .foot{margin-top:auto;font-size:.78rem;color:var(--muted);display:flex;flex-direction:column;gap:10px}\n  .sidebar .foot .soc{display:flex;gap:14px}\n  .sidebar .foot a:hover{color:var(--accent)}\n\n  .scrim{position:fixed;inset:0 0 0 var(--sw);z-index:90;background:var(--scrim);opacity:0;visibility:hidden;transition:opacity var(--t),visibility var(--t)}\n  .scrim.open{opacity:1;visibility:visible}\n  .flyout{position:fixed;top:0;bottom:0;left:var(-- key===\"Escape\")closePanel();});\n  var ovl=document.getElementById(\"ovl\");\n  document.getElementById(\"ovlOpen\").addEventListener(\"click\",function(){ovl.classList.add(\"open\");ovl.setAttribute(\"aria-hidden\",\"false\");this.setAttribute(\"aria-expanded\",\"true\");});\n  document.getElementById(\"ovlClose\").addEventListener(\"click\",function(){ovl.classList.remove(\"open\");ovl.setAttribute(\"aria-hidden\",\"true\");});\n})();\n<\/script><script type=\"module\">\nimport * as THREE from 'three';\nimport { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';\nimport { ConvexGeometry } from 'three/addons/geometries/ConvexGeometry.js';\nimport { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';\nimport { RenderPass } from 'three/addons/postprocessing/RenderPass.js';\nimport { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';\nimport { OutputPass } from 'three/addons/postprocessing/OutputPass.js';\n\n  function brilliantGeometry(){\n    const pts=[],R=1.0,NG=16,NT=8,tableR=0.56,tableY=0.42,culetY=-0.92,crownMidR=0.9,crownMidY=0.2,TAU=6.28318;\n    for(let i=0;i<NT;i++){const a=i/NT*TAU;pts.push(new THREE.Vector3(Math.cos(a)*tableR,tableY,Math.sin(a)*tableR));}\n    for(let i=0;i<NG;i++){const a=(i+0.5)/NG*TAU;pts.push(new THREE.Vector3(Math.cos(a)*crownMidR,crownMidY,Math.sin(a)*crownMidR));}\n    for(let i=0;i<NG;i++){const a=i/NG*TAU;pts.push(new THREE.Vector3(Math.cos(a)*R,0,Math.sin(a)*R));}\n    pts.push(new THREE.Vector3(0,culetY,0));\n    return new ConvexGeometry(pts);\n  }\n  function diamondMaterial(color){\n    const m=new THREE.MeshPhysicalMaterial({color:color||0xffffff,metalness:0,roughness:0,transmission:1,ior:2.42,thickness:1.1,envMapIntensity:1.8,reflectivity:1,specularIntensity:1,attenuationColor:new THREE.Color(color||0xffffff),attenuationDistance:6});\n    if('dispersion' in m)m.dispersion=5.0; return m;\n  }\n  function sparkleField(n,rad){\n    const pos=new Float32Array(n*3);\n    for(let i=0;i<n;i++){const r=rad+Math.random()*rad*0.9,th=Math.random()*6.283,ph=Math.acos(2*Math.random()-1);\n      pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);pos[i*3+2]=r*Math.cos(ph);}\n    const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));\n    return new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:0.045,transparent:true,opacity:0.8,blending:THREE.AdditiveBlending,depthWrite:false}));\n  }\n\nconst canvas=document.getElementById('gem'),reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;\ntry{\n  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});\n  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.15;\n  const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(40,1,0.1,100);camera.position.z=5;\n  const pmrem=new THREE.PMREMGenerator(renderer);scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;\n  const gem=new THREE.Mesh(brilliantGeometry(),diamondMaterial(0xffffff));gem.scale.setScalar(1.4);scene.add(gem);\n  const l1=new THREE.PointLight(0xffffff,24,30,2);l1.position.set(3,4,3);scene.add(l1);\n  const l2=new THREE.PointLight(0xffffff,16,30,2);l2.position.set(-3,-1,3);scene.add(l2);\n  const composer=new EffectComposer(renderer);composer.addPass(new RenderPass(scene,camera));\n  composer.addPass(new UnrealBloomPass(new THREE.Vector2(1,1),0.55,0.5,0.85));composer.addPass(new OutputPass());\n  function rs(){const w=canvas.clientWidth,h=canvas.clientHeight;if(!w||!h)return;renderer.setSize(w,h,false);composer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}\n  addEventListener('resize',rs);rs();setTimeout(rs,150);\n  document.querySelectorAll('#gemsw button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('#gemsw button').forEach(x=>x.setAttribute('aria-pressed','false'));b.setAttribute('aria-pressed','true');gem.material.color.set(b.dataset.c);gem.material.attenuationColor.set(b.dataset.c);if(b.dataset.accent)document.documentElement.style.setProperty('--accent',b.dataset.accent);}));\n  let dragging=false,px=0,py=0,vx=0,vy=0,rx=0,ry=0;\n  canvas.addEventListener('pointerdown',e=>{dragging=true;px=e.clientX;py=e.clientY;canvas.setPointerCapture(e.pointerId);});\n  canvas.addEventListener('pointermove',e=>{if(!dragging)return;vy=(e.clientX-px)*0.01;vx=(e.clientY-py)*0.01;ry+=vy;rx+=vx;px=e.clientX;py=e.clientY;});\n  canvas.addEventListener('pointerup',()=>dragging=false);canvas.addEventListener('pointerleave',()=>dragging=false);\n  let run=true,raf;document.addEventListener('visibilitychange',()=>{run=!document.hidden;if(run&&!raf)loop();});\n  function loop(){raf=requestAnimationFrame(loop);if(!run){raf=0;return;}if(!dragging){if(!reduce)ry+=0.006;vx*=0.92;vy*=0.92;rx+=vx;ry+=vy;}gem.rotation.y=ry;gem.rotation.x=rx;composer.render();}\n  loop();\n}catch(e){if(canvas)canvas.style.display='none';console.error(e);}\n<\/script><\/body><\/html>"},
{t:"04 \u00b7 M\u00e9tal Liquide",d:"Lebendiger GLSL-Shader (geschmolzenes Licht), reagiert auf den Cursor.",h:"<!DOCTYPE html><html lang=\"de\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><title>VEYRA \u2014 04 \u00b7 M\u00e9tal Liquide<\/title><link rel=\"preconnect\" href=\"https://fonts.googleapis.com\" /><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin /><link href=\"https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap\" rel=\"stylesheet\" /><script type=\"importmap\">{\"imports\":{\"three\":\"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js\",\"three/addons/\":\"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/\"}}<\/script><style>:root{--bg:#06090E;--panel:#0B1118;--panel-2:#111A24;--fg:#EAF1F8;--muted:#8B9AAB;--accent:#8FD0E6;--accent2:#5A93B0;--line:rgba(234,241,248,.12);--scrim:rgba(2,4,8,.6);--on-accent:#06101A;--sw:252px;--ease:cubic-bezier(.22,1,.36,1);--t:340ms}\n  *,*::before,*::after{box-sizing:border-box}\n  html{scroll-behavior:smooth}\n  body{margin:0;background:var(--bg);color:var(--fg);font-family:\"Inter\",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}\n  a{color:inherit;text-decoration:none} img{display:block;max-width:100%}\n  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}\n  .badge{position:fixed;left:14px;bottom:14px;z-index:300;background:var(--fg);color:var(--bg);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;opacity:.9}\n\n  /* ===== Sidebar (gewaehlte Navbar: 6+5+8) ===== */\n  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sw);z-index:95;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:30px 24px}\n  .sidebar .brand{font-family:\"Cormorant Garamond\",serif;font-size:1.7rem;font-weight:600;letter-spacing:.24em;color:var(--fg)}\n  .sidebar .brand small{display:block;font-family:\"Inter\",sans-serif;font-size:.58rem;letter-spacing:.36em;color:var(--muted);margin-top:8px}\n  .sidebar nav{margin-top:42px;display:flex;flex-direction:column;gap:2px}\n  .navitem{position:relative;display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;background:none;border:none;cursor:pointer;color:var(--muted);font-family:inherit;font-size:.98rem;text-align:left;padding:11px 0 11px 18px;transition:color var(--t),padding var(--t) var(--ease)}\n  .navitem::before{content:\"\";position:absolute;left:0;top:50%;width:7px;height:1.5px;background:var(--accent);transform:translateY(-50%) scaleX(0);transform-origin:left;transition:transform var(--t) var(--ease)}\n  .navitem .car{opacity:0;transition:opacity var(--t);font-family:\"JetBrains Mono\",monospace;color:var(--accent)}\n  .navitem:hover,.navitem.active{color:var(--fg);padding-left:24px}\n  .navitem:hover::before,.navitem.active::before{transform:translateY(-50%) scaleX(1)}\n  .navitem[data-panel]:hover .car,.navitem.active .car{opacity:1}\n  .sidebar .cta{margin-top:22px;display:inline-flex;justify-content:center;border:1px solid var(--line);border-radius:999px;padding:12px;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--fg);transition:background var(--t),color var(--t),border-color var(--t)}\n  .sidebar .cta:hover{background:var(--accent);color:var(--on-accent);border-color:var(--accent)}\n  .sidebar .foot{margin-top:auto;font-size:.78rem;color:var(--muted);display:flex;flex-direction:column;gap:10px}\n  .sidebar .foot .soc{display:flex;gap:14px}\n  .sidebar .foot a:hover{color:var(--accent)}\n\n  .scrim{position:fixed;inset:0 0 0 var(--sw);z-index:90;background:var(--scrim);opacity:0;visibility:hidden;transition:opacity var(--t),visibility var(--t)}\n  .scrim.open{opacity:1;visibility:visible}\n  .flyout{position:fixed;top:0;bottom:0;left:var(--sw);z-index:96;width:min(70vw,640px);background:var(--panel-2);border-right:1px solid var(--line);box-shadow:40px 0 80px -40px rgba(0,0,0,.4);transform:translateX(-18px);opacity:0;visibility:hidden;transition:transform var(--t) var(--ease),opacity var(--t),visibility var(--t);display:grid;grid-template-columns:1fr 1fr;overflow:hidden}\n  .flyout.open{transform:none;opacity:1;visibility:visible}\n  .flyout .lcol{padding:32px 28px;overflow:auto}\n  .flyout .phead{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}\n  .flyout .phead h3{font-family:\"Cormorant Garamond\",serif;font-weight:600;font-size:1.6rem;margin:0;color:var(--fg)}\n  .flyout .phead .close{background:none;border:none;color:var(--muted);cursor:pointer;font-family:\"JetBrains Mono\",monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase}\n  .flyout .phead .close:hover{color:var(--fg)}\n  .panel{display:none}\n  .panel.show{display:block;animation:fade .4s var(--ease)}\n  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}\n  .panel h4{font-family:\"JetBrains Mono\",monospace;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:18px 0 9px}\n  .panel h4:first-child{margin-top:0}\n  .panel ul{list-style:none;margin:0;padding:0}\n  .panel a.sub{display:flex;align-items:baseline;gap:10px;padding:8px 0;font-size:1.0rem;color:var(--fg);transition:color var(--t),padding var(--t) var(--ease)}\n  .panel a.sub .ix{font-family:\"JetBrains Mono\",monospace;font-size:.72rem;color:var(--accent);opacity:.7}\n  .panel a.sub:hover{color:var(--accent);padding-left:8px}\n  .flyout .rcol{position:relative;background:var(--bg);overflow:hidden}\n  .flyout .preview{position:absolute;inset:0}\n  .flyout .preview img{width:100%;height:100%;object-fit:cover;opacity:1;transition:opacity .35s var(--ease)}\n  .flyout .rcol::after{content:\"\";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(0,0,0,.55))}\n  .flyout .pcap{position:absolute;left:20px;bottom:18px;z-index:2;color:#fff}\n  .flyout .pcap em{font-style:normal;font-family:\"JetBrains Mono\",monospace;font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:#fff;opacity:.85}\n  .flyout .pcap b{display:block;font-family:\"Cormorant Garamond\",serif;font-weight:600;font-size:1.3rem;margin-top:3px}\n  @media (max-width:760px){ .flyout{display:none} }\n\n  .topbar{display:none;position:fixed;top:0;left:0;right:0;z-index:95;align-items:center;justify-content:space-between;padding:14px 18px;background:color-mix(in srgb, var(--panel) 88%, transparent);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}\n  .topbar .brand{font-family:\"Cormorant Garamond\",serif;font-size:1.3rem;font-weight:600;letter-spacing:.22em;color:var(--fg)}\n  .topbar button{background:none;border:none;color:var(--fg);cursor:pointer;display:inline-flex;align-items:center;gap:10px;font-family:\"JetBrains Mono\",monospace;font-size:.74rem;letter-spacing:.14em;text-transform:uppercase}\n  .topbar .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}\n  .ovl{position:fixed;inset:0;z-index:120;background:var(--bg);padding:22px;overflow:auto;transform:translateY(-100%);transition:transform var(--t) var(--ease)}\n  .ovl.open{transform:none}\n  .ovl .x{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}\n  .ovl .x button{background:none;border:none;color:var(--fg);font-size:2rem;cursor:pointer}\n  .ovl .grp{border-top:1px solid var(--line);padding:8px 0}\n  .ovl .glabel{font-family:\"Cormorant Garamond\",serif;font-size:1.6rem;padding:12px 0;color:var(--fg)}\n  .ovl .links{display:flex;flex-wrap:wrap;gap:8px 16px;padding:0 0 14px}\n  .ovl .links a{color:var(--muted);font-size:.95rem}\n  .ovl .links a:hover{color:var(--accent)}\n\n  .main{margin-left:var(--sw)}\n  @media (max-width:900px){\n    .sidebar{display:none} .topbar{display:flex} .main{margin-left:0} .scrim{left:0} .flyout{display:none}\n  }\n  @media (prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:.001ms !important;animation:none !important;scroll-behavior:auto !important}}\n\n  .reveal{position:fixed;inset:0;z-index:500;display:grid;grid-template-columns:repeat(6,1fr);pointer-events:none}\n  .reveal .col{background:var(--panel);transform-origin:top;animation:revcol .85s var(--ease) forwards;animation-delay:calc(.55s + var(--i)*.07s)}\n  @keyframes revcol{from{transform:scaleY(1)}to{transform:scaleY(0)}}\n  .reveal .mark{position:absolute;inset:0;display:grid;place-items:center;font-family:\"Cormorant Garamond\",serif;font-weight:600;font-size:clamp(2rem,7vw,4.2rem);letter-spacing:.42em;color:var(--fg);padding-left:.42em;animation:revmark 1.15s var(--ease) forwards}\n  .reveal .mark span{overflow:hidden}\n  @keyframes revmark{0%{opacity:0;letter-spacing:.6em}28%{opacity:1;letter-spacing:.42em}72%{opacity:1}100%{opacity:0}}\n  .rise{opacity:0;animation:rise .9s var(--ease) forwards;animation-delay:1.15s}\n  .rise.d1{animation-delay:1.25s}.rise.d2{animation-delay:1.35s}.rise.d3{animation-delay:1.45s}\n  @keyframes rise{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}\n  @media (prefers-reduced-motion:reduce){.reveal{display:none}.rise{opacity:1;animation:none}}\n\n  .hero{position:relative;min-height:100vh;overflow:hidden;display:flex;align-items:flex-end}\n  .hero .glow{position:absolute;top:50%;left:50%;width:74vmin;height:74vmin;transform:translate(-50%,-56%);background:radial-gradient(circle,color-mix(in srgb,var(--accent) 42%,transparent),transparent 62%);filter:blur(22px);z-index:0;pointer-events:none}\n  .hero .fallback{position:absolute;inset:0;z-index:0}.hero .fallback img{width:100%;height:100%;object-fit:cover;opacity:.45}\n  #gem{position:absolute;inset:0;width:100%;height:100%;z-index:1;display:block;touch-action:none}\n  .hero .inner{position:relative;z-index:2;padding:clamp(28px,5vw,80px);max-width:780px;pointer-events:none}\n  .hero .inner *{pointer-events:auto}\n  .hero .eb{display:flex;align-items:center;gap:12px;font-family:\"JetBrains Mono\",monospace;font-size:.72rem;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin:0 0 18px}\n  .hero .eb .ln{width:42px;height:1px;background:var(--accent);opacity:.7}\n  .hero h1{font-family:\"Fraunces\",serif;font-weight:600;font-size:clamp(2.6rem,7vw,5.4rem);line-height:1.0;margin:0 0 20px;max-width:15ch}\n  .hero h1 em{font-style:italic;color:var(--accent)}\n  .hero .lead{color:var(--muted);max-width:44ch;margin:0 0 26px}\n  .hero .actions{display:flex;flex-wrap:wrap;gap:14px}\n  .hero .cta{display:inline-flex;align-items:center;min-height:52px;padding:0 30px;border-radius:999px;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600;cursor:pointer}\n  .hero .cta.solid{background:var(--accent);color:var(--on-accent)}\n  .hero .cta.ghost{border:1px solid var(--line);color:var(--fg)}\n  .hero .cta.ghost:hover{background:var(--fg);color:var(--bg)}\n  .hero .hint{position:absolute;right:clamp(20px,4vw,54px);bottom:28px;z-index:2;font-family:\"JetBrains Mono\",monospace;font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}\n  .picker{display:flex;flex-wrap:wrap;gap:22px;margin:2px 0 26px}\n  .picker .grp{display:flex;flex-direction:column;gap:10px}\n  .picker .pt{font-family:\"JetBrains Mono\",monospace;font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}\n  .sw{display:flex;gap:10px}\n  .sw button{width:42px;height:42px;border-radius:50%;border:2px solid transparent;cursor:pointer;position:relative;transition:transform .2s var(--ease),border-color var(--t);box-shadow:inset 0 0 0 1px rgba(0,0,0,.25)}\n  .sw button:hover{transform:translateY(-3px)} .sw button[aria-pressed=\"true\"]{border-color:var(--fg)}\n<\/style><\/head><body><div class=\"reveal\" aria-hid span class=\"ix\">03<\/span> Automatik<\/a><\/li>\n      <\/ul>\n      <h4>Service<\/h4>\n      <ul><li><a class=\"sub\" href=\"#\" data-img=\"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=1100&q=80&auto=format&fit=crop\" data-cap=\"Service|Revision\"><span class=\"ix\">04<\/span> Revision &amp; Ankauf<\/a><\/li><\/ul>\n    <\/div>\n  <\/div>\n  <div class=\"rcol\"><div class=\"preview\"><img id=\"previewImg\" src=\"\" alt=\"Vorschau\" /><\/div><div class=\"pcap\"><em id=\"capKicker\"><\/em><b id=\"capTitle\"><\/b><\/div><\/div>\n<\/div>\n<header class=\"topbar\"><a class=\"brand\" href=\"#\">VEYRA<\/a><button id=\"ovlOpen\" aria-expanded=\"false\" aria-controls=\"ovl\"><span class=\"dot\"><\/span> Men\u00fc<\/button><\/header>\n<div class=\"ovl\" id=\"ovl\" aria-hidden=\"true\">\n  <div class=\"x\"><span class=\"brand\" style=\"font-family:'Cormorant Garamond',serif;font-size:1.4rem;letter-spacing:.2em;color:var(--fg)\">VEYRA<\/span><button id=\"ovlClose\" aria-label=\"Schlie\u00dfen\">&times;<\/button><\/div>\n  <div class=\"grp\"><div class=\"glabel\"><a href=\"#\">Schmuck<\/a><\/div><div class=\"links\"><a href=\"#\">Ringe<\/a><a href=\"#\">Halsketten<\/a><a href=\"#\">Ohrringe<\/a><a href=\"#\">Armb\u00e4nder<\/a><\/div><\/div>\n  <div class=\"grp\"><div class=\"glabel\"><a href=\"#\">Trauringe<\/a><\/div><div class=\"links\"><a href=\"#\">Konfigurator<\/a><a href=\"#\">Materialien<\/a><a href=\"#\">Solit\u00e4re<\/a><\/div><\/div>\n  <div class=\"grp\"><div class=\"glabel\"><a href=\"#\">Uhren<\/a><\/div><div class=\"links\"><a href=\"#\">Damenuhren<\/a><a href=\"#\">Herrenuhren<\/a><a href=\"#\">Service<\/a><\/div><\/div>\n  <div class=\"grp\"><div class=\"glabel\"><a href=\"#\">Atelier<\/a><\/div><\/div>\n  <div class=\"grp\"><div class=\"glabel\"><a href=\"#\">Maison<\/a><\/div><\/div>\n<\/div>\n<div class=\"main\"><section class=\"hero\"><canvas id=\"gem\"><\/canvas>\n  <div class=\"inner\">\n    <p class=\"eb rise\"><span class=\"ln\"><\/span> Maison Veyra \u00b7 Surface<\/p>\n    <h1 class=\"rise d1\">Edelmetall, <em>in Bewegung<\/em>.<\/h1>\n    <p class=\"lead rise d2\">Ein lebendiger Verlauf aus geschmolzenem Licht. Hintergrund-Shader in Echtzeit.<\/p>\n    \n    <div class=\"actions rise d3\"><a class=\"cta solid\" href=\"#\">Kollektion entdecken<\/a><\/div>\n  <\/div>\n  <span class=\"hint\">WebGL-Shader<\/span>\n<\/section><\/div><script>\n(function(){\n  var sidebar=document.getElementById(\"sidebar\"),scrim=document.getElementById(\"scrim\"),flyout=document.getElementById(\"flyout\"),\n      panelTitle=document.getElementById(\"panelTitle\"),previewImg=document.getElementById(\"previewImg\"),\n      capKicker=document.getElementById(\"capKicker\"),capTitle=document.getElementById(\"capTitle\");\n  var items=document.querySelectorAll(\".navitem[data-panel]\"),panels=document.querySelectorAll(\".panel\"),closeTimer=null,current=null;\n  function setPreview(url,cap){if(url&&previewImg.getAttribute(\"src\")!==url){previewImg.style.opacity=0;var p=new Image();p.onload=function(){previewImg.src=url;previewImg.style.opacity=1;};p.src=url;}\n    if(cap){var s=cap.split(\"|\");capKicker.textContent=s[0]||\"\";capTitle.textContent=s[1]||\"\";}}\n  function openPanel(key,btn){current=key;panels.forEach(function(p){p.classList.toggle(\"show\",p.getAttribute(\"data-key\")===key);});\n    items.forEach(function(b){b.classList.toggle(\"active\",b===btn);b.setAttribute(\"aria-expanded\",b===btn?\"true\":\"false\");});\n    var a=document.querySelector('.panel[data-key=\"'+key+'\"]');panelTitle.textContent=btn?btn.textContent.replace(\"\\u2192\",\"\").trim():key;\n    setPreview(a.getAttribute(\"data-default\"),a.getAttribute(\"data-cap\"));flyout.classList.add(\"open\");scrim.classList.add(\"open\");}\n  function closePanel(){flyout.classList.remove(\"open\");scrim.classList.remove(\"open\");current=null;\n    items.forEach(function(b){b.classList.remove(\"active\");b.setAttribute(\"aria-expanded\",\"false\");});}\n  items.forEach(function(btn){var key=btn.getAttribute(\"data-panel\");\n    btn.addEventListener(\"mouseenter\",function(){clearTimeout(closeTimer);openPanel(key,btn);});\n    btn.addEventListener(\"click\",function(){current===key?closePanel():openPanel(key,btn);});\n    btn.addEventListener(\"focus\",function(){openPanel(key,btn);});});\n  document.querySelectorAll(\".panel a.sub\").forEach(function(a){a.addEventListener(\"mouseenter\",function(){setPreview(a.getAttribute(\"data-img\"),a.getAttribute(\"data-cap\"));});});\n  function leave(){closeTimer=setTimeout(closePanel,160);}\n  sidebar.addEventListener(\"mouseleave\",leave);flyout.addEventListener(\"mouseleave\",leave);\n  sidebar.addEventListener(\"mouseenter\",function(){clearTimeout(closeTimer);});flyout.addEventListener(\"mouseenter\",function(){clearTimeout(closeTimer);});\n  scrim.addEventListener(\"click\",closePanel);document.getElementById(\"panelClose\").addEventListener(\"click\",closePanel);\n  document.addEventListener(\"keydown\",function(e){if(e.key===\"Escape\")closePanel();});\n  var ovl=document.getElementById(\"ovl\");\n  document.getElementById(\"ovlOpen\").addEventListener(\"click\",function(){ovl.classList.add(\"open\");ovl.setAttribute(\"aria-hidden\",\"false\");this.setAttribute(\"aria-expanded\",\"true\");});\n  document.getElementById(\"ovlClose\").addEventListener(\"click\",function(){ovl.classList.remove(\"open\");ovl.setAttribute(\"aria-hidden\",\"true\");});\n})();\n<\/script><script type=\"module\">\nimport * as THREE from 'three';\nconst canvas=document.getElementById('gem');\ntry{\n  const renderer=new THREE.WebGLRenderer({canvas,antialias:true});\n  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));\n  const scene=new THREE.Scene(),camera=new THREE.OrthographicCamera(-1,1,1,-1,0,1);\n  const uni={t:{value:0},r:{value:new THREE.Vector2(1,1)},m:{value:new THREE.Vector2(0.5,0.5)}};\n  const frag=`precision highp float;uniform float t;uniform vec2 r;unifo Content.replace(\"\\u2192\",\"\").trim():key;\n    setPreview(a.getAttribute(\"data-default\"),a.getAttribute(\"data-cap\"));flyout.classList.add(\"open\");scrim.classList.add(\"open\");}\n  function closePanel(){flyout.classList.remove(\"open\");scrim.classList.remove(\"open\");current=null;\n    items.forEach(function(b){b.classList.remove(\"active\");b.setAttribute(\"aria-expanded\",\"false\");});}\n  items.forEach(function(btn){var key=btn.getAttribute(\"data-panel\");\n    btn.addEventListener(\"mouseenter\",function(){clearTimeout(closeTimer);openPanel(key,btn);});\n    btn.addEventListener(\"click\",function(){current===key?closePanel():openPanel(key,btn);});\n    btn.addEventListener(\"focus\",function(){openPanel(key,btn);});});\n  document.querySelectorAll(\".panel a.sub\").forEach(function(a){a.addEventListener(\"mouseenter\",function(){setPreview(a.getAttribute(\"data-img\"),a.getAttribute(\"data-cap\"));});});\n  function leave(){closeTimer=setTimeout(closePanel,160);}\n  sidebar.addEventListener(\"mouseleave\",leave);flyout.addEventListener(\"mouseleave\",leave);\n  sidebar.addEventListener(\"mouseenter\",function(){clearTimeout(closeTimer);});flyout.addEventListener(\"mouseenter\",function(){clearTimeout(closeTimer);});\n  scrim.addEventListener(\"click\",closePanel);document.getElementById(\"panelClose\").addEventListener(\"click\",closePanel);\n  document.addEventListener(\"keydown\",function(e){if(e.key===\"Escape\")closePanel();});\n  var ovl=document.getElementById(\"ovl\");\n  document.getElementById(\"ovlOpen\").addEventListener(\"click\",function(){ovl.classList.add(\"open\");ovl.setAttribute(\"aria-hidden\",\"false\");this.setAttribute(\"aria-expanded\",\"true\");});\n  document.getElementById(\"ovlClose\").addEventListener(\"click\",function(){ovl.classList.remove(\"open\");ovl.setAttribute(\"aria-hidden\",\"true\");});\n})();\n<\/script><script>\n(function(){var c=document.getElementById('spark');if(!c)return;var ctx=c.getContext('2d');\nva {t:"06 \u00b7 Reflet",d:"Licht-Sweep \u00fcber Metall + 3D-Tilt der Karte (Cursor).",h:"<!DOCTYPE html><html lang=\"de\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><title>VEYRA \u2014 06 \u00b7 Reflet<\/title><link rel=\"preconnect\" href=\"https://fonts.googleapis.com\" /><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin /><link href=\"https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap\" rel=\"stylesheet\" /><style>:root{--bg:#06090E;--panel:#0B1118;--panel-2:#111A24;--fg:#EAF1F8;--muted:#8B9AAB;--accent:#8FD0E6;--accent2:#5A93B0;--line:rgba(234,241,248,.12);--scrim:rgba(2,4,8,.6);--on-accent:#06101A;--sw:252px;--ease:cubic-bezier(.22,1,.36,1);--t:340ms}\n  *,*::before,*::after{box-sizing:border-box}\n  html{scroll-behavior:smooth}\n  body{margin:0;background:var(--bg);color:var(--fg);font-family:\"Inter\",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}\n  a{color:inherit;text-decoration:none} img{display:block;max-width:100%}\n  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}\n  .badge{position:fixed;left:14px;bottom:14px;z-index:300;background:var(--fg);color:var(--bg);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;opacity:.9}\n\n  /* ===== Sidebar (gewaehlte Navbar: 6+5+8) ===== */\n  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sw);z-index:95;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:30px 24px}\n  .sidebar .brand{font-family:\"Cormorant Garamond\",serif;font-size:1.7rem;font-weight:600;letter-spacing:.24em;color:var(--fg)}\n  .sidebar .brand small{display:block;font-family:\"Inter\",sans-serif;font-size:.58rem;letter-spacing:.36em;color:var(--muted);margin-top:8px}\n ps://images.unsplash.com/photo-1523275335684-37898b6baf30?w=1100&q=80&auto=format&fit=crop\" data-cap=\"Uhren|Herrenuhren\"><span class=\"ix\">02<\/span> Herrenuhren<\/a><\/li>\n        <li><a class=\"sub\" href=\"#\" data-img=\"https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=1100&q=80&auto=format&fit=crop\" data-cap=\"Uhren|Automatik\"><span class=\"ix\">03<\/span> Automatik<\/a><\/li>\n      <\/ul>\n      <h4>Service<\/h4>\n      <ul><li><a class=\"sub\" href=\"#\" data-img=\"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=1100&q=80&auto=format&fit=crop\" data-cap=\"Service|Revision\"><span class=\"ix\">04<\/span> Revision &amp; Ankauf<\/a><\/li><\/ul>\n    <\/div>\n  <\/div>\n  <div class=\"rcol\"><div class=\"preview\"><img id=\"previewImg\" src=\"\" alt=\"Vorschau\" /><\/div><div class=\"pcap\"><em id=\"capKicker\"><\/em><b id=\"capTitle\"><\/b><\/div><\/div>\n<\/div>\n<header class=\"topbar\"><a class=\"brand\" href=\"#\">VEYRA<\/a><button id=\"ovlOpen\" aria-expanded=\"false\" aria-controls=\"ovl\"><span class=\"dot\"><\/span> Men\u00fc<\/button><\/header>\n<div class=\"ovl\" id=\"ovl\" aria-hidden=\"true\">\n  <div class=\"x\"><span class=\"brand\" style=\"font-family:'Cormorant Garamond',serif;font-size:1.4rem;letter-spacing:.2em;color:var(--fg)\">VEYRA<\/span><button id=\"ovlClose\" aria-label=\"Schlie\u00dfen\">&times;<\/button><\/div>\n  <div class=\"grp\"><div class=\"glabel\"><a href=\"#\">Schmuck<\/a><\/div><div class=\"links\"><a href=\"#\">Ringe<\/a><a href=\"#\">Halsketten<\/a><a href=\"#\">Ohrringe<\/a><a href=\"#\">Armb\u00e4nder<\/a><\/div><\/div>\n  <div class=\"grp\"><div class=\"glabel\"><a href=\"#\">Trauringe<\/a><\/div><div class=\"links\"><a href=\"#\">Konfigurator<\/a><a href=\"#\">Materialien<\/a><a href=\"#\">Solit\u00e4re<\/a><\/div><\/div>\n  <div class=\"grp\"><div class=\"glabel\"><a href=\"#\">Uhren<\/a><\/div><div class=\"links\"><a href=\"#\">Damenuhren<\/a><a href=\"#\">Herrenuhren<\/a><a href=\"#\">Service<\/a><\/div><\/div>\n  <div class=\"grp\"><div class=\"glabel\"><a href=\"#\">Atelier<\/a><\/div><\/div>\n  <div class=\"grp\"><div class=\"glabel\"><a href=\"#\">Maison<\/a><\/div><\/div>\n<\/div>\n<div class=\"main\"><div class=\"prog\" id=\"prog\"><\/div><section class=\"hero\"><div class=\"glow\"><\/div><canvas id=\"gem\"><\/canvas>\n  <div class=\"inner\">\n    <p class=\"eb rise\"><span class=\"ln\"><\/span> Maison Veyra \u00b7 D\u00e9filement<\/p>\n    <h1 class=\"rise d1\">Scrollen <em>dreht<\/em> den Stein.<\/h1>\n    <p class=\"lead rise d2\">Der Brillant folgt Ihrem Scrollen. Bewegung mit Bedeutung.<\/p>\n    \n    <div class=\"actions rise d3\"><a class=\"cta solid\" href=\"#\">Kollektion<\/a><\/div>\n  <\/div>\n  <span class=\"hint\">Nach unten scrollen<\/span>\n<\/section><section class=\"after\">Folgesektion \u2014 hier ginge es weiter<\/section><\/div><script>\n(function(){\n  var sidebar=document.getElementById(\"sidebar\"),scrim=document.getElementById(\"scrim\"),flyout=document.getElementById(\"flyout\"),\n      panelTitle=document.getElementById(\"panelTitle\"),previewImg=document.getElementById(\"previewImg\"),\n      capKicker=document.getElementById(\"capKicker\"),capTitle=document.getElementById(\"capTitle\");\n  var items=document.querySelectorAll(\".navitem[data-panel]\"),panels=document.querySelectorAll(\".panel\"),closeTimer=null,current=null;\n  function setPreview(url,cap){if(url&&previewImg.getAttribute(\"src\")!==url){previewImg.style.opacity=0;var p=new Image();p.onload=function(){previewImg.src=url;previewImg.style.opacity=1;};p.src=url;}\n    if(cap){var s=cap.split(\"|\");capKicker.textContent=s[0]||\"\";capTitle.textContent=s[1]||\"\";}}\n  function openPanel(key,btn){current=key;panels.forEach(function(p){p.classList.toggle(\"show\",p.getAttribute(\"data-key\")===key);});\n    items.forEach(function(b){b.classList.toggle(\"active\",b===btn);b.setAttribute(\"aria-expanded\",b===btn?\"true\":\"false\");});\n    var a=document.querySelector('.panel[data-key=\"'+key+'\"]');panelTitle.textContent=btn?btn.textContent.replace(\"\\u2192\",\"\").trim():key;\n    setPreview(a.getAttribute(\"data-default\"),a.getAttribute(\"data-cap\"));flyout.classList.add(\"open\");scrim.classList.add(\"open\");}\n  function closePanel(){flyout.classList.remove(\"open\");scrim.classList.remove(\"open\");current=null;\n    items.forEach(function(b){b.classList.remove(\"active\");b.setAttribute(\"aria-expanded\",\"false\");});}\n  items.forEach(function(btn){var key=btn.getAttribute(\"data-panel\");\n    btn.addEventListener(\"mouseenter\",function(){clearTimeout(closeTimer);openPanel(key,btn);});\n    btn.addEventListener(\"click\",function(){current===key?closePanel():openPanel(key,btn);});\n    btn.addEventListener(\"focus\",function(){openPanel(key,btn);});});\n  document.querySelectorAll(\".panel a.sub\").forEach(function(a){a.addEventListener(\"mouseenter\",function(){setPreview(a.getAttribute(\"data-img\"),a.getAttribute(\"data-cap\"));});});\n  function leave(){closeTimer=setTimeout(closePanel,160);}\n  sidebar.addEventListener(\"mouseleave\",leave);flyout.addEventListener(\"mouseleave\",leave);\n  sidebar.addEventListener(\"mouseenter\",function(){clearTimeout(closeTimer);});flyout.addEventListener(\"mouseenter\",function(){clearTimeout(closeTimer);});\n  scrim.addEventListener(\"click\",closePanel);document.getElementById(\"panelClose\").addEventListener(\"click\",closePanel);\n  document.addEventListener(\"keydown\",function(e){if(e.key===\"Escape\")closePanel();});\n  var ovl=document.getElementById(\"ovl\");\n  document.getElementById(\"ovlOpen\").addEventListener(\"click\",function(){ovl.classList.add(\"open\");ovl.setAttribute(\"aria-hidden\",\"false\");this.setAttribute(\"aria-expanded\",\"true\");});\n  document.getElementById(\"ovlClose\").addEventListener(\"click\",function(){ovl.classList.remove(\"open\");ovl.setAttribute(\"aria-hidden\",\"true\");});\n})();\n<\/script><script type=\"module\">\nimport * as THREE from 'three';\nimport { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';\nimport { ConvexGeometry } from 'three/addons/geometries/ConvexGeometry.js';\n\n  function brilliantGeometry(){\n    const pts=[],R=1.0,NG=16,NT=8,tableR=0.56,tableY=0.42,culetY=-0.92,crownMidR=0.9,crownMidY=0.2,TAU=6.28318;\n    for(let i=0;i<NT;i++){const a=i/NT*TAU;pts.push(new THREE.Vector3(Math.cos(a)*tableR,tableY,Math.sin(a)*tableR));}\n    for(let i=0;i<NG;i++){const a=(i+0.5)/NG*TAU;pts.push(new THREE.Vector3(Math.cos(a)*crownMidR,crownMidY,Math.sin(a)*crownMidR));}\n    for(let i=0;i<NG;i++){const a=i/NG*TAU;pts.push(new THREE.Vector3(Math.cos(a)*R,0,Math.sin(a)*R));}\n    pts.push(new THREE.Vector3(0,culetY,0));\n    return new ConvexGeometry(pts);\n  }\n  function diamondMaterial(color){\n    const m=new THREE.MeshPhysicalMaterial({color:color||0xffffff,metalness:0,roughness:0,transmission:1,ior:2.42,thickness:1.1,envMapIntensity:1.8,reflectivity:1,specularIntensity:1,attenuationColor:new THREE.Color(color||0xffffff),attenuationDistance:6});\n    if('dispersion' in m)m.dispersion=5.0; return m;\n  }\n  function sparkleField(n,rad){\n    const pos=new Float32Array(n*3);\n    for(let i=0;i<n;i++){const r=rad+Math.random()*rad*0.9,th=Math.random()*6.283,ph=Math.acos(2*Math.random()-1);\n      pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);pos[i*3+2]=r*Math.cos(ph);}\n    const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));\n    return new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:0.045,transparent:true,opacity:0.8,blending:THREE.AdditiveBlending,depthWrite:false}));\n  }\n\nconst canvas=document.getElementById('gem'),prog=document.getElementById('prog'),reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;\ntry{\n  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});\n  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.15;\n  const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(40,1,0.1,100);camera.position.z=5;\n  const pmrem=new THREE.PMREMGenerator(renderer);scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;\n  const gem=new THREE.Mesh(brilliantGeometry(),diamondMaterial(0xffffff));gem.scale.setScalar(1.35);scene.add(gem);\n  const l1=new THREE.PointLight(0xffffff,24,30,2);l1.position.set(3,4,3);scene.add(l1);\n  const l2=new THREE.PointLight(0xbfe6ff,16,30,2);l2.position.set(-3,-1,3);scene.add(l2);\n  function rs(){const w=canvas.clientWidth,h=canvas.clientHeight;if(!w||!h)return;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}\n  addEventListener('resize',rs);rs();setTimeout(rs,150);\n  let target=0,cur=0;\n  function onScroll(){const max=document.documentElement.scrollHeight-window.innerHeight;const p=max>0?window.scrollY/max:0;target=p;if(prog)prog.style.width=(p*100)+'%';}\n  addEventListener('scroll',onScroll,{passive:true});onScroll();\n  let run=true,t=0,raf;document.addEventListener('visibilitychange',()=>{run=!document.hidden;if(run&&!raf)loop();});\n  function loop(){raf=requestAnimationFrame(loop);if(!run){raf=0;return;}t+=0.016;cur+=(target-cur)*0.08;\n    gem.rotation.y=cur*Math.PI*4+(reduce?0:t*0.05);gem.rotation.x=cur*Math.PI*1.2;gem.position.y=Math.sin(t*0.6)*0.04;\n    camera.position.z=5-cur*1.2;camera.lookAt(0,0,0);renderer.render(scene,camera);}\n  loop();\n}catch(e){if(canvas)canvas.style.display='none';console.error(e);}\n<\/script><\/body><\/html>"},
{t:"08 \u00b7 Cin\u00e9tique",d:"Kinetische Typo: Wort scramblet/wechselt endlos. Farbwelt Encre.",h:"<!DOCTYPE html><html lang=\"de\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><title>VEYRA \u2014 08 \u00b7 Cin\u00e9tique<\/title><link rel=\"preconnect\" href=\"https://fonts.googleapis.com\" /><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin /><link href=\"https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap\" rel=\"stylesheet\" /><style>:root{--bg:#120D1C;--panel:#1A1228;--panel-2:#241834;--fg:#F1ECF7;--muted:#A697B6;--accent:#B79BE6;--accent2:#8F73C2;--line:rgba(241,236,247,.13);--scrim:rgba(8,5,14,.6);--on-accent:#160F22;--sw:252px;--ease:cubic-bezier(.22,1,.36,1);--t:340ms}\n  *,*::before,*::after{box-sizing:border-box}\n  html{scroll-behavior:smooth}\n  body{margin:0;background:var(--bg);color:var(--fg);font-family:\"Inter\",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}\n  a{color:inherit;text-decoration:none} img{display:block;max-width:100%}\n  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}\n  .badge{position:fixed;left:14px;bottom:14px;z-index:300;background:var(--fg);color:var(--bg);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;opacity:.9}\n\n  /* ===== Sidebar (gewaehlte Navbar: 6+5+8) ===== */\n  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sw);z-index:95;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:30px 24px}\n  .sidebar .brand{font-family:\"Cormorant Garamond\",serif;font-size:1.7rem;font-weight:600;letter-spacing:.24em;color:var(--fg)}\n  .sidebar .brand small{display:block;font-family:\"Inter\",sans-serif;font-size:.58rem;letter-spacing:.36em;color:var(--mu
