{t:"04 \u00b7 Configurateur",d:"Ring-B\u00fchne + Material-Selektor, der den Akzent live \u00e4ndert (webgi).",h:"<!DOCTYPE html>\n<html lang=\"de\">\n<head>\n<!-- MAISON VEYRA \u00b7 Hero-Option 4 \"Configurateur\" \u2014 Ring-Buehne + Material-Selektor, der\n     den Akzent live aendert. Inspiration: webgi-jewelry. -->\n<meta charset=\"UTF-8\" />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n<title>VEYRA \u2014 Hero 4 \u00b7 Configurateur<\/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\" />\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin />\n<link href=\"https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap\" rel=\"stylesheet\" />\n<style>\n  :root{--bg:#0E0C0A;--fg:#F4ECE1;--muted:#A89E8E;--accent:#C9A45B;--line:rgba(244,236,225,.16);--ease:cubic-bezier(.22,1,.36,1);--t:340ms}\n  *,*::before,*::after{box-sizing:border-box}\n  body{margin:0;background:\n      radial-gradient(900px 600px at 78% 30%,rgba(201,164,91,.12),transparent 60%),var(--bg);\n    color:var(--fg);font-family:\"Inter\",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background var(--t)}\n  .badge{position:fixed;left:14px;bottom:14px;z-index:50;background:var(--fg);color:var(--bg);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;opacity:.85}\n  .hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:clamp(30px,5vw,70px);padding:clamp(80px,10vh,120px) clamp(24px,6vw,90px) 60px}\n  @media (max-width:880px){.hero{grid-template-columns:1fr;text-align:center}}\n  .eb{font-family:\"JetBrains Mono\",monospace;font-size:.74rem;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin:0 0 20px;transition:color var(--t)}\n  h1{font-family:\"Cormorant Garamond\",serif;font-weight:600;font-size:clamp(2.6rem,6vw,5rem);line-height:1.02;margin:0 0 20px}\n  h1 em{font-style:italic;color:var(--accent);transition:color var(--t)}\n  .lead{color:var(--muted);max-width:42ch;margin:0 0 30px;font-size:1.06rem}\n  @media (max-width:880px){.lead{margin-left:auto;margin-right:auto}}\n  .config{display:flex;flex-direction:column;gap:14px}\n  @media (max-width:880px){.config{align-items:center}}\n  .config .ctitle{font-family:\"JetBrains Mono\",monospace;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}\n  .swatches{display:flex;gap:14px}\n  .swatches button{width:50px;height:50px;border-radius:50%;border:2px solid transparent;cursor:pointer;position:relative;transition:transform .2s var(--ease),border-color var(--t);box-shadow:inset 0 0 0 1px rgba(0,0,0,.25)}\n  .swatches button:hover{transform:translateY(-3px)}\n  .swatches button[aria-pressed=\"true\"]{border-color:var(--fg)}\n  .swatches button .nm{position:absolute;top:58px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:.7rem;letter-spacing:.05em;color:var(--muted)}\n  .sw-gelb{background:radial-gradient(circle at 35% 30%,#F6DC97,#C99A4E)}\n  .sw-weiss{background:radial-gradient(circle at 35% 30%,#F4F6F9,#B9C0CC)}\n  .sw-rose{background:radial-gradient(circle at 35% 30%,#EDC9B8,#C98E76)}\n  .sw-platin{background:radial-gradient(circle at 35% 30%,#EAECEF,#9098A2)}\n  .cta{display:inline-flex;align-items:center;min-height:52px;padding:0 28px;border-radius:999px;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600;background:var(--accent);color:#1c1407;margin-top:34px;transition:background var(--t),transform .15s}\n  @media (max-width:880px){.cta{margin-left:auto;margin-right:auto}}\n  .cta:active{transform:scale(.97)}\n  .stage{position:relative;justify-self:center;width:min(82vw,460px);aspect-ratio:1;border-radius:30px;overflow:hidden;box-shadow:0 50px 100px -50px rgba(0,0,0,.8)}\n  .stage img{width:100%;height:100%;object-fit:cover}\n  .stage .glow{position:absolute;inset:0;mix-blend-mode:soft-light;background:radial-gradient(circle at 50% 42%,var(--accent),transparent 60%);opacity:.7;transition:background var(--t)}\n  .stage .ring{position:absolute;inset:0;border:1px solid var(--line);border-radius:30px;pointer-events:none}\n  @media (prefers-reduced-motion:reduce){*{transition:none !important}}\n<\/style>\n<\/head>\n<body>\n<span class=\"badge\">Hero 4 \u00b7 Configurateur<\/span>\n<section class=\"hero\">\n  <div>\n    <p class=\"eb\">Atelier \u00b7 nach Ma\u00df<\/p>\n    <h1>Ihr Ring, <em>Ihr Material<\/em>.<\/h1>\n    <p class=\"lead\">W\u00e4hlen Sie das Edelmetall und sehen Sie den Ton in Echtzeit. In Produktion als 3D-Konfigurator (WebGL).<\/p>\n    <div class=\"config\">\n      <span class=\"ctitle\">Material w\u00e4hlen<\/span>\n      <div class=\"swatches\" role=\"group\" aria-label=\"Material\">\n        <button class=\"sw-gelb\" aria-pressed=\"true\" data-accent=\"#C9A45B\" aria-label=\"Gelbgold\"><span class=\"nm\">Gelbgold<\/span><\/button>\n        <button class=\"sw-weiss\" aria-pressed=\"false\" data-accent=\"#AEB6C2\" aria-label=\"Wei\u00dfgold\"><span class=\"nm\">Wei\u00dfgold<\/span><\/button>\n        <button class=\"sw-rose\" aria-pressed=\"false\" data-accent=\"#D2A088\" aria-label=\"Ros\u00e9gold\"><span class=\"nm\">Ros\u00e9gold<\/span><\/button>\n        <button class=\"sw-platin\" aria-pressed=\"false\" data-accent=\"#AAB2BD\" aria-label=\"Platin\"><span class=\"nm\">Platin<\/span><\/button>\n      <\/div>\n    <\/div>\n    <a class=\"cta\" href=\"#\">Jetzt konfigurieren<\/a>\n  <\/div>\n  <div class=\"stage\">\n    <img src=\"https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=1200&q=80&auto=format&fit=crop\" alt=\"Solit\u00e4r-Ring\" />\n    <div class=\"glow\" aria-hidden=\"true\"><\/div>\n    <div class=\"ring\" aria-hidden=\"true\"><\/div>\n  <\/div>\n<\/section>\n<script>\n(function(){\n  var sw=document.querySelectorAll(\".swatches button\");\n  sw.forEach(function(b){b.addEventListener(\"click\",function(){\n    sw.forEach(function(x){x.setAttribute(\"aria-pressed\",\"false\");});\n    b.setAttribute(\"aria-pressed\",\"true\");\n    document.documentElement.style.setProperty(\"--accent\",b.getAttribute(\"data-accent\"));\n  });});\n})();\n<\/script>\n<\/body>\n<\/html>\n"},
{t:"05 \u00b7 Mosaic",d:"Bento-Bildraster mit Headline-Overlay und Lauftext.",h:"<!DOCTYPE html>\n<html lang=\"de\">\n<head>\n<!-- MAISON VEYRA \u00b7 Hero-Option 5 \"Mosaic\" \u2014 Bento-Bildraster mit Headline-Overlay und\n     Lauftext. Modern, editorial/Galerie. -->\n<meta charset=\"UTF-8\" />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n<title>VEYRA \u2014 Hero 5 \u00b7 Mosaic<\/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\" />\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin />\n<link href=\"https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap\" rel=\"stylesheet\" />\n<style>\n  :root{--bg:#0D0B0A;--fg:#F4ECE1;--muted:#A89E8E;--gold:#C9A45B;--line:rgba(244,236,225,.14);--ease:cubic-bezier(.22,1,.36,1)}\n  *,*::before,*::after{box-sizing:border-box}\n  body{margin:0;background:var(--bg);color:var(--fg);font-family:\"Inter\",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}\n  .badge{position:fixed;left:14px;bottom:14px;z-index:50;background:var(--fg);color:var(--bg);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;opacity:.85}\n  .hero{min-height:100vh;display:flex;flex-direction:column;padding:clamp(20px,3vw,32px);gap:clamp(14px,2vw,20px)}\n  .top{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;padding:clamp(10px,3vh,30px) 6px 0}\n  .top .eb{font-family:\"JetBrains Mono\",monospace;font-size:.72rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin:0}\n  .top h1{font-family:\"Cormorant Garamond\",serif;font-weight:600;font-size:clamp(2.4rem,6vw,5rem);line-height:1.0;margin:10px 0 0;max-width:18ch}\n  .top h1 em{font-style:italic;color:var(--gold)}\n  .top .cta{display:inline-flex;align-items:center;min-height:50px;padding:0 26px;border-radius:999px;border:1px solid var(--line);font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;transition:background .3s,color .3s;white-space:nowrap}\n  .top .cta:hover{background:var(--fg);color:var(--bg)}\n  .grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:1.3fr 1fr;gap:clamp(12px,1.4vw,18px);min-height:54vh}\n  .tile{position:relative;border-radius:18px;overflow:hidden;background:#141009}\n  .tile img{width:100%;height:100%;object-fit:cover;transition:transform .9s var(--ease)}\n  .tile:hover img{transform:scale(1.07)}\n  .tile .cap{position:absolute;left:14px;bottom:12px;z-index:2;font-family:\"JetBrains Mono\",monospace;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:#fff;mix-blend-mode:difference}\n  .tile.big{grid-column:span 2;grid-row:span 2}\n  .tile.wide{grid-column:span 2}\n  @media (max-width:820px){\n    .grid{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(3,1fr)}\n    .tile.big{grid-column:span 2;grid-row:span 1}.tile.wide{grid-column:span 2}\n  }\n  .marquee{overflow:hidden;white-space:nowrap;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:12px 0}\n  .marquee .tr{display:inline-flex;gap:40px;animation:m 24s linear infinite;font-family:\"Cormorant Garamond\",serif;font-size:1.3rem;color:var(--muted)}\n  .marquee .tr span{display:inline-flex;gap:40px;align-items:center}\n  .marquee .tr i{color:var(--gold);font-style:normal}\n  @keyframes m{to{transform:translateX(-50%)}}\n  @media (prefers-reduced-motion:reduce){.tile img,.marquee .tr{animation:none !important;transition:none !important}}\n<\/style>\n<\/head>\n<body>\n<span class=\"badge\">Hero 5 \u00b7 Mosaic<\/span>\n<section class=\"hero\">\n  <div class=\"top\">\n    <div>\n      <p class=\"eb\">Maison Veyra \u00b7 D\u00fcsseldorf<\/p>\n      <h1>Vier Welten, <em>ein Haus<\/em>.<\/h1>\n    <\/div>\n    <a class=\"cta\" href=\"#\">Alles entdecken<\/a>\n  <\/div>\n  <div class=\"grid\">\n    <a class=\"tile big\" href=\"#\"><img src=\"https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=1300&q=80&auto=format&fit=crop\" alt=\"Feiner Goldschmuck\" /><span class=\"cap\">Schmuck<\/span><\/a>\n    <a class=\"tile\" href=\"#\"><img src=\"https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=800&q=80&auto=format&fit=crop\" alt=\"Solit\u00e4r-Ring\" /><span class=\"cap\">Trauringe<\/span><\/a>\n    <a class=\"tile\" href=\"#\"><img src=\"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800&q=80&auto=format&fit=crop\" alt=\"Feine Uhr\" /><span class=\"cap\">Uhren<\/span><\/a>\n    <a class=\"tile wide\" href=\"#\"><img src=\"https://images.unsplash.com/photo-1602173574767-37ac01994b2a?w=1100&q=80&auto=format&fit=crop\" alt=\"Edelstein\" /><span class=\"cap\">Diamanten<\/span><\/a>\n  <\/div>\n  <div class=\"marquee\" aria-hidden=\"true\">\n    <div class=\"tr\">\n      <span>Haute Joaillerie <i>\u00b7<\/i> Horlogerie <i>\u00b7<\/i> Trauringe nach Ma\u00df <i>\u00b7<\/i> Atelier am Rhein <i>\u00b7<\/i> Seit 1968 <i>\u00b7<\/i><\/span>\n      <span>Haute Joaillerie <i>\u00b7<\/i> Horlogerie <i>\u00b7<\/i> Trauringe nach Ma\u00df <i>\u00b7<\/i> Atelier am Rhein <i>\u00b7<\/i> Seit 1968 <i>\u00b7<\/i><\/span>\n    <\/div>\n  <\/div>\n<\/section>\n<\/body>\n<\/html>\n"}

const stage=document.getElementById("stage"),tabs=document.getElementById("tabs"),titleEl=document.getElementById("title"),descEl=document.getElementById("desc");
function show(i){const d=DOCS[i];stage.srcdoc=d.h;titleEl.textContent=d.t;descEl.textContent=d.d;[...tabs.children].forEach((b,k)=>b.classList.toggle("active",k===i));try{history.replaceState(null,"","#h"+String(i+1).padStart(2,"0"));}catch(e){}}
tabs.addEventListener("click",e=>{const b=e.target.closest(".tab");if(b)show(+b.dataset.i);});
const m=(location.hash.match(/h(\d+)/)||[])[1];show(m?Math.min(DOCS.length-1,Math.max(0,(+m)-1)):0);
</script></body></html>
