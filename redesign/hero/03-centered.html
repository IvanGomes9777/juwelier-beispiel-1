<!DOCTYPE html>
<html lang="de">
<head>
<!-- MAISON VEYRA · Hero-Option 3 "Centered Couture" — zentriertes Statement ueber Bild,
     feine Gold-Linie, Scroll-Indikator. Sehr couture/Maison. -->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VEYRA — Hero 3 · Centered Couture</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#0D0B0A;--fg:#F4ECE1;--muted:#B6AC9C;--gold:#C9A45B;--line:rgba(244,236,225,.2);--ease:cubic-bezier(.16,1,.3,1)}
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:"Inter",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
  .badge{position:fixed;left:14px;bottom:14px;z-index:50;background:var(--fg);color:var(--bg);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;opacity:.85}
  .hero{position:relative;height:100vh;min-height:600px;display:grid;place-items:center;text-align:center;overflow:hidden}
  .hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .hero::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 40%,transparent,rgba(13,11,10,.5) 70%,rgba(13,11,10,.85))}
  .inner{position:relative;z-index:2;padding:0 24px;max-width:40ch}
  .eb{font-family:"JetBrains Mono",monospace;font-size:.74rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin:0 0 22px;opacity:0;animation:fade 1s var(--ease) .1s forwards}
  .rule{width:54px;height:1px;background:var(--gold);margin:0 auto 26px;transform:scaleX(0);transform-origin:center;animation:grow 1s var(--ease) .3s forwards}
  h1{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:clamp(2.6rem,7vw,5.6rem);line-height:1.04;margin:0 0 22px;opacity:0;animation:fade 1.1s var(--ease) .42s forwards}
  h1 em{font-style:italic;color:var(--gold)}
  .lead{color:var(--muted);font-size:1.1rem;margin:0 0 32px;opacity:0;animation:fade 1.1s var(--ease) .56s forwards}
  .cta{display:inline-block;border:1px solid var(--line);padding:15px 34px;border-radius:999px;font-size:.8rem;letter-spacing:.16em;text-transform:uppercase;transition:background .3s,color .3s;opacity:0;animation:fade 1.1s var(--ease) .7s forwards}
  .cta:hover{background:var(--fg);color:var(--bg)}
  @keyframes fade{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  @keyframes grow{to{transform:scaleX(1)}}
  .cue{position:absolute;left:50%;bottom:30px;transform:translateX(-50%);z-index:2;font-family:"JetBrains Mono",monospace;font-size:.66rem;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:8px}
  .cue .d{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulse 1.7s infinite}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){*{animation:none !important}.eb,h1,.lead,.cta{opacity:1 !important}.rule{transform:none !important}}
</style>
</head>
<body>
<span class="badge">Hero 3 · Centered Couture</span>
<section class="hero">
  <img src="https://images.unsplash.com/photo-1620656798579-1984d9e87df7?w=2200&q=80&auto=format&fit=crop" alt="Feiner Schmuck in Szene" />
  <div class="inner">
    <p class="eb">Seit 1968 · Königsallee</p>
    <div class="rule"></div>
    <h1>Die Kunst, <em>Schönes</em> zu bewahren.</h1>
    <p class="lead">Maison Veyra — Haute Joaillerie aus Düsseldorf.</p>
    <a class="cta" href="#">Maison entdecken</a>
  </div>
  <div class="cue"><span class="d"></span>Scrollen</div>
</section>
</body>
</html>
