<!DOCTYPE html>
<html lang="de">
<head>
<!--
  MAISON VEYRA · Redesign — Navbar-Option 4 "Configurateur"
  Inspiration: webgi-jewelry.vercel.app — schwebende Glas-Pill-Navigation zentriert,
  grosse Bold-Typo, integrierter Material-Selektor (Gelb-/Weiss-/Rosegold, Platin)
  der den Akzent live aendert, "Scrollen zum Entdecken"-Hinweis, hell und luftig.
-->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MAISON VEYRA — Navbar 4 · Configurateur</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F4F2EE; --ink:#16140F; --muted:#6E695E; --line:rgba(22,20,15,.12);
    --accent:#C99A4E; /* wird per JS gesetzt */
    --ease:cubic-bezier(.22,1,.36,1); --t:300ms;
  }
  *,*::before,*::after{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:"Manrope",system-ui,sans-serif;background:var(--bg);color:var(--ink);
    line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none} img{display:block;max-width:100%}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  .badge{position:fixed;left:14px;bottom:14px;z-index:300;background:var(--ink);color:var(--bg);
    font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;opacity:.85}

  /* ====== Floating glass pill nav ====== */
  .nav{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:8px;
    padding:8px 8px 8px 18px;border-radius:999px;background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.7);
    -webkit-backdrop-filter:blur(16px) saturate(160%);backdrop-filter:blur(16px) saturate(160%);
    box-shadow:0 18px 50px -22px rgba(0,0,0,.4);max-width:calc(100vw - 28px)}
  .nav .logo{font-weight:800;letter-spacing:.04em;font-size:1rem;padding-right:10px}
  .nav .logo b{color:var(--accent);transition:color var(--t)}
  .nav .links{display:flex;gap:2px}
  .nav .links a{font-size:.86rem;font-weight:500;padding:9px 14px;border-radius:999px;color:var(--muted);
    transition:background var(--t),color var(--t)}
  .nav .links a:hover{background:rgba(22,20,15,.06);color:var(--ink)}
  .nav .pill{background:var(--accent);color:#1c1407;font-weight:700;font-size:.84rem;border:none;cursor:pointer;
    padding:10px 18px;border-radius:999px;font-family:inherit;transition:background var(--t),transform .15s}
  .nav .pill:active{transform:scale(.96)}
  .nav .burger{display:none;background:none;border:none;cursor:pointer;padding:8px}
  .nav .burger svg{width:22px;height:22px;stroke:var(--ink);fill:none;stroke-width:1.7}
  @media (max-width:760px){ .nav .links{display:none} .nav .burger{display:inline-flex} }

  .mnav{position:fixed;inset:0;z-index:95;background:var(--bg);display:flex;flex-direction:column;
    justify-content:center;padding:32px;gap:6px;transform:translateY(-100%);transition:transform var(--t) var(--ease)}
  .mnav.open{transform:none}
  .mnav a{font-size:2rem;font-weight:700;padding:12px 0;border-bottom:1px solid var(--line)}
  .mnav .x{position:absolute;top:24px;right:28px;font-size:2rem;background:none;border:none;cursor:pointer}

  /* ====== Hero / Configurator stage ====== */
  .stage{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;
    padding:120px clamp(20px,5vw,80px) 60px;gap:40px}
  @media (max-width:860px){ .stage{grid-template-columns:1fr;text-align:center;padding-top:110px} }
  .stage .word{font-weight:800;font-size:clamp(3rem,9vw,7rem);line-height:.95;letter-spacing:-.03em;margin:0}
  .stage .word em{font-style:normal;color:var(--accent);transition:color var(--t)}
  .stage .lead{color:var(--muted);max-width:42ch;margin:22px 0 30px;font-size:1.05rem}
  @media (max-width:860px){ .stage .lead{margin-left:auto;margin-right:auto} }

  .visual{position:relative;justify-self:center;width:min(80vw,440px);aspect-ratio:1;border-radius:32px;overflow:hidden;
    box-shadow:0 40px 90px -40px rgba(0,0,0,.5)}
  .visual img{width:100%;height:100%;object-fit:cover}
  .visual .ring-glow{position:absolute;inset:0;mix-blend-mode:overlay;
    background:radial-gradient(circle at 50% 42%,var(--accent),transparent 62%);opacity:.55;transition:background var(--t)}

  /* Material selector */
  .config{display:flex;flex-direction:column;gap:14px;margin-top:6px}
  @media (max-width:860px){ .config{align-items:center} }
  .config .ctitle{font-size:.74rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  .swatches{display:flex;gap:12px}
  .swatches button{width:46px;height:46px;border-radius:50%;border:2px solid transparent;cursor:pointer;
    position:relative;transition:transform .2s var(--ease),border-color var(--t);box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
  .swatches button:hover{transform:translateY(-3px)}
  .swatches button[aria-pressed="true"]{border-color:var(--ink)}
  .swatches button .nm{position:absolute;top:54px;left:50%;transform:translateX(-50%);white-space:nowrap;
    font-size:.7rem;letter-spacing:.06em;color:var(--muted)}
  .sw-gelb{background:radial-gradient(circle at 35% 30%,#F6DC97,#C99A4E)}
  .sw-weiss{background:radial-gradient(circle at 35% 30%,#F4F6F9,#B9C0CC)}
  .sw-rose{background:radial-gradient(circle at 35% 30%,#EDC9B8,#C98E76)}
  .sw-platin{background:radial-gradient(circle at 35% 30%,#EAECEF,#9098A2)}

  .scroll-hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:60;
    font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:10px}
  .scroll-hint .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{transition-duration:.001ms !important;animation:none !important;scroll-behavior:auto !important}
  }
</style>
</head>
<body>
<span class="badge">Option 4 · Configurateur</span>

<nav class="nav" aria-label="Hauptnavigation">
  <a class="logo" href="#">VE<b>Y</b>RA</a>
  <div class="links">
    <a href="#">Ringe</a><a href="#">Uhren</a><a href="#">Schmuck</a><a href="#">Atelier</a>
  </div>
  <button class="pill">Konfigurieren</button>
  <button class="burger" id="burger" aria-label="Menü"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
</nav>

<div class="mnav" id="mnav" aria-hidden="true">
  <button class="x" id="mx" aria-label="Schließen">&times;</button>
  <a href="#">Ringe</a><a href="#">Uhren</a><a href="#">Schmuck</a><a href="#">Atelier</a>
</div>

<section class="stage">
  <div>
    <h1 class="word">Ihr Ring,<br><em>Ihr Material</em>.</h1>
    <p class="lead">Wählen Sie das Edelmetall und sehen Sie Ihren Ring in Echtzeit. In Produktion als
      3D-Konfigurator (WebGL).</p>
    <div class="config">
      <span class="ctitle">Material</span>
      <div class="swatches" role="group" aria-label="Material wählen">
        <button class="sw-gelb" aria-pressed="true" data-accent="#C99A4E" aria-label="Gelbgold"><span class="nm">Gelbgold</span></button>
        <button class="sw-weiss" aria-pressed="false" data-accent="#9AA3B2" aria-label="Weißgold"><span class="nm">Weißgold</span></button>
        <button class="sw-rose" aria-pressed="false" data-accent="#C98E76" aria-label="Roségold"><span class="nm">Roségold</span></button>
        <button class="sw-platin" aria-pressed="false" data-accent="#8C95A1" aria-label="Platin"><span class="nm">Platin</span></button>
      </div>
    </div>
  </div>
  <div class="visual">
    <img src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=1100&q=80&auto=format&fit=crop" alt="Ring im Konfigurator" />
    <div class="ring-glow" aria-hidden="true"></div>
  </div>
</section>

<div class="scroll-hint"><span class="dot"></span> Scrollen zum Entdecken</div>

<script>
(function(){
  var burger=document.getElementById("burger"),mnav=document.getElementById("mnav"),mx=document.getElementById("mx");
  burger.addEventListener("click",function(){mnav.classList.add("open");mnav.setAttribute("aria-hidden","false");});
  mx.addEventListener("click",function(){mnav.classList.remove("open");mnav.setAttribute("aria-hidden","true");});

  var sw=document.querySelectorAll(".swatches button");
  sw.forEach(function(b){
    b.addEventListener("click",function(){
      sw.forEach(function(x){x.setAttribute("aria-pressed","false");});
      b.setAttribute("aria-pressed","true");
      document.documentElement.style.setProperty("--accent",b.getAttribute("data-accent"));
    });
  });
})();
</script>
</body>
</html>
