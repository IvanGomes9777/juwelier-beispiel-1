<!DOCTYPE html>
<html lang="de">
<head>
<!--
  MAISON VEYRA · Redesign — Navbar-Option 6 "Sidebar"
  Vertikale Navigation links (Fashion-/Editorial-Haus). Logo oben, Links gestapelt,
  Kontakt/Social unten. Inhalt rechts versetzt. Mobil: Top-Bar + Hamburger-Sheet.
-->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MAISON VEYRA — Navbar 6 · Sidebar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#0E0C0A;--panel:#15110D;--fg:#F4ECE1;--muted:#9A9080;--gold:#C9A45B;--line:rgba(244,236,225,.14);
    --ease:cubic-bezier(.22,1,.36,1);--t:280ms;--sw:248px}
  *,*::before,*::after{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.6;
    -webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none} img{display:block;max-width:100%}
  :focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .badge{position:fixed;left:14px;bottom:14px;z-index:300;background:var(--fg);color:var(--bg);
    font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;opacity:.85}

  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sw);z-index:90;background:var(--panel);
    border-right:1px solid var(--line);display:flex;flex-direction:column;padding:30px 26px}
  .sidebar .brand{font-family:"Cormorant Garamond",serif;font-size:1.7rem;font-weight:600;letter-spacing:.22em;margin-bottom:4px}
  .sidebar .brand small{display:block;font-family:"Inter",sans-serif;font-size:.6rem;letter-spacing:.34em;color:var(--muted);margin-top:8px}
  .sidebar nav{margin-top:46px;display:flex;flex-direction:column;gap:3px}
  .sidebar nav a{position:relative;padding:11px 0 11px 18px;font-size:.96rem;color:var(--muted);
    transition:color var(--t),padding var(--t) var(--ease)}
  .sidebar nav a::before{content:"";position:absolute;left:0;top:50%;width:7px;height:1.5px;background:var(--gold);
    transform:translateY(-50%) scaleX(0);transform-origin:left;transition:transform var(--t) var(--ease)}
  .sidebar nav a:hover,.sidebar nav a.active{color:var(--fg);padding-left:24px}
  .sidebar nav a:hover::before,.sidebar nav a.active::before{transform:translateY(-50%) scaleX(1)}
  .sidebar .foot{margin-top:auto;font-size:.78rem;color:var(--muted);display:flex;flex-direction:column;gap:10px}
  .sidebar .foot .soc{display:flex;gap:14px}
  .sidebar .foot a:hover{color:var(--gold)}
  .sidebar .cta{margin-top:18px;display:inline-flex;justify-content:center;border:1px solid var(--line);
    border-radius:999px;padding:11px;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;
    transition:background var(--t),color var(--t)}
  .sidebar .cta:hover{background:var(--gold);color:#1c1407;border-color:var(--gold)}

  /* mobile top bar */
  .topbar{display:none;position:fixed;top:0;left:0;right:0;z-index:90;align-items:center;justify-content:space-between;
    padding:14px 18px;background:rgba(14,12,10,.85);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line)}
  .topbar .brand{font-family:"Cormorant Garamond",serif;font-size:1.3rem;font-weight:600;letter-spacing:.2em}
  .topbar button{background:none;border:none;color:var(--fg);cursor:pointer;padding:6px}
  .topbar svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.6}

  .main{margin-left:var(--sw)}
  .hero{position:relative;min-height:100vh;display:flex;align-items:flex-end;overflow:hidden}
  .hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(14,12,10,.3),transparent 35%,rgba(14,12,10,.85))}
  .hero .inner{position:relative;z-index:2;padding:clamp(28px,5vw,72px)}
  .hero .eb{font-size:.74rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin:0 0 16px}
  .hero h1{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:clamp(2.6rem,6vw,5rem);line-height:1.02;margin:0 0 22px;max-width:18ch}
  .hero .cta2{display:inline-block;border:1px solid rgba(244,236,225,.6);padding:14px 30px;border-radius:999px;
    font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;transition:background var(--t),color var(--t)}
  .hero .cta2:hover{background:var(--fg);color:var(--bg)}

  .sheet{position:fixed;inset:0;z-index:120;background:var(--panel);transform:translateX(-100%);
    transition:transform var(--t) var(--ease);padding:24px;display:flex;flex-direction:column}
  .sheet.open{transform:none}
  .sheet .x{align-self:flex-end;background:none;border:none;color:var(--fg);font-size:2rem;cursor:pointer}
  .sheet a{font-family:"Cormorant Garamond",serif;font-size:1.8rem;padding:13px 0;border-bottom:1px solid var(--line)}

  @media (max-width:900px){
    .sidebar{display:none} .topbar{display:flex} .main{margin-left:0}
    .hero{align-items:center;text-align:center} .hero .inner{margin:0 auto}
  }
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:.001ms !important;scroll-behavior:auto !important}}
</style>
</head>
<body>
<span class="badge">Option 6 · Sidebar</span>

<aside class="sidebar">
  <a class="brand" href="#">VEYRA<small>DÜSSELDORF</small></a>
  <nav aria-label="Hauptnavigation">
    <a href="#" class="active">Start</a>
    <a href="#">Schmuck</a>
    <a href="#">Trauringe</a>
    <a href="#">Uhren</a>
    <a href="#">Atelier</a>
    <a href="#">Maison</a>
  </nav>
  <a class="cta" href="#">Termin buchen</a>
  <div class="foot">
    <div class="soc"><a href="#">Instagram</a><a href="#">Pinterest</a></div>
    <span>Königsallee · Düsseldorf</span>
  </div>
</aside>

<header class="topbar">
  <a class="brand" href="#">VEYRA</a>
  <button id="burger" aria-label="Menü"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
</header>

<div class="sheet" id="sheet" aria-hidden="true">
  <button class="x" id="sx" aria-label="Schließen">&times;</button>
  <a href="#">Start</a><a href="#">Schmuck</a><a href="#">Trauringe</a><a href="#">Uhren</a><a href="#">Atelier</a><a href="#">Maison</a>
</div>

<div class="main">
  <section class="hero">
    <img src="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=2000&q=80&auto=format&fit=crop" alt="Feiner Goldschmuck" />
    <div class="inner">
      <p class="eb">Haute Joaillerie · Düsseldorf</p>
      <h1>Eine Adresse für das Besondere.</h1>
      <a class="cta2" href="#">Kollektion entdecken</a>
    </div>
  </section>
</div>

<script>
(function(){
  var sheet=document.getElementById("sheet");
  document.getElementById("burger").addEventListener("click",function(){sheet.classList.add("open");sheet.setAttribute("aria-hidden","false");});
  document.getElementById("sx").addEventListener("click",function(){sheet.classList.remove("open");sheet.setAttribute("aria-hidden","true");});
})();
</script>
</body>
</html>
