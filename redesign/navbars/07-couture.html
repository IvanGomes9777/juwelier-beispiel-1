<!DOCTYPE html>
<html lang="de">
<head>
<!--
  MAISON VEYRA · Redesign — Navbar-Option 7 "Couture"
  Symmetrisch: Links links | zentriertes Serif-Logo | Links rechts, feine Gold-Linie.
  Sehr couture/Maison. Beim Scrollen schrumpft das Logo und die Bar wird kompakter.
-->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MAISON VEYRA — Navbar 7 · Couture</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--paper:#F7F2E9;--paper-2:#EFE7D8;--ink:#17140F;--muted:#6F6757;--gold:#A8822F;--line:rgba(23,20,15,.16);
    --ease:cubic-bezier(.22,1,.36,1);--t:300ms}
  *,*::before,*::after{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:"Inter",system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;
    -webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none} img{display:block;max-width:100%}
  :focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .badge{position:fixed;left:14px;bottom:14px;z-index:300;background:var(--ink);color:var(--paper);
    font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;opacity:.85}

  .header{position:sticky;top:0;z-index:100;background:rgba(247,242,233,.9);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
    padding:clamp(14px,2.2vw,26px) clamp(16px,4vw,44px);transition:padding var(--t) var(--ease)}
  .header.small .bar{padding-top:11px;padding-bottom:11px}
  .side{display:flex;gap:clamp(14px,2vw,30px)}
  .side.l{justify-content:flex-start}.side.r{justify-content:flex-end}
  .side a{position:relative;font-size:.82rem;letter-spacing:.16em;text-transform:uppercase;padding:6px 0;color:var(--ink)}
  .side a::after{content:"";position:absolute;left:50%;right:50%;bottom:0;height:1px;background:var(--gold);
    transition:left var(--t) var(--ease),right var(--t) var(--ease)}
  .side a:hover::after{left:0;right:0}

  .logo{grid-column:2;text-align:center;font-family:"Cormorant Garamond",serif;font-weight:600;
    letter-spacing:.34em;font-size:clamp(1.5rem,3.4vw,2.5rem);line-height:1;padding-left:.34em;white-space:nowrap;
    transition:font-size var(--t) var(--ease)}
  .header.small .logo{font-size:1.3rem}
  .logo small{display:block;font-family:"Inter",sans-serif;font-size:.56rem;letter-spacing:.4em;color:var(--muted);
    margin-top:7px;padding-left:.4em;transition:opacity var(--t),max-height var(--t),margin var(--t)}
  .header.small .logo small{opacity:0;max-height:0;margin:0;overflow:hidden}
  .rule{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}

  .icons{display:flex;align-items:center;gap:12px;margin-left:18px}
  .icons button{background:none;border:none;color:inherit;cursor:pointer;padding:6px;display:inline-flex}
  .icons svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.6}
  .burger{display:none;background:none;border:none;cursor:pointer;padding:6px;color:inherit}
  .burger svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.6}

  @media (max-width:880px){
    .side{display:none} .bar{grid-template-columns:auto 1fr auto}
    .logo{grid-column:2} .burger{display:inline-flex;grid-column:1;justify-self:start} .icons{grid-column:3}
  }
  .sheet{position:fixed;inset:0;z-index:120;background:var(--paper);transform:translateY(-100%);
    transition:transform var(--t) var(--ease);padding:24px;display:flex;flex-direction:column;text-align:center}
  .sheet.open{transform:none}
  .sheet .x{align-self:flex-end;background:none;border:none;font-size:2rem;cursor:pointer}
  .sheet a{font-family:"Cormorant Garamond",serif;font-size:1.9rem;padding:14px 0;border-bottom:1px solid var(--line)}

  .hero{position:relative;height:100vh;min-height:600px;display:grid;place-items:center;text-align:center}
  .hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .hero::after{content:"";position:absolute;inset:0;background:rgba(247,242,233,.18)}
  .hero .in{position:relative;z-index:2;background:rgba(247,242,233,.78);
    -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);padding:clamp(30px,5vw,60px);border:1px solid var(--line);
    max-width:34ch;margin:0 20px}
  .hero .eb{font-size:.74rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin:0 0 16px}
  .hero h1{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:clamp(2.2rem,5vw,3.8rem);line-height:1.06;margin:0 0 20px}
  .hero .cta{display:inline-block;border:1px solid var(--ink);padding:13px 30px;border-radius:999px;
    font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;transition:background var(--t),color var(--t)}
  .hero .cta:hover{background:var(--ink);color:var(--paper)}
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:.001ms !important;scroll-behavior:auto !important}}
</style>
</head>
<body>
<span class="badge">Option 7 · Couture</span>

<header class="header" id="header">
  <div class="bar">
    <nav class="side l" aria-label="Navigation links">
      <a href="#">Schmuck</a><a href="#">Trauringe</a><a href="#">Uhren</a>
    </nav>
    <button class="burger" id="burger" aria-label="Menü"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
    <a class="logo" href="#">VEYRA<small>MAISON · DÜSSELDORF</small></a>
    <nav class="side r" aria-label="Navigation rechts">
      <a href="#">Atelier</a><a href="#">Boutique</a>
      <span class="icons">
        <button aria-label="Suche"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></button>
        <button aria-label="Konto"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5 21c0-4 3.5-6 7-6s7 2 7 6"/></svg></button>
      </span>
    </nav>
    <span class="icons" style="grid-column:3;display:none"></span>
  </div>
  <div class="rule" aria-hidden="true"></div>
</header>

<div class="sheet" id="sheet" aria-hidden="true">
  <button class="x" id="sx" aria-label="Schließen">&times;</button>
  <a href="#">Schmuck</a><a href="#">Trauringe</a><a href="#">Uhren</a><a href="#">Atelier</a><a href="#">Boutique</a>
</div>

<section class="hero">
  <img src="https://images.unsplash.com/photo-1620656798579-1984d9e87df7?w=2000&q=80&auto=format&fit=crop" alt="Feiner Schmuck in Szene" />
  <div class="in">
    <p class="eb">Seit 1968</p>
    <h1>Die Kunst, Schönes zu bewahren.</h1>
    <a class="cta" href="#">Maison entdecken</a>
  </div>
</section>

<script>
(function(){
  var header=document.getElementById("header");
  window.addEventListener("scroll",function(){header.classList.toggle("small",window.scrollY>60);},{passive:true});
  var sheet=document.getElementById("sheet");
  document.getElementById("burger").addEventListener("click",function(){sheet.classList.add("open");sheet.setAttribute("aria-hidden","false");});
  document.getElementById("sx").addEventListener("click",function(){sheet.classList.remove("open");sheet.setAttribute("aria-hidden","true");});
})();
</script>
</body>
</html>
