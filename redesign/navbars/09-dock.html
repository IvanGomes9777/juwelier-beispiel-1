<!DOCTYPE html>
<html lang="de">
<head>
<!--
  MAISON VEYRA · Redesign — Navbar-Option 9 "Dock"
  Schwebende Bottom-Navigation (app-artig). Oben nur ein kleines zentriertes Logo,
  unten ein Glas-Dock mit Icon+Label-Items und gleitendem Aktiv-Indikator.
-->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MAISON VEYRA — Navbar 9 · Dock</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#0E0C0A;--fg:#F4ECE1;--muted:#9A9080;--gold:#C9A45B;--line:rgba(244,236,225,.16);
    --ease:cubic-bezier(.22,1,.36,1);--t:300ms}
  *,*::before,*::after{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.6;
    -webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none} img{display:block;max-width:100%}
  :focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .badge{position:fixed;left:14px;top:14px;z-index:300;background:var(--fg);color:var(--bg);
    font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;opacity:.85}

  .topmark{position:fixed;top:0;left:0;right:0;z-index:80;display:flex;justify-content:center;padding:22px;
    pointer-events:none}
  .topmark a{pointer-events:auto;font-family:"Cormorant Garamond",serif;font-weight:600;font-size:1.5rem;
    letter-spacing:.3em;color:#fff;mix-blend-mode:difference;padding-left:.3em}

  /* Dock */
  .dock{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:4px;
    padding:8px;border-radius:999px;background:rgba(20,17,13,.66);border:1px solid var(--line);
    -webkit-backdrop-filter:blur(20px) saturate(150%);backdrop-filter:blur(20px) saturate(150%);
    box-shadow:0 24px 60px -24px rgba(0,0,0,.8);max-width:calc(100vw - 24px);overflow:auto}
  .dock .glow{position:absolute;top:8px;bottom:8px;border-radius:999px;background:rgba(201,164,91,.18);
    border:1px solid rgba(201,164,91,.4);transition:left var(--t) var(--ease),width var(--t) var(--ease);z-index:0}
  .dock a{position:relative;z-index:1;display:inline-flex;flex-direction:column;align-items:center;gap:3px;
    padding:9px 16px;border-radius:999px;color:var(--muted);font-size:.7rem;letter-spacing:.04em;white-space:nowrap;
    transition:color var(--t)}
  .dock a svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:1.6}
  .dock a.active,.dock a:hover{color:var(--fg)}
  .dock .pill{background:linear-gradient(150deg,var(--gold),#a87f37);color:#1c1407;font-weight:600;
    flex-direction:row;gap:8px;padding:11px 18px}
  .dock .pill svg{stroke:#1c1407}

  .hero{position:relative;min-height:100vh;display:grid;place-items:center;text-align:center;color:#fff}
  .hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(14,12,10,.45),rgba(14,12,10,.7))}
  .hero .in{position:relative;z-index:2;padding:0 24px;max-width:30ch}
  .hero .eb{font-size:.74rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin:0 0 18px}
  .hero h1{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:clamp(2.6rem,7vw,5.2rem);line-height:1.03;margin:0 0 24px}
  .hero .cta{display:inline-block;border:1px solid rgba(255,255,255,.6);padding:14px 32px;border-radius:999px;
    font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;transition:background var(--t),color var(--t)}
  .hero .cta:hover{background:#fff;color:#000}
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:.001ms !important;scroll-behavior:auto !important}}
</style>
</head>
<body>
<span class="badge">Option 9 · Dock</span>

<div class="topmark"><a href="#">VEYRA</a></div>

<section class="hero">
  <img src="https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?w=2000&q=80&auto=format&fit=crop" alt="Portrait mit Schmuck" />
  <div class="in">
    <p class="eb">Maison Veyra · Düsseldorf</p>
    <h1>Nah bei Ihnen, jederzeit.</h1>
    <a class="cta" href="#">Kollektion entdecken</a>
  </div>
</section>

<nav class="dock" id="dock" aria-label="Hauptnavigation">
  <span class="glow" id="glow" aria-hidden="true"></span>
  <a href="#" class="active" data-dock>
    <svg viewBox="0 0 24 24"><path d="M3 11 12 4l9 7"/><path d="M5 10v10h14V10"/></svg> Start
  </a>
  <a href="#" data-dock>
    <svg viewBox="0 0 24 24"><path d="M12 3 4 9l8 12 8-12z"/></svg> Schmuck
  </a>
  <a href="#" data-dock>
    <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="6"/><path d="M9 6 12 2l3 4"/></svg> Ringe
  </a>
  <a href="#" data-dock>
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg> Uhren
  </a>
  <a href="#" class="pill" data-dock>
    <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg> Termin
  </a>
</nav>

<script>
(function(){
  var dock=document.getElementById("dock"),glow=document.getElementById("glow"),items=dock.querySelectorAll("[data-dock]");
  function move(el){
    var d=dock.getBoundingClientRect(),r=el.getBoundingClientRect();
    glow.style.left=(r.left-d.left)+"px"; glow.style.width=r.width+"px";
  }
  function setActive(el){items.forEach(function(x){x.classList.remove("active");});el.classList.add("active");move(el);}
  items.forEach(function(el){
    el.addEventListener("mouseenter",function(){move(el);});
    el.addEventListener("click",function(e){e.preventDefault();setActive(el);});
  });
  dock.addEventListener("mouseleave",function(){move(dock.querySelector(".active"));});
  window.addEventListener("load",function(){move(dock.querySelector(".active"));});
  window.addEventListener("resize",function(){move(dock.querySelector(".active"));});
  move(dock.querySelector(".active"));
})();
</script>
</body>
</html>
