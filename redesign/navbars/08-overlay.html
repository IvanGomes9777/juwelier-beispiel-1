<!DOCTYPE html>
<html lang="de">
<head>
<!--
  MAISON VEYRA · Redesign — Navbar-Option 8 "Overlay"
  Minimale Top-Bar (Logo + "Menü"). Klick oeffnet ein Fullscreen-Overlay mit grossen
  Serif-Links; beim Hover eines Links erscheint rechts das passende Bild (Award-Site-Stil).
-->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MAISON VEYRA — Navbar 8 · Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#0C0B0A;--fg:#F3ECE0;--muted:#928A7B;--gold:#C9A45B;--line:rgba(243,236,224,.16);
    --ease:cubic-bezier(.16,1,.3,1);--t:520ms}
  *,*::before,*::after{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.6;
    -webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none} img{display:block;max-width:100%}
  :focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .badge{position:fixed;left:14px;bottom:14px;z-index:300;background:var(--fg);color:var(--bg);
    font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;opacity:.85}

  .bar{position:fixed;top:0;left:0;right:0;z-index:90;display:flex;align-items:center;justify-content:space-between;
    padding:clamp(16px,2.4vw,26px) clamp(18px,4vw,44px);color:#fff;mix-blend-mode:difference}
  .bar .logo{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:1.45rem;letter-spacing:.24em}
  .menu-toggle{display:inline-flex;align-items:center;gap:12px;background:none;border:none;color:inherit;cursor:pointer;
    font-family:"JetBrains Mono",monospace;font-size:.78rem;letter-spacing:.16em;text-transform:uppercase}
  .menu-toggle .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold)}

  /* Overlay */
  .overlay{position:fixed;inset:0;z-index:120;background:var(--bg);display:grid;grid-template-columns:1.1fr .9fr;
    clip-path:circle(0% at calc(100% - 60px) 40px);transition:clip-path .7s var(--ease);visibility:hidden}
  .overlay.open{clip-path:circle(150% at calc(100% - 60px) 40px);visibility:visible}
  .overlay .o-head{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;
    padding:clamp(16px,2.4vw,26px) clamp(18px,4vw,44px)}
  .overlay .o-head .logo{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:1.45rem;letter-spacing:.24em}
  .overlay .o-head .x{background:none;border:none;color:var(--fg);cursor:pointer;font-family:"JetBrains Mono",monospace;
    font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;display:inline-flex;gap:10px;align-items:center}
  .overlay .links{align-self:center;padding:0 clamp(24px,6vw,90px);display:flex;flex-direction:column;gap:4px}
  .overlay .links a{display:flex;align-items:baseline;gap:16px;font-family:"Cormorant Garamond",serif;font-weight:600;
    font-size:clamp(2.2rem,6vw,4.4rem);line-height:1.1;color:var(--muted);transition:color var(--t) var(--ease)}
  .overlay .links a .ix{font-family:"JetBrains Mono",monospace;font-size:.8rem;color:var(--gold);opacity:.6}
  .overlay .links a:hover{color:var(--fg)}
  .overlay .preview{position:relative;overflow:hidden;background:#000}
  .overlay .preview .pi{position:absolute;inset:0;opacity:0;transform:scale(1.06);transition:opacity var(--t) var(--ease),transform 1.2s var(--ease)}
  .overlay .preview .pi.show{opacity:.85;transform:none}
  .overlay .preview img{width:100%;height:100%;object-fit:cover}
  .overlay .meta{position:absolute;left:24px;bottom:24px;z-index:2;font-family:"JetBrains Mono",monospace;
    font-size:.74rem;letter-spacing:.14em;color:#fff;mix-blend-mode:difference}
  @media (max-width:820px){
    .overlay{grid-template-columns:1fr} .overlay .preview{display:none}
    .overlay .links{align-self:center;text-align:left}
  }

  .hero{position:relative;height:100vh;min-height:600px;display:grid;place-items:center;text-align:center;color:#fff}
  .hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.4),rgba(0,0,0,.5))}
  .hero .in{position:relative;z-index:2;padding:0 24px;max-width:26ch}
  .hero .eb{font-family:"JetBrains Mono",monospace;font-size:.74rem;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);margin:0 0 18px}
  .hero h1{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:clamp(2.6rem,7vw,5.4rem);line-height:1.03;margin:0}
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{transition-duration:.001ms !important;scroll-behavior:auto !important}
    .overlay{clip-path:none !important}
  }
</style>
</head>
<body>
<span class="badge">Option 8 · Overlay</span>

<header class="bar">
  <a class="logo" href="#">VEYRA</a>
  <button class="menu-toggle" id="open" aria-expanded="false" aria-controls="overlay"><span class="dot"></span> Menü</button>
</header>

<nav class="overlay" id="overlay" aria-label="Hauptmenü" aria-hidden="true">
  <div class="o-head">
    <span class="logo">VEYRA</span>
    <button class="x" id="close">Schließen &times;</button>
  </div>
  <div class="links" id="links">
    <a href="#" data-img="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=1200&q=80&auto=format&fit=crop"><span class="ix">01</span> Schmuck</a>
    <a href="#" data-img="https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=1200&q=80&auto=format&fit=crop"><span class="ix">02</span> Trauringe</a>
    <a href="#" data-img="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=1200&q=80&auto=format&fit=crop"><span class="ix">03</span> Uhren</a>
    <a href="#" data-img="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=1200&q=80&auto=format&fit=crop"><span class="ix">04</span> Atelier</a>
    <a href="#" data-img="https://images.unsplash.com/photo-1602173574767-37ac01994b2a?w=1200&q=80&auto=format&fit=crop"><span class="ix">05</span> Maison</a>
  </div>
  <div class="preview" id="preview"><span class="meta">VEYRA · Düsseldorf</span></div>
</nav>

<section class="hero">
  <img src="https://images.unsplash.com/photo-1573408301185-9146fe634ad0?w=2000&q=80&auto=format&fit=crop" alt="Schmuck-Inszenierung" />
  <div class="in">
    <p class="eb">Maison Veyra</p>
    <h1>Treten Sie ein.</h1>
  </div>
</section>

<script>
(function(){
  var overlay=document.getElementById("overlay"),openBtn=document.getElementById("open"),closeBtn=document.getElementById("close");
  function open(){overlay.classList.add("open");overlay.setAttribute("aria-hidden","false");openBtn.setAttribute("aria-expanded","true");document.body.style.overflow="hidden";}
  function close(){overlay.classList.remove("open");overlay.setAttribute("aria-hidden","true");openBtn.setAttribute("aria-expanded","false");document.body.style.overflow="";}
  openBtn.addEventListener("click",open); closeBtn.addEventListener("click",close);
  document.addEventListener("keydown",function(e){if(e.key==="Escape")close();});

  // hover image preview
  var preview=document.getElementById("preview"),imgs={};
  document.querySelectorAll("#links a").forEach(function(a){
    var url=a.getAttribute("data-img");
    var d=document.createElement("div");d.className="pi";
    var im=document.createElement("img");im.src=url;im.alt="";d.appendChild(im);preview.appendChild(d);imgs[url]=d;
    a.addEventListener("mouseenter",function(){
      for(var k in imgs)imgs[k].classList.remove("show"); d.classList.add("show");
    });
  });
})();
</script>
</body>
</html>
