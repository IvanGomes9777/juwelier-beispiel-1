\"#\">\u003cspan class=\"lead\">Edition Bordeaux\u003c/span>  Neu 2025\u003c/a>\n        \u003ca class=\"m-sub\" href=\"#\">\u003cspan class=\"lead\">Private Beratung\u003c/span>  Nach Vereinbarung\u003c/a>\n      \u003c/div>\n\n      \u003ca class=\"m-item\" href=\"#kollektion\">Atelier\u003c/a>\n      \u003ca class=\"m-item\" href=\"#kollektion\">Service\u003c/a>\n      \u003ca class=\"m-item\" href=\"#kollektion\">Boutique\u003c/a>\n\n      \u003ca class=\"m-cta\" href=\"#\">Termin anfragen\u003c/a>\n    \u003c/div>\n  \u003c/div>\n\u003c/header>\n\n\u003cmain id=\"main\">\n  \u003c!-- HERO -->\n  \u003csection class=\"hero\">\n    \u003cspan class=\"glow\" aria-hidden=\"true\">\u003c/span>\n    \u003cspan class=\"glow two\" aria-hidden=\"true\">\u003c/span>\n    \u003cdiv class=\"wrap\">\n      \u003cdiv class=\"hero-inner\">\n        \u003cdiv>\n          \u003cspan class=\"eyebrow\">\u003cspan class=\"dot\" aria-hidden=\"true\">\u003c/span>Bordeaux und Gold  Edition 2025\u003c/span>\n          \u003ch1>Zeitlose Stuecke,\u003cbr>\u003cspan class=\"em\">in warmem Gold\u003c/span> gefasst.\u003c/h1>\n          \u003cp class=\"lead\">Maison Aurelie verbindet Duesseldorfer Handwerk mit moderner Formensprache. Uhren, Schmuck und Trauringe, kuratiert mit Sorgfalt.\u003c/p>\n          \u003cdiv class=\"hero-actions\">\n            \u003cbutton class=\"cta\" type=\"button\">Kollektion ansehen\u003c/button>\n            \u003ca class=\"btn-ghost\" href=\"#kollektion\">Mehr erfahren\u003c/a>\n          \u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"hero-media\" aria-label=\"Bildplatzhalter Hero\">\n          \u003cspan class=\"tag\">PLATZHALTER  MEDIEN\u003c/span>\n          \u003cspan class=\"center\">4 zu 5  Hero-Visual\u003c/span>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- BENTO CARDS -->\n  \u003csection class=\"section\" id=\"kollektion\">\n    \u003cdiv class=\"wrap\">\n      \u003cdiv class=\"section-head\">\n        \u003cspan class=\"kick\">Kuratiert\u003c/span>\n        \u003ch2>Eine Auswahl aus dem Atelier\u003c/h2>\n      \u003c/div>\n\n      \u003cdiv class=\"cards\">\n        \u003carticle class=\"card c-wide c-tall\">\n          \u003cspan class=\"media\" aria-hidden=\"true\">\u003c/span>\n          \u003cdiv class=\"c-body\">\n            \u003ch3>Uhren\u003c/h3>\n            \u003cp>Mechanik, die bleibt. Praezise gefertigt und sorgfaeltig kuratiert.\u003c/p>\n          \u003c/div>\n        \u003c/article>\n        \u003carticle class=\"card c-tall\">\n          \u003cspan class=\"media\" aria-hidden=\"true\">\u003c/span>\n          \u003cdiv class=\"c-body\">\u003ch3>Schmuck\u003c/h3>\u003cp>Colliers und Ringe in Gold.\u003c/p>\u003c/div>\n        \u003c/article>\n        \u003carticle class=\"card\">\n          \u003cspan class=\"media\" aria-hidden=\"true\">\u003c/span>\n          \u003cdiv class=\"c-body\">\u003ch3>Trauringe\u003c/h3>\u003cp>Fuer immer.\u003c/p>\u003c/div>\n        \u003c/article>\n        \u003carticle class=\"card\">\n          \u003cspan class=\"media\" aria-hidden=\"true\">\u003c/span>\n          \u003cdiv class=\"c-body\">\u003ch3>Service\u003c/h3>\u003cp>Pflege und Reparatur.\u003c/p>\u003c/div>\n        \u003c/article>\n        \u003carticle class=\"card c-wide\">\n          \u003cspan class=\"media\" aria-hidden=\"true\">\u003c/span>\n          \u003cdiv class=\"c-body\">\u003ch3>Edition Bordeaux\u003c/h3>\u003cp>Limitierte Serie 2025.\u003c/p>\u003c/div>\n        \u003c/article>\n        \u003carticle class=\"card c-wide\">\n          \u003cspan class=\"media\" aria-hidden=\"true\">\u003c/span>\n          \u003cdiv class=\"c-body\">\u003ch3>Private Beratung\u003c/h3>\u003cp>Persoenliche Auswahl im Salon, nach Vereinbarung.\u003c/p>\u003c/div>\n        \u003c/article>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003csection class=\"section\">\n    \u003cdiv class=\"wrap\">\n      \u003cdiv class=\"section-head\">\n        \u003cspan class=\"kick\">Besuch\u003c/span>\n        \u003ch2>Salon in Duesseldorf\u003c/h2>\n      \u003c/div>\n      \u003cp style=\"color:var(--text-2);max-width:60ch\">Vereinbaren Sie einen Termin fuer eine persoenliche Beratung. Wir nehmen uns Zeit fuer Ihre Auswahl, in ruhiger Atmosphaere und mit fachkundiger Begleitung.\u003c/p>\n    \u003c/div>\n  \u003c/section>\n\u003c/main>\n\n\u003cfooter class=\"site-footer\">\n  \u003cdiv class=\"wrap foot-inner\">\n    \u003cspan>Maison Aurelie  Koenigsallee, Duesseldorf\u003c/span>\n    \u003cspan>Bordeaux und Gold  Ausfuehrung 2025\u003c/span>\n  \u003c/div>\n\u003c/footer>\n\n\u003cscript>\n(function(){\n  \"use strict\";\n\n  var mqDesktop = window.matchMedia(\"(min-width: 861px)\");\n\n  /* ===================== Desktop Mega-Menue (Disclosure) ===================== */\n  var trigger = document.getElementById(\"mega-trigger\");\n  var mega    = document.getElementById(\"mega-kollektionen\");\n  var host    = trigger.closest(\".has-mega\");\n  var openTimer = null, closeTimer = null;\n  var HOVER_OPEN = 90, HOVER_CLOSE = 160;\n\n  function isOpen(){ return trigger.getAttribute(\"aria-expanded\") === \"true\"; }\n\n  function openMega(){\n    if(!mqDesktop.matches) return;\n    clearTimeout(closeTimer);\n    trigger.setAttribute(\"aria-expanded\",\"true\");\n    mega.classList.add(\"open\");\n  }\n  function closeMega(){\n    clearTimeout(openTimer);\n    trigger.setAttribute(\"aria-expanded\",\"false\");\n    mega.classList.remove(\"open\");\n  }\n  function toggleMega(){ isOpen() ? closeMega() : openMega(); }\n\n  /* Klick / Tastatur (Enter, Space) auf den Trigger */\n  trigger.addEventListener(\"click\", function(e){\n    e.preventDefault();\n    clearTimeout(openTimer); clearTimeout(closeTimer);\n    toggleMega();\n  });\n\n  /* Hover (mit Delay, blockiert die Tastatur nicht) */\n  host.addEventListener(\"mouseenter\", function(){\n    if(!mqDesktop.matches) return;\n    clearTimeout(closeTimer);\n    openTimer = setTimeout(openMega, HOVER_OPEN);\n  });\n  host.addEventListener(\"mouseleave\", function(){\n    if(!mqDesktop.matches) return;\n    clearTimeout(openTimer);\n    closeTimer = setTimeout(closeMega, HOVER_CLOSE);\n  });\n\n  /* ESC schliesst und gibt Fokus zurueck */\n  document.addEventListener(\"keydown\", function(e){\n    if(e.key === \"Escape\" && isOpen()){\n      closeMega();\n      trigger.focus();\n    }\n  });\n\n  /* Klick ausserhalb schliesst */\n  document.addEventListener(\"click\", function(e){\n    if(isOpen() && !host.contains(e.target)){ closeMega(); }\n  });\n\n  /* Fokusverlust (Tab aus dem Menue heraus) schliesst */\n  host.addEventListener(\"focusout\", function(e){\n    if(!host.contains(e.relatedTarget)){ closeMega(); }\n  });\n\n  /* ===================== Mobile Menue ===================== */\n  var mToggle = document.getElementById(\"menu-toggle\");\n  var mPanel  = document.getElementById(\"mobile-panel\");\n\n  mToggle.addEventListener(\"click\", function(){\n    var open = mToggle.getAttribute(\"aria-expanded\") === \"true\";\n    mToggle.setAttribute(\"aria-expanded\", String(!open));\n    mToggle.setAttribute(\"aria-label\", open ? \"Menue oeffnen\" : \"Menue schliessen\");\n    mPanel.classList.toggle(\"open\", !open);\n  });\n\n  /* Mobile Accordion */\n  var mAcc = document.getElementById(\"m-acc-trigger\");\n  var mAccC = document.getElementById(\"m-acc-content\");\n  mAcc.addEventListener(\"click\", function(){\n    var open = mAcc.getAttribute(\"aria-expanded\") === \"true\";\n    mAcc.setAttribute(\"aria-expanded\", String(!open));\n    mAccC.classList.toggle(\"open\", !open);\n  });\n\n  /* ESC schliesst Mobile-Panel */\n  document.addEventListener(\"keydown\", function(e){\n    if(e.key === \"Escape\" && mToggle.getAttribute(\"aria-expanded\") === \"true\"){\n      mToggle.setAttribute(\"aria-expanded\",\"false\");\n      mToggle.setAttribute(\"aria-label\",\"Menue oeffnen\");\n      mPanel.classList.remove(\"open\");\n      mToggle.focus();\n    }\n  });\n\n  /* Aufraeumen beim Wechsel Desktop \u003c-> Mobile */\n  mqDesktop.addEventListener(\"change\", function(){\n    closeMega();\n    mToggle.setAttribute(\"aria-expanded\",\"false\");\n    mPanel.classList.remove(\"open\");\n  });\n\n  /* ===================== Magnetischer CTA (\u003c=6px) ===================== */\n  var reduce = window.matchMedia(\"(prefers-reduced-motion: reduce)\");\n  var magnets = document.querySelectorAll(\".cta\");\n  var MAX = 6;\n\n  magnets.forEach(function(btn){\n    btn.addEventListener(\"pointermove\", function(e){\n      if(reduce.matches || e.pointerType === \"touch\") return;\n      var r = btn.getBoundingClientRect();\n      var dx = e.clientX - (r.left + r.width/2);\n      var dy = e.clientY - (r.top + r.height/2);\n      var mx = Math.max(-MAX, Math.min(MAX, dx * 0.3));\n      var my = Math.max(-MAX, Math.min(MAX, dy * 0.3));\n      btn.style.transform = \"translate(\" + mx + \"px,\" + my + \"px)\";\n    });\n    btn.addEventListener(\"pointerleave\", function(){\n      btn.style.transform = \"\";\n    });\n  });\n})();\n\u003c/script>\n\u003c/body>\n\u003c/html>\n"},
  {name:"Morph zu Glas-Pille", desc:"Transparent ueber dem Hero, morpht beim Scrollen zur kompakten Glas-Pille.", file:"m5-shrink-pill.html", html:"\u003c!DOCTYPE html>\n\u003chtml lang=\"de\">\n\u003chead>\n\u003c!--\n  ============================================================================\n  MAISON AURELIE  -  Duesseldorf\n  Konzept: \"Bordeaux & Gold\"  /  Moderne Ausfuehrung 2025\n  Navbar-Konzept M5: \"Transparent zu Glas-Pille (Morph beim Scrollen)\"\n\n  Idee:\n    Am screenfuellenden Hero liegt die Navbar als breite, transparente Leiste\n    (volle Breite, kein Hintergrund). Beim Scrollen morpht sie sanft in eine\n    kompakte, schwebende Frosted-Glass-Pille: Breite schrumpft, Rundung waechst\n    zur Pill, backdrop-blur + weicher Schatten erscheinen, sie rueckt leicht\n    nach innen.\n\n  Technik:\n    - Scroll-Zustand via IntersectionObserver-Sentinel (kein Scroll-Spam),\n      ergaenzt durch rAF-gedrosselten Fallback-Listener.\n    - Lesbarkeit im transparenten Zustand: heller Text + dezenter Top-Scrim.\n    - Mobile-Menue (\u003c ~860px): aria-expanded/controls, ESC, Schliessen-Button,\n      Fokus-Trap, Skip-Link.\n    - prefers-reduced-motion: Morph aus, direkt kompakter Glas-Zustand.\n\n  PROD-Hinweis: Fonts via next/font lokal einbinden (statt Google-Fonts-CDN).\n  Standalone, offline lauffaehig (CDN-Fonts degradieren auf System-Stack).\n  ============================================================================\n-->\n\u003cmeta charset=\"UTF-8\" />\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n\u003ctitle>MAISON AURELIE  -  Bordeaux & Gold\u003c/title>\n\n\u003c!-- PROD: next/font lokal -->\n\u003clink rel=\"preconnect\" href=\"https://fonts.googleapis.com\" />\n\u003clink rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin />\n\u003clink href=\"https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap\" rel=\"stylesheet\" />\n\n\u003cstyle>\n  :root{\n    --bg:#1A0A0E;\n    --bg2:#240D13;\n    --panel:rgba(255,255,255,0.05);\n    --text:#F6ECE6;\n    --text-2:#C9A7AD;\n    --gold:#E6C07A;\n    --gold-2:#C99A4E;\n    --line:rgba(255,220,190,0.12);\n\n    --ease:cubic-bezier(0.22,1,0.36,1);\n    --t:200ms;\n    --font-ui:\"Space Grotesk\", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;\n    --font-body:\"Inter\", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;\n    --font-display:\"Fraunces\", Georgia, \"Times New Roman\", serif;\n\n    --maxw:1200px;\n    --nav-h:74px;\n    --radius-pill:999px;\n    --radius-2xl:28px;\n  }\n\n  *,*::before,*::after{box-sizing:border-box;}\n\n  html{scroll-behavior:smooth;}\n\n  body{\n    margin:0;\n    background:\n      radial-gradient(1200px 700px at 80% -10%, rgba(230,192,122,0.10), transparent 60%),\n      radial-gradient(900px 600px at 0% 10%, rgba(201,154,78,0.08), transparent 55%),\n      linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);\n    background-attachment:fixed;\n    color:var(--text);\n    font-family:var(--font-body);\n    line-height:1.6;\n    -webkit-font-smoothing:antialiased;\n    overflow-x:hidden;\n  }\n\n  a{color:inherit;text-decoration:none;}\n\n  img,svg{display:block;max-width:100%;}\n\n  ::selection{background:rgba(230,192,122,0.30);color:var(--text);}\n\n  /* ---------- Skip Link ---------- */\n  .skip-link{\n    position:fixed;\n    top:10px;left:50%;\n    transform:translate(-50%,-160%);\n    z-index:1000;\n    background:var(--gold);\n    color:#2a1206;\n    font-family:var(--font-ui);\n    font-weight:600;\n    padding:12px 20px;\n    border-radius:var(--radius-pill);\n    transition:transform var(--t) var(--ease);\n  }\n  .skip-link:focus{transform:translate(-50%,0);}\n\n  /* ---------- Focus visibility ---------- */\n  :focus-visible{\n    outline:2px solid var(--gold);\n    outline-offset:3px;\n    border-radius:6px;\n  }\n\n  /* ============================================================\n     HEADER / NAVBAR  -  M5 Transparent -> Glas-Pille\n     ============================================================ */\n  .site-header{\n    position:fixed;\n    top:0;left:0;right:0;\n    z-index:900;\n    display:flex;\n    justify-content:center;\n    /* Padding aussen steuert das \"Einruecken\" beim Morph */\n    padding:14px clamp(12px,4vw,40px);\n    transition:padding var(--t) var(--ease);\n    pointer-events:none;\n  }\n  .site-header > *{pointer-events:auto;}\n\n  /* dezenter Scrim fuer Lesbarkeit im transparenten Zustand */\n  .nav-scrim{\n    position:fixed;\n    top:0;left:0;right:0;\n    height:160px;\n    z-index:850;\n    pointer-events:none;\n    background:linear-gradient(180deg, rgba(15,5,8,0.55) 0%, rgba(15,5,8,0) 100%);\n    opacity:1;\n    transition:opacity var(--t) var(--ease);\n  }\n\n  .nav-shell{\n    width:100%;\n    max-width:var(--maxw);\n    height:var(--nav-h);\n    display:flex;\n    align-items:center;\n    justify-content:space-between;\n    gap:24px;\n    padding:0 clamp(16px,2.4vw,28px);\n    border-radius:var(--radius-2xl);\n    border:1px solid transparent;\n    background:transparent;\n    backdrop-filter:blur(0px);\n    -webkit-backdrop-filter:blur(0px);\n    box-shadow:0 0 0 rgba(0,0,0,0);\n    transition:\n      max-width var(--t) var(--ease),\n      height var(--t) var(--ease),\n      border-radius var(--t) var(--ease),\n      border-color var(--t) var(--ease),\n      background var(--t) var(--ease),\n      box-shadow var(--t) var(--ease),\n      backdrop-filter var(--t) var(--ease),\n      -webkit-backdrop-filter var(--t) var(--ease);\n  }\n\n  /* === Geschrumpfter Glas-Pillen-Zustand === */\n  .site-header.is-shrunk{\n    padding-top:12px;\n  }\n  .site-header.is-shrunk .nav-shell{\n    max-width:920px;\n    height:62px;\n    border-radius:var(--radius-pill);\n    border-color:var(--line);\n    background:rgba(36,13,19,0.55);\n    backdrop-filter:blur(18px) saturate(140%);\n    -webkit-backdrop-filter:blur(18px) saturate(140%);\n    box-shadow:\n      0 18px 50px -20px rgba(0,0,0,0.65),\n      inset 0 1px 0 rgba(255,255,255,0.06);\n  }\n  .site-header.is-shrunk + .nav-scrim,\n  .site-header.is-shrunk ~ .nav-scrim{opacity:0;}\n\n  /* Wordmark */\n  .wordmark{\n    font-family:var(--font-ui);\n    font-weight:600;\n    font-size:1.05rem;\n    letter-spacing:0.14em;\n    display:inline-flex;\n    align-items:center;\n    gap:10px;\n    white-space:nowrap;\n    transition:opacity var(--t) var(--ease);\n  }\n  .wordmark .mark{\n    width:12px;height:12px;\n    border-radius:50%;\n    background:radial-gradient(circle at 30% 30%, var(--gold), var(--gold-2));\n    box-shadow:0 0 16px rgba(230,192,122,0.55);\n    flex:0 0 auto;\n  }\n  .wordmark .sub{\n    font-size:0.62rem;\n    color:var(--text-2);\n    letter-spacing:0.22em;\n    font-weight:500;\n  }\n\n  /* Desktop Nav */\n  .nav-links{\n    display:flex;\n    align-items:center;\n    gap:6px;\n    list-style:none;\n    margin:0;padding:0;\n  }\n  .nav-links a{\n    font-family:var(--font-ui);\n    font-size:0.92rem;\n    font-weight:500;\n    color:var(--text);\n    padding:10px 16px;\n    border-radius:var(--radius-pill);\n    position:relative;\n    transition:color var(--t) var(--ease), background var(--t) var(--ease);\n  }\n  .nav-links a::after{\n    content:\"\";\n    position:absolute;\n    left:16px;right:16px;bottom:6px;\n    height:1.5px;\n    background:linear-gradient(90deg,var(--gold),var(--gold-2));\n    transform:scaleX(0);\n    transform-origin:left;\n    transition:transform var(--t) var(--ease);\n  }\n  .nav-links a:hover{color:var(--gold);}\n  .nav-links a:hover::after{transform:scaleX(1);}\n\n  .nav-cta-wrap{display:flex;align-items:center;gap:14px;}\n\n  /* Magnetischer CTA */\n  .btn-cta{\n    font-family:var(--font-ui);\n    font-weight:600;\n    font-size:0.92rem;\n    color:#2a1206;\n    background:linear-gradient(135deg,var(--gold),var(--gold-2));\n    border:none;\n    cursor:pointer;\n    padding:12px 22px;\n    border-radius:var(--radius-pill);\n    min-height:44px;\n    white-space:nowrap;\n    box-shadow:0 8px 24px -10px rgba(230,192,122,0.6);\n    transition:transform 120ms var(--ease), box-shadow var(--t) var(--ease), filter var(--t) var(--ease);\n    will-change:transform;\n  }\n  .btn-cta:hover{\n    filter:brightness(1.05);\n    box-shadow:0 12px 34px -10px rgba(230,192,122,0.75);\n  }\n  .btn-cta:active{transform:scale(0.97);}\n\n  /* Burger */\n  .nav-toggle{\n    display:none;\n    align-items:center;\n    justify-content:center;\n    width:46px;height:46px;\n    border-radius:var(--radius-pill);\n    border:1px solid var(--line);\n    background:rgba(255,255,255,0.05);\n    color:var(--text);\n    cursor:pointer;\n    transition:background var(--t) var(--ease), border-color var(--t) var(--ease);\n  }\n  .nav-toggle:hover{background:rgba(255,255,255,0.10);border-color:var(--gold);}\n  .nav-toggle svg{width:22px;height:22px;}\n\n  /* ============================================================\n     MOBILE MENU\n     ============================================================ */\n  .mobile-menu{\n    position:fixed;\n    inset:0;\n    z-index:950;\n    display:none;\n    flex-direction:column;\n    padding:22px clamp(16px,5vw,32px) 40px;\n    background:rgba(20,8,11,0.78);\n    backdrop-filter:blur(22px) saturate(140%);\n    -webkit-backdrop-filter:blur(22px) saturate(140%);\n    opacity:0;\n    transition:opacity var(--t) var(--ease);\n  }\n  .mobile-menu.is-open{display:flex;opacity:1;}\n\n  .mobile-menu__top{\n    display:flex;\n    align-items:center;\n    justify-content:space-between;\n    margin-bottom:30px;\n  }\n  .mobile-close{\n    width:46px;height:46px;\n    min-width:44px;min-height:44px;\n    display:inline-flex;\n    align-items:center;\n    justify-content:center;\n    border-radius:var(--radius-pill);\n    border:1px solid var(--line);\n    background:rgba(255,255,255,0.05);\n    color:var(--text);\n    cursor:pointer;\n    transition:background var(--t) var(--ease), border-color var(--t) var(--ease);\n  }\n  .mobile-close:hover{background:rgba(255,255,255,0.10);border-color:var(--gold);}\n  .mobile-close svg{width:24px;height:24px;}\n\n  .mobile-nav{\n    list-style:none;\n    margin:0;padding:0;\n    display:flex;\n    flex-direction:column;\n    gap:6px;\n  }\n  .mobile-nav a{\n    font-family:var(--font-ui);\n    font-size:1.5rem;\n    font-weight:500;\n    padding:16px 8px;\n    min-height:44px;\n    display:flex;\n    align-items:center;\n    border-bottom:1px solid var(--line);\n    transition:color var(--t) var(--ease), padding-left var(--t) var(--ease);\n  }\n  .mobile-nav a:hover{color:var(--gold);padding-left:16px;}\n\n  .mobile-menu .btn-cta{\n    margin-top:32px;\n    width:100%;\n    text-align:center;\n    justify-content:center;\n    padding:18px;\n    font-size:1.05rem;\n  }\n\n  /* ============================================================\n     HERO\n     ============================================================ */\n  .hero{\n    position:relative;\n    min-height:100svh;\n    display:flex;\n    align-items:center;\n    padding:120px clamp(16px,4vw,40px) 80px;\n    overflow:hidden;\n  }\n  .hero__glow{\n    position:absolute;\n    top:-10%;left:50%;\n    transform:translateX(-50%);\n    width:min(1100px,120vw);\n    height:900px;\n    background:\n      radial-gradient(closest-side, rgba(230,192,122,0.22), transparent 70%),\n      radial-gradient(closest-side, rgba(140,30,60,0.30), transparent 72%);\n    filter:blur(20px);\n    pointer-events:none;\n    z-index:0;\n  }\n  .hero__inner{\n    position:relative;\n    z-index:1;\n    width:100%;\n    max-width:var(--maxw);\n    margin:0 auto;\n    display:grid;\n    grid-template-columns:1.15fr 0.85fr;\n    gap:clamp(28px,5vw,64px);\n    align-items:center;\n  }\n  .hero__eyebrow{\n    font-family:var(--font-ui);\n    font-size:0.78rem;\n    letter-spacing:0.26em;\n    text-transform:uppercase;\n    color:var(--gold);\n    margin:0 0 20px;\n    display:inline-flex;\n    align-items:center;\n    gap:12px;\n  }\n  .hero__eyebrow::before{\n    content:\"\";\n    width:34px;height:1px;\n    background:linear-gradient(90deg,var(--gold),transparent);\n  }\n  .hero h1{\n    font-family:var(--font-display);\n    font-weight:400;\n    font-size:clamp(2.6rem,7vw,5rem);\n    line-height:1.02;\n    letter-spacing:-0.01em;\n    margin:0 0 24px;\n  }\n  .hero h1 em{\n    font-style:italic;\n    color:var(--gold);\n  }\n  .hero p.lede{\n    color:var(--text-2);\n    font-size:clamp(1rem,1.4vw,1.18rem);\n    max-width:46ch;\n    margin:0 0 36px;\n  }\n  .hero__actions{display:flex;gap:16px;flex-wrap:wrap;}\n  .btn-ghost{\n    font-family:var(--font-ui);\n    font-weight:500;\n    font-size:0.95rem;\n    color:var(--text);\n    background:transparent;\n    border:1px solid var(--line);\n    padding:13px 24px;\n    min-height:44px;\n    border-radius:var(--radius-pill);\n    cursor:pointer;\n    transition:border-color var(--t) var(--ease), background var(--t) var(--ease), color var(--t) var(--ease);\n  }\n  .btn-ghost:hover{border-color:var(--gold);color:var(--gold);background:rgba(230,192,122,0.06);}\n\n  /* Medien-Platzhalter */\n  .hero__media{\n    position:relative;\n    aspect-ratio:4/5;\n    border-radius:var(--radius-2xl);\n    border:1px solid var(--line);\n    background:\n      linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01)),\n      repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0 14px, transparent 14px 28px);\n    box-shadow:0 30px 80px -40px rgba(0,0,0,0.8);\n    display:flex;\n    align-items:center;\n    justify-content:center;\n    overflow:hidden;\n  }\n  .hero__media::after{\n    content:\"BILDPLATZHALTER  -  Produktaufnahme\";\n    font-family:var(--font-ui);\n    font-size:0.72rem;\n    letter-spacing:0.2em;\n    color:var(--text-2);\n    text-transform:uppercase;\n    padding:8px 14px;\n    border:1px dashed var(--line);\n    border-radius:var(--radius-pill);\n  }\n\n  .scroll-hint{\n    position:absolute;\n    bottom:26px;left:50%;\n    transform:translateX(-50%);\n    z-index:1;\n    font-family:var(--font-ui);\n    font-size:0.7rem;\n    letter-spacing:0.24em;\n    text-transform:uppercase;\n    color:var(--text-2);\n    display:flex;\n    flex-direction:column;\n    align-items:center;\n    gap:8px;\n  }\n  .scroll-hint span{\n    width:1px;height:34px;\n    background:linear-gradient(180deg,var(--gold),transparent);\n    animation:pulse 2.2s var(--ease) infinite;\n  }\n  @keyframes pulse{\n    0%,100%{opacity:0.4;transform:scaleY(0.7);}\n    50%{opacity:1;transform:scaleY(1);}\n  }\n\n  /* ============================================================\n     SECTIONS / BENTO\n     ============================================================ */\n  section.block{\n    position:relative;\n    max-width:var(--maxw);\n    margin:0 auto;\n    padding:clamp(70px,10vw,130px) clamp(16px,4vw,40px);\n  }\n  .block__head{margin-bottom:48px;max-width:60ch;}\n  .block__head .eyebrow{\n    font-family:var(--font-ui);\n    font-size:0.74rem;\n    letter-spacing:0.24em;\n    text-transform:uppercase;\n    color:var(--gold);\n    margin:0 0 16px;\n  }\n  .block__head h2{\n    font-family:var(--font-display);\n    font-weight:400;\n    font-size:clamp(2rem,4.5vw,3.2rem);\n    line-height:1.08;\n    margin:0 0 14px;\n  }\n  .block__head p{color:var(--text-2);margin:0;}\n\n  .bento{\n    display:grid;\n    grid-template-columns:repeat(6,1fr);\n    gap:18px;\n  }\n  .card{\n    background:var(--panel);\n    border:1px solid var(--line);\n    border-radius:var(--radius-2xl);\n    padding:30px;\n    min-height:220px;\n    display:flex;\n    flex-direction:column;\n    justify-content:flex-end;\n    gap:10px;\n    backdrop-filter:blur(6px);\n    -webkit-backdrop-filter:blur(6px);\n    transition:transform var(--t) var(--ease), border-color var(--t) var(--ease), box-shadow var(--t) var(--ease);\n    will-change:transform;\n  }\n  .card:hover{\n    transform:translateY(-5px);\n    border-color:rgba(230,192,122,0.35);\n    box-shadow:0 24px 60px -30px rgba(0,0,0,0.7);\n  }\n  .card .tag{\n    font-family:var(--font-ui);\n    font-size:0.68rem;\n    letter-spacing:0.2em;\n    text-transform:uppercase;\n    color:var(--gold);\n  }\n  .card h3{\n    font-family:var(--font-ui);\n    font-weight:600;\n    font-size:1.3rem;\n    margin:0;\n  }\n  .card p{color:var(--text-2);margin:0;font-size:0.95rem;}\n  .card .ph{\n    align-self:flex-start;\n    width:46px;height:46px;\n    border-radius:14px;\n    background:linear-gradient(135deg, rgba(230,192,122,0.25), rgba(201,154,78,0.08));\n    border:1px solid var(--line);\n    margin-bottom:auto;\n  }\n  .card.span-3{grid-column:span 3;}\n  .card.span-2{grid-column:span 2;}\n  .card.span-4{grid-column:span 4;}\n  .card.tall{min-height:320px;}\n  .card.feature{\n    background:\n      linear-gradient(135deg, rgba(140,30,60,0.30), rgba(36,13,19,0.2)),\n      var(--panel);\n  }\n\n  /* ============================================================\n     FOOTER\n     ============================================================ */\n  footer.site-footer{\n    border-top:1px solid var(--line);\n    padding:48px clamp(16px,4vw,40px);\n    text-align:center;\n    color:var(--text-2);\n    font-size:0.85rem;\n  }\n  footer .wordmark{justify-content:center;margin-bottom:14px;}\n\n  /* ============================================================\n     RESPONSIVE\n     ============================================================ */\n  @media (max-width:860px){\n    .nav-links,.nav-cta-wrap .btn-cta{display:none;}\n    .nav-toggle{display:inline-flex;}\n    .hero__inner{grid-template-columns:1fr;}\n    .hero__media{max-width:440px;}\n    .bento{grid-template-columns:repeat(2,1fr);}\n    .card.span-3,.card.span-2,.card.span-4{grid-column:span 2;}\n  }\n\n  @media (max-width:520px){\n    .bento{grid-template-columns:1fr;}\n    .card.span-3,.card.span-2,.card.span-4{grid-column:span 1;}\n    .wordmark .sub{display:none;}\n  }\n\n  /* ============================================================\n     REDUCED MOTION  -  Morph aus, direkt kompakter Glas-Zustand\n     ============================================================ */\n  @media (prefers-reduced-motion: reduce){\n    *,*::before,*::after{\n      transition-duration:0.01ms !important;\n      animation-duration:0.01ms !important;\n      animation-iteration-count:1 !important;\n      scroll-behavior:auto !important;\n    }\n    .nav-shell{\n      max-width:920px;\n      height:62px;\n      border-radius:var(--radius-pill);\n      border-color:var(--line);\n      background:rgba(36,13,19,0.65);\n      backdrop-filter:blur(18px) saturate(140%);\n      -webkit-backdrop-filter:blur(18px) saturate(140%);\n      box-shadow:0 18px 50px -20px rgba(0,0,0,0.65);\n    }\n    .nav-scrim{display:none;}\n    .scroll-hint span{animation:none;}\n  }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\n\u003ca class=\"skip-link\" href=\"#main\">Zum Inhalt springen\u003c/a>\n\n\u003c!-- ===================== HEADER / NAVBAR ===================== -->\n\u003cheader class=\"site-header\" id=\"siteHeader\">\n  \u003cnav class=\"nav-shell\" aria-label=\"Hauptnavigation\">\n    \u003ca class=\"wordmark\" href=\"#top\" aria-label=\"MAISON AURELIE Startseite\">\n      \u003cspan class=\"mark\" aria-hidden=\"true\">\u003c/span>\n      MAISON AURELIE\n      \u003cspan class=\"sub\">DUESSELDORF\u003c/span>\n    \u003c/a>\n\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#kollektion\">Kollektion\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#atelier\">Atelier\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#service\">Service\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#kontakt\">Kontakt\u003c/a>\u003c/li>\n    \u003c/ul>\n\n    \u003cdiv class=\"nav-cta-wrap\">\n      \u003ca class=\"btn-cta\" href=\"#termin\" id=\"ctaDesktop\">Termin anfragen\u003c/a>\n      \u003cbutton\n        class=\"nav-toggle\"\n        id=\"navToggle\"\n        aria-label=\"Menue oeffnen\"\n        aria-expanded=\"false\"\n        aria-controls=\"mobileMenu\">\n        \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" aria-hidden=\"true\">\n          \u003cline x1=\"3\" y1=\"7\" x2=\"21\" y2=\"7\"/>\n          \u003cline x1=\"3\" y1=\"12\" x2=\"21\" y2=\"12\"/>\n          \u003cline x1=\"3\" y1=\"17\" x2=\"21\" y2=\"17\"/>\n        \u003c/svg>\n      \u003c/button>\n    \u003c/div>\n  \u003c/nav>\n\u003c/header>\n\n\u003c!-- dezenter Scrim fuer Lesbarkeit im transparenten Zustand -->\n\u003cdiv class=\"nav-scrim\" aria-hidden=\"true\">\u003c/div>\n\n\u003c!-- Sentinel fuer IntersectionObserver (Scroll-Morph) -->\n\u003cdiv id=\"navSentinel\" aria-hidden=\"true\" style=\"position:absolute;top:8px;height:1px;width:1px;\">\u003c/div>\n\n\u003c!-- ===================== MOBILE MENU ===================== -->\n\u003cdiv class=\"mobile-menu\" id=\"mobileMenu\" role=\"dialog\" aria-modal=\"true\" aria-label=\"Hauptmenue\">\n  \u003cdiv class=\"mobile-menu__top\">\n    \u003ca class=\"wordmark\" href=\"#top\">\n      \u003cspan class=\"mark\" aria-hidden=\"true\">\u003c/span>\n      MAISON AURELIE\n    \u003c/a>\n    \u003cbutton class=\"mobile-close\" id=\"mobileClose\" aria-label=\"Menue schliessen\">\n      \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" aria-hidden=\"true\">\n        \u003cline x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"/>\n        \u003cline x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"/>\n      \u003c/svg>\n    \u003c/button>\n  \u003c/div>\n  \u003cul class=\"mobile-nav\">\n    \u003cli>\u003ca href=\"#kollektion\">Kollektion\u003c/a>\u003c/li>\n    \u003cli>\u003ca href=\"#atelier\">Atelier\u003c/a>\u003c/li>\n    \u003cli>\u003ca href=\"#service\">Service\u003c/a>\u003c/li>\n    \u003cli>\u003ca href=\"#kontakt\">Kontakt\u003c/a>\u003c/li>\n  \u003c/ul>\n  \u003ca class=\"btn-cta\" href=\"#termin\">Termin anfragen\u003c/a>\n\u003c/div>\n\n\u003c!-- ===================== MAIN ===================== -->\n\u003cmain id=\"main\">\n  \u003cspan id=\"top\">\u003c/span>\n\n  \u003c!-- HERO -->\n  \u003csection class=\"hero\" aria-labelledby=\"heroTitle\">\n    \u003cdiv class=\"hero__glow\" aria-hidden=\"true\">\u003c/div>\n    \u003cdiv class=\"hero__inner\">\n      \u003cdiv class=\"hero__copy\">\n        \u003cp class=\"hero__eyebrow\">Hochjuwelier seit 1924\u003c/p>\n        \u003ch1 id=\"heroTitle\">Bordeaux\u003cbr>und \u003cem>Gold\u003c/em>,\u003cbr>von Hand gefasst.\u003c/h1>\n        \u003cp class=\"lede\">\n          Feinste Goldschmiedekunst aus dem Herzen von Duesseldorf.\n          Einzelstuecke, die Tiefe und Waerme tragen wie ein edler Wein.\n        \u003c/p>\n        \u003cdiv class=\"hero__actions\">\n          \u003ca class=\"btn-cta\" href=\"#kollektion\">Kollektion entdecken\u003c/a>\n          \u003ca class=\"btn-ghost\" href=\"#atelier\">Das Atelier\u003c/a>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"hero__media\" role=\"img\" aria-label=\"Platzhalter fuer Produktaufnahme eines Schmuckstuecks\">\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"scroll-hint\" aria-hidden=\"true\">\n      Scrollen\n      \u003cspan>\u003c/span>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- SECTION 1 -->\n  \u003csection class=\"block\" id=\"kollektion\" aria-labelledby=\"s1\">\n    \u003cdiv class=\"block__head\">\n      \u003cp class=\"eyebrow\">Die Kollektion\u003c/p>\n      \u003ch2 id=\"s1\">Stuecke mit Charakter\u003c/h2>\n      \u003cp>Jedes Schmuckstueck erzaehlt eine eigene Geschichte aus Material, Licht und Handwerk.\u003c/p>\n    \u003c/div>\n    \u003cdiv class=\"bento\">\n      \u003carticle class=\"card span-3 tall feature\">\n        \u003cspan class=\"ph\" aria-hidden=\"true\">\u003c/span>\n        \u003cspan class=\"tag\">Signature\u003c/span>\n        \u003ch3>Aurelie Solitaire\u003c/h3>\n        \u003cp>Der Klassiker des Hauses, neu interpretiert in warmem Roségold.\u003c/p>\n      \u003c/article>\n      \u003carticle class=\"card span-3\">\n        \u003cspan class=\"ph\" aria-hidden=\"true\">\u003c/span>\n        \u003cspan class=\"tag\">Ringe\u003c/span>\n        \u003ch3>Bordeaux Linie\u003c/h3>\n        \u003cp>Tiefe Granate gefasst in feinem Gelbgold.\u003c/p>\n      \u003c/article>\n      \u003carticle class=\"card span-2\">\n        \u003cspan class=\"ph\" aria-hidden=\"true\">\u003c/span>\n        \u003cspan class=\"tag\">Ketten\u003c/span>\n        \u003ch3>Lumière\u003c/h3>\n        \u003cp>Filigrane Gliederketten.\u003c/p>\n      \u003c/article>\n      \u003carticle class=\"card span-2\">\n        \u003cspan class=\"ph\" aria-hidden=\"true\">\u003c/span>\n        \u003cspan class=\"tag\">Ohrschmuck\u003c/span>\n        \u003ch3>Étoile\u003c/h3>\n        \u003cp>Funkelnde Begleiter fuer jeden Anlass.\u003c/p>\n      \u003c/article>\n      \u003carticle class=\"card span-2\">\n        \u003cspan class=\"ph\" aria-hidden=\"true\">\u003c/span>\n        \u003cspan class=\"tag\">Armschmuck\u003c/span>\n        \u003ch3>Velours\u003c/h3>\n        \u003cp>Weich fliessende Formen.\u003c/p>\n      \u003c/article>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- SECTION 2 -->\n  \u003csection class=\"block\" id=\"atelier\" aria-labelledby=\"s2\">\n    \u003cdiv class=\"block__head\">\n      \u003cp class=\"eyebrow\">Das Atelier\u003c/p>\n      \u003ch2 id=\"s2\">Handwerk in Duesseldorf\u003c/h2>\n      \u003cp>In unserer Werkstatt verbinden sich Tradition und moderne Praezision zu zeitlosen Objekten.\u003c/p>\n    \u003c/div>\n    \u003cdiv class=\"bento\">\n      \u003carticle class=\"card span-4 tall feature\">\n        \u003cspan class=\"ph\" aria-hidden=\"true\">\u003c/span>\n        \u003cspan class=\"tag\">Manufaktur\u003c/span>\n        \u003ch3>Vom Entwurf bis zur Fassung\u003c/h3>\n        \u003cp>Jeder Schritt entsteht unter einem Dach, von Hand und mit Geduld.\u003c/p>\n      \u003c/article>\n      \u003carticle class=\"card span-2 tall\">\n        \u003cspan class=\"ph\" aria-hidden=\"true\">\u003c/span>\n        \u003cspan class=\"tag\">Beratung\u003c/span>\n        \u003ch3>Persoenlich\u003c/h3>\n        \u003cp>Wir nehmen uns Zeit fuer Ihr Stueck.\u003c/p>\n      \u003c/article>\n      \u003carticle class=\"card span-3\">\n        \u003cspan class=\"ph\" aria-hidden=\"true\">\u003c/span>\n        \u003cspan class=\"tag\">Material\u003c/span>\n        \u003ch3>Verantwortungsvolles Gold\u003c/h3>\n        \u003cp>Recyceltes Edelmetall und zertifizierte Steine.\u003c/p>\n      \u003c/article>\n      \u003carticle class=\"card span-3\">\n        \u003cspan class=\"ph\" aria-hidden=\"true\">\u003c/span>\n        \u003cspan class=\"tag\">Service\u003c/span>\n        \u003ch3>Pflege und Restauration\u003c/h3>\n        \u003cp>Damit Ihr Schmuck ein Leben lang strahlt.\u003c/p>\n      \u003c/article>\n    \u003c/div>\n  \u003c/section>\n\u003c/main>\n\n\u003c!-- ===================== FOOTER ===================== -->\n\u003cfooter class=\"site-footer\" id=\"kontakt\">\n  \u003ca class=\"wordmark\" href=\"#top\">\n    \u003cspan class=\"mark\" aria-hidden=\"true\">\u003c/span>\n    MAISON AURELIE\n    \u003cspan class=\"sub\">DUESSELDORF\u003c/span>\n  \u003c/a>\n  \u003cp>Koenigsallee, Duesseldorf &nbsp;&middot;&nbsp; Termine nach Vereinbarung\u003c/p>\n  \u003cp>&copy; 2025 Maison Aurelie. Konzept \"Bordeaux & Gold\".\u003c/p>\n\u003c/footer>\n\n\u003cscript>\n(function(){\n  \"use strict\";\n\n  var header   = document.getElementById(\"siteHeader\");\n  var sentinel = document.getElementById(\"navSentinel\");\n\n  var reduceMotion = window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n\n  /* ---------- Scroll-Morph: Transparent -> Glas-Pille ---------- */\n  /* Bei reduced motion: dauerhaft kompakter Zustand (per CSS), JS uebersprungen. */\n  if(!reduceMotion){\n    function setShrunk(on){\n      header.classList.toggle(\"is-shrunk\", on);\n    }\n\n    if(\"IntersectionObserver\" in window){\n      var io = new IntersectionObserver(function(entries){\n        // Sentinel sichtbar (oben) -> transparent; raus -> Pille\n        setShrunk(!entries[0].isIntersecting);\n      }, { threshold:0, rootMargin:\"-12px 0px 0px 0px\" });\n      io.observe(sentinel);\n    } else {\n      // Fallback: rAF-gedrosselter Scroll-Listener\n      var ticking = false;\n      function onScroll(){\n        if(ticking) return;\n        ticking = true;\n        window.requestAnimationFrame(function(){\n          setShrunk(window.scrollY > 24);\n          ticking = false;\n        });\n      }\n      window.addEventListener(\"scroll\", onScroll, { passive:true });\n      onScroll();\n    }\n  }\n\n  /* ---------- Magnetischer CTA (\u003c= 6px) ---------- */\n  if(!reduceMotion && window.matchMedia(\"(pointer:fine)\").matches){\n    document.querySelectorAll(\".btn-cta\").forEach(function(btn){\n      btn.addEventListener(\"pointermove\", function(e){\n        var r = btn.getBoundingClientRect();\n        var mx = e.clientX - (r.left + r.width/2);\n        var my = e.clientY - (r.top + r.height/2);\n        var dx = Math.max(-6, Math.min(6, mx * 0.25));\n        var dy = Math.max(-6, Math.min(6, my * 0.25));\n        btn.style.transform = \"translate(\" + dx + \"px,\" + dy + \"px)\";\n      });\n      btn.addEventListener(\"pointerleave\", function(){\n        btn.style.transform = \"\";\n      });\n    });\n  }\n\n  /* ---------- Mobile Menu ---------- */\n  var toggle   = document.getElementById(\"navToggle\");\n  var menu     = document.getElementById(\"mobileMenu\");\n  var closeBtn = document.getElementById(\"mobileClose\");\n  var lastFocus = null;\n\n  function focusables(){\n    return menu.querySelectorAll('a[href], button:not([disabled])');\n  }\n\n  function openMenu(){\n    lastFocus = document.activeElement;\n    menu.classList.add(\"is-open\");\n    toggle.setAttribute(\"aria-expanded\",\"true\");\n    document.body.style.overflow = \"hidden\";\n    var f = focusables();\n    if(f.length) f[0].focus();\n    document.addEventListener(\"keydown\", onKeydown);\n  }\n\n  function closeMenu(){\n    menu.classList.remove(\"is-open\");\n    toggle.setAttribute(\"aria-expanded\",\"false\");\n    document.body.style.overflow = \"\";\n    document.removeEventListener(\"keydown\", onKeydown);\n    if(lastFocus) lastFocus.focus();\n  }\n\n  function onKeydown(e){\n    if(e.key === \"Escape\"){ closeMenu(); return; }\n    if(e.key === \"Tab\"){\n      var f = focusables();\n      if(!f.length) return;\n      var first = f[0], last = f[f.length-1];\n      if(e.shiftKey && document.activeElement === first){\n        e.preventDefault(); last.focus();\n      } else if(!e.shiftKey && document.activeElement === last){\n        e.preventDefault(); first.focus();\n      }\n    }\n  }\n\n  toggle.addEventListener(\"click\", openMenu);\n  closeBtn.addEventListener(\"click\", closeMenu);\n\n  // Klick auf Link schliesst Menue\n  menu.querySelectorAll(\".mobile-nav a, .btn-cta\").forEach(function(a){\n    a.addEventListener(\"click\", closeMenu);\n  });\n\n  // Bei Resize ueber Breakpoint Menue schliessen\n  window.addEventListener(\"resize\", function(){\n    if(window.innerWidth > 860 && menu.classList.contains(\"is-open\")){\n      closeMenu();\n    }\n  });\n})();\n\u003c/script>\n\u003c/body>\n\u003c/html>\n"},
  {name:"Minimal Mono", desc:"Ultra-reduziert, weite Laufweite, eine Goldlinie folgt dem Cursor.", file:"m6-minimal-mono.html", html:"\u003c!DOCTYPE html>\n\u003chtml lang=\"de\">\n\u003c!--\n  ============================================================================\n  MAISON AURÉLIE — Düsseldorf\n  Konzept: \"Bordeaux & Gold\" — MODERNE Ausführung 2025\n  Navbar M6: \"Minimal Mono mit Cursor-Linie\"\n  ----------------------------------------------------------------------------\n  Ultra-minimalistische Leiste: kleine Wordmark, Grotesk-Links mit weitem\n  Letter-Spacing, viel Negativraum. Ein dünner Goldindikator (gleitende\n  Linie) folgt dem gehoverten Link bzw. markiert den aktiven. Kein Kasten,\n  nur Typografie und feine Linie. Editorial-modern.\n\n  Standalone / offline lauffähig. Eine Datei.\n\n  A11y: Skip-Link, semantisches header/nav, zugängliches Mobile-Menü\n  (\u003c860px) mit aria-expanded/controls, ESC, Schließen-Button, Fokus-Trap;\n  :focus-visible deutlich; Touch-Targets >=44px; prefers-reduced-motion\n  schaltet die Linien-Animation aus; kein horizontales Scrollen bei 320px.\n\n  PROD: next/font lokal statt Google-Fonts-\u003clink> verwenden.\n  ============================================================================\n-->\n\u003chead>\n\u003cmeta charset=\"UTF-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\u003ctitle>MAISON AURÉLIE — Feine Juwelierskunst aus Düsseldorf\u003c/title>\n\u003cmeta name=\"description\" content=\"MAISON AURÉLIE, Düsseldorf. Feine Juwelierskunst in Bordeaux und Gold.\">\n\n\u003c!-- PROD: next/font lokal -->\n\u003clink rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n\u003clink rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n\u003clink href=\"https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap\" rel=\"stylesheet\">\n\n\u003cstyle>\n  :root{\n    --bg:#1A0A0E;\n    --bg2:#240D13;\n    --panel:rgba(255,255,255,0.05);\n    --text:#F6ECE6;\n    --text-2:#C9A7AD;\n    --gold:#E6C07A;\n    --gold-2:#C99A4E;\n    --line:rgba(255,220,190,0.12);\n\n    --ease:cubic-bezier(0.22,1,0.36,1);\n    --t-fast:180ms;\n    --t-mid:220ms;\n    --t-slow:260ms;\n\n    --maxw:1200px;\n    --pad:clamp(20px,5vw,64px);\n    --nav-h:72px;\n\n    --font-ui:\"Space Grotesk\", ui-sans-serif, system-ui, sans-serif;\n    --font-body:\"Inter\", ui-sans-serif, system-ui, sans-serif;\n    --font-display:\"Fraunces\", Georgia, serif;\n  }\n\n  *,*::before,*::after{box-sizing:border-box;}\n  html{scroll-behavior:smooth;}\n  @media (prefers-reduced-motion: reduce){\n    html{scroll-behavior:auto;}\n  }\n\n  body{\n    margin:0;\n    background:var(--bg);\n    color:var(--text);\n    font-family:var(--font-body);\n    font-size:16px;\n    line-height:1.6;\n    -webkit-font-smoothing:antialiased;\n    text-rendering:optimizeLegibility;\n    overflow-x:hidden;\n  }\n\n  a{color:inherit;text-decoration:none;}\n  img{max-width:100%;display:block;}\n\n  /* ---- Fokus sichtbar (gerade weil minimal) ---- */\n  :focus-visible{\n    outline:2px solid var(--gold);\n    outline-offset:3px;\n    border-radius:4px;\n  }\n\n  /* ---- Skip-Link ---- */\n  .skip{\n    position:fixed;\n    top:-100px;\n    left:16px;\n    z-index:1000;\n    background:var(--bg2);\n    color:var(--text);\n    border:1px solid var(--gold);\n    padding:12px 18px;\n    border-radius:10px;\n    font-family:var(--font-ui);\n    font-size:14px;\n    transition:top var(--t-mid) var(--ease);\n  }\n  .skip:focus{top:16px;}\n\n  /* ===================================================================\n     NAVBAR — M6 Minimal Mono mit Cursor-Linie\n     =================================================================== */\n  .site-header{\n    position:sticky;\n    top:0;\n    z-index:100;\n    background:color-mix(in srgb, var(--bg) 78%, transparent);\n    backdrop-filter:blur(14px) saturate(120%);\n    -webkit-backdrop-filter:blur(14px) saturate(120%);\n    border-bottom:1px solid var(--line);\n  }\n\n  .nav{\n    max-width:var(--maxw);\n    margin-inline:auto;\n    height:var(--nav-h);\n    padding-inline:var(--pad);\n    display:flex;\n    align-items:center;\n    justify-content:space-between;\n    gap:24px;\n  }\n\n  /* Wordmark — klein, ruhig */\n  .wordmark{\n    font-family:var(--font-ui);\n    font-weight:600;\n    font-size:15px;\n    letter-spacing:0.18em;\n    text-transform:uppercase;\n    color:var(--text);\n    display:inline-flex;\n    align-items:center;\n    gap:9px;\n    white-space:nowrap;\n    transition:opacity var(--t-fast) var(--ease);\n  }\n  .wordmark:hover{opacity:0.82;}\n  .wordmark .dot{\n    width:6px;height:6px;border-radius:50%;\n    background:var(--gold);\n    box-shadow:0 0 10px color-mix(in srgb,var(--gold) 60%,transparent);\n  }\n  .wordmark .accent{color:var(--gold);}\n\n  /* Link-Cluster mit gleitender Linie */\n  .nav-links{\n    position:relative;\n    display:flex;\n    align-items:center;\n    gap:clamp(20px,3vw,40px);\n    list-style:none;\n    margin:0;\n    padding:0;\n  }\n  .nav-links a{\n    position:relative;\n    display:inline-block;\n    font-family:var(--font-ui);\n    font-weight:500;\n    font-size:12.5px;\n    letter-spacing:0.16em;\n    text-transform:uppercase;\n    color:var(--text-2);\n    padding:6px 2px;\n    transition:color var(--t-mid) var(--ease);\n  }\n  .nav-links a:hover,\n  .nav-links a:focus-visible,\n  .nav-links a[aria-current=\"page\"]{\n    color:var(--text);\n  }\n\n  /* Gleitende Gold-Linie (1.5px) */\n  .nav-indicator{\n    position:absolute;\n    bottom:-6px;\n    left:0;\n    height:1.5px;\n    width:0;\n    background:linear-gradient(90deg,var(--gold-2),var(--gold),var(--gold-2));\n    border-radius:2px;\n    opacity:0;\n    transform:translateX(0);\n    transition:\n      transform var(--t-slow) var(--ease),\n      width var(--t-slow) var(--ease),\n      opacity var(--t-mid) var(--ease);\n    pointer-events:none;\n    box-shadow:0 0 8px color-mix(in srgb,var(--gold) 40%,transparent);\n  }\n  @media (prefers-reduced-motion: reduce){\n    .nav-indicator{transition:none;}\n  }\n\n  /* Rechte Seite: CTA + Burger */\n  .nav-right{\n    display:flex;\n    align-items:center;\n    gap:14px;\n  }\n\n  /* Magnetischer CTA */\n  .cta{\n    font-family:var(--font-ui);\n    font-weight:600;\n    font-size:12.5px;\n    letter-spacing:0.12em;\n    text-transform:uppercase;\n    color:var(--bg);\n    background:linear-gradient(180deg,var(--gold),var(--gold-2));\n    padding:11px 20px;\n    border-radius:999px;\n    min-height:44px;\n    display:inline-flex;\n    align-items:center;\n    will-change:transform;\n    transition:transform var(--t-mid) var(--ease), box-shadow var(--t-mid) var(--ease), filter var(--t-fast) var(--ease);\n    box-shadow:0 6px 22px -10px color-mix(in srgb,var(--gold) 70%,transparent);\n  }\n  .cta:hover{filter:brightness(1.05);}\n  @media (prefers-reduced-motion: reduce){\n    .cta{transition:none;}\n  }\n\n  /* Burger */\n  .burger{\n    display:none;\n    width:44px;height:44px;\n    align-items:center;\n    justify-content:center;\n    background:transparent;\n    border:1px solid var(--line);\n    border-radius:10px;\n    cursor:pointer;\n    color:var(--text);\n    transition:border-color var(--t-fast) var(--ease), background var(--t-fast) var(--ease);\n  }\n  .burger:hover{border-color:color-mix(in srgb,var(--gold) 40%,var(--line));background:var(--panel);}\n  .burger svg{width:20px;height:20px;}\n\n  /* ===================================================================\n     MOBILE MENÜ\n     =================================================================== */\n  .mobile-menu{\n    position:fixed;\n    inset:0;\n    z-index:200;\n    display:none;\n    background:color-mix(in srgb,var(--bg) 96%, black);\n    padding:var(--pad);\n    padding-top:24px;\n    opacity:0;\n    transition:opacity var(--t-mid) var(--ease);\n  }\n  .mobile-menu.open{display:block;opacity:1;}\n  @media (prefers-reduced-motion: reduce){\n    .mobile-menu{transition:none;}\n  }\n\n  .mm-top{\n    display:flex;\n    align-items:center;\n    justify-content:space-between;\n    height:var(--nav-h);\n    margin-bottom:24px;\n  }\n  .mm-close{\n    width:44px;height:44px;\n    display:inline-flex;align-items:center;justify-content:center;\n    background:transparent;\n    border:1px solid var(--line);\n    border-radius:10px;\n    color:var(--text);\n    cursor:pointer;\n    transition:border-color var(--t-fast) var(--ease);\n  }\n  .mm-close:hover{border-color:color-mix(in srgb,var(--gold) 40%,var(--line));}\n  .mm-close svg{width:20px;height:20px;}\n\n  .mm-links{\n    list-style:none;\n    margin:0;\n    padding:0;\n    display:flex;\n    flex-direction:column;\n  }\n  .mm-links li{border-bottom:1px solid var(--line);}\n  .mm-links a{\n    display:flex;\n    align-items:center;\n    min-height:60px;\n    font-family:var(--font-ui);\n    font-weight:500;\n    font-size:18px;\n    letter-spacing:0.06em;\n    text-transform:uppercase;\n    color:var(--text);\n    transition:color var(--t-fast) var(--ease), padding-left var(--t-mid) var(--ease);\n  }\n  .mm-links a:hover,\n  .mm-links a:focus-visible{color:var(--gold);padding-left:8px;}\n  .mm-links a[aria-current=\"page\"]{color:var(--gold);}\n\n  .mm-cta{\n    margin-top:32px;\n    width:100%;\n    justify-content:center;\n    min-height:52px;\n  }\n\n  /* ===================================================================\n     HERO\n     =================================================================== */\n  main{display:block;}\n\n  .hero{\n    position:relative;\n    overflow:hidden;\n    padding-block:clamp(72px,14vw,160px);\n    padding-inline:var(--pad);\n  }\n  .hero-glow{\n    position:absolute;\n    inset:0;\n    z-index:0;\n    pointer-events:none;\n  }\n  .hero-glow::before,\n  .hero-glow::after{\n    content:\"\";\n    position:absolute;\n    border-radius:50%;\n    filter:blur(90px);\n    opacity:0.5;\n  }\n  .hero-glow::before{\n    width:min(60vw,560px);height:min(60vw,560px);\n    top:-12%;left:-8%;\n    background:radial-gradient(circle, color-mix(in srgb,var(--gold) 30%,transparent), transparent 70%);\n  }\n  .hero-glow::after{\n    width:min(70vw,640px);height:min(70vw,640px);\n    bottom:-20%;right:-12%;\n    background:radial-gradient(circle, #5A1726, transparent 68%);\n  }\n\n  .hero-inner{\n    position:relative;\n    z-index:1;\n    max-width:var(--maxw);\n    margin-inline:auto;\n  }\n  .eyebrow{\n    font-family:var(--font-ui);\n    font-size:12px;\n    letter-spacing:0.32em;\n    text-transform:uppercase;\n    color:var(--gold);\n    margin:0 0 20px;\n    display:flex;align-items:center;gap:12px;\n  }\n  .eyebrow::before{\n    content:\"\";width:32px;height:1px;background:var(--gold-2);\n  }\n  .hero h1{\n    font-family:var(--font-display);\n    font-weight:500;\n    font-size:clamp(40px,8vw,86px);\n    line-height:1.02;\n    letter-spacing:-0.01em;\n    margin:0 0 28px;\n    max-width:16ch;\n  }\n  .hero h1 em{\n    font-style:italic;\n    color:var(--gold);\n  }\n  .hero p.lead{\n    font-size:clamp(16px,2.2vw,20px);\n    color:var(--text-2);\n    max-width:52ch;\n    margin:0 0 40px;\n  }\n  .hero-actions{display:flex;flex-wrap:wrap;gap:16px;align-items:center;}\n  .btn-ghost{\n    font-family:var(--font-ui);\n    font-weight:500;\n    font-size:13px;\n    letter-spacing:0.1em;\n    text-transform:uppercase;\n    color:var(--text);\n    padding:12px 22px;\n    min-height:44px;\n    display:inline-flex;align-items:center;gap:8px;\n    border:1px solid var(--line);\n    border-radius:999px;\n    transition:border-color var(--t-mid) var(--ease), background var(--t-mid) var(--ease), transform var(--t-mid) var(--ease);\n  }\n  .btn-ghost:hover{\n    border-color:color-mix(in srgb,var(--gold) 45%,var(--line));\n    background:var(--panel);\n  }\n\n  /* Medien-Platzhalter */\n  .media{\n    position:relative;\n    z-index:1;\n    max-width:var(--maxw);\n    margin:clamp(56px,9vw,96px) auto 0;\n    padding-inline:var(--pad);\n  }\n  .media-frame{\n    position:relative;\n    aspect-ratio:16/7;\n    border-radius:24px;\n    overflow:hidden;\n    border:1px solid var(--line);\n    background:\n      linear-gradient(135deg, var(--bg2), #2E1018 60%, #3A1320);\n    display:flex;align-items:center;justify-content:center;\n  }\n  .media-frame::after{\n    content:\"PLATZHALTER · 16:7 · Editorial-Foto\";\n    font-family:var(--font-ui);\n    font-size:12px;\n    letter-spacing:0.22em;\n    text-transform:uppercase;\n    color:var(--text-2);\n    border:1px dashed color-mix(in srgb,var(--gold) 40%,var(--line));\n    padding:10px 16px;\n    border-radius:999px;\n  }\n\n  /* ===================================================================\n     BENTO\n     =================================================================== */\n  .bento{\n    max-width:var(--maxw);\n    margin-inline:auto;\n    padding:clamp(72px,12vw,128px) var(--pad);\n  }\n  .section-head{margin-bottom:clamp(32px,5vw,56px);}\n  .section-head .eyebrow{margin-bottom:16px;}\n  .section-head h2{\n    font-family:var(--font-display);\n    font-weight:500;\n    font-size:clamp(28px,5vw,48px);\n    line-height:1.08;\n    letter-spacing:-0.01em;\n    margin:0;\n    max-width:20ch;\n  }\n\n  .bento-grid{\n    display:grid;\n    grid-template-columns:repeat(6,1fr);\n    gap:clamp(14px,2vw,22px);\n  }\n  .card{\n    position:relative;\n    background:var(--panel);\n    border:1px solid var(--line);\n    border-radius:20px;\n    padding:clamp(22px,3vw,34px);\n    overflow:hidden;\n    transition:border-color var(--t-mid) var(--ease), transform var(--t-mid) var(--ease), background var(--t-mid) var(--ease);\n    min-height:200px;\n    display:flex;flex-direction:column;justify-content:space-between;gap:24px;\n  }\n  .card:hover{\n    border-color:color-mix(in srgb,var(--gold) 36%,var(--line));\n    transform:translateY(-4px);\n    background:color-mix(in srgb,var(--panel) 100%, var(--gold) 4%);\n  }\n  @media (prefers-reduced-motion: reduce){\n    .card:hover{transform:none;}\n  }\n  .card .num{\n    font-family:var(--font-ui);\n    font-size:12px;\n    letter-spacing:0.2em;\n    color:var(--gold);\n  }\n  .card h3{\n    font-family:var(--font-ui);\n    font-weight:600;\n    font-size:clamp(18px,2.4vw,22px);\n    letter-spacing:0.01em;\n    margin:0 0 10px;\n  }\n  .card p{margin:0;color:var(--text-2);font-size:14.5px;}\n  .card.span-3{grid-column:span 3;}\n  .card.span-2{grid-column:span 2;}\n  .card.span-4{grid-column:span 4;}\n  .card.tall{min-height:300px;}\n  .card .glow{\n    position:absolute;\n    width:200px;height:200px;\n    right:-40px;top:-40px;\n    border-radius:50%;\n    background:radial-gradient(circle, color-mix(in srgb,var(--gold) 22%,transparent), transparent 70%);\n    filter:blur(30px);\n    opacity:0;\n    transition:opacity var(--t-slow) var(--ease);\n    pointer-events:none;\n  }\n  .card:hover .glow{opacity:1;}\n\n  /* ===================================================================\n     FOOTER\n     =================================================================== */\n  footer{\n    border-top:1px solid var(--line);\n    padding:clamp(40px,7vw,72px) var(--pad);\n  }\n  .footer-inner{\n    max-width:var(--maxw);\n    margin-inline:auto;\n    display:flex;\n    flex-wrap:wrap;\n    align-items:center;\n    justify-content:space-between;\n    gap:20px;\n  }\n  .footer-inner small{color:var(--text-2);font-size:13px;}\n\n  /* ===================================================================\n     RESPONSIVE\n     =================================================================== */\n  @media (max-width:860px){\n    .nav-links,\n    .nav .cta{display:none;}\n    .burger{display:inline-flex;}\n  }\n\n  @media (max-width:520px){\n    .bento-grid{grid-template-columns:1fr;}\n    .card.span-3,.card.span-2,.card.span-4{grid-column:span 1;}\n    .media-frame{aspect-ratio:4/3;}\n  }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\n\u003ca class=\"skip\" href=\"#main\">Zum Inhalt springen\u003c/a>\n\n\u003cheader class=\"site-header\">\n  \u003cnav class=\"nav\" aria-label=\"Hauptnavigation\">\n    \u003ca class=\"wordmark\" href=\"#top\" aria-label=\"MAISON AURÉLIE · Startseite\">\n      \u003cspan class=\"dot\" aria-hidden=\"true\">\u003c/span>\n      MAISON \u003cspan class=\"accent\">AURÉLIE\u003c/span>\n    \u003c/a>\n\n    \u003cul class=\"nav-links\" id=\"navLinks\">\n      \u003cli>\u003ca href=\"#kollektionen\" aria-current=\"page\">Kollektionen\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#atelier\">Atelier\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#trauringe\">Trauringe\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#maison\">Maison\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#kontakt\">Kontakt\u003c/a>\u003c/li>\n      \u003cspan class=\"nav-indicator\" id=\"navIndicator\" aria-hidden=\"true\">\u003c/span>\n    \u003c/ul>\n\n    \u003cdiv class=\"nav-right\">\n      \u003ca class=\"cta\" id=\"navCta\" href=\"#termin\">Termin\u003c/a>\n      \u003cbutton class=\"burger\" id=\"burger\" aria-label=\"Menü öffnen\" aria-expanded=\"false\" aria-controls=\"mobileMenu\">\n        \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" aria-hidden=\"true\">\n          \u003cpath d=\"M3 6h18M3 12h18M3 18h18\" stroke-linecap=\"round\"/>\n        \u003c/svg>\n      \u003c/button>\n    \u003c/div>\n  \u003c/nav>\n\u003c/header>\n\n\u003c!-- Mobile Menü -->\n\u003cdiv class=\"mobile-menu\" id=\"mobileMenu\" role=\"dialog\" aria-modal=\"true\" aria-label=\"Hauptmenü\" hidden>\n  \u003cdiv class=\"mm-top\">\n    \u003cspan class=\"wordmark\">\u003cspan class=\"dot\" aria-hidden=\"true\">\u003c/span>MAISON \u003cspan class=\"accent\">AURÉLIE\u003c/span>\u003c/span>\n    \u003cbutton class=\"mm-close\" id=\"mmClose\" aria-label=\"Menü schließen\">\n      \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" aria-hidden=\"true\">\n        \u003cpath d=\"M6 6l12 12M18 6L6 18\" stroke-linecap=\"round\"/>\n      \u003c/svg>\n    \u003c/button>\n  \u003c/div>\n  \u003cul class=\"mm-links\">\n    \u003cli>\u003ca href=\"#kollektionen\" aria-current=\"page\">Kollektionen\u003c/a>\u003c/li>\n    \u003cli>\u003ca href=\"#atelier\">Atelier\u003c/a>\u003c/li>\n    \u003cli>\u003ca href=\"#trauringe\">Trauringe\u003c/a>\u003c/li>\n    \u003cli>\u003ca href=\"#maison\">Maison\u003c/a>\u003c/li>\n    \u003cli>\u003ca href=\"#kontakt\">Kontakt\u003c/a>\u003c/li>\n  \u003c/ul>\n  \u003ca class=\"cta mm-cta\" href=\"#termin\">Termin vereinbaren\u003c/a>\n\u003c/div>\n\n\u003cmain id=\"main\">\n  \u003csection class=\"hero\" id=\"top\">\n    \u003cdiv class=\"hero-glow\" aria-hidden=\"true\">\u003c/div>\n    \u003cdiv class=\"hero-inner\">\n      \u003cp class=\"eyebrow\">Düsseldorf · seit 1987\u003c/p>\n      \u003ch1>Schmuck, der eine \u003cem>Geschichte\u003c/em> in sich trägt.\u003c/h1>\n      \u003cp class=\"lead\">Feine Juwelierskunst in Bordeaux und Gold. Jedes Stück entsteht im Atelier am Rhein, von Hand gefasst und mit Bedacht gefertigt.\u003c/p>\n      \u003cdiv class=\"hero-actions\">\n        \u003ca class=\"cta\" href=\"#kollektionen\">Kollektionen entdecken\u003c/a>\n        \u003ca class=\"btn-ghost\" href=\"#atelier\">Das Atelier\n          \u003csvg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" aria-hidden=\"true\">\u003cpath d=\"M5 12h14M13 6l6 6-6 6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\u003c/svg>\n        \u003c/a>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003cdiv class=\"media\" aria-hidden=\"false\">\n    \u003cdiv class=\"media-frame\" role=\"img\" aria-label=\"Platzhalter für ein Editorial-Foto\">\u003c/div>\n  \u003c/div>\n\n  \u003csection class=\"bento\" id=\"kollektionen\">\n    \u003cdiv class=\"section-head\">\n      \u003cp class=\"eyebrow\">Was uns ausmacht\u003c/p>\n      \u003ch2>Handwerk, Material und Zeit in jeder Fassung.\u003c/h2>\n    \u003c/div>\n    \u003cdiv class=\"bento-grid\">\n      \u003carticle class=\"card span-3 tall\">\n        \u003cdiv class=\"glow\" aria-hidden=\"true\">\u003c/div>\n        \u003cspan class=\"num\">01\u003c/span>\n        \u003cdiv>\n          \u003ch3>Manufaktur am Rhein\u003c/h3>\n          \u003cp>Entwurf, Guss und Fassung entstehen unter einem Dach. Kein Stück verlaesst das Haus, das nicht durch unsere Haende ging.\u003c/p>\n        \u003c/div>\n      \u003c/article>\n      \u003carticle class=\"card span-3 tall\">\n        \u003cdiv class=\"glow\" aria-hidden=\"true\">\u003c/div>\n        \u003cspan class=\"num\">02\u003c/span>\n        \u003cdiv>\n          \u003ch3>Verantwortungsvolle Steine\u003c/h3>\n          \u003cp>Wir arbeiten mit zertifizierten Lieferanten und legen die Herkunft jedes Steins offen.\u003c/p>\n        \u003c/div>\n      \u003c/article>\n      \u003carticle class=\"card span-2\">\n        \u003cdiv class=\"glow\" aria-hidden=\"true\">\u003c/div>\n        \u003cspan class=\"num\">03\u003c/span>\n        \u003cdiv>\n          \u003ch3>Trauringe\u003c/h3>\n          \u003cp>Gemeinsam gestaltet, ein Leben lang getragen.\u003c/p>\n        \u003c/div>\n      \u003c/article>\n      \u003carticle class=\"card span-2\">\n        \u003cdiv class=\"glow\" aria-hidden=\"true\">\u003c/div>\n        \u003cspan class=\"num\">04\u003c/span>\n        \u003cdiv>\n          \u003ch3>Anpassung\u003c/h3>\n          \u003cp>Groesse, Gravur und Patina nach Wunsch.\u003c/p>\n        \u003c/div>\n      \u003c/article>\n      \u003carticle class=\"card span-2\">\n        \u003cdiv class=\"glow\" aria-hidden=\"true\">\u003c/div>\n        \u003cspan class=\"num\">05\u003c/span>\n        \u003cdiv>\n          \u003ch3>Service\u003c/h3>\n          \u003cp>Pflege und Aufarbeitung im Haus.\u003c/p>\n        \u003c/div>\n      \u003c/article>\n      \u003carticle class=\"card span-6\">\n        \u003cdiv class=\"glow\" aria-hidden=\"true\">\u003c/div>\n        \u003cspan class=\"num\">06\u003c/span>\n        \u003cdiv>\n          \u003ch3>Persönliche Beratung in Düsseldorf\u003c/h3>\n          \u003cp>Vereinbaren Sie einen Termin in unserem Salon. In Ruhe, mit Zeit und einem Glas Champagner.\u003c/p>\n        \u003c/div>\n      \u003c/article>\n    \u003c/div>\n  \u003c/section>\n\u003c/main>\n\n\u003cfooter id=\"kontakt\">\n  \u003cdiv class=\"footer-inner\">\n    \u003cspan class=\"wordmark\">\u003cspan class=\"dot\" aria-hidden=\"true\">\u003c/span>MAISON \u003cspan class=\"accent\">AURÉLIE\u003c/span>\u003c/span>\n    \u003csmall>Königsallee, Düsseldorf · Termine nach Vereinbarung\u003c/small>\n    \u003csmall>&copy; 2025 Maison Aurélie\u003c/small>\n  \u003c/div>\n\u003c/footer>\n\n\u003cscript>\n(function(){\n  \"use strict\";\n\n  var reduceMotion = window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n\n  /* ============================================================\n     Gleitende Gold-Linie (Cursor-Linie)\n     ============================================================ */\n  var list = document.getElementById(\"navLinks\");\n  var indicator = document.getElementById(\"navIndicator\");\n  var links = list ? Array.prototype.slice.call(list.querySelectorAll(\"a\")) : [];\n\n  function moveTo(el, animate){\n    if(!el || !indicator) return;\n    var lr = list.getBoundingClientRect();\n    var er = el.getBoundingClientRect();\n    if(reduceMotion){ indicator.style.transition = \"none\"; }\n    indicator.style.opacity = \"1\";\n    indicator.style.width = er.width + \"px\";\n    indicator.style.transform = \"translateX(\" + (er.left - lr.left) + \"px)\";\n  }\n\n  function moveToActive(){\n    var active = list ? list.querySelector('a[aria-current=\"page\"]') : null;\n    if(active){ moveTo(active); }\n    else if(indicator){ indicator.style.opacity = \"0\"; }\n  }\n\n  links.forEach(function(a){\n    a.addEventListener(\"mouseenter\", function(){ moveTo(a); });\n    a.addEventListener(\"focus\", function(){ moveTo(a); });\n  });\n  if(list){\n    list.addEventListener(\"mouseleave\", moveToActive);\n  }\n  links.forEach(function(a){\n    a.addEventListener(\"blur\", function(){\n      // kurz warten, falls Fokus zu nächstem Link wandert\n      window.setTimeout(function(){\n        if(!list.contains(document.activeElement)){ moveToActive(); }\n      },0);\n    });\n  });\n\n  window.addEventListener(\"load\", moveToActive);\n  window.addEventListener(\"resize\", moveToActive);\n\n  /* ============================================================\n     Magnetischer CTA (\u003c=6px)\n     ============================================================ */\n  if(!reduceMotion){\n    document.querySelectorAll(\".cta\").forEach(function(btn){\n      var MAX = 6;\n      btn.addEventListener(\"mousemove\", function(e){\n        var r = btn.getBoundingClientRect();\n        var x = (e.clientX - (r.left + r.width/2)) / (r.width/2);\n        var y = (e.clientY - (r.top + r.height/2)) / (r.height/2);\n        btn.style.transform = \"translate(\" + (x*MAX).toFixed(2) + \"px,\" + (y*MAX).toFixed(2) + \"px)\";\n      });\n      btn.addEventListener(\"mouseleave\", function(){\n        btn.style.transform = \"translate(0,0)\";\n      });\n    });\n  }\n\n  /* ============================================================\n     Mobile Menü mit Fokus-Trap\n     ============================================================ */\n  var burger = document.getElementById(\"burger\");\n  var menu = document.getElementById(\"mobileMenu\");\n  var closeBtn = document.getElementById(\"mmClose\");\n  var lastFocused = null;\n\n  function focusables(){\n    return Array.prototype.slice.call(\n      menu.querySelectorAll('a[href], button:not([disabled])')\n    ).filter(function(el){ return el.offsetParent !== null; });\n  }\n\n  function openMenu(){\n    lastFocused = document.activeElement;\n    menu.hidden = false;\n    // reflow für Transition\n    void menu.offsetWidth;\n    menu.classList.add(\"open\");\n    burger.setAttribute(\"aria-expanded\",\"true\");\n    document.body.style.overflow = \"hidden\";\n    closeBtn.focus();\n    document.addEventListener(\"keydown\", onKeydown);\n  }\n\n  function closeMenu(){\n    menu.classList.remove(\"open\");\n    burger.setAttribute(\"aria-expanded\",\"false\");\n    document.body.style.overflow = \"\";\n    document.removeEventListener(\"keydown\", onKeydown);\n    var finish = function(){\n      menu.hidden = true;\n      menu.removeEventListener(\"transitionend\", finish);\n    };\n    if(reduceMotion){ menu.hidden = true; }\n    else { menu.addEventListener(\"transitionend\", finish); }\n    if(lastFocused){ lastFocused.focus(); }\n  }\n\n  function onKeydown(e){\n    if(e.key === \"Escape\"){ e.preventDefault(); closeMenu(); return; }\n    if(e.key === \"Tab\"){\n      var items = focusables();\n      if(!items.length) return;\n      var first = items[0], last = items[items.length-1];\n      if(e.shiftKey && document.activeElement === first){\n        e.preventDefault(); last.focus();\n      } else if(!e.shiftKey && document.activeElement === last){\n        e.preventDefault(); first.focus();\n      }\n    }\n  }\n\n  if(burger){ burger.addEventListener(\"click\", openMenu); }\n  if(closeBtn){ closeBtn.addEventListener(\"click\", closeMenu); }\n  if(menu){\n    menu.querySelectorAll(\".mm-links a, .mm-cta\").forEach(function(a){\n      a.addEventListener(\"click\", closeMenu);\n    });\n  }\n\n  // Bei Aufweitung über 860px Menü sicher schließen\n  window.matchMedia(\"(min-width: 861px)\").addEventListener(\"change\", function(ev){\n    if(ev.matches && menu.classList.contains(\"open\")){ closeMenu(); }\n  });\n})();\n\u003c/script>\n\u003c/body>\n\u003c/html>\n"},
  {name:"Icon-Rail", desc:"Schmale vertikale Glas-Rail, expandiert bei Hover und blendet Labels ein.", file:"m7-icon-rail.html", html:"\u003c!DOCTYPE html>\n\u003c!--\n  ============================================================================\n  MAISON AURELIE - Duesseldorf\n  Konzept: \"Bordeaux & Gold\" - MODERNE Ausfuehrung 2025\n  Navbar-Konzept M7: \"Expandierende Icon-Rail\"\n\n  Beschreibung:\n  - Desktop (>=1000px): Schmale vertikale Glas-Rail am linken Rand.\n    Inline-SVG-Icons (Trauringe, Uhren, Schmuck, Manufaktur, Termin) in\n    44px-Flaechen. Bei Hover/Fokus expandiert die Rail sanft; Text-Labels\n    gleiten neben den Icons ein (Breite animiert).\n  - Unter 1000px: Rail wird zu moderner oberer Leiste mit Hamburger-Menue.\n\n  A11y:\n  - SVG-Icons mit aria-label, Rail-Expansion per Tastatur-Fokus\n  - Skip-Link, semantisches header/nav, :focus-visible\n  - Mobile-Menue: aria-expanded/controls, ESC, Schliessen-Button, Fokus-Trap\n  - Touch-Ziele >=44px, Kontrast >=4.5:1\n  - prefers-reduced-motion: Expansion ohne Animation\n  - kein horizontales Scrollen bei 320px\n\n  PROD: next/font lokal statt Google-Fonts-\u003clink>\n  ============================================================================\n-->\n\u003chtml lang=\"de\">\n\u003chead>\n  \u003cmeta charset=\"UTF-8\">\n  \u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  \u003ctitle>Maison Aurelie - Feine Juwelierskunst aus Duesseldorf\u003c/title>\n\n  \u003c!-- PROD: next/font lokal -->\n  \u003clink rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n  \u003clink rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n  \u003clink href=\"https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap\" rel=\"stylesheet\">\n\n  \u003cstyle>\n    :root {\n      --bg: #1A0A0E;\n      --bg2: #240D13;\n      --panel: rgba(255, 255, 255, 0.05);\n      --text: #F6ECE6;\n      --text-2: #C9A7AD;\n      --gold: #E6C07A;\n      --gold-2: #C99A4E;\n      --line: rgba(255, 220, 190, 0.12);\n\n      --rail-w: 76px;\n      --rail-w-open: 256px;\n      --ease: cubic-bezier(0.22, 1, 0.36, 1);\n      --dur: 220ms;\n      --radius-lg: 28px;\n      --radius-md: 20px;\n      --radius-sm: 14px;\n    }\n\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n\n    html { scroll-behavior: smooth; }\n\n    body {\n      background:\n        radial-gradient(1200px 800px at 85% -10%, rgba(230, 192, 122, 0.10), transparent 60%),\n        radial-gradient(900px 700px at 5% 110%, rgba(201, 154, 78, 0.08), transparent 55%),\n        linear-gradient(160deg, var(--bg), var(--bg2));\n      background-attachment: fixed;\n      color: var(--text);\n      font-family: \"Inter\", system-ui, -apple-system, sans-serif;\n      line-height: 1.6;\n      min-height: 100vh;\n      overflow-x: hidden;\n      -webkit-font-smoothing: antialiased;\n    }\n\n    a { color: inherit; text-decoration: none; }\n\n    /* ---------- Skip Link ---------- */\n    .skip-link {\n      position: fixed;\n      top: -100px;\n      left: 16px;\n      z-index: 200;\n      background: var(--gold);\n      color: #2A0E12;\n      padding: 12px 20px;\n      border-radius: var(--radius-sm);\n      font-family: \"Space Grotesk\", sans-serif;\n      font-weight: 600;\n      transition: top var(--dur) var(--ease);\n    }\n    .skip-link:focus-visible { top: 16px; outline: 2px solid var(--text); outline-offset: 3px; }\n\n    :focus-visible {\n      outline: 2px solid var(--gold);\n      outline-offset: 3px;\n      border-radius: 8px;\n    }\n\n    /* ============================================================\n       ICON-RAIL (Desktop >=1000px)\n       ============================================================ */\n    .rail {\n      position: fixed;\n      top: 18px;\n      left: 18px;\n      bottom: 18px;\n      width: var(--rail-w);\n      z-index: 100;\n      display: flex;\n      flex-direction: column;\n      gap: 8px;\n      padding: 14px 12px;\n      background: var(--panel);\n      border: 1px solid var(--line);\n      border-radius: var(--radius-lg);\n      backdrop-filter: blur(18px) saturate(140%);\n      -webkit-backdrop-filter: blur(18px) saturate(140%);\n      box-shadow:\n        0 24px 60px rgba(0, 0, 0, 0.45),\n        inset 0 1px 0 rgba(255, 255, 255, 0.06);\n      overflow: hidden;\n      transition: width var(--dur) var(--ease), box-shadow var(--dur) var(--ease);\n    }\n\n    /* Expansion bei Hover ODER wenn ein Kind den Fokus haelt */\n    .rail:hover,\n    .rail:focus-within {\n      width: var(--rail-w-open);\n      box-shadow:\n        0 30px 80px rgba(0, 0, 0, 0.55),\n        inset 0 1px 0 rgba(255, 255, 255, 0.08);\n    }\n\n    .rail__brand {\n      display: flex;\n      align-items: center;\n      gap: 14px;\n      padding: 8px 6px;\n      min-height: 48px;\n      margin-bottom: 6px;\n      border-bottom: 1px solid var(--line);\n      white-space: nowrap;\n    }\n    .rail__mark {\n      flex: 0 0 48px;\n      width: 48px;\n      height: 48px;\n      display: grid;\n      place-items: center;\n      border-radius: 14px;\n      background: linear-gradient(145deg, var(--gold), var(--gold-2));\n      color: #2A0E12;\n      font-family: \"Space Grotesk\", sans-serif;\n      font-weight: 700;\n      font-size: 19px;\n      box-shadow: 0 6px 18px rgba(230, 192, 122, 0.25);\n    }\n    .rail__wordmark {\n      font-family: \"Space Grotesk\", sans-serif;\n      font-weight: 600;\n      font-size: 15px;\n      letter-spacing: 0.14em;\n      text-transform: uppercase;\n      color: var(--text);\n      opacity: 0;\n      transform: translateX(-6px);\n      transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);\n    }\n    .rail__wordmark small {\n      display: block;\n      font-family: \"Inter\", sans-serif;\n      font-weight: 400;\n      font-size: 10px;\n      letter-spacing: 0.22em;\n      color: var(--text-2);\n    }\n\n    .rail__nav {\n      display: flex;\n      flex-direction: column;\n      gap: 6px;\n      flex: 1;\n    }\n\n    .rail__link {\n      position: relative;\n      display: flex;\n      align-items: center;\n      gap: 16px;\n      min-height: 48px;\n      padding: 0 8px;\n      border-radius: var(--radius-sm);\n      color: var(--text-2);\n      white-space: nowrap;\n      transition: background var(--dur) var(--ease), color var(--dur) var(--ease);\n    }\n    .rail__link:hover { background: rgba(255, 255, 255, 0.04); color: var(--text); }\n\n    .rail__ico {\n      flex: 0 0 44px;\n      width: 44px;\n      height: 44px;\n      display: grid;\n      place-items: center;\n    }\n    .rail__ico svg { width: 24px; height: 24px; display: block; }\n\n    .rail__label {\n      font-family: \"Space Grotesk\", sans-serif;\n      font-size: 15px;\n      font-weight: 500;\n      opacity: 0;\n      transform: translateX(-6px);\n      transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);\n    }\n\n    /* Labels + Wordmark sichtbar wenn Rail offen */\n    .rail:hover .rail__label,\n    .rail:focus-within .rail__label,\n    .rail:hover .rail__wordmark,\n    .rail:focus-within .rail__wordmark {\n      opacity: 1;\n      transform: translateX(0);\n    }\n\n    /* Aktiver Punkt mit Goldakzent */\n    .rail__link.is-active {\n      color: var(--text);\n      background: rgba(230, 192, 122, 0.10);\n    }\n    .rail__link.is-active::before {\n      content: \"\";\n      position: absolute;\n      left: 0;\n      top: 50%;\n      transform: translateY(-50%);\n      width: 4px;\n      height: 22px;\n      border-radius: 0 4px 4px 0;\n      background: linear-gradient(180deg, var(--gold), var(--gold-2));\n      box-shadow: 0 0 14px rgba(230, 192, 122, 0.6);\n    }\n    .rail__link.is-active .rail__ico svg { color: var(--gold); }\n\n    .rail__cta {\n      margin-top: 4px;\n      display: flex;\n      align-i
