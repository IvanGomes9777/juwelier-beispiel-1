<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!--
  NAVBAR-SHOWCASE (Konzept 5: Bordeaux & Gold, moderne Ausfuehrung 2025)
  Eine Datei, 8 moderne Navbar-Designs zum Durchklicken. Jede Variante laeuft
  isoliert in einem iframe (srcdoc) inklusive eigener moderner Beispielseite,
  damit Sticky-/Scroll-/Hover-Verhalten echt testbar ist.
  Bedienung: Liste links (mobil oben), Pfeiltasten links/rechts wechseln,
  "Vollbild" oeffnet die aktive Variante pur. Produktion: gewaehlte Variante wird fest.
-->
<title>MAISON AURÉLIE · Navbar-Showcase (8 moderne Designs)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#140709; --bg2:#1f0b11; --panel:rgba(255,255,255,0.05);
    --text:#F6ECE6; --text-2:#C9A7AD; --gold:#E6C07A; --gold-2:#C99A4E;
    --line:rgba(255,220,190,0.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(120% 80% at 100% 0%, rgba(230,192,122,0.08), transparent 60%),
      radial-gradient(100% 70% at 0% 100%, rgba(201,154,78,0.10), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:"Space Grotesk",system-ui,sans-serif;
    display:flex; flex-direction:column; overflow:hidden;
  }
  a{color:inherit}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:8px}

  .top{
    display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
    padding:.85rem clamp(.9rem,2.5vw,1.6rem);
    border-bottom:1px solid var(--line);
    background:rgba(20,7,9,.7); backdrop-filter:blur(12px);
  }
  .brand{font-weight:600;letter-spacing:.14em;font-size:.95rem}
  .brand b{color:var(--gold);font-weight:700}
  .top .meta{color:var(--text-2);font-size:.8rem;font-family:"Inter",sans-serif}
  .spacer{flex:1}
  .counter{font-family:"Inter",sans-serif;font-size:.8rem;color:var(--text-2);font-variant-numeric:tabular-nums}
  .iconbtn{
    display:inline-flex;align-items:center;justify-content:center;gap:.4rem;
    min-height:40px;padding:0 .9rem;border-radius:999px;
    border:1px solid var(--line);background:var(--panel);color:var(--text);
    font:inherit;font-size:.82rem;cursor:pointer;
    transition:border-color .2s ease,transform .2s ease, background .2s ease;
  }
  .iconbtn:hover{border-color:var(--gold-2);transform:translateY(-1px)}

  .stage{flex:1;display:flex;min-height:0}

  .list{
    width:clamp(15rem,24vw,20rem); flex:0 0 auto; overflow-y:auto;
    border-right:1px solid var(--line); padding:.8rem;
    display:flex; flex-direction:column; gap:.55rem;
    background:rgba(31,11,17,.35);
  }
  .opt{
    text-align:left; cursor:pointer; color:var(--text);
    border:1px solid var(--line); border-radius:16px; padding:.85rem .95rem;
    background:var(--panel); font:inherit;
    transition:border-color .22s cubic-bezier(.22,1,.36,1), transform .22s cubic-bezier(.22,1,.36,1), background .22s ease;
  }
  .opt:hover{transform:translateY(-2px);border-color:var(--gold-2)}
  .opt[aria-current="true"]{
    border-color:var(--gold);
    background:linear-gradient(180deg, rgba(230,192,122,.14), rgba(230,192,122,.05));
    box-shadow:0 10px 30px -16px rgba(230,192,122,.6);
  }
  .opt .n{font-family:"Inter",sans-serif;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-variant-numeric:tabular-nums}
  .opt .t{display:block;font-weight:600;font-size:1.05rem;margin:.15rem 0 .25rem}
  .opt .d{font-family:"Inter",sans-serif;font-size:.82rem;color:var(--text-2);line-height:1.45}

  .preview{flex:1;min-width:0;position:relative;display:flex;flex-direction:column}
  .frame-head{
    display:flex;align-items:center;gap:.7rem;
    padding:.7rem 1rem;border-bottom:1px solid var(--line);
    font-family:"Inter",sans-serif;
  }
  .frame-head .dot{width:10px;height:10px;border-radius:50%;background:var(--gold-2);box-shadow:0 0 0 3px rgba(230,192,122,.15)}
  .frame-head .name{font-weight:600;font-family:"Space Grotesk",sans-serif}
  .frame-head .desc{color:var(--text-2);font-size:.82rem}
  .nav-arrows{margin-left:auto;display:flex;gap:.4rem}
  iframe{flex:1;width:100%;border:0;background:#1A0A0E}

  @media (max-width: 820px){
    .stage{flex-direction:column}
    .list{
      width:100%; flex:0 0 auto; flex-direction:row; overflow-x:auto; overflow-y:hidden;
      border-right:0; border-bottom:1px solid var(--line); gap:.5rem;
    }
    .opt{min-width:13rem;flex:0 0 auto}
    .frame-head .desc{display:none}
  }
</style>
</head>
<body>
  <div class="top">
    <span class="brand">MAISON <b>AURÉLIE</b></span>
    <span class="meta">Navbar-Showcase · 8 moderne Designs · Bordeaux &amp; Gold</span>
    <span class="spacer"></span>
    <span class="counter" id="counter">01 / 08</span>
    <button class="iconbtn" id="fs" title="Aktive Variante pur im neuen Tab oeffnen">Vollbild</button>
  </div>

  <div class="stage">
    <div class="list" id="list" role="tablist" aria-label="Navbar-Designs"></div>
    <div class="preview">
      <div class="frame-head">
        <span class="dot" aria-hidden="true"></span>
        <span class="name" id="fName">-</span>
        <span class="desc" id="fDesc">-</span>
        <span class="nav-arrows">
          <button class="iconbtn" id="prev" aria-label="Vorheriges Design">&larr;</button>
          <button class="iconbtn" id="next" aria-label="Naechstes Design">&rarr;</button>
        </span>
      </div>
      <iframe id="frame" title="Navbar-Vorschau" loading="eager"></iframe>
    </div>
  </div>

<script>
  const VARIANTS = [
  {name:"Glass Island", desc:"Schwebende Frosted-Glass-Pille mit gleitendem Aktiv-Indikator und magnetischem CTA.", file:"m1-glass-island.html", html:"\u003c!DOCTYPE html>\n\u003chtml lang=\"de\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\" />\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n\u003ctitle>MAISON AURELIE - Feine Juwelierkunst in Duesseldorf\u003c/title>\n\u003c!--\n  ============================================================================\n  MAISON AURELIE - Konzept \"Bordeaux & Gold\" / Navbar M1 \"Glass Island\"\n  ----------------------------------------------------------------------------\n  Standalone, offline lauffaehige, moderne HTML-Demo (Stil 2025).\n  - Navigation: schwebende, frosted-glass Pill-Insel, zentriert.\n    Wordmark links, Links mittig mit gleitendem Aktiv-/Hover-Indikator,\n    \"Termin\"-CTA rechts (magnetisch, max. 6px Versatz).\n  - Beim Scrollen rueckt die Insel naeher an den Rand und wird kompakter.\n  - A11y: Skip-Link, semantisches header/nav, zugaengliches Mobile-Menue\n    (aria-expanded/controls, ESC, Schliessen-Button, Fokus-Trap),\n    :focus-visible, Touch-Targets >= 44px, Kontrast >= 4.5:1,\n    prefers-reduced-motion respektiert, kein H-Scroll bei 320px.\n  - Keine echten Bilder: Medien sind markierte Platzhalter (aspect-ratio).\n\n  PROD-Hinweis: Fonts hier via Google-Fonts-\u003clink>. In Produktion lokal\n  einbinden (z.B. next/font lokal) statt CDN.\n  ============================================================================\n-->\n\u003c!-- PROD: next/font lokal statt Google-Fonts-CDN -->\n\u003clink rel=\"preconnect\" href=\"https://fonts.googleapis.com\" />\n\u003clink rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin />\n\u003clink href=\"https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap\" rel=\"stylesheet\" />\n\u003cstyle>\n  :root {\n    --bg: #1A0A0E;\n    --bg2: #240D13;\n    --panel: rgba(255, 255, 255, 0.05);\n    --text: #F6ECE6;\n    --text-2: #C9A7AD;\n    --gold: #E6C07A;\n    --gold-2: #C99A4E;\n    --line: rgba(255, 220, 190, 0.12);\n\n    --ease: cubic-bezier(0.22, 1, 0.36, 1);\n    --t-fast: 180ms;\n    --t-mid: 220ms;\n    --t-slow: 260ms;\n\n    --r-pill: 999px;\n    --r-2xl: 22px;\n    --r-xl: 18px;\n    --r-lg: 16px;\n\n    --shadow-island:\n      0 1px 0 rgba(255, 255, 255, 0.06) inset,\n      0 10px 30px -12px rgba(0, 0, 0, 0.65),\n      0 30px 60px -30px rgba(0, 0, 0, 0.55);\n    --shadow-card:\n      0 1px 0 rgba(255, 255, 255, 0.04) inset,\n      0 18px 40px -24px rgba(0, 0, 0, 0.7);\n\n    --nav-h: 64px;\n  }\n\n  * { box-sizing: border-box; }\n\n  html { scroll-behavior: smooth; }\n\n  body {\n    margin: 0;\n    min-height: 100vh;\n    background:\n      radial-gradient(1100px 700px at 78% -8%, rgba(230, 192, 122, 0.10), transparent 60%),\n      radial-gradient(900px 600px at 8% 18%, rgba(123, 23, 42, 0.30), transparent 58%),\n      linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);\n    background-attachment: fixed;\n    color: var(--text);\n    font-family: \"Inter\", system-ui, -apple-system, sans-serif;\n    font-weight: 400;\n    line-height: 1.6;\n    -webkit-font-smoothing: antialiased;\n    overflow-x: hidden;\n  }\n\n  a { color: inherit; text-decoration: none; }\n\n  ::selection { background: rgba(230, 192, 122, 0.28); color: #fff; }\n\n  :focus-visible {\n    outline: 2px solid var(--gold);\n    outline-offset: 3px;\n    border-radius: 10px;\n  }\n\n  /* ---------- Skip link ---------- */\n  .skip-link {\n    position: fixed;\n    top: 12px;\n    left: 12px;\n    z-index: 200;\n    transform: translateY(-160%);\n    background: var(--gold);\n    color: #2a0f14;\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    padding: 12px 18px;\n    border-radius: var(--r-pill);\n    transition: transform var(--t-mid) var(--ease);\n  }\n  .skip-link:focus { transform: translateY(0); }\n\n  /* ============================================================\n     NAV M1 - GLASS ISLAND\n     ============================================================ */\n  .nav-wrap {\n    position: fixed;\n    top: 22px;\n    left: 0;\n    right: 0;\n    z-index: 100;\n    display: flex;\n    justify-content: center;\n    padding: 0 16px;\n    pointer-events: none;\n    transition: top var(--t-slow) var(--ease);\n  }\n  .nav-wrap.scrolled { top: 12px; }\n\n  .island {\n    pointer-events: auto;\n    width: min(1080px, 100%);\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 16px;\n    height: var(--nav-h);\n    padding: 0 12px 0 22px;\n    border: 1px solid var(--line);\n    border-radius: var(--r-pill);\n    background:\n      linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02)),\n      rgba(26, 10, 14, 0.55);\n    -webkit-backdrop-filter: blur(18px) saturate(140%);\n    backdrop-filter: blur(18px) saturate(140%);\n    box-shadow: var(--shadow-island);\n    transition:\n      height var(--t-slow) var(--ease),\n      width var(--t-slow) var(--ease),\n      padding var(--t-slow) var(--ease),\n      border-color var(--t-mid) var(--ease),\n      box-shadow var(--t-mid) var(--ease);\n  }\n  .nav-wrap.scrolled .island {\n    height: 56px;\n    width: min(980px, 100%);\n    border-color: rgba(230, 192, 122, 0.26);\n  }\n\n  /* Wordmark */\n  .wordmark {\n    display: inline-flex;\n    align-items: baseline;\n    gap: 8px;\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 700;\n    letter-spacing: 0.14em;\n    font-size: 0.92rem;\n    white-space: nowrap;\n    padding: 8px 6px;\n    border-radius: 12px;\n    transition: transform var(--t-fast) var(--ease);\n  }\n  .wordmark:hover { transform: translateY(-1px); }\n  .wordmark .dot {\n    width: 6px; height: 6px;\n    border-radius: 50%;\n    background: var(--gold);\n    box-shadow: 0 0 12px rgba(230, 192, 122, 0.8);\n    align-self: center;\n  }\n  .wordmark .sub {\n    font-weight: 500;\n    font-size: 0.62rem;\n    letter-spacing: 0.26em;\n    color: var(--text-2);\n  }\n\n  /* Center links with sliding indicator */\n  .nav-links {\n    position: relative;\n    display: flex;\n    align-items: center;\n    gap: 2px;\n    padding: 4px;\n    border-radius: var(--r-pill);\n  }\n  .nav-slider {\n    position: absolute;\n    top: 4px;\n    left: 0;\n    height: calc(100% - 8px);\n    border-radius: var(--r-pill);\n    background:\n      linear-gradient(180deg, rgba(230, 192, 122, 0.22), rgba(201, 154, 78, 0.12));\n    border: 1px solid rgba(230, 192, 122, 0.35);\n    box-shadow: 0 6px 18px -8px rgba(230, 192, 122, 0.4);\n    opacity: 0;\n    transform: translateX(0);\n    transition:\n      transform var(--t-slow) var(--ease),\n      width var(--t-slow) var(--ease),\n      opacity var(--t-mid) var(--ease);\n    pointer-events: none;\n    z-index: 0;\n  }\n  .nav-links a {\n    position: relative;\n    z-index: 1;\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 500;\n    font-size: 0.9rem;\n    color: var(--text-2);\n    padding: 10px 16px;\n    border-radius: var(--r-pill);\n    white-space: nowrap;\n    transition: color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);\n  }\n  .nav-links a:hover,\n  .nav-links a[aria-current=\"page\"] { color: var(--text); }\n  .nav-links a:active { transform: scale(0.97); }\n\n  /* Right cluster */\n  .nav-right { display: flex; align-items: center; gap: 8px; }\n\n  .cta {\n    position: relative;\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    min-height: 44px;\n    padding: 11px 20px;\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    font-size: 0.9rem;\n    color: #2a0f14;\n    background: linear-gradient(180deg, var(--gold), var(--gold-2));\n    border: 1px solid rgba(255, 240, 215, 0.4);\n    border-radius: var(--r-pill);\n    box-shadow:\n      0 1px 0 rgba(255, 255, 255, 0.5) inset,\n      0 10px 24px -12px rgba(230, 192, 122, 0.6);\n    cursor: pointer;\n    will-change: transform;\n    transition: transform var(--t-fast) var(--ease), box-shadow var(--t-mid) var(--ease);\n  }\n  .cta:hover {\n    box-shadow:\n      0 1px 0 rgba(255, 255, 255, 0.6) inset,\n      0 16px 30px -12px rgba(230, 192, 122, 0.75);\n  }\n  .cta:active { transform: scale(0.97); }\n  .cta .arrow { transition: transform var(--t-mid) var(--ease); }\n  .cta:hover .arrow { transform: translateX(3px); }\n\n  /* Mobile trigger */\n  .menu-trigger {\n    display: none;\n    align-items: center;\n    justify-content: center;\n    width: 44px;\n    height: 44px;\n    border: 1px solid var(--line);\n    border-radius: 14px;\n    background: var(--panel);\n    color: var(--text);\n    cursor: pointer;\n    transition: transform var(--t-fast) var(--ease), border-color var(--t-mid) var(--ease);\n  }\n  .menu-trigger:hover { transform: translateY(-1px); border-color: rgba(230,192,122,0.35); }\n  .menu-trigger svg { width: 20px; height: 20px; }\n\n  /* ============================================================\n     MOBILE MENU (overlay)\n     ============================================================ */\n  .mobile-menu {\n    position: fixed;\n    inset: 0;\n    z-index: 150;\n    display: none;\n    padding: 16px;\n  }\n  .mobile-menu.open { display: block; }\n  .mobile-backdrop {\n    position: absolute;\n    inset: 0;\n    background: rgba(12, 4, 7, 0.6);\n    -webkit-backdrop-filter: blur(6px);\n    backdrop-filter: blur(6px);\n    opacity: 0;\n    transition: opacity var(--t-mid) var(--ease);\n  }\n  .mobile-menu.open .mobile-backdrop { opacity: 1; }\n  .mobile-panel {\n    position: relative;\n    margin: 8px auto 0;\n    width: min(440px, 100%);\n    border: 1px solid var(--line);\n    border-radius: var(--r-2xl);\n    background:\n      linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02)),\n      rgba(26, 10, 14, 0.82);\n    -webkit-backdrop-filter: blur(20px) saturate(140%);\n    backdrop-filter: blur(20px) saturate(140%);\n    box-shadow: var(--shadow-island);\n    padding: 16px;\n    transform: translateY(-10px);\n    opacity: 0;\n    transition: transform var(--t-slow) var(--ease), opacity var(--t-mid) var(--ease);\n  }\n  .mobile-menu.open .mobile-panel { transform: translateY(0); opacity: 1; }\n  .mobile-head {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 4px 4px 14px;\n    border-bottom: 1px solid var(--line);\n    margin-bottom: 10px;\n  }\n  .mobile-close {\n    width: 44px; height: 44px;\n    display: inline-flex; align-items: center; justify-content: center;\n    border: 1px solid var(--line);\n    border-radius: 12px;\n    background: var(--panel);\n    color: var(--text);\n    cursor: pointer;\n    transition: transform var(--t-fast) var(--ease), border-color var(--t-mid) var(--ease);\n  }\n  .mobile-close:hover { transform: rotate(90deg); border-color: rgba(230,192,122,0.35); }\n  .mobile-close svg { width: 18px; height: 18px; }\n  .mobile-links { display: flex; flex-direction: column; gap: 4px; }\n  .mobile-links a {\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 500;\n    font-size: 1.05rem;\n    color: var(--text);\n    padding: 14px 16px;\n    min-height: 44px;\n    display: flex;\n    align-items: center;\n    border-radius: var(--r-lg);\n    transition: background var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);\n  }\n  .mobile-links a:hover { background: var(--panel); transform: translateX(2px); }\n  .mobile-links a[aria-current=\"page\"] { color: var(--gold); }\n  .mobile-cta { margin-top: 14px; width: 100%; justify-content: center; }\n\n  /* ============================================================\n     PAGE CONTENT\n     ============================================================ */\n  main { padding-top: calc(var(--nav-h) + 64px); }\n\n  .container { width: min(1120px, 100%); margin: 0 auto; padding: 0 24px; }\n\n  /* Hero */\n  .hero { position: relative; padding: 40px 0 72px; }\n  .hero-glow {\n    position: absolute;\n    top: -120px;\n    left: 50%;\n    transform: translateX(-50%);\n    width: min(900px, 90%);\n    height: 520px;\n    background:\n      radial-gradient(closest-side, rgba(230, 192, 122, 0.18), transparent 70%),\n      radial-gradient(closest-side at 30% 60%, rgba(123, 23, 42, 0.45), transparent 70%);\n    filter: blur(20px);\n    pointer-events: none;\n    z-index: -1;\n  }\n  .eyebrow {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 500;\n    font-size: 0.74rem;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--gold);\n    padding: 8px 16px;\n    border: 1px solid var(--line);\n    border-radius: var(--r-pill);\n    background: var(--panel);\n    -webkit-backdrop-filter: blur(8px);\n    backdrop-filter: blur(8px);\n  }\n  .hero h1 {\n    font-family: \"Fraunces\", Georgia, serif;\n    font-weight: 400;\n    font-size: clamp(2.6rem, 7vw, 5rem);\n    line-height: 1.04;\n    letter-spacing: -0.01em;\n    margin: 24px 0 0;\n    max-width: 16ch;\n  }\n  .hero h1 em {\n    font-style: italic;\n    color: var(--gold);\n  }\n  .hero p.lead {\n    margin: 22px 0 0;\n    max-width: 56ch;\n    font-size: 1.12rem;\n    color: var(--text-2);\n  }\n  .hero-actions { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 32px; }\n  .btn-ghost {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    min-height: 44px;\n    padding: 12px 22px;\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    font-size: 0.92rem;\n    color: var(--text);\n    border: 1px solid var(--line);\n    border-radius: var(--r-pill);\n    background: var(--panel);\n    -webkit-backdrop-filter: blur(8px);\n    backdrop-filter: blur(8px);\n    cursor: pointer;\n    transition: transform var(--t-fast) var(--ease), border-color var(--t-mid) var(--ease), background var(--t-mid) var(--ease);\n  }\n  .btn-ghost:hover { transform: translateY(-2px); border-color: rgba(230,192,122,0.4); background: rgba(255,255,255,0.08); }\n  .btn-ghost:active { transform: scale(0.98); }\n\n  /* Media placeholder */\n  .media {\n    position: relative;\n    margin-top: 56px;\n    aspect-ratio: 16 / 8;\n    width: 100%;\n    border-radius: var(--r-2xl);\n    border: 1px solid var(--line);\n    background:\n      repeating-linear-gradient(135deg, rgba(255,255,255,0.03) 0 14px, rgba(255,255,255,0.01) 14px 28px),\n      linear-gradient(180deg, rgba(123, 23, 42, 0.28), rgba(26, 10, 14, 0.5));\n    box-shadow: var(--shadow-card);\n    overflow: hidden;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n  .media .tag {\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 500;\n    font-size: 0.78rem;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--text-2);\n    border: 1px dashed var(--line);\n    border-radius: var(--r-pill);\n    padding: 10px 18px;\n    background: rgba(0,0,0,0.25);\n  }\n\n  /* Bento section */\n  .section { padding: 88px 0; }\n  .section-head { max-width: 60ch; }\n  .section-head h2 {\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    font-size: clamp(1.8rem, 4vw, 2.6rem);\n    line-height: 1.12;\n    letter-spacing: -0.01em;\n    margin: 14px 0 0;\n  }\n  .section-head p { color: var(--text-2); margin: 16px 0 0; font-size: 1.05rem; }\n\n  .bento {\n    margin-top: 44px;\n    display: grid;\n    grid-template-columns: repeat(6, 1fr);\n    gap: 18px;\n  }\n  .card {\n    position: relative;\n    border: 1px solid var(--line);\n    border-radius: var(--r-2xl);\n    background:\n      linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)),\n      rgba(26, 10, 14, 0.4);\n    -webkit-backdrop-filter: blur(10px);\n    backdrop-filter: blur(10px);\n    box-shadow: var(--shadow-card);\n    padding: 28px;\n    overflow: hidden;\n    transition: transform var(--t-mid) var(--ease), border-color var(--t-mid) var(--ease), box-shadow var(--t-mid) var(--ease);\n  }\n  .card::after {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background: radial-gradient(420px 200px at 100% 0%, rgba(230,192,122,0.12), transparent 60%);\n    opacity: 0;\n    transition: opacity var(--t-slow) var(--ease);\n    pointer-events: none;\n  }\n  .card:hover {\n    transform: translateY(-4px);\n    border-color: rgba(230, 192, 122, 0.3);\n    box-shadow:\n      0 1px 0 rgba(255,255,255,0.05) inset,\n      0 26px 50px -26px rgba(0,0,0,0.75);\n  }\n  .card:hover::after { opacity: 1; }\n  .card .num {\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 700;\n    font-size: 0.8rem;\n    color: var(--gold);\n    letter-spacing: 0.06em;\n  }\n  .card h3 {\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    font-size: 1.3rem;\n    margin: 14px 0 0;\n  }\n  .card p { color: var(--text-2); margin: 12px 0 0; font-size: 0.98rem; }\n  .card .thumb {\n    margin-top: 22px;\n    aspect-ratio: 4 / 3;\n    border-radius: var(--r-lg);\n    border: 1px solid var(--line);\n    background:\n      repeating-linear-gradient(135deg, rgba(255,255,255,0.03) 0 12px, rgba(255,255,255,0.008) 12px 24px),\n      linear-gradient(180deg, rgba(123,23,42,0.22), rgba(26,10,14,0.4));\n    display: flex; align-items: center; justify-content: center;\n    font-family: \"Space Grotesk\", sans-serif;\n    font-size: 0.66rem; letter-spacing: 0.16em; text-transform: uppercase;\n    color: var(--text-2);\n  }\n  .card.lg { grid-column: span 4; }\n  .card.sm { grid-column: span 2; }\n  .card.md { grid-column: span 3; }\n\n  /* Footer */\n  footer {\n    border-top: 1px solid var(--line);\n    padding: 56px 0 72px;\n    margin-top: 40px;\n  }\n  .foot-grid {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 24px;\n    justify-content: space-between;\n    align-items: center;\n  }\n  footer .wordmark { padding-left: 0; }\n  footer small { color: var(--text-2); }\n\n  /* ============================================================\n     RESPONSIVE\n     ============================================================ */\n  @media (max-width: 860px) {\n    .nav-links, .nav-right .cta { display: none; }\n    .menu-trigger { display: inline-flex; }\n    .island { padding: 0 12px 0 18px; }\n  }\n\n  @media (max-width: 760px) {\n    .bento { grid-template-columns: repeat(2, 1fr); }\n    .card.lg, .card.sm, .card.md { grid-column: span 2; }\n  }\n\n  @media (max-width: 420px) {\n    .container { padding: 0 16px; }\n    .wordmark .sub { display: none; }\n  }\n\n  /* ============================================================\n     REDUCED MOTION\n     ============================================================ */\n  @media (prefers-reduced-motion: reduce) {\n    html { scroll-behavior: auto; }\n    *, *::before, *::after {\n      transition-duration: 0.01ms !important;\n      animation-duration: 0.01ms !important;\n      animation-iteration-count: 1 !important;\n    }\n    .nav-slider { transition: none; }\n  }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n  \u003ca class=\"skip-link\" href=\"#main\">Zum Inhalt springen\u003c/a>\n\n  \u003c!-- ===================== NAV M1 GLASS ISLAND ===================== -->\n  \u003cheader>\n    \u003cdiv class=\"nav-wrap\" id=\"navWrap\">\n      \u003cnav class=\"island\" aria-label=\"Hauptnavigation\">\n        \u003ca class=\"wordmark\" href=\"#main\" aria-label=\"Maison Aurelie, Startseite\">\n          \u003cspan class=\"dot\" aria-hidden=\"true\">\u003c/span>\n          MAISON AURELIE\n          \u003cspan class=\"sub\">DUESSELDORF\u003c/span>\n        \u003c/a>\n\n        \u003cdiv class=\"nav-links\" id=\"navLinks\">\n          \u003cspan class=\"nav-slider\" id=\"navSlider\" aria-hidden=\"true\">\u003c/span>\n          \u003ca href=\"#kollektion\" aria-current=\"page\">Kollektion\u003c/a>\n          \u003ca href=\"#atelier\">Atelier\u003c/a>\n          \u003ca href=\"#trauringe\">Trauringe\u003c/a>\n          \u003ca href=\"#kontakt\">Kontakt\u003c/a>\n        \u003c/div>\n\n        \u003cdiv class=\"nav-right\">\n          \u003ca class=\"cta\" id=\"ctaMagnet\" href=\"#kontakt\">\n            Termin\n            \u003cspan class=\"arrow\" aria-hidden=\"true\">&rarr;\u003c/span>\n          \u003c/a>\n          \u003cbutton class=\"menu-trigger\" id=\"menuTrigger\" aria-expanded=\"false\" aria-controls=\"mobileMenu\" aria-label=\"Menue oeffnen\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" aria-hidden=\"true\">\n              \u003cpath d=\"M4 7h16M4 12h16M4 17h16\" />\n            \u003c/svg>\n          \u003c/button>\n        \u003c/div>\n      \u003c/nav>\n    \u003c/div>\n  \u003c/header>\n\n  \u003c!-- ===================== MOBILE MENU ===================== -->\n  \u003cdiv class=\"mobile-menu\" id=\"mobileMenu\" role=\"dialog\" aria-modal=\"true\" aria-label=\"Navigationsmenue\">\n    \u003cdiv class=\"mobile-backdrop\" id=\"mobileBackdrop\">\u003c/div>\n    \u003cdiv class=\"mobile-panel\">\n      \u003cdiv class=\"mobile-head\">\n        \u003cspan class=\"wordmark\" style=\"padding-left:0\">\n          \u003cspan class=\"dot\" aria-hidden=\"true\">\u003c/span> MAISON AURELIE\n        \u003c/span>\n        \u003cbutton class=\"mobile-close\" id=\"mobileClose\" aria-label=\"Menue schliessen\">\n          \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" aria-hidden=\"true\">\n            \u003cpath d=\"M6 6l12 12M18 6L6 18\" />\n          \u003c/svg>\n        \u003c/button>\n      \u003c/div>\n      \u003cdiv class=\"mobile-links\">\n        \u003ca href=\"#kollektion\" aria-current=\"page\">Kollektion\u003c/a>\n        \u003ca href=\"#atelier\">Atelier\u003c/a>\n        \u003ca href=\"#trauringe\">Trauringe\u003c/a>\n        \u003ca href=\"#kontakt\">Kontakt\u003c/a>\n      \u003c/div>\n      \u003ca class=\"cta mobile-cta\" href=\"#kontakt\">\n        Termin vereinbaren \u003cspan class=\"arrow\" aria-hidden=\"true\">&rarr;\u003c/span>\n      \u003c/a>\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- ===================== PAGE ===================== -->\n  \u003cmain id=\"main\">\n    \u003csection class=\"hero container\" id=\"kollektion\">\n      \u003cdiv class=\"hero-glow\" aria-hidden=\"true\">\u003c/div>\n      \u003cspan class=\"eyebrow\">\u003cspan class=\"dot\" style=\"width:6px;height:6px;border-radius:50%;background:var(--gold);display:inline-block\" aria-hidden=\"true\">\u003c/span> Feine Juwelierkunst seit 1962\u003c/span>\n      \u003ch1>Schmuck, der eine \u003cem>Geschichte\u003c/em> in sich traegt.\u003c/h1>\n      \u003cp class=\"lead\">In unserem Duesseldorfer Atelier verbinden wir traditionelle Goldschmiedekunst mit zeitgenoessischem Design. Jedes Stueck entsteht von Hand, mit Sorgfalt fuer das Detail.\u003c/p>\n      \u003cdiv class=\"hero-actions\">\n        \u003ca class=\"cta\" href=\"#kontakt\">Beratung buchen \u003cspan class=\"arrow\" aria-hidden=\"true\">&rarr;\u003c/span>\u003c/a>\n        \u003ca class=\"btn-ghost\" href=\"#kollektion\">Kollektion ansehen\u003c/a>\n      \u003c/div>\n\n      \u003cdiv class=\"media\" role=\"img\" aria-label=\"Platzhalter fuer Atelier-Aufnahme\">\n        \u003cspan class=\"tag\">Bild-Platzhalter &middot; 16:8\u003c/span>\n      \u003c/div>\n    \u003c/section>\n\n    \u003csection class=\"section container\" id=\"atelier\">\n      \u003cdiv class=\"section-head\">\n        \u003cspan class=\"eyebrow\">Unsere Welt\u003c/span>\n        \u003ch2>Vier Wege zu Ihrem Lieblingsstueck.\u003c/h2>\n        \u003cp>Von der ersten Skizze bis zur fertigen Fassung begleiten wir Sie persoenlich. Entdecken Sie, was Maison Aurelie auszeichnet.\u003c/p>\n      \u003c/div>\n\n      \u003cdiv class=\"bento\">\n        \u003carticle class=\"card lg\">\n          \u003cspan class=\"num\">01\u003c/span>\n          \u003ch3>Massanfertigung\u003c/h3>\n          \u003cp>Ein Entwurf, der ganz Ihnen gehoert. Gemeinsam entwickeln wir ein Schmuckstueck, das zu Ihrer Geschichte passt, gefertigt in unserer Werkstatt am Rhein.\u003c/p>\n          \u003cdiv class=\"thumb\">Bild-Platzhalter\u003c/div>\n        \u003c/article>\n\n        \u003carticle class=\"card sm\" id=\"trauringe\">\n          \u003cspan class=\"num\">02\u003c/span>\n          \u003ch3>Trauringe\u003c/h3>\n          \u003cp>Zeitlose Paare in Gelb-, Weiss- und Rosegold.\u003c/p>\n          \u003cdiv class=\"thumb\">Bild-Platzhalter\u003c/div>\n        \u003c/article>\n\n        \u003carticle class=\"card md\">\n          \u003cspan class=\"num\">03\u003c/span>\n          \u003ch3>Edelsteine\u003c/h3>\n          \u003cp>Sorgfaeltig ausgewaehlte, zertifizierte Steine mit Charakter und Brillanz.\u003c/p>\n          \u003cdiv class=\"thumb\">Bild-Platzhalter\u003c/div>\n        \u003c/article>\n\n        \u003carticle class=\"card md\">\n          \u003cspan class=\"num\">04\u003c/span>\n          \u003ch3>Restauration\u003c/h3>\n          \u003cp>Wir bringen Erbstuecke behutsam zu neuem Glanz und bewahren ihre Seele.\u003c/p>\n          \u003cdiv class=\"thumb\">Bild-Platzhalter\u003c/div>\n        \u003c/article>\n      \u003c/div>\n    \u003c/section>\n\n    \u003cfooter id=\"kontakt\">\n      \u003cdiv class=\"container foot-grid\">\n        \u003cspan class=\"wordmark\">\u003cspan class=\"dot\" aria-hidden=\"true\">\u003c/span> MAISON AURELIE \u003cspan class=\"sub\">DUESSELDORF\u003c/span>\u003c/span>\n        \u003csmall>Koenigsallee 1, 40212 Duesseldorf &middot; Termine nach Vereinbarung &middot; 2026\u003c/small>\n      \u003c/div>\n    \u003c/footer>\n  \u003c/main>\n\n  \u003cscript>\n    (function () {\n      \"use strict\";\n      var reduceMotion = window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n\n      /* ---------- Scroll: island shrinks & moves to edge ---------- */\n      var navWrap = document.getElementById(\"navWrap\");\n      function onScroll() {\n        if (window.scrollY > 24) navWrap.classList.add(\"scrolled\");\n        else navWrap.classList.remove(\"scrolled\");\n      }\n      onScroll();\n      window.addEventListener(\"scroll\", onScroll, { passive: true });\n\n      /* ---------- Sliding active/hover indicator ---------- */\n      var navLinks = document.getElementById(\"navLinks\");\n      var slider = document.getElementById(\"navSlider\");\n      var links = Array.prototype.slice.call(navLinks.querySelectorAll(\"a\"));\n\n      function moveSlider(el) {\n        if (!el) return;\n        slider.style.opacity = \"1\";\n        slider.style.width = el.offsetWidth + \"px\";\n        slider.style.transform = \"translateX(\" + el.offsetLeft + \"px)\";\n      }\n      function resetSlider() {\n        var active = navLinks.querySelector('a[aria-current=\"page\"]');\n        if (active) moveSlider(active);\n        else slider.style.opacity = \"0\";\n      }\n\n      links.forEach(function (a) {\n        a.addEventListener(\"mouseenter\", function () { moveSlider(a); });\n        a.addEventListener(\"focus\", function () { moveSlider(a); });\n      });\n      navLinks.addEventListener(\"mouseleave\", resetSlider);\n      navLinks.addEventListener(\"focusout\", function (e) {\n        if (!navLinks.contains(e.relatedTarget)) resetSlider();\n      });\n      window.addEventListener(\"load\", resetSlider);\n      window.addEventListener(\"resize\", resetSlider);\n      resetSlider();\n\n      /* ---------- Magnetic CTA (max 6px) ---------- */\n      var cta = document.getElementById(\"ctaMagnet\");\n      if (cta && !reduceMotion) {\n        cta.addEventListener(\"mousemove\", function (e) {\n          var r = cta.getBoundingClientRect();\n          var x = (e.clientX - r.left - r.width / 2) / (r.width / 2);\n          var y = (e.clientY - r.top - r.height / 2) / (r.height / 2);\n          cta.style.transform = \"translate(\" + (x * 6) + \"px,\" + (y * 6) + \"px)\";\n        });\n        cta.addEventListener(\"mouseleave\", function () {\n          cta.style.transform = \"translate(0,0)\";\n        });\n      }\n\n      /* ---------- Mobile menu with focus trap ---------- */\n      var trigger = document.getElementById(\"menuTrigger\");\n      var menu = document.getElementById(\"mobileMenu\");\n      var backdrop = document.getElementById(\"mobileBackdrop\");\n      var closeBtn = document.getElementById(\"mobileClose\");\n      var lastFocused = null;\n\n      function focusables() {\n        return Array.prototype.slice.call(\n          menu.querySelectorAll('a[href], button:not([disabled])')\n        ).filter(function (el) { return el.offsetParent !== null; });\n      }\n\n      function openMenu() {\n        lastFocused = document.activeElement;\n        menu.classList.add(\"open\");\n        trigger.setAttribute(\"aria-expanded\", \"true\");\n        document.body.style.overflow = \"hidden\";\n        var f = focusables();\n        if (f.length) f[0].focus();\n        document.addEventListener(\"keydown\", onKeydown);\n      }\n      function closeMenu() {\n        menu.classList.remove(\"open\");\n        trigger.setAttribute(\"aria-expanded\", \"false\");\n        document.body.style.overflow = \"\";\n        document.removeEventListener(\"keydown\", onKeydown);\n        if (lastFocused) lastFocused.focus();\n      }\n      function onKeydown(e) {\n        if (e.key === \"Escape\") { closeMenu(); return; }\n        if (e.key === \"Tab\") {\n          var f = focusables();\n          if (!f.length) return;\n          var first = f[0], last = f[f.length - 1];\n          if (e.shiftKey && document.activeElement === first) {\n            e.preventDefault(); last.focus();\n          } else if (!e.shiftKey && document.activeElement === last) {\n            e.preventDefault(); first.focus();\n          }\n        }\n      }\n\n      trigger.addEventListener(\"click\", openMenu);\n      closeBtn.addEventListener(\"click\", closeMenu);\n      backdrop.addEventListener(\"click\", closeMenu);\n      menu.querySelectorAll(\".mobile-links a, .mobile-cta\").forEach(function (a) {\n        a.addEventListener(\"click\", closeMenu);\n      });\n    })();\n  \u003c/script>\n\u003c/body>\n\u003c/html>\n"},
  {name:"Segmented Control", desc:"Links in einem iOS-artigen Segmented-Control, das Highlight gleitet weich mit.", file:"m2-segmented.html", html:"\u003c!DOCTYPE html>\n\u003chtml lang=\"de\">\n\u003c!--\n  ============================================================================\n  MAISON AURELIE - Duesseldorf | Juwelier\n  Konzept: \"Bordeaux & Gold\" - MODERNE Ausfuehrung 2025\n  Navbar-Konzept M2: \"Segmented Control\"\n  ----------------------------------------------------------------------------\n  - Wordmark links, Segmented-Control mittig (gleitendes Highlight), CTA rechts\n  - Frosted-Glass, 2xl/Pill-Rundungen, weiche mehrlagige Schatten\n  - Uebergaenge 180-260ms cubic-bezier(0.22,1,0.36,1), Micro-Interactions\n  - Magnetischer CTA (\u003c=6px), dezente Goldakzente\n  - A11y: Skip-Link, semantische Landmarks, Mobile-Menue mit Fokus-Trap (ESC),\n    :focus-visible, Touch >=44px, Kontrast >=4.5:1, reduced-motion, 320px safe\n  - Standalone & offline lauffaehig (nur Google-Fonts via \u003clink>)\n  - PROD: next/font lokal statt Google-Fonts-\u003clink>\n  ============================================================================\n-->\n\u003chead>\n\u003cmeta charset=\"UTF-8\" />\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n\u003ctitle>MAISON AURELIE - Juwelier in Duesseldorf\u003c/title>\n\u003cmeta name=\"description\" content=\"MAISON AURELIE - Feine Juwelierkunst aus Duesseldorf. Bordeaux und Gold, modern interpretiert.\" />\n\n\u003c!-- PROD: next/font lokal statt Google-Fonts-\u003clink> -->\n\u003clink rel=\"preconnect\" href=\"https://fonts.googleapis.com\" />\n\u003clink rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin />\n\u003clink href=\"https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap\" rel=\"stylesheet\" />\n\n\u003cstyle>\n  :root {\n    --bg: #1A0A0E;\n    --bg2: #240D13;\n    --panel: rgba(255, 255, 255, 0.05);\n    --text: #F6ECE6;\n    --text-2: #C9A7AD;\n    --gold: #E6C07A;\n    --gold-2: #C99A4E;\n    --line: rgba(255, 220, 190, 0.12);\n\n    --ease: cubic-bezier(0.22, 1, 0.36, 1);\n    --t-fast: 180ms var(--ease);\n    --t-med: 220ms var(--ease);\n    --t-slow: 260ms var(--ease);\n\n    --r-pill: 999px;\n    --r-2xl: 28px;\n    --r-xl: 20px;\n    --r-lg: 16px;\n\n    --shadow-soft:\n      0 1px 2px rgba(0, 0, 0, 0.25),\n      0 8px 24px rgba(0, 0, 0, 0.28),\n      0 24px 60px rgba(0, 0, 0, 0.30);\n    --shadow-gold:\n      0 8px 30px rgba(230, 192, 122, 0.16),\n      0 2px 8px rgba(201, 154, 78, 0.22);\n\n    --maxw: 1180px;\n  }\n\n  *, *::before, *::after { box-sizing: border-box; }\n\n  html { scroll-behavior: smooth; }\n\n  body {\n    margin: 0;\n    background:\n      radial-gradient(1200px 700px at 80% -10%, rgba(230, 192, 122, 0.08), transparent 60%),\n      radial-gradient(900px 600px at -10% 10%, rgba(201, 154, 78, 0.06), transparent 55%),\n      linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);\n    background-attachment: fixed;\n    color: var(--text);\n    font-family: \"Inter\", system-ui, -apple-system, sans-serif;\n    font-size: 16px;\n    line-height: 1.65;\n    -webkit-font-smoothing: antialiased;\n    min-height: 100vh;\n    overflow-x: hidden;\n  }\n\n  a { color: inherit; text-decoration: none; }\n\n  /* ---------- Skip-Link ---------- */\n  .skip-link {\n    position: absolute;\n    left: 16px;\n    top: -120px;\n    z-index: 200;\n    background: var(--gold);\n    color: #2a1206;\n    padding: 12px 20px;\n    border-radius: var(--r-pill);\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    font-size: 0.95rem;\n    box-shadow: var(--shadow-soft);\n    transition: top var(--t-med);\n  }\n  .skip-link:focus { top: 16px; }\n\n  :focus-visible {\n    outline: 2px solid var(--gold);\n    outline-offset: 3px;\n    border-radius: 8px;\n  }\n\n  /* ============================================================\n     HEADER / NAVBAR (Segmented Control)\n     ============================================================ */\n  .site-header {\n    position: sticky;\n    top: 0;\n    z-index: 100;\n    padding: 14px 20px;\n  }\n\n  .nav-shell {\n    max-width: var(--maxw);\n    margin: 0 auto;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 16px;\n    padding: 10px 12px 10px 20px;\n    border-radius: var(--r-pill);\n    border: 1px solid var(--line);\n    background: rgba(36, 13, 19, 0.55);\n    backdrop-filter: blur(18px) saturate(140%);\n    -webkit-backdrop-filter: blur(18px) saturate(140%);\n    box-shadow: var(--shadow-soft);\n  }\n\n  /* Wordmark */\n  .wordmark {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 700;\n    font-size: 1.18rem;\n    letter-spacing: 0.04em;\n    color: var(--text);\n    white-space: nowrap;\n    flex-shrink: 0;\n  }\n  .wordmark .dot {\n    width: 9px;\n    height: 9px;\n    border-radius: 50%;\n    background: linear-gradient(135deg, var(--gold), var(--gold-2));\n    box-shadow: 0 0 14px rgba(230, 192, 122, 0.55);\n  }\n  .wordmark .sub {\n    font-family: \"Inter\", sans-serif;\n    font-weight: 500;\n    font-size: 0.62rem;\n    letter-spacing: 0.28em;\n    color: var(--text-2);\n    text-transform: uppercase;\n  }\n\n  /* ---------- Segmented Control ---------- */\n  .segmented {\n    position: relative;\n    display: flex;\n    align-items: center;\n    gap: 2px;\n    padding: 5px;\n    border-radius: var(--r-pill);\n    background: rgba(255, 255, 255, 0.04);\n    border: 1px solid var(--line);\n    box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.25);\n  }\n\n  /* Gleitendes Highlight */\n  .seg-highlight {\n    position: absolute;\n    top: 5px;\n    left: 0;\n    height: calc(100% - 10px);\n    border-radius: var(--r-pill);\n    background: linear-gradient(180deg, rgba(230, 192, 122, 0.22), rgba(201, 154, 78, 0.16));\n    border: 1px solid rgba(230, 192, 122, 0.35);\n    box-shadow:\n      0 4px 16px rgba(230, 192, 122, 0.18),\n      inset 0 1px 0 rgba(255, 255, 255, 0.12);\n    transform: translateX(0);\n    width: 0;\n    opacity: 0;\n    transition:\n      transform var(--t-slow),\n      width var(--t-slow),\n      opacity var(--t-fast);\n    pointer-events: none;\n    z-index: 0;\n  }\n  .segmented.is-ready .seg-highlight { opacity: 1; }\n\n  .seg-link {\n    position: relative;\n    z-index: 1;\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    min-height: 44px;\n    padding: 0 20px;\n    border-radius: var(--r-pill);\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 500;\n    font-size: 0.95rem;\n    letter-spacing: 0.01em;\n    color: var(--text-2);\n    white-space: nowrap;\n    transition: color var(--t-med);\n  }\n  .seg-link:hover { color: var(--text); }\n  .seg-link[aria-current=\"page\"] { color: var(--text); font-weight: 600; }\n\n  /* ---------- CTA (magnetisch) ---------- */\n  .nav-actions {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    flex-shrink: 0;\n  }\n\n  .cta {\n    position: relative;\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    gap: 8px;\n    min-height: 44px;\n    padding: 0 22px;\n    border-radius: var(--r-pill);\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    font-size: 0.95rem;\n    color: #2a1206;\n    background: linear-gradient(135deg, var(--gold), var(--gold-2));\n    border: none;\n    cursor: pointer;\n    white-space: nowrap;\n    box-shadow: var(--shadow-gold);\n    transition: transform var(--t-fast), box-shadow var(--t-med), filter var(--t-fast);\n    will-change: transform;\n  }\n  .cta:hover { filter: brightness(1.05); box-shadow: 0 12px 36px rgba(230, 192, 122, 0.28), 0 2px 8px rgba(201, 154, 78, 0.30); }\n  .cta:active { transform: scale(0.97); }\n  .cta .arrow { transition: transform var(--t-med); }\n  .cta:hover .arrow { transform: translateX(3px); }\n\n  /* ---------- Burger ---------- */\n  .burger {\n    display: none;\n    align-items: center;\n    justify-content: center;\n    width: 44px;\n    height: 44px;\n    border-radius: 50%;\n    background: rgba(255, 255, 255, 0.05);\n    border: 1px solid var(--line);\n    cursor: pointer;\n    color: var(--text);\n    transition: background var(--t-fast), transform var(--t-fast);\n  }\n  .burger:hover { background: rgba(255, 255, 255, 0.09); }\n  .burger:active { transform: scale(0.94); }\n  .burger svg { width: 22px; height: 22px; }\n\n  /* ============================================================\n     MOBILE MENU\n     ============================================================ */\n  .mobile-overlay {\n    position: fixed;\n    inset: 0;\n    z-index: 150;\n    background: rgba(10, 4, 6, 0.6);\n    backdrop-filter: blur(6px);\n    -webkit-backdrop-filter: blur(6px);\n    opacity: 0;\n    visibility: hidden;\n    transition: opacity var(--t-med), visibility var(--t-med);\n  }\n  .mobile-overlay.is-open { opacity: 1; visibility: visible; }\n\n  .mobile-panel {\n    position: fixed;\n    top: 0;\n    right: 0;\n    z-index: 160;\n    height: 100%;\n    width: min(86vw, 360px);\n    padding: 22px 22px 32px;\n    background: linear-gradient(180deg, rgba(36, 13, 19, 0.96), rgba(26, 10, 14, 0.98));\n    backdrop-filter: blur(20px);\n    -webkit-backdrop-filter: blur(20px);\n    border-left: 1px solid var(--line);\n    box-shadow: -20px 0 60px rgba(0, 0, 0, 0.45);\n    transform: translateX(100%);\n    transition: transform var(--t-slow);\n    display: flex;\n    flex-direction: column;\n    gap: 8px;\n  }\n  .mobile-overlay.is-open .mobile-panel { transform: translateX(0); }\n\n  .mobile-head {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    margin-bottom: 14px;\n  }\n  .mobile-head .wordmark { font-size: 1.05rem; }\n\n  .mobile-close {\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    width: 44px;\n    height: 44px;\n    border-radius: 50%;\n    background: rgba(255, 255, 255, 0.05);\n    border: 1px solid var(--line);\n    color: var(--text);\n    cursor: pointer;\n    transition: background var(--t-fast), transform var(--t-fast);\n  }\n  .mobile-close:hover { background: rgba(255, 255, 255, 0.1); }\n  .mobile-close:active { transform: scale(0.94); }\n  .mobile-close svg { width: 20px; height: 20px; }\n\n  .mobile-link {\n    display: flex;\n    align-items: center;\n    min-height: 52px;\n    padding: 0 18px;\n    border-radius: var(--r-lg);\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 500;\n    font-size: 1.08rem;\n    color: var(--text);\n    border: 1px solid transparent;\n    transition: background var(--t-fast), border-color var(--t-fast), transform var(--t-fast);\n  }\n  .mobile-link:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--line); }\n  .mobile-link[aria-current=\"page\"] { color: var(--gold); }\n\n  .mobile-cta {\n    margin-top: 12px;\n    width: 100%;\n    min-height: 52px;\n  }\n\n  /* ============================================================\n     MAIN / HERO\n     ============================================================ */\n  main { display: block; }\n\n  .hero {\n    position: relative;\n    max-width: var(--maxw);\n    margin: 0 auto;\n    padding: clamp(56px, 9vw, 120px) 20px clamp(40px, 6vw, 80px);\n    text-align: center;\n    overflow: hidden;\n  }\n  .hero::before {\n    content: \"\";\n    position: absolute;\n    top: -10%;\n    left: 50%;\n    transform: translateX(-50%);\n    width: min(680px, 90vw);\n    height: 520px;\n    background: radial-gradient(circle, rgba(230, 192, 122, 0.18), transparent 65%);\n    filter: blur(20px);\n    pointer-events: none;\n    z-index: 0;\n  }\n  .hero > * { position: relative; z-index: 1; }\n\n  .eyebrow {\n    display: inline-flex;\n    align-items: center;\n    gap: 9px;\n    padding: 8px 16px;\n    border-radius: var(--r-pill);\n    border: 1px solid var(--line);\n    background: var(--panel);\n    font-family: \"Space Grotesk\", sans-serif;\n    font-size: 0.78rem;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--gold);\n    margin-bottom: 26px;\n  }\n  .eyebrow .dot {\n    width: 7px; height: 7px; border-radius: 50%;\n    background: var(--gold);\n    box-shadow: 0 0 10px rgba(230, 192, 122, 0.7);\n  }\n\n  .hero h1 {\n    font-family: \"Fraunces\", \"Space Grotesk\", serif;\n    font-weight: 500;\n    font-size: clamp(2.5rem, 7vw, 5rem);\n    line-height: 1.04;\n    letter-spacing: -0.02em;\n    margin: 0 auto 22px;\n    max-width: 14ch;\n  }\n  .hero h1 .accent {\n    font-style: italic;\n    background: linear-gradient(135deg, var(--gold), var(--gold-2));\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n  }\n\n  .hero p {\n    color: var(--text-2);\n    font-size: clamp(1rem, 2vw, 1.18rem);\n    max-width: 56ch;\n    margin: 0 auto 34px;\n  }\n\n  .hero-actions {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 12px;\n    justify-content: center;\n  }\n  .btn-ghost {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    min-height: 50px;\n    padding: 0 26px;\n    border-radius: var(--r-pill);\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 500;\n    font-size: 1rem;\n    color: var(--text);\n    background: var(--panel);\n    border: 1px solid var(--line);\n    cursor: pointer;\n    transition: background var(--t-fast), border-color var(--t-fast), transform var(--t-fast);\n  }\n  .btn-ghost:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(230, 192, 122, 0.3); }\n  .btn-ghost:active { transform: scale(0.98); }\n  .hero-actions .cta { min-height: 50px; padding: 0 28px; }\n\n  /* ---------- Media placeholder ---------- */\n  .media {\n    max-width: var(--maxw);\n    margin: 0 auto;\n    padding: 0 20px clamp(50px, 8vw, 100px);\n  }\n  .media-frame {\n    position: relative;\n    aspect-ratio: 16 / 8;\n    border-radius: var(--r-2xl);\n    border: 1px solid var(--line);\n    background:\n      linear-gradient(135deg, rgba(230, 192, 122, 0.07), rgba(36, 13, 19, 0.5)),\n      repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.018) 0 14px, transparent 14px 28px);\n    box-shadow: var(--shadow-soft);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    overflow: hidden;\n  }\n  .media-frame .label {\n    font-family: \"Space Grotesk\", sans-serif;\n    font-size: 0.82rem;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--text-2);\n    padding: 9px 18px;\n    border-radius: var(--r-pill);\n    border: 1px dashed rgba(230, 192, 122, 0.35);\n    background: rgba(26, 10, 14, 0.5);\n  }\n\n  /* ============================================================\n     BENTO SECTION\n     ============================================================ */\n  .section {\n    max-width: var(--maxw);\n    margin: 0 auto;\n    padding: clamp(30px, 5vw, 60px) 20px clamp(70px, 10vw, 130px);\n  }\n  .section-head { margin-bottom: 36px; max-width: 60ch; }\n  .section-head h2 {\n    font-family: \"Fraunces\", serif;\n    font-weight: 500;\n    font-size: clamp(1.8rem, 4vw, 2.8rem);\n    line-height: 1.1;\n    letter-spacing: -0.01em;\n    margin: 0 0 12px;\n  }\n  .section-head p { color: var(--text-2); font-size: 1.05rem; margin: 0; }\n\n  .bento {\n    display: grid;\n    grid-template-columns: repeat(6, 1fr);\n    gap: 18px;\n  }\n  .card {\n    position: relative;\n    border-radius: var(--r-2xl);\n    border: 1px solid var(--line);\n    background: var(--panel);\n    backdrop-filter: blur(8px);\n    -webkit-backdrop-filter: blur(8px);\n    padding: 30px;\n    box-shadow: var(--shadow-soft);\n    transition: transform var(--t-med), border-color var(--t-med), box-shadow var(--t-med);\n    overflow: hidden;\n  }\n  .card::after {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    border-radius: inherit;\n    background: radial-gradient(420px 200px at 100% 0%, rgba(230, 192, 122, 0.10), transparent 60%);\n    opacity: 0;\n    transition: opacity var(--t-med);\n    pointer-events: none;\n  }\n  .card:hover {\n    transform: translateY(-4px);\n    border-color: rgba(230, 192, 122, 0.28);\n    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.36), var(--shadow-gold);\n  }\n  .card:hover::after { opacity: 1; }\n\n  .card .ic {\n    width: 48px; height: 48px;\n    display: flex; align-items: center; justify-content: center;\n    border-radius: var(--r-lg);\n    background: linear-gradient(135deg, rgba(230, 192, 122, 0.2), rgba(201, 154, 78, 0.12));\n    border: 1px solid rgba(230, 192, 122, 0.3);\n    margin-bottom: 18px;\n    color: var(--gold);\n  }\n  .card .ic svg { width: 24px; height: 24px; }\n  .card h3 {\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    font-size: 1.25rem;\n    margin: 0 0 10px;\n  }\n  .card p { color: var(--text-2); margin: 0; font-size: 0.98rem; }\n\n  .card.wide { grid-column: span 4; }\n  .card.tall { grid-column: span 2; }\n  .card.half { grid-column: span 3; }\n  .card.third { grid-column: span 2; }\n\n  .card.feature {\n    grid-column: span 6;\n    display: flex;\n    flex-wrap: wrap;\n    align-items: center;\n    justify-content: space-between;\n    gap: 24px;\n    background: linear-gradient(135deg, rgba(230, 192, 122, 0.10), rgba(36, 13, 19, 0.4));\n  }\n  .card.feature .ft-text { max-width: 50ch; }\n  .card.feature h3 { font-size: 1.6rem; font-family: \"Fraunces\", serif; font-weight: 500; }\n\n  /* ---------- Footer ---------- */\n  .site-footer {\n    border-top: 1px solid var(--line);\n    padding: 40px 20px;\n  }\n  .footer-inner {\n    max-width: var(--maxw);\n    margin: 0 auto;\n    display: flex;\n    flex-wrap: wrap;\n    align-items: center;\n    justify-content: space-between;\n    gap: 16px;\n    color: var(--text-2);\n    font-size: 0.9rem;\n  }\n\n  /* ============================================================\n     RESPONSIVE\n     ============================================================ */\n  @media (max-width: 860px) {\n    .segmented { display: none; }\n    .nav-actions .cta { display: none; }\n    .burger { display: inline-flex; }\n    .bento { grid-template-columns: repeat(2, 1fr); }\n    .card.wide, .card.tall, .card.half, .card.third, .card.feature { grid-column: span 2; }\n  }\n\n  @media (max-width: 520px) {\n    .nav-shell { padding-left: 16px; }\n    .wordmark .sub { display: none; }\n    .bento { grid-template-columns: 1fr; }\n    .card.wide, .card.tall, .card.half, .card.third, .card.feature { grid-column: span 1; }\n    .card.feature { flex-direction: column; align-items: flex-start; }\n  }\n\n  @media (prefers-reduced-motion: reduce) {\n    *, *::before, *::after {\n      animation: none !important;\n      transition-duration: 0.01ms !important;\n      scroll-behavior: auto !important;\n    }\n    html { scroll-behavior: auto; }\n  }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\n\u003ca class=\"skip-link\" href=\"#main\">Zum Inhalt springen\u003c/a>\n\n\u003cheader class=\"site-header\">\n  \u003cdiv class=\"nav-shell\">\n    \u003ca class=\"wordmark\" href=\"#\" aria-label=\"MAISON AURELIE - Startseite\">\n      \u003cspan class=\"dot\" aria-hidden=\"true\">\u003c/span>\n      MAISON AURELIE\n      \u003cspan class=\"sub\">Duesseldorf\u003c/span>\n    \u003c/a>\n\n    \u003cnav class=\"segmented\" id=\"segmented\" aria-label=\"Hauptnavigation\">\n      \u003cspan class=\"seg-highlight\" aria-hidden=\"true\">\u003c/span>\n      \u003ca class=\"seg-link\" href=\"#kollektion\" aria-current=\"page\">Kollektion\u003c/a>\n      \u003ca class=\"seg-link\" href=\"#atelier\">Atelier\u003c/a>\n      \u003ca class=\"seg-link\" href=\"#service\">Service\u003c/a>\n      \u003ca class=\"seg-link\" href=\"#kontakt\">Kontakt\u003c/a>\n    \u003c/nav>\n\n    \u003cdiv class=\"nav-actions\">\n      \u003cbutton class=\"cta\" type=\"button\">\n        Termin\n        \u003cspan class=\"arrow\" aria-hidden=\"true\">&#8594;\u003c/span>\n      \u003c/button>\n      \u003cbutton class=\"burger\" type=\"button\" id=\"burger\" aria-label=\"Menue oeffnen\" aria-expanded=\"false\" aria-controls=\"mobileMenu\">\n        \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" aria-hidden=\"true\">\n          \u003cline x1=\"4\" y1=\"8\" x2=\"20\" y2=\"8\" />\u003cline x1=\"4\" y1=\"16\" x2=\"20\" y2=\"16\" />\n        \u003c/svg>\n      \u003c/button>\n    \u003c/div>\n  \u003c/div>\n\u003c/header>\n\n\u003c!-- Mobile Menu -->\n\u003cdiv class=\"mobile-overlay\" id=\"mobileMenu\" hidden>\n  \u003cnav class=\"mobile-panel\" role=\"dialog\" aria-modal=\"true\" aria-label=\"Hauptmenue\">\n    \u003cdiv class=\"mobile-head\">\n      \u003cspan class=\"wordmark\">\u003cspan class=\"dot\" aria-hidden=\"true\">\u003c/span>MAISON AURELIE\u003c/span>\n      \u003cbutton class=\"mobile-close\" type=\"button\" id=\"mobileClose\" aria-label=\"Menue schliessen\">\n        \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" aria-hidden=\"true\">\n          \u003cline x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\" />\u003cline x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\" />\n        \u003c/svg>\n      \u003c/button>\n    \u003c/div>\n    \u003ca class=\"mobile-link\" href=\"#kollektion\" aria-current=\"page\">Kollektion\u003c/a>\n    \u003ca class=\"mobile-link\" href=\"#atelier\">Atelier\u003c/a>\n    \u003ca class=\"mobile-link\" href=\"#service\">Service\u003c/a>\n    \u003ca class=\"mobile-link\" href=\"#kontakt\">Kontakt\u003c/a>\n    \u003cbutton class=\"cta mobile-cta\" type=\"button\">\n      Termin vereinbaren\n      \u003cspan class=\"arrow\" aria-hidden=\"true\">&#8594;\u003c/span>\n    \u003c/button>\n  \u003c/nav>\n\u003c/div>\n\n\u003cmain id=\"main\">\n  \u003c!-- HERO -->\n  \u003csection class=\"hero\">\n    \u003cspan class=\"eyebrow\">\u003cspan class=\"dot\" aria-hidden=\"true\">\u003c/span>Bordeaux &amp; Gold &middot; seit 1924\u003c/span>\n    \u003ch1>Schmuck, der \u003cspan class=\"accent\">Geschichten\u003c/span> traegt\u003c/h1>\n    \u003cp>MAISON AURELIE vereint klassische Goldschmiedekunst mit moderner Formensprache. Gefertigt in unserem Atelier mitten in Duesseldorf.\u003c/p>\n    \u003cdiv class=\"hero-actions\">\n      \u003cbutton class=\"cta\" type=\"button\">Termin vereinbaren \u003cspan class=\"arrow\" aria-hidden=\"true\">&#8594;\u003c/span>\u003c/button>\n      \u003cbutton class=\"btn-ghost\" type=\"button\">Kollektion ansehen\u003c/button>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- MEDIA -->\n  \u003cdiv class=\"media\">\n    \u003cdiv class=\"media-frame\">\n      \u003cspan class=\"label\">Bild-Platzhalter &middot; Atelier &amp; Kollektion\u003c/span>\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- BENTO -->\n  \u003csection class=\"section\" id=\"kollektion\">\n    \u003cdiv class=\"section-head\">\n      \u003ch2>Handwerk in jedem Detail\u003c/h2>\n      \u003cp>Von der ersten Skizze bis zum fertigen Stueck begleitet Sie unser Atelier persoenlich.\u003c/p>\n    \u003c/div>\n\n    \u003cdiv class=\"bento\">\n      \u003carticle class=\"card feature\">\n        \u003cdiv class=\"ft-text\">\n          \u003ch3>Massanfertigung nach Ihren Wuenschen\u003c/h3>\n          \u003cp>Wir entwerfen einzigartige Stuecke, die genau zu Ihnen passen. Persoenliche Beratung inklusive.\u003c/p>\n        \u003c/div>\n        \u003cbutton class=\"cta\" type=\"button\">Beratung \u003cspan class=\"arrow\" aria-hidden=\"true\">&#8594;\u003c/span>\u003c/button>\n      \u003c/article>\n\n      \u003carticle class=\"card wide\" id=\"atelier\">\n        \u003cdiv class=\"ic\" aria-hidden=\"true\">\n          \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\">\u003cpath d=\"M12 2l2.5 5 5.5.8-4 3.9.9 5.5L12 14.5 7.1 17.2 8 11.7 4 7.8 9.5 7z\"/>\u003c/svg>\n        \u003c/div>\n        \u003ch3>Feinste Materialien\u003c/h3>\n        \u003cp>Verantwortungsvoll bezogenes Gold, ethisch gehandelte Diamanten und sorgfaeltig ausgewaehlte Farbsteine bilden die Basis jeder Kreation.\u003c/p>\n      \u003c/article>\n\n      \u003carticle class=\"card tall\">\n        \u003cdiv class=\"ic\" aria-hidden=\"true\">\n          \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\">\u003ccircle cx=\"12\" cy=\"12\" r=\"8\"/>\u003cpath d=\"M12 8v4l3 2\"/>\u003c/svg>\n        \u003c/div>\n        \u003ch3>100 Jahre\u003c/h3>\n        \u003cp>Tradition seit 1924, weitergegeben ueber vier Generationen.\u003c/p>\n      \u003c/article>\n\n      \u003carticle class=\"card third\" id=\"service\">\n        \u003cdiv class=\"ic\" aria-hidden=\"true\">\n          \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\">\u003cpath d=\"M4 12l5 5L20 6\"/>\u003c/svg>\n        \u003c/div>\n        \u003ch3>Reparatur\u003c/h3>\n        \u003cp>Fachgerechte Pflege und Restaurierung Ihrer Lieblingsstuecke.\u003c/p>\n      \u003c/article>\n\n      \u003carticle class=\"card third\">\n        \u003cdiv class=\"ic\" aria-hidden=\"true\">\n          \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\">\u003cpath d=\"M12 21s-7-4.5-7-10a4 4 0 017-2.6A4 4 0 0119 11c0 5.5-7 10-7 10z\"/>\u003c/svg>\n        \u003c/div>\n        \u003ch3>Trauringe\u003c/h3>\n        \u003cp>Gemeinsam zum perfekten Ring fuer den wichtigsten Tag.\u003c/p>\n      \u003c/article>\n\n      \u003carticle class=\"card third\" id=\"kontakt\">\n        \u003cdiv class=\"ic\" aria-hidden=\"true\">\n          \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\">\u003cpath d=\"M21 16.9v3a2 2 0 01-2.2 2 19.8 19.8 0 01-8.6-3 19.5 19.5 0 01-6-6A19.8 19.8 0 011.1 4.2 2 2 0 013.1 2h3a2 2 0 012 1.7c.1.9.3 1.8.6 2.6a2 2 0 01-.5 2.1L7 9.6a16 16 0 006 6l1.2-1.2a2 2 0 012.1-.5c.8.3 1.7.5 2.6.6a2 2 0 011.7 2z\"/>\u003c/svg>\n        \u003c/div>\n        \u003ch3>Besuchen Sie uns\u003c/h3>\n        \u003cp>Koenigsallee, Duesseldorf. Mo bis Sa nach Vereinbarung.\u003c/p>\n      \u003c/article>\n    \u003c/div>\n  \u003c/section>\n\u003c/main>\n\n\u003cfooter class=\"site-footer\">\n  \u003cdiv class=\"footer-inner\">\n    \u003cspan class=\"wordmark\" style=\"font-size:1rem;\">\u003cspan class=\"dot\" aria-hidden=\"true\">\u003c/span>MAISON AURELIE\u003c/span>\n    \u003cspan>&copy; 2025 MAISON AURELIE Duesseldorf &middot; Bordeaux &amp; Gold\u003c/span>\n  \u003c/div>\n\u003c/footer>\n\n\u003cscript>\n  \"use strict\";\n\n  /* ---------- Segmented Control: gleitendes Highlight ---------- */\n  (function () {\n    var seg = document.getElementById(\"segmented\");\n    if (!seg) return;\n    var highlight = seg.querySelector(\".seg-highlight\");\n    var links = Array.prototype.slice.call(seg.querySelectorAll(\".seg-link\"));\n    var current = links.find(function (l) { return l.getAttribute(\"aria-current\") === \"page\"; }) || links[0];\n\n    function moveTo(el) {\n      if (!el) return;\n      highlight.style.width = el.offsetWidth + \"px\";\n      highlight.style.transform = \"translateX(\" + el.offsetLeft + \"px)\";\n    }\n\n    function settle() {\n      requestAnimationFrame(function () {\n        moveTo(current);\n        seg.classList.add(\"is-ready\");\n      });\n    }\n\n    links.forEach(function (link) {\n      link.addEventListener(\"mouseenter\", function () { moveTo(link); });\n      link.addEventListener(\"focus\", function () { moveTo(link); });\n      link.addEventListener(\"click\", function () {\n        links.forEach(function (l) { l.removeAttribute(\"aria-current\"); });\n        link.setAttribute(\"aria-current\", \"page\");\n        current = link;\n      });\n    });\n\n    seg.addEventListener(\"mouseleave\", function () { moveTo(current); });\n    seg.addEventListener(\"focusout\", function (e) {\n      if (!seg.contains(e.relatedTarget)) moveTo(current);\n    });\n\n    window.addEventListener(\"resize\", function () { moveTo(current); });\n\n    if (document.fonts && document.fonts.ready) {\n      document.fonts.ready.then(settle);\n    } else {\n      window.addEventListener(\"load\", settle);\n    }\n    settle();\n  })();\n\n  /* ---------- Magnetischer CTA (\u003c=6px) ---------- */\n  (function () {\n    var reduce = window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n    if (reduce) return;\n    var MAX = 6;\n    document.querySelectorAll(\".cta\").forEach(function (btn) {\n      btn.addEventListener(\"mousemove\", function (e) {\n        var r = btn.getBoundingClientRect();\n        var x = (e.clientX - r.left - r.width / 2) / (r.width / 2);\n        var y = (e.clientY - r.top - r.height / 2) / (r.height / 2);\n        btn.style.transform = \"translate(\" + (x * MAX).toFixed(1) + \"px,\" + (y * MAX).toFixed(1) + \"px)\";\n      });\n      btn.addEventListener(\"mouseleave\", function () { btn.style.transform = \"\"; });\n    });\n  })();\n\n  /* ---------- Mobile Menu: open/close, ESC, Fokus-Trap ---------- */\n  (function () {\n    var burger = document.getElementById(\"burger\");\n    var menu = document.getElementById(\"mobileMenu\");\n    var closeBtn = document.getElementById(\"mobileClose\");\n    var panel = menu.querySelector(\".mobile-panel\");\n    var lastFocused = null;\n\n    function focusables() {\n      return Array.prototype.slice.call(\n        panel.querySelectorAll('a[href], button:not([disabled])')\n      ).filter(function (el) { return el.offsetParent !== null; });\n    }\n\n    function open() {\n      lastFocused = document.activeElement;\n      menu.hidden = false;\n      requestAnimationFrame(function () { menu.classList.add(\"is-open\"); });\n      burger.setAttribute(\"aria-expanded\", \"true\");\n      document.body.style.overflow = \"hidden\";\n      setTimeout(function () { closeBtn.focus(); }, 60);\n      document.addEventListener(\"keydown\", onKeydown);\n    }\n\n    function close() {\n      menu.classList.remove(\"is-open\");\n      burger.setAttribute(\"aria-expanded\", \"false\");\n      document.body.style.overflow = \"\";\n      document.removeEventListener(\"keydown\", onKeydown);\n      setTimeout(function () { menu.hidden = true; }, 260);\n      if (lastFocused) lastFocused.focus();\n    }\n\n    function onKeydown(e) {\n      if (e.key === \"Escape\") { e.preventDefault(); close(); return; }\n      if (e.key === \"Tab\") {\n        var f = focusables();\n        if (!f.length) return;\n        var first = f[0], last = f[f.length - 1];\n        if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }\n        else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }\n      }\n    }\n\n    burger.addEventListener(\"click\", open);\n    closeBtn.addEventListener(\"click\", close);\n    menu.addEventListener(\"click\", function (e) { if (e.target === menu) close(); });\n    panel.querySelectorAll(\".mobile-link\").forEach(function (l) {\n      l.addEventListener(\"click\", close);\n    });\n  })();\n\u003c/script>\n\u003c/body>\n\u003c/html>\n"},
  {name:"Command Bar", desc:"Schlanke Leiste mit Command-Palette: Suche per Klick oder Tastenkuerzel.", file:"m3-command-bar.html", html:"\u003c!DOCTYPE html>\n\u003chtml lang=\"de\">\n\u003chead>\n\u003c!--\n  ============================================================================\n  MAISON AURELIE  -  Duesseldorf\n  Konzept: \"Bordeaux & Gold\"  |  Moderne Ausfuehrung 2025\n  Navbar-Konzept M3: \"Command Bar\"\n  ----------------------------------------------------------------------------\n  Schlanke moderne Leiste: Wordmark links, Links mittig, rechts ein\n  Command-Palette-Trigger (Pill mit Lupe + Tastenkuerzel Strg K / Cmd K).\n  Klick oder Tastenkuerzel oeffnet ein zugaengliches Glas-Modal\n  (role=\"dialog\", aria-modal) mit Suche und Schnellzielen, voll\n  tastaturnavigierbar inkl. Fokus-Trap, ESC, Fokus-Rueckgabe, Scroll-Sperre.\n\n  Standalone, offline lauffaehig. Keine externen Skripte ausser Google Fonts.\n  PROD: next/font lokal statt Google-Fonts-\u003clink> verwenden.\n  ============================================================================\n-->\n\u003cmeta charset=\"UTF-8\" />\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n\u003ctitle>Maison Aurelie  -  Feine Juwelierkunst aus Duesseldorf\u003c/title>\n\n\u003c!-- PROD: next/font lokal. Hier Google-Fonts-\u003clink> fuer Offline-Demo-Bequemlichkeit. -->\n\u003clink rel=\"preconnect\" href=\"https://fonts.googleapis.com\" />\n\u003clink rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin />\n\u003clink href=\"https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap\" rel=\"stylesheet\" />\n\n\u003cstyle>\n  :root {\n    --bg: #1A0A0E;\n    --bg2: #240D13;\n    --panel: rgba(255, 255, 255, 0.05);\n    --text: #F6ECE6;\n    --text-2: #C9A7AD;\n    --gold: #E6C07A;\n    --gold-2: #C99A4E;\n    --line: rgba(255, 220, 190, 0.12);\n\n    --ease: cubic-bezier(0.22, 1, 0.36, 1);\n    --t: 200ms;\n    --radius-2xl: 28px;\n    --radius-xl: 20px;\n    --radius-pill: 999px;\n    --shadow-soft: 0 18px 50px -18px rgba(0, 0, 0, 0.65);\n    --shadow-glow: 0 0 0 1px var(--line), 0 24px 70px -24px rgba(0, 0, 0, 0.8);\n    --maxw: 1200px;\n  }\n\n  *, *::before, *::after { box-sizing: border-box; }\n\n  html { scroll-behavior: smooth; }\n\n  body {\n    margin: 0;\n    background:\n      radial-gradient(1100px 700px at 78% -8%, rgba(230, 192, 122, 0.10), transparent 60%),\n      radial-gradient(900px 600px at 8% 6%, rgba(201, 154, 78, 0.08), transparent 55%),\n      linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);\n    background-attachment: fixed;\n    color: var(--text);\n    font-family: \"Inter\", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;\n    font-size: 16px;\n    line-height: 1.6;\n    -webkit-font-smoothing: antialiased;\n    overflow-x: hidden;\n    min-height: 100vh;\n  }\n\n  a { color: inherit; text-decoration: none; }\n\n  ::selection { background: rgba(230, 192, 122, 0.28); color: #fff; }\n\n  /* ---------- Skip link ---------- */\n  .skip-link {\n    position: fixed;\n    left: 16px;\n    top: -120px;\n    z-index: 200;\n    background: var(--gold);\n    color: #2a0f14;\n    padding: 12px 18px;\n    border-radius: var(--radius-pill);\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    transition: top var(--t) var(--ease);\n  }\n  .skip-link:focus { top: 16px; }\n\n  :focus-visible {\n    outline: 2px solid var(--gold);\n    outline-offset: 3px;\n    border-radius: 6px;\n  }\n\n  /* ---------- Layout helpers ---------- */\n  .wrap {\n    width: 100%;\n    max-width: var(--maxw);\n    margin: 0 auto;\n    padding: 0 24px;\n  }\n\n  /* ============================================================\n     COMMAND BAR / HEADER\n     ============================================================ */\n  .site-header {\n    position: sticky;\n    top: 0;\n    z-index: 90;\n    padding: 14px 0;\n  }\n\n  .commandbar {\n    display: flex;\n    align-items: center;\n    gap: 18px;\n    padding: 10px 12px 10px 18px;\n    border-radius: var(--radius-pill);\n    background: rgba(26, 10, 14, 0.55);\n    -webkit-backdrop-filter: blur(18px) saturate(140%);\n    backdrop-filter: blur(18px) saturate(140%);\n    border: 1px solid var(--line);\n    box-shadow: var(--shadow-soft);\n  }\n\n  /* Wordmark */\n  .wordmark {\n    display: inline-flex;\n    align-items: center;\n    gap: 11px;\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    font-size: 1.12rem;\n    letter-spacing: 0.04em;\n    color: var(--text);\n    white-space: nowrap;\n    padding: 6px 6px;\n    border-radius: 14px;\n    flex: 0 0 auto;\n  }\n  .wordmark .mark {\n    width: 30px; height: 30px;\n    border-radius: 9px;\n    display: grid; place-items: center;\n    background: linear-gradient(150deg, var(--gold), var(--gold-2));\n    color: #2a0f14;\n    font-weight: 700;\n    box-shadow: 0 6px 18px -6px rgba(230, 192, 122, 0.5);\n    transition: transform var(--t) var(--ease);\n  }\n  .wordmark:hover .mark { transform: rotate(-6deg) scale(1.06); }\n  .wordmark .sub { color: var(--text-2); font-weight: 400; font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; }\n\n  /* Center nav */\n  .nav-center {\n    flex: 1 1 auto;\n    display: flex;\n    justify-content: center;\n  }\n  .nav-links {\n    display: flex;\n    align-items: center;\n    gap: 4px;\n    list-style: none;\n    margin: 0; padding: 0;\n  }\n  .nav-links a {\n    position: relative;\n    display: inline-flex;\n    align-items: center;\n    min-height: 44px;\n    padding: 0 16px;\n    border-radius: var(--radius-pill);\n    color: var(--text-2);\n    font-size: 0.95rem;\n    font-weight: 500;\n    transition: color var(--t) var(--ease), background var(--t) var(--ease);\n  }\n  .nav-links a::after {\n    content: \"\";\n    position: absolute;\n    left: 16px; right: 16px; bottom: 9px;\n    height: 1.5px;\n    background: var(--gold);\n    transform: scaleX(0);\n    transform-origin: left;\n    transition: transform var(--t) var(--ease);\n  }\n  .nav-links a:hover, .nav-links a:focus-visible { color: var(--text); background: rgba(255,255,255,0.04); }\n  .nav-links a:hover::after, .nav-links a:focus-visible::after { transform: scaleX(1); }\n\n  /* Right cluster */\n  .nav-right {\n    flex: 0 0 auto;\n    display: flex;\n    align-items: center;\n    gap: 10px;\n  }\n\n  /* Command-palette trigger */\n  .cmd-trigger {\n    display: inline-flex;\n    align-items: center;\n    gap: 12px;\n    min-height: 44px;\n    padding: 0 8px 0 16px;\n    border-radius: var(--radius-pill);\n    border: 1px solid var(--line);\n    background: rgba(255, 255, 255, 0.04);\n    color: var(--text-2);\n    font-family: \"Inter\", sans-serif;\n    font-size: 0.9rem;\n    cursor: pointer;\n    transition: border-color var(--t) var(--ease), background var(--t) var(--ease), transform var(--t) var(--ease), box-shadow var(--t) var(--ease);\n  }\n  .cmd-trigger:hover {\n    border-color: rgba(230, 192, 122, 0.5);\n    background: rgba(255, 255, 255, 0.06);\n    color: var(--text);\n    box-shadow: 0 10px 30px -14px rgba(230, 192, 122, 0.4);\n  }\n  .cmd-trigger svg { width: 18px; height: 18px; flex: 0 0 auto; }\n  .cmd-trigger .hint { color: var(--text-2); white-space: nowrap; }\n  .cmd-trigger .kbd {\n    display: inline-flex;\n    align-items: center;\n    gap: 3px;\n    padding: 5px 9px;\n    border-radius: var(--radius-pill);\n    background: rgba(255, 255, 255, 0.06);\n    border: 1px solid var(--line);\n    font-family: \"Space Grotesk\", sans-serif;\n    font-size: 0.74rem;\n    font-weight: 600;\n    color: var(--text);\n    letter-spacing: 0.02em;\n  }\n\n  /* CTA (magnetic) */\n  .cta {\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    min-height: 44px;\n    padding: 0 20px;\n    border-radius: var(--radius-pill);\n    background: linear-gradient(150deg, var(--gold), var(--gold-2));\n    color: #2a0f14;\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    font-size: 0.92rem;\n    border: none;\n    cursor: pointer;\n    white-space: nowrap;\n    box-shadow: 0 12px 30px -12px rgba(230, 192, 122, 0.55);\n    transition: transform 120ms var(--ease), box-shadow var(--t) var(--ease);\n    will-change: transform;\n  }\n  .cta:hover { box-shadow: 0 16px 40px -12px rgba(230, 192, 122, 0.7); }\n  .cta:active { transform: scale(0.97); }\n\n  /* Mobile menu button */\n  .menu-btn {\n    display: none;\n    align-items: center;\n    justify-content: center;\n    width: 44px; height: 44px;\n    border-radius: var(--radius-pill);\n    border: 1px solid var(--line);\n    background: rgba(255, 255, 255, 0.04);\n    color: var(--text);\n    cursor: pointer;\n    transition: background var(--t) var(--ease), border-color var(--t) var(--ease);\n  }\n  .menu-btn:hover { background: rgba(255,255,255,0.07); }\n  .menu-btn svg { width: 22px; height: 22px; }\n\n  /* Mobile nav panel */\n  .mobile-nav {\n    display: none;\n    margin-top: 10px;\n    padding: 12px;\n    border-radius: var(--radius-2xl);\n    background: rgba(26, 10, 14, 0.85);\n    -webkit-backdrop-filter: blur(18px);\n    backdrop-filter: blur(18px);\n    border: 1px solid var(--line);\n    box-shadow: var(--shadow-soft);\n  }\n  .mobile-nav[hidden] { display: none; }\n  .mobile-nav ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 4px; }\n  .mobile-nav a {\n    display: flex; align-items: center;\n    min-height: 48px;\n    padding: 0 16px;\n    border-radius: var(--radius-xl);\n    color: var(--text);\n    font-size: 1rem;\n    transition: background var(--t) var(--ease);\n  }\n  .mobile-nav a:hover, .mobile-nav a:focus-visible { background: rgba(255,255,255,0.06); }\n  .mobile-nav .cta { width: 100%; margin-top: 8px; }\n\n  /* ============================================================\n     HERO\n     ============================================================ */\n  main { display: block; }\n\n  .hero {\n    position: relative;\n    padding: 110px 0 90px;\n    overflow: hidden;\n  }\n  .hero-glow {\n    position: absolute;\n    inset: -10% 0 auto 0;\n    height: 620px;\n    background:\n      radial-gradient(620px 360px at 70% 30%, rgba(230, 192, 122, 0.18), transparent 60%),\n      radial-gradient(520px 320px at 20% 10%, rgba(150, 30, 50, 0.22), transparent 60%);\n    filter: blur(8px);\n    pointer-events: none;\n    z-index: 0;\n  }\n  .hero .wrap { position: relative; z-index: 1; }\n\n  .hero-eyebrow {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    padding: 7px 16px;\n    border-radius: var(--radius-pill);\n    border: 1px solid var(--line);\n    background: var(--panel);\n    color: var(--gold);\n    font-family: \"Space Grotesk\", sans-serif;\n    font-size: 0.78rem;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    margin-bottom: 26px;\n  }\n  .hero-eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 12px var(--gold); }\n\n  .hero h1 {\n    font-family: \"Fraunces\", \"Space Grotesk\", serif;\n    font-weight: 500;\n    font-size: clamp(2.6rem, 7vw, 5.2rem);\n    line-height: 1.04;\n    letter-spacing: -0.02em;\n    margin: 0 0 22px;\n    max-width: 14ch;\n  }\n  .hero h1 .accent {\n    font-style: italic;\n    background: linear-gradient(120deg, var(--gold), var(--gold-2));\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n  }\n  .hero p.lead {\n    font-size: clamp(1.05rem, 2vw, 1.28rem);\n    color: var(--text-2);\n    max-width: 54ch;\n    margin: 0 0 36px;\n  }\n  .hero-actions { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }\n  .btn-ghost {\n    display: inline-flex; align-items: center; gap: 9px;\n    min-height: 44px;\n    padding: 0 22px;\n    border
