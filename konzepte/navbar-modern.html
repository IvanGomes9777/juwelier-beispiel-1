-radius: var(--radius-pill);\n    border: 1px solid var(--line);\n    background: var(--panel);\n    color: var(--text);\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 500;\n    cursor: pointer;\n    transition: background var(--t) var(--ease), border-color var(--t) var(--ease), transform var(--t) var(--ease);\n  }\n  .btn-ghost:hover { background: rgba(255,255,255,0.08); border-color: rgba(230,192,122,0.4); }\n  .btn-ghost:active { transform: scale(0.98); }\n\n  /* Media placeholder */\n  .hero-media {\n    position: relative;\n    margin-top: 64px;\n    height: clamp(280px, 42vw, 520px);\n    border-radius: var(--radius-2xl);\n    border: 1px solid var(--line);\n    background:\n      radial-gradient(700px 400px at 30% 20%, rgba(230,192,122,0.16), transparent 60%),\n      linear-gradient(160deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));\n    -webkit-backdrop-filter: blur(6px);\n    backdrop-filter: blur(6px);\n    box-shadow: var(--shadow-glow);\n    display: grid;\n    place-items: center;\n    overflow: hidden;\n  }\n  .hero-media .ph-badge {\n    position: absolute; top: 16px; left: 16px;\n    padding: 7px 14px;\n    border-radius: var(--radius-pill);\n    background: rgba(0,0,0,0.4);\n    border: 1px dashed rgba(230,192,122,0.5);\n    font-family: \"Space Grotesk\", sans-serif;\n    font-size: 0.74rem;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--gold);\n  }\n  .hero-media .ph-label { color: var(--text-2); font-family: \"Space Grotesk\", sans-serif; letter-spacing: 0.06em; }\n\n  /* ============================================================\n     BENTO SECTION\n     ============================================================ */\n  .section { padding: 90px 0; position: relative; }\n  .section-head { margin-bottom: 44px; max-width: 60ch; }\n  .section-head h2 {\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    font-size: clamp(1.8rem, 4vw, 2.8rem);\n    letter-spacing: -0.01em;\n    margin: 0 0 14px;\n  }\n  .section-head p { color: var(--text-2); margin: 0; font-size: 1.08rem; }\n\n  .bento {\n    display: grid;\n    grid-template-columns: repeat(6, 1fr);\n    gap: 18px;\n  }\n  .card {\n    position: relative;\n    border-radius: var(--radius-2xl);\n    border: 1px solid var(--line);\n    background: var(--panel);\n    -webkit-backdrop-filter: blur(10px);\n    backdrop-filter: blur(10px);\n    padding: 28px;\n    overflow: hidden;\n    transition: transform var(--t) var(--ease), border-color var(--t) var(--ease), box-shadow var(--t) var(--ease);\n    min-height: 220px;\n    display: flex;\n    flex-direction: column;\n    justify-content: flex-end;\n  }\n  .card::before {\n    content: \"\";\n    position: absolute; inset: 0;\n    background: radial-gradient(360px 200px at 80% 0%, rgba(230,192,122,0.14), transparent 60%);\n    opacity: 0;\n    transition: opacity var(--t) var(--ease);\n    pointer-events: none;\n  }\n  .card:hover { transform: translateY(-4px); border-color: rgba(230,192,122,0.35); box-shadow: var(--shadow-soft); }\n  .card:hover::before { opacity: 1; }\n  .card .icon {\n    width: 46px; height: 46px;\n    border-radius: 14px;\n    display: grid; place-items: center;\n    background: rgba(230,192,122,0.12);\n    border: 1px solid var(--line);\n    color: var(--gold);\n    margin-bottom: auto;\n  }\n  .card .icon svg { width: 22px; height: 22px; }\n  .card h3 { font-family: \"Space Grotesk\", sans-serif; font-weight: 600; font-size: 1.25rem; margin: 18px 0 8px; }\n  .card p { color: var(--text-2); margin: 0; font-size: 0.96rem; }\n\n  .card.col-3 { grid-column: span 3; }\n  .card.col-2 { grid-column: span 2; }\n  .card.col-4 { grid-column: span 4; }\n  .card.feature { min-height: 320px; }\n  .card.feature h3 { font-size: 1.6rem; }\n\n  /* ============================================================\n     FOOTER\n     ============================================================ */\n  footer {\n    border-top: 1px solid var(--line);\n    padding: 50px 0 60px;\n    margin-top: 40px;\n  }\n  .footer-inner { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 24px; align-items: center; }\n  footer .wordmark { font-size: 1rem; }\n  footer .copy { color: var(--text-2); font-size: 0.88rem; }\n\n  /* ============================================================\n     COMMAND PALETTE (DIALOG)\n     ============================================================ */\n  .cmd-overlay {\n    position: fixed;\n    inset: 0;\n    z-index: 150;\n    display: none;\n    padding: 14vh 20px 20px;\n    background: rgba(10, 4, 6, 0.62);\n    -webkit-backdrop-filter: blur(6px);\n    backdrop-filter: blur(6px);\n    opacity: 0;\n    transition: opacity var(--t) var(--ease);\n  }\n  .cmd-overlay.open { display: block; opacity: 1; }\n\n  .cmd-palette {\n    width: 100%;\n    max-width: 600px;\n    margin: 0 auto;\n    border-radius: var(--radius-2xl);\n    border: 1px solid var(--line);\n    background: rgba(36, 13, 19, 0.86);\n    -webkit-backdrop-filter: blur(26px) saturate(150%);\n    backdrop-filter: blur(26px) saturate(150%);\n    box-shadow: var(--shadow-glow);\n    overflow: hidden;\n    transform: translateY(12px) scale(0.985);\n    opacity: 0;\n    transition: transform var(--t) var(--ease), opacity var(--t) var(--ease);\n  }\n  .cmd-overlay.open .cmd-palette { transform: translateY(0) scale(1); opacity: 1; }\n\n  .cmd-search {\n    display: flex;\n    align-items: center;\n    gap: 14px;\n    padding: 18px 22px;\n    border-bottom: 1px solid var(--line);\n  }\n  .cmd-search svg { width: 22px; height: 22px; color: var(--gold); flex: 0 0 auto; }\n  .cmd-search input {\n    flex: 1 1 auto;\n    background: transparent;\n    border: none;\n    color: var(--text);\n    font-family: \"Inter\", sans-serif;\n    font-size: 1.1rem;\n    padding: 6px 0;\n    min-height: 44px;\n  }\n  .cmd-search input::placeholder { color: var(--text-2); }\n  .cmd-search input:focus { outline: none; }\n  .cmd-search .esc {\n    flex: 0 0 auto;\n    padding: 5px 10px;\n    border-radius: var(--radius-pill);\n    border: 1px solid var(--line);\n    background: rgba(255,255,255,0.05);\n    font-family: \"Space Grotesk\", sans-serif;\n    font-size: 0.72rem;\n    font-weight: 600;\n    color: var(--text-2);\n  }\n\n  .cmd-section-label {\n    padding: 16px 22px 8px;\n    font-family: \"Space Grotesk\", sans-serif;\n    font-size: 0.72rem;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--text-2);\n  }\n  .cmd-list { list-style: none; margin: 0; padding: 0 12px 14px; }\n  .cmd-item {\n    display: flex;\n    align-items: center;\n    gap: 14px;\n    width: 100%;\n    min-height: 56px;\n    padding: 12px 14px;\n    border-radius: var(--radius-xl);\n    border: none;\n    background: transparent;\n    color: var(--text);\n    font-family: \"Inter\", sans-serif;\n    font-size: 1rem;\n    text-align: left;\n    cursor: pointer;\n    transition: background 120ms var(--ease);\n  }\n  .cmd-item .ic {\n    width: 40px; height: 40px;\n    border-radius: 12px;\n    display: grid; place-items: center;\n    background: rgba(230,192,122,0.1);\n    border: 1px solid var(--line);\n    color: var(--gold);\n    flex: 0 0 auto;\n  }\n  .cmd-item .ic svg { width: 20px; height: 20px; }\n  .cmd-item .txt { display: flex; flex-direction: column; }\n  .cmd-item .txt .t { font-weight: 500; }\n  .cmd-item .txt .d { color: var(--text-2); font-size: 0.84rem; }\n  .cmd-item .go { margin-left: auto; color: var(--text-2); opacity: 0; transition: opacity 120ms var(--ease); }\n  .cmd-item:hover, .cmd-item.active {\n    background: rgba(255,255,255,0.07);\n  }\n  .cmd-item.active { box-shadow: inset 0 0 0 1px rgba(230,192,122,0.4); }\n  .cmd-item:hover .go, .cmd-item.active .go { opacity: 1; }\n  .cmd-empty { padding: 28px 22px 32px; color: var(--text-2); text-align: center; display: none; }\n  .cmd-empty.show { display: block; }\n\n  /* ============================================================\n     RESPONSIVE\n     ============================================================ */\n  @media (max-width: 860px) {\n    .nav-center { display: none; }\n    .cmd-trigger .hint { display: none; }\n    .cta { display: none; }\n    .menu-btn { display: inline-flex; }\n    .cmd-trigger { padding: 0 14px; }\n  }\n\n  @media (max-width: 760px) {\n    .bento { grid-template-columns: repeat(2, 1fr); }\n    .card.col-3, .card.col-2, .card.col-4 { grid-column: span 2; }\n  }\n\n  @media (max-width: 520px) {\n    .wrap { padding: 0 16px; }\n    .wordmark .sub { display: none; }\n    .cmd-trigger .kbd { display: none; }\n    .hero { padding: 70px 0 60px; }\n  }\n\n  @media (prefers-reduced-motion: reduce) {\n    *, *::before, *::after {\n      animation-duration: 0.001ms !important;\n      transition-duration: 0.001ms !important;\n      scroll-behavior: auto !important;\n    }\n  }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\n\u003ca class=\"skip-link\" href=\"#main\">Zum Inhalt springen\u003c/a>\n\n\u003cheader class=\"site-header\">\n  \u003cdiv class=\"wrap\">\n    \u003cnav class=\"commandbar\" aria-label=\"Hauptnavigation\">\n      \u003ca class=\"wordmark\" href=\"#\" aria-label=\"Maison Aurelie Startseite\">\n        \u003cspan class=\"mark\" aria-hidden=\"true\">A\u003c/span>\n        \u003cspan>MAISON AURELIE \u003cspan class=\"sub\">Duesseldorf\u003c/span>\u003c/span>\n      \u003c/a>\n\n      \u003cdiv class=\"nav-center\">\n        \u003cul class=\"nav-links\">\n          \u003cli>\u003ca href=\"#trauringe\">Trauringe\u003c/a>\u003c/li>\n          \u003cli>\u003ca href=\"#uhren\">Uhren\u003c/a>\u003c/li>\n          \u003cli>\u003ca href=\"#schmuck\">Schmuck\u003c/a>\u003c/li>\n          \u003cli>\u003ca href=\"#atelier\">Atelier\u003c/a>\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n\n      \u003cdiv class=\"nav-right\">\n        \u003cbutton class=\"cmd-trigger\" id=\"cmdTrigger\" type=\"button\"\n                aria-haspopup=\"dialog\" aria-expanded=\"false\" aria-controls=\"cmdPalette\"\n                aria-keyshortcuts=\"Control+K Meta+K\">\n          \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" aria-hidden=\"true\">\n            \u003ccircle cx=\"11\" cy=\"11\" r=\"7\">\u003c/circle>\u003cpath d=\"m21 21-4.3-4.3\">\u003c/path>\n          \u003c/svg>\n          \u003cspan class=\"hint\">Suchen oder springen\u003c/span>\n          \u003cspan class=\"kbd\" id=\"kbdHint\" aria-hidden=\"true\">Strg K\u003c/span>\n        \u003c/button>\n\n        \u003ca class=\"cta\" href=\"#termin\">Termin buchen\u003c/a>\n\n        \u003cbutton class=\"menu-btn\" id=\"menuBtn\" type=\"button\"\n                aria-expanded=\"false\" aria-controls=\"mobileNav\" aria-label=\"Menue oeffnen\">\n          \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" aria-hidden=\"true\">\n            \u003cpath d=\"M4 7h16M4 12h16M4 17h16\">\u003c/path>\n          \u003c/svg>\n        \u003c/button>\n      \u003c/div>\n    \u003c/nav>\n\n    \u003cdiv class=\"mobile-nav\" id=\"mobileNav\" hidden>\n      \u003cul>\n        \u003cli>\u003ca href=\"#trauringe\">Trauringe\u003c/a>\u003c/li>\n        \u003cli>\u003ca href=\"#uhren\">Uhren\u003c/a>\u003c/li>\n        \u003cli>\u003ca href=\"#schmuck\">Schmuck\u003c/a>\u003c/li>\n        \u003cli>\u003ca href=\"#atelier\">Atelier\u003c/a>\u003c/li>\n      \u003c/ul>\n      \u003ca class=\"cta\" href=\"#termin\">Termin buchen\u003c/a>\n    \u003c/div>\n  \u003c/div>\n\u003c/header>\n\n\u003cmain id=\"main\">\n  \u003c!-- HERO -->\n  \u003csection class=\"hero\">\n    \u003cdiv class=\"hero-glow\" aria-hidden=\"true\">\u003c/div>\n    \u003cdiv class=\"wrap\">\n      \u003cspan class=\"hero-eyebrow\">\u003cspan class=\"dot\" aria-hidden=\"true\">\u003c/span> Feine Juwelierkunst seit 1932\u003c/span>\n      \u003ch1>Glanz, der eine \u003cspan class=\"accent\">Geschichte\u003c/span> erzaehlt.\u003c/h1>\n      \u003cp class=\"lead\">\n        Im Herzen von Duesseldorf fertigen wir Trauringe, kuratieren feine Uhren und\n        gestalten Schmuck, der ein Leben lang getragen wird. Handwerk trifft auf\n        zeitlose Eleganz in Bordeaux und Gold.\n      \u003c/p>\n      \u003cdiv class=\"hero-actions\">\n        \u003ca class=\"cta\" href=\"#termin\" style=\"display:inline-flex;\">Termin im Atelier\u003c/a>\n        \u003cbutton class=\"btn-ghost\" type=\"button\" id=\"heroSearchBtn\">\n          \u003csvg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" aria-hidden=\"true\">\n            \u003ccircle cx=\"11\" cy=\"11\" r=\"7\">\u003c/circle>\u003cpath d=\"m21 21-4.3-4.3\">\u003c/path>\n          \u003c/svg>\n          Kollektion durchsuchen\n        \u003c/button>\n      \u003c/div>\n\n      \u003cdiv class=\"hero-media\" role=\"img\" aria-label=\"Platzhalter fuer Atelier-Aufnahme\">\n        \u003cspan class=\"ph-badge\">Platzhalter\u003c/span>\n        \u003cspan class=\"ph-label\">Medien-Platzhalter  -  Atelieraufnahme 16:9\u003c/span>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- BENTO -->\n  \u003csection class=\"section\" id=\"schmuck\">\n    \u003cdiv class=\"wrap\">\n      \u003cdiv class=\"section-head\">\n        \u003ch2>Vier Welten, ein Haus.\u003c/h2>\n        \u003cp>Von der Verlobung bis zur Vitrine: entdecken Sie die Bereiche von Maison Aurelie.\u003c/p>\n      \u003c/div>\n\n      \u003cdiv class=\"bento\">\n        \u003carticle class=\"card feature col-3\">\n          \u003cspan class=\"icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">\u003ccircle cx=\"12\" cy=\"13\" r=\"6\">\u003c/circle>\u003cpath d=\"M9 6 12 2l3 4\">\u003c/path>\u003c/svg>\n          \u003c/span>\n          \u003ch3>Trauringe nach Mass\u003c/h3>\n          \u003cp>Gemeinsam entworfen, von Hand gefertigt. Ihre Ringe entstehen in unserer Werkstatt am Rhein.\u003c/p>\n        \u003c/article>\n\n        \u003carticle class=\"card col-3\" id=\"uhren\">\n          \u003cspan class=\"icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">\u003ccircle cx=\"12\" cy=\"12\" r=\"9\">\u003c/circle>\u003cpath d=\"M12 7v5l3 2\">\u003c/path>\u003c/svg>\n          \u003c/span>\n          \u003ch3>Feine Uhren\u003c/h3>\n          \u003cp>Eine kuratierte Auswahl mechanischer Zeitmesser, betreut von unseren Uhrmachern.\u003c/p>\n        \u003c/article>\n\n        \u003carticle class=\"card col-2\" id=\"trauringe\">\n          \u003cspan class=\"icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">\u003cpath d=\"M12 3 4 9l8 12 8-12z\">\u003c/path>\u003c/svg>\n          \u003c/span>\n          \u003ch3>Diamanten\u003c/h3>\n          \u003cp>Zertifiziert und verantwortungsvoll bezogen.\u003c/p>\n        \u003c/article>\n\n        \u003carticle class=\"card col-2\" id=\"atelier\">\n          \u003cspan class=\"icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">\u003cpath d=\"M3 21h18M5 21V8l7-5 7 5v13\">\u003c/path>\u003c/svg>\n          \u003c/span>\n          \u003ch3>Das Atelier\u003c/h3>\n          \u003cp>Reparatur, Politur und Anpassung von erfahrenen Goldschmieden.\u003c/p>\n        \u003c/article>\n\n        \u003carticle class=\"card col-2\" id=\"termin\">\n          \u003cspan class=\"icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">\u003crect x=\"3\" y=\"5\" width=\"18\" height=\"16\" rx=\"2\">\u003c/rect>\u003cpath d=\"M3 9h18M8 3v4M16 3v4\">\u003c/path>\u003c/svg>\n          \u003c/span>\n          \u003ch3>Privater Termin\u003c/h3>\n          \u003cp>Persoenliche Beratung bei einem Glas Champagner.\u003c/p>\n        \u003c/article>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- spacer section for scroll testing -->\n  \u003csection class=\"section\">\n    \u003cdiv class=\"wrap\">\n      \u003cdiv class=\"section-head\">\n        \u003ch2>Ein Haus mit Haltung.\u003c/h2>\n        \u003cp>\n          Seit drei Generationen verbinden wir Duesseldorfer Eleganz mit ehrlichem\n          Handwerk. Jedes Stueck, das unser Atelier verlaesst, traegt eine Geschichte\n          und ein Versprechen.\n        \u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"bento\">\n        \u003carticle class=\"card col-4\">\n          \u003cspan class=\"icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">\u003cpath d=\"M12 2 15 9l7 .5-5.5 4.5L18 21l-6-3.8L6 21l1.5-7L2 9.5 9 9z\">\u003c/path>\u003c/svg>\n          \u003c/span>\n          \u003ch3>Meisterwerkstatt\u003c/h3>\n          \u003cp>Auszeichnungen der Handwerkskammer und ein Team, das sein Handwerk liebt.\u003c/p>\n        \u003c/article>\n        \u003carticle class=\"card col-2\">\n          \u003cspan class=\"icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">\u003cpath d=\"M12 21s-7-4.5-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 11c0 5.5-7 10-7 10z\">\u003c/path>\u003c/svg>\n          \u003c/span>\n          \u003ch3>Mit Liebe\u003c/h3>\n          \u003cp>Beratung ohne Eile, ganz nach Ihrem Tempo.\u003c/p>\n        \u003c/article>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\u003c/main>\n\n\u003cfooter>\n  \u003cdiv class=\"wrap footer-inner\">\n    \u003ca class=\"wordmark\" href=\"#\" aria-label=\"Maison Aurelie Startseite\">\n      \u003cspan class=\"mark\" aria-hidden=\"true\">A\u003c/span>\n      \u003cspan>MAISON AURELIE\u003c/span>\n    \u003c/a>\n    \u003cspan class=\"copy\">Koenigsallee, Duesseldorf  -  copyri rget;\n      var typing = t && (t.tagName === \"INPUT\" || t.tagName === \"TEXTAREA\" || t.isContentEditable);\n      if (!typing) { e.preventDefault(); openPalette(); }\n    }\n  });\n\n  /* ---------- Wiring ---------- */\n  trigger.addEventListener(\"click\", openPalette);\n  if (heroBtn) heroBtn.addEventListener(\"click\", openPalette);\n  input.addEventListener(\"input\", function () { filterList(input.value); });\n\n  overlay.addEventListener(\"mousedown\", function (e) {\n    if (e.target === overlay) closePalette();\n  });\n\n  list.addEventListener(\"click\", function (e) {\n    var b = e.target.closest(\".cmd-item\");\n    if (b) activate(b);\n  });\n  list.addEventListener(\"mousemove\", function (e) {\n    var b = e.target.closest(\".cmd-item\");\n    if (!b) return;\n    var its = items();\n    var i = its.indexOf(b);\n    if (i !== -1 && i !== activeIndex) setActive(i);\n  });\n\n  /* ---------- Mobile menu ---------- */\n  var menuBtn = document.getElementById(\"menuBtn\");\n  var mobileNav = document.getElementById(\"mobileNav\");\n  function setMenu(open) {\n    menuBtn.setAttribute(\"aria-expanded\", String(open));\n    menuBtn.setAttribute(\"aria-label\", open ? \"Menue schliessen\" : \"Menue oeffnen\");\n    mobileNav.hidden = !open;\n  }\n  menuBtn.addEventListener(\"click\", function () {\n    setMenu(mobileNav.hidden);\n  });\n  mobileNav.addEventListener(\"click\", function (e) {\n    if (e.target.closest(\"a\")) setMenu(false);\n  });\n  document.addEventListener(\"keydown\", function (e) {\n    if (e.key === \"Escape\" && !mobileNav.hidden) { setMenu(false); menuBtn.focus(); }\n  });\n  /* Close mobile menu when leaving mobile breakpoint */\n  var mq = window.matchMedia(\"(min-width: 861px)\");\n  (mq.addEventListener ? mq.addEventListener.bind(mq, \"change\") : mq.addListener.bind(mq))(function (ev) {\n    if (ev.matches && !mobileNav.hidden) setMenu(false);\n  });\n\n  /* ---------- Magnetic CTA (\u003c=6px), respects reduced motion ---------- */\n  var reduce = window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n  if (!reduce) {\n    document.querySelectorAll(\".cta\").forEach(function (btn) {\n      btn.addEventListener(\"pointermove\", function (e) {\n        if (e.pointerType === \"touch\") return;\n        var r = btn.getBoundingClientRect();\n        var mx = e.clientX - (r.left + r.width / 2);\n        var my = e.clientY - (r.top + r.height / 2);\n        var max = 6;\n        var dx = Math.max(-max, Math.min(max, mx * 0.3));\n        var dy = Math.max(-max, Math.min(max, my * 0.3));\n        btn.style.transform = \"translate(\" + dx + \"px,\" + dy + \"px)\";\n      });\n      btn.addEventListener(\"pointerleave\", function () { btn.style.transform = \"\"; });\n    });\n  }\n})();\n\u003c/script>\n\u003c/body>\n\u003c/html>\n"},
  {name:"Bento Mega-Menue", desc:"Kollektionen oeffnen ein grosses Glas-Panel im Bento-Grid mit Feature-Kacheln.", file:"m4-bento-mega.html", html:"\u003c!DOCTYPE html>\n\u003c!--\n  ============================================================================\n  MAISON AURELIE  -  Duesseldorf\n  Konzept: \"Bordeaux & Gold\"  /  MODERNE Ausfuehrung 2025\n  Navbar-Konzept M4: \"Bento Mega-Menue\"\n  ----------------------------------------------------------------------------\n  Standalone, offline lauffaehige Demo-Datei (eine Datei, kein Build).\n  - Moderne Leiste; \"Kollektionen\" oeffnet ein grosses Glas-Panel im\n    Bento-Grid-Stil (unterschiedlich grosse Kacheln, Hover-Scale).\n  - Zugaengliches Disclosure: aria-expanded/controls, Hover UND Klick/Tastatur,\n    ESC schliesst, schliesst bei Klick ausserhalb/Fokusverlust, Hover-Delay\n    behindert die Tastaturbedienung nicht.\n  - Unter ~860px: Accordion-Mobile-Menue. Skip-Link, semantisches \u003cheader>\u003cnav>,\n    :focus-visible, Touch-Ziele >=44px, Kontrast >=4.5:1.\n  - prefers-reduced-motion: reduce schaltet Animationen ab.\n  - Kein horizontales Scrollen bei 320px. Keine Geviertstriche in sichtbarer Copy.\n\n  PROD-Hinweis: In Produktion Fonts via next/font lokal einbinden statt CDN.\n  PROD: next/font lokal (Space Grotesk, Inter, Fraunces) statt Google Fonts \u003clink>.\n  ============================================================================\n-->\n\u003chtml lang=\"de\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003ctitle>MAISON AURELIE  Bordeaux und Gold  Bento Mega-Menue\u003c/title>\n\n\u003c!-- PROD: next/font lokal. Google-Fonts nur fuer diese Offline-Demo. -->\n\u003clink rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n\u003clink rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n\u003clink href=\"https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap\" rel=\"stylesheet\">\n\n\u003cstyle>\n  :root{\n    --bg:#1A0A0E;\n    --bg2:#240D13;\n    --panel:rgba(255,255,255,0.05);\n    --text:#F6ECE6;\n    --text-2:#C9A7AD;\n    --gold:#E6C07A;\n    --gold-2:#C99A4E;\n    --line:rgba(255,220,190,0.12);\n\n    --r-sm:14px;\n    --r-md:20px;\n    --r-lg:28px;\n    --r-2xl:34px;\n\n    --ease:cubic-bezier(0.22,1,0.36,1);\n    --t-fast:180ms;\n    --t-med:220ms;\n    --t-slow:260ms;\n\n    --shadow-soft:\n      0 1px 2px rgba(0,0,0,0.35),\n      0 8px 24px rgba(0,0,0,0.35),\n      0 28px 64px rgba(0,0,0,0.45);\n    --shadow-glass:\n      0 1px 0 rgba(255,255,255,0.06) inset,\n      0 18px 50px rgba(0,0,0,0.55),\n      0 40px 110px rgba(0,0,0,0.55);\n\n    --maxw:1200px;\n  }\n\n  *,*::before,*::after{box-sizing:border-box}\n\n  html{scroll-behavior:smooth}\n\n  body{\n    margin:0;\n    background:\n      radial-gradient(1100px 600px at 78% -8%, rgba(230,192,122,0.10), transparent 60%),\n      radial-gradient(900px 520px at 8% 4%, rgba(140,30,55,0.30), transparent 60%),\n      linear-gradient(180deg, var(--bg2), var(--bg) 42%);\n    background-attachment:fixed;\n    color:var(--text);\n    font-family:\"Inter\", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;\n    line-height:1.6;\n    min-height:100vh;\n    -webkit-font-smoothing:antialiased;\n    text-rendering:optimizeLegibility;\n    overflow-x:hidden;\n  }\n\n  a{color:inherit;text-decoration:none}\n\n  img{max-width:100%;display:block}\n\n  /* ---------- Skip-Link ---------- */\n  .skip-link{\n    position:fixed;\n    top:-200px;\n    left:16px;\n    z-index:1000;\n    background:var(--gold);\n    color:#26100A;\n    padding:12px 18px;\n    border-radius:var(--r-sm);\n    font-family:\"Space Grotesk\",sans-serif;\n    font-weight:600;\n    box-shadow:var(--shadow-soft);\n    transition:top var(--t-med) var(--ease);\n  }\n  .skip-link:focus{top:14px}\n\n  :focus-visible{\n    outline:2px solid var(--gold);\n    outline-offset:3px;\n    border-radius:6px;\n  }\n\n  .wrap{\n    width:100%;\n    max-width:var(--maxw);\n    margin-inline:auto;\n    padding-inline:clamp(16px,4vw,32px);\n  }\n\n  /* ============================================================\n     HEADER / NAVBAR\n     ============================================================ */\n  .site-header{\n    position:sticky;\n    top:0;\n    z-index:200;\n    backdrop-filter:saturate(140%) blur(14px);\n    -webkit-backdrop-filter:saturate(140%) blur(14px);\n    background:linear-gradient(180deg, rgba(26,10,14,0.82), rgba(26,10,14,0.58));\n    border-bottom:1px solid var(--line);\n  }\n\n  .nav{\n    display:flex;\n    align-items:center;\n    gap:18px;\n    height:74px;\n  }\n\n  .brand{\n    display:inline-flex;\n    align-items:center;\n    gap:11px;\n    font-family:\"Space Grotesk\",sans-serif;\n    font-weight:700;\n    letter-spacing:0.14em;\n    font-size:0.98rem;\n    text-transform:uppercase;\n    white-space:nowrap;\n    padding:8px 6px;\n    border-radius:var(--r-sm);\n    transition:transform var(--t-fast) var(--ease);\n  }\n  .brand:hover{transform:translateY(-1px)}\n  .brand .mark{\n    width:30px;height:30px;flex:0 0 auto;\n    border-radius:9px;\n    display:grid;place-items:center;\n    background:linear-gradient(150deg, var(--gold), var(--gold-2));\n    color:#2A1108;\n    font-weight:700;\n    box-shadow:0 6px 16px rgba(230,192,122,0.30);\n  }\n  .brand .sub{color:var(--text-2);font-weight:500;letter-spacing:0.18em;font-size:0.62rem}\n\n  .nav-spacer{flex:1 1 auto}\n\n  .nav-list{\n    display:flex;\n    align-items:center;\n    gap:4px;\n    list-style:none;\n    margin:0;padding:0;\n  }\n\n  .nav-link,\n  .nav-trigger{\n    font-family:\"Space Grotesk\",sans-serif;\n    font-weight:500;\n    font-size:0.95rem;\n    color:var(--text);\n    background:transparent;\n    border:0;\n    cursor:pointer;\n    display:inline-flex;\n    align-items:center;\n    gap:7px;\n    min-height:44px;\n    padding:0 16px;\n    border-radius:var(--r-md);\n    transition:background var(--t-fast) var(--ease),\n               color var(--t-fast) var(--ease),\n               transform var(--t-fast) var(--ease);\n  }\n  .nav-link:hover,\n  .nav-trigger:hover{background:var(--panel);color:var(--gold)}\n  .nav-link::after{\n    content:\"\";\n    display:block;\n    height:2px;width:0;\n    margin-top:2px;\n    border-radius:2px;\n    background:linear-gradient(90deg,var(--gold),var(--gold-2));\n    transition:width var(--t-med) var(--ease);\n  }\n  .nav-link:hover::after{width:18px}\n\n  .nav-trigger .chev{\n    width:14px;height:14px;\n    transition:transform var(--t-med) var(--ease);\n  }\n  .nav-trigger[aria-expanded=\"true\"] .chev{transform:rotate(180deg)}\n  .nav-trigger[aria-expanded=\"true\"]{background:var(--panel);color:var(--gold)}\n\n  /* CTA (magnetisch) */\n  .cta{\n    font-family:\"Space Grotesk\",sans-serif;\n    font-weight:600;\n    font-size:0.92rem;\n    color:#28110A;\n    background:linear-gradient(150deg, var(--gold), var(--gold-2));\n    border:0;\n    cursor:pointer;\n    min-height:44px;\n    padding:0 20px;\n    border-radius:999px;\n    box-shadow:0 8px 22px rgba(230,192,122,0.26);\n    transition:transform var(--t-med) var(--ease),\n               box-shadow var(--t-med) var(--ease),\n               filter var(--t-fast) var(--ease);\n    will-change:transform;\n  }\n  .cta:hover{filter:brightness(1.04);box-shadow:0 12px 30px rgba(230,192,122,0.36)}\n  .cta:active{transform:scale(0.98)}\n\n  /* ---------- Mega-Menue (Bento) ---------- */\n  .has-mega{position:static}\n\n  .mega{\n    position:absolute;\n    left:50%;\n    top:calc(74px + 8px);\n    transform:translateX(-50%) translateY(8px);\n    width:min(1120px, calc(100vw - 24px));\n    z-index:190;\n\n    background:linear-gradient(180deg, rgba(48,18,24,0.72), rgba(30,11,16,0.78));\n    backdrop-filter:saturate(160%) blur(22px);\n    -webkit-backdrop-filter:saturate(160%) blur(22px);\n    border:1px solid var(--line);\n    border-radius:var(--r-2xl);\n    box-shadow:var(--shadow-glass);\n    padding:18px;\n\n    opacity:0;\n    visibility:hidden;\n    pointer-events:none;\n    transition:opacity var(--t-slow) var(--ease),\n               transform var(--t-slow) var(--ease),\n               visibility 0s linear var(--t-slow);\n  }\n  .mega.open{\n    opacity:1;\n    visibility:visible;\n    pointer-events:auto;\n    transform:translateX(-50%) translateY(0);\n    transition:opacity var(--t-slow) var(--ease),\n               transform var(--t-slow) var(--ease),\n               visibility 0s;\n  }\n\n  .mega-head{\n    display:flex;\n    align-items:baseline;\n    justify-content:space-between;\n    gap:16px;\n    padding:6px 8px 14px;\n  }\n  .mega-head h2{\n    margin:0;\n    font-family:\"Space Grotesk\",sans-serif;\n    font-weight:600;\n    font-size:0.86rem;\n    letter-spacing:0.16em;\n    text-transform:uppercase;\n    color:var(--gold);\n  }\n  .mega-head .hint{color:var(--text-2);font-size:0.8rem}\n\n  /* Bento Grid */\n  .bento{\n    display:grid;\n    grid-template-columns:repeat(4,1fr);\n    grid-auto-rows:128px;\n    gap:14px;\n  }\n\n  .tile{\n    position:relative;\n    overflow:hidden;\n    border-radius:var(--r-lg);\n    border:1px solid var(--line);\n    background:var(--panel);\n    padding:16px;\n    display:flex;\n    flex-direction:column;\n    justify-content:flex-end;\n    min-height:44px;\n    transition:transform var(--t-med) var(--ease),\n               border-color var(--t-med) var(--ease),\n               box-shadow var(--t-med) var(--ease);\n  }\n  .tile:hover{\n    transform:scale(1.02);\n    border-color:rgba(230,192,122,0.36);\n    box-shadow:0 14px 36px rgba(0,0,0,0.4);\n  }\n  .tile:focus-visible{transform:scale(1.02)}\n\n  /* abgerundeter Medien-Platzhalter (markiert) */\n  .tile .media{\n    position:absolute;\n    inset:0;\n    background:\n      radial-gradient(120% 120% at 80% 0%, rgba(230,192,122,0.18), transparent 55%),\n      linear-gradient(160deg, rgba(140,30,55,0.42), rgba(26,10,14,0.20));\n    z-index:0;\n  }\n  .tile .media::after{\n    content:\"PLATZHALTER\";\n    position:absolute;\n    top:10px;left:12px;\n    font-family:\"Space Grotesk\",sans-serif;\n    font-size:0.56rem;\n    letter-spacing:0.18em;\n    color:var(--text-2);\n    border:1px solid var(--line);\n    border-radius:999px;\n    padding:3px 8px;\n    background:rgba(0,0,0,0.25);\n  }\n  .tile .t-body{position:relative;z-index:1}\n  .tile .t-kicker{\n    font-size:0.66rem;\n    letter-spacing:0.16em;\n    text-transform:uppercase;\n    color:var(--gold);\n    font-family:\"Space Grotesk\",sans-serif;\n    margin-bottom:3px;\n  }\n  .tile .t-title{\n    font-family:\"Space Grotesk\",sans-serif;\n    font-weight:600;\n    font-size:1.04rem;\n    color:var(--text);\n  }\n  .tile .t-desc{color:var(--text-2);font-size:0.82rem;margin-top:2px}\n\n  /* Groessenvarianten der Kacheln */\n  .t-uhren   {grid-column:span 2; grid-row:span 2}\n  .t-schmuck {grid-column:span 1; grid-row:span 2}\n  .t-trau    {grid-column:span 1; grid-row:span 1}\n  .t-service {grid-column:span 1; grid-row:span 1}\n  /* Feature-Kacheln */\n  .t-feature {\n    grid-column:span 2; grid-row:span 1;\n    background:linear-gradient(150deg, rgba(230,192,122,0.16), rgba(140,30,55,0.22));\n    border-color:rgba(230,192,122,0.30);\n  }\n  .t-feature .media{display:none}\n  .t-feature2{grid-column:span 2; grid-row:span 1}\n\n  .arrow{\n    align-self:flex-start;\n    margin-top:8px;\n    display:inline-flex;align-items:center;gap:6px;\n    color:var(--gold);\n    font-family:\"Space Grotesk\",sans-serif;\n    font-size:0.78rem;\n    transition:gap var(--t-fast) var(--ease);\n  }\n  .tile:hover .arrow{gap:11px}\n\n  /* ---------- Hamburger ---------- */\n  .menu-toggle{\n    display:none;\n    width:46px;height:46px;\n    align-items:center;justify-content:center;\n    background:var(--panel);\n    border:1px solid var(--line);\n    border-radius:var(--r-md);\n    cursor:pointer;\n    color:var(--text);\n    transition:background var(--t-fast) var(--ease);\n  }\n  .menu-toggle:hover{background:rgba(255,255,255,0.08)}\n  .menu-toggle .bars{position:relative;width:20px;height:14px}\n  .menu-toggle .bars span{\n    position:absolute;left:0;height:2px;width:100%;\n    background:var(--text);border-radius:2px;\n    transition:transform var(--t-med) var(--ease),opacity var(--t-fast) var(--ease);\n  }\n  .menu-toggle .bars span:nth-child(1){top:0}\n  .menu-toggle .bars span:nth-child(2){top:6px}\n  .menu-toggle .bars span:nth-child(3){top:12px}\n  .menu-toggle[aria-expanded=\"true\"] .bars span:nth-child(1){transform:translateY(6px) rotate(45deg)}\n  .menu-toggle[aria-expanded=\"true\"] .bars span:nth-child(2){opacity:0}\n  .menu-toggle[aria-expanded=\"true\"] .bars span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}\n\n  /* ============================================================\n     MOBILE\n     ============================================================ */\n  .mobile-panel{display:none}\n\n  @media (max-width:860px){\n    .nav-list,.nav .cta.desktop-cta{display:none}\n    .menu-toggle{display:inline-flex}\n\n    .mobile-panel{\n      display:block;\n      overflow:hidden;\n      max-height:0;\n      opacity:0;\n      transition:max-height var(--t-slow) var(--ease),\n                 opacity var(--t-med) var(--ease);\n      border-bottom:1px solid var(--line);\n      background:linear-gradient(180deg, rgba(36,13,19,0.96), rgba(26,10,14,0.96));\n      backdrop-filter:blur(14px);\n      -webkit-backdrop-filter:blur(14px);\n    }\n    .mobile-panel.open{max-height:90vh;opacity:1;overflow-y:auto}\n\n    .m-inner{padding:14px clamp(16px,4vw,32px) 26px}\n\n    .m-item{\n      display:block;\n      width:100%;\n      text-align:left;\n      font-family:\"Space Grotesk\",sans-serif;\n      font-size:1.04rem;\n      color:var(--text);\n      background:transparent;border:0;\n      border-bottom:1px solid var(--line);\n      padding:16px 6px;\n      min-height:44px;\n      cursor:pointer;\n    }\n    .m-acc-trigger{\n      display:flex;align-items:center;justify-content:space-between;\n    }\n    .m-acc-trigger .chev{width:16px;height:16px;transition:transform var(--t-med) var(--ease)}\n    .m-acc-trigger[aria-expanded=\"true\"] .chev{transform:rotate(180deg)}\n\n    .m-acc-content{\n      overflow:hidden;\n      max-height:0;\n      transition:max-height var(--t-slow) var(--ease);\n    }\n    .m-acc-content.open{max-height:760px}\n    .m-sub{\n      display:block;\n      color:var(--text-2);\n      padding:13px 10px;\n      min-height:44px;\n      border-bottom:1px solid var(--line);\n      font-size:0.96rem;\n    }\n    .m-sub .lead{color:var(--gold);font-family:\"Space Grotesk\",sans-serif;font-weight:600}\n    .m-sub:last-child{border-bottom:0}\n\n    .m-cta{\n      display:block;text-align:center;\n      margin-top:18px;\n      font-family:\"Space Grotesk\",sans-serif;font-weight:600;\n      color:#28110A;\n      background:linear-gradient(150deg,var(--gold),var(--gold-2));\n      border-radius:999px;\n      padding:15px;min-height:44px;\n    }\n\n    /* Desktop-Mega nie auf Mobile zeigen */\n    .mega{display:none !important}\n  }\n\n  /* ============================================================\n     HERO + CONTENT\n     ============================================================ */\n  main{display:block}\n\n  .hero{position:relative;padding:clamp(56px,9vw,120px) 0 clamp(40px,6vw,80px);overflow:hidden}\n  .hero .glow{\n    position:absolute;\n    inset:auto;\n    width:680px;height:680px;\n    right:-160px;top:-180px;\n    background:radial-gradient(closest-side, rgba(230,192,122,0.20), transparent 70%);\n    filter:blur(8px);\n    pointer-events:none;\n    z-index:0;\n  }\n  .hero .glow.two{\n    left:-200px;top:120px;\n    width:560px;height:560px;\n    background:radial-gradient(closest-side, rgba(140,30,55,0.40), transparent 70%);\n  }\n  .hero-inner{position:relative;z-index:1;display:grid;grid-template-columns:1.1fr 0.9fr;gap:clamp(28px,5vw,60px);align-items:center}\n\n  .eyebrow{\n    display:inline-flex;align-items:center;gap:9px;\n    font-family:\"Space Grotesk\",sans-serif;\n    font-size:0.74rem;letter-spacing:0.2em;text-transform:uppercase;\n    color:var(--gold);\n    border:1px solid var(--line);\n    border-radius:999px;\n    padding:8px 14px;\n    background:var(--panel);\n    margin-bottom:22px;\n  }\n  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}\n\n  .hero h1{\n    font-family:\"Fraunces\", Georgia, serif;\n    font-weight:500;\n    font-size:clamp(2.6rem,6.4vw,4.6rem);\n    line-height:1.02;\n    letter-spacing:-0.01em;\n    margin:0 0 20px;\n  }\n  .hero h1 .em{\n    font-style:italic;\n    background:linear-gradient(120deg,var(--gold),#F4DDA9 60%,var(--gold-2));\n    -webkit-background-clip:text;background-clip:text;color:transparent;\n  }\n  .hero p.lead{color:var(--text-2);font-size:clamp(1rem,1.6vw,1.18rem);max-width:46ch;margin:0 0 30px}\n\n  .hero-actions{display:flex;gap:14px;flex-wrap:wrap}\n  .btn-ghost{\n    font-family:\"Space Grotesk\",sans-serif;font-weight:500;\n    color:var(--text);background:var(--panel);\n    border:1px solid var(--line);\n    border-radius:999px;\n    min-height:44px;padding:0 22px;\n    display:inline-flex;align-items:center;\n    transition:background var(--t-fast) var(--ease),transform var(--t-fast) var(--ease);\n  }\n  .btn-ghost:hover{background:rgba(255,255,255,0.09);transform:translateY(-1px)}\n\n  .hero-media{\n    position:relative;\n    aspect-ratio:4/5;\n    border-radius:var(--r-2xl);\n    border:1px solid var(--line);\n    background:\n      radial-gradient(120% 90% at 78% 6%, rgba(230,192,122,0.20), transparent 55%),\n      linear-gradient(160deg, rgba(140,30,55,0.45), rgba(26,10,14,0.30));\n    box-shadow:var(--shadow-glass);\n    overflow:hi
