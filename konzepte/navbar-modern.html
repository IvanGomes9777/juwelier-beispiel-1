     \u003cspan class=\"rail__label\">Beratung buchen\u003c/span>\n      \u003c/a>\n    \u003c/nav>\n  \u003c/header>\n\n  \u003c!-- ============== MOBILE TOP BAR ============== -->\n  \u003cdiv class=\"topbar\">\n    \u003cdiv class=\"topbar__brand\">\n      \u003cspan class=\"topbar__mark\" aria-hidden=\"true\">MA\u003c/span>\n      \u003cspan class=\"topbar__name\">Maison Aurelie\u003c/span>\n    \u003c/div>\n    \u003cbutton class=\"hamburger\" id=\"menuBtn\" aria-label=\"Menue oeffnen\" aria-expanded=\"false\" aria-controls=\"mMenu\">\n      \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" aria-hidden=\"true\">\u003cpath d=\"M4 7h16M4 12h16M4 17h16\"/>\u003c/svg>\n    \u003c/button>\n  \u003c/div>\n\n  \u003c!-- ============== MOBILE MENU OVERLAY ============== -->\n  \u003cdiv class=\"m-menu\" id=\"mMenu\" aria-hidden=\"true\">\n    \u003cdiv class=\"m-menu__scrim\" data-close>\u003c/div>\n    \u003cnav class=\"m-menu__panel\" aria-label=\"Mobile Navigation\">\n      \u003cdiv class=\"m-menu__head\">\n        \u003cspan class=\"m-menu__title\">Navigation\u003c/span>\n        \u003cbutton class=\"m-close\" id=\"menuClose\" aria-label=\"Menue schliessen\">\n          \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" aria-hidden=\"true\">\u003cpath d=\"M6 6l12 12M18 6 6 18\"/>\u003c/svg>\n        \u003c/button>\n      \u003c/div>\n\n      \u003ca class=\"m-link is-active\" href=\"#trauringe\" aria-current=\"page\" data-mlink>\n        \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\">\u003ccircle cx=\"8.5\" cy=\"14\" r=\"5.5\"/>\u003ccircle cx=\"15.5\" cy=\"14\" r=\"5.5\"/>\u003cpath d=\"M9.2 4.6 8.5 8 7.8 4.6 8.5 3z\"/>\u003c/svg>\n        Trauringe\n      \u003c/a>\n      \u003ca class=\"m-link\" href=\"#uhren\" data-mlink>\n        \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\">\u003ccircle cx=\"12\" cy=\"13\" r=\"6.5\"/>\u003cpath d=\"M12 9.5V13l2.2 1.5M9 3h6\"/>\u003c/svg>\n        Uhren\n      \u003c/a>\n      \u003ca class=\"m-link\" href=\"#schmuck\" data-mlink>\n        \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\">\u003cpath d=\"M12 3 8 8l4 13 4-13z\"/>\u003cpath d=\"M5 8h14\"/>\u003c/svg>\n        Schmuck\n      \u003c/a>\n      \u003ca class=\"m-link\" href=\"#manufaktur\" data-mlink>\n        \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\">\u003cpath d=\"M14.5 5.5a3 3 0 0 1 0 4.2L7.7 16.5l-3.2.8.8-3.2 6.8-6.8a3 3 0 0 1 2.4-.8z\"/>\u003cpath d=\"M13 7l3 3\"/>\u003c/svg>\n        Manufaktur\n      \u003c/a>\n      \u003ca class=\"m-link\" href=\"#termin\" data-mlink>\n        \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\">\u003crect x=\"3.5\" y=\"5\" width=\"17\" height=\"15\" rx=\"2.5\"/>\u003cpath d=\"M3.5 9.5h17M8 3v4M16 3v4\"/>\u003c/svg>\n        Termin\n      \u003c/a>\n\n      \u003ca class=\"m-menu__cta\" href=\"#termin\" data-mlink>Beratung buchen\u003c/a>\n    \u003c/nav>\n  \u003c/div>\n\n  \u003c!-- ============== MAIN ============== -->\n  \u003cmain id=\"main\" class=\"shell\">\n\n    \u003csection class=\"hero\" id=\"trauringe\">\n      \u003cdiv class=\"hero__glow\" aria-hidden=\"true\">\u003c/div>\n      \u003cspan class=\"eyebrow\">Juwelier seit 1978\u003c/span>\n      \u003ch1>Bordeaux trifft \u003cem>Gold\u003c/em>, gefertigt in Duesseldorf.\u003c/h1>\n      \u003cp>Feine Trauringe, exklusive Uhren und individueller Schmuck aus eigener Manufaktur. Jedes Stueck entsteht in Handarbeit, abgestimmt auf Ihre Geschichte.\u003c/p>\n      \u003cdiv class=\"hero__actions\">\n        \u003ca class=\"btn btn--gold\" href=\"#termin\">Beratung buchen\u003c/a>\n        \u003ca class=\"btn btn--ghost\" href=\"#schmuck\">Kollektion ansehen\u003c/a>\n      \u003c/div>\n\n      \u003cdiv class=\"media\" role=\"img\" aria-label=\"Platzhalter fuer Atelier-Aufnahme der Manufaktur\">\n        \u003cspan class=\"media__tag\">Medien-Platzhalter 16:9\u003c/span>\n      \u003c/div>\n    \u003c/section>\n\n    \u003csection id=\"schmuck\">\n      \u003cdiv class=\"section-head\">\n        \u003ch2>Unsere Welten\u003c/h2>\n        \u003cp>Von der ersten Skizze bis zum fertigen Unikat begleiten wir Sie durch jeden Schritt.\u003c/p>\n      \u003c/div>\n\n      \u003cdiv class=\"bento\">\n        \u003carticle class=\"card card--wide\">\n          \u003cdiv class=\"card__ico\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"8.5\" cy=\"14\" r=\"5.5\"/>\u003ccircle cx=\"15.5\" cy=\"14\" r=\"5.5\"/>\u003c/svg>\n          \u003c/div>\n          \u003ch3>Trauringe nach Mass\u003c/h3>\n          \u003cp>Gemeinsam entwerfen wir Ringe, die zu Ihnen passen. Edelmetalle, Profile und Steine frei waehlbar.\u003c/p>\n        \u003c/article>\n\n        \u003carticle class=\"card card--tall\" id=\"uhren\">\n          \u003cdiv class=\"card__ico\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"12\" cy=\"13\" r=\"6.5\"/>\u003cpath d=\"M12 9.5V13l2.2 1.5\"/>\u003c/svg>\n          \u003c/div>\n          \u003ch3>Uhren-Atelier\u003c/h3>\n          \u003cp>Kuratierte Auswahl mechanischer Zeitmesser, fachkundige Wartung und Restauration im Haus.\u003c/p>\n        \u003c/article>\n\n        \u003carticle class=\"card\">\n          \u003cdiv class=\"card__num\">48h\u003c/div>\n          \u003ch3>Express-Service\u003c/h3>\n          \u003cp>Reparaturen und Anpassungen oft binnen zwei Werktagen erledigt.\u003c/p>\n        \u003c/article>\n\n        \u003carticle class=\"card\" id=\"manufaktur\">\n          \u003cdiv class=\"card__ico\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M14.5 5.5a3 3 0 0 1 0 4.2L7.7 16.5l-3.2.8.8-3.2 6.8-6.8a3 3 0 0 1 2.4-.8z\"/>\u003c/svg>\n          \u003c/div>\n          \u003ch3>Eigene Manufaktur\u003c/h3>\n          \u003cp>Goldschmiede-Handwerk auf hoechstem Niveau, mitten in Duesseldorf.\u003c/p>\n        \u003c/article>\n\n        \u003carticle class=\"card card--wide\" id=\"termin\">\n          \u003cdiv class=\"card__ico\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"3.5\" y=\"5\" width=\"17\" height=\"15\" rx=\"2.5\"/>\u003cpath d=\"M3.5 9.5h17M8 3v4M16 3v4\"/>\u003c/svg>\n          \u003c/div>\n          \u003ch3>Persoenliche Beratung\u003c/h3>\n          \u003cp>Vereinbaren Sie einen Termin in unserem Salon und erleben Sie Beratung ganz in Ruhe.\u003c/p>\n        \u003c/article>\n      \u003c/div>\n    \u003c/section>\n\n    \u003cfooter>\n      \u003cspan>Maison Aurelie, Koenigsallee, Duesseldorf\u003c/span>\n      \u003cspan>Bordeaux und Gold, Ausfuehrung 2025\u003c/span>\n    \u003c/footer>\n\n  \u003c/main>\n\n  \u003cscript>\n    (function () {\n      var menuBtn = document.getElementById('menuBtn');\n      var menu = document.getElementById('mMenu');\n      var closeBtn = document.getElementById('menuClose');\n      var lastFocus = null;\n\n      function focusable() {\n        return menu.querySelectorAll('a[href], button:not([disabled])');\n      }\n\n      function openMenu() {\n        lastFocus = document.activeElement;\n        menu.classList.add('is-open');\n        menu.setAttribute('aria-hidden', 'false');\n        menuBtn.setAttribute('aria-expanded', 'true');\n        document.body.style.overflow = 'hidden';\n        var f = focusable();\n        if (f.length) f[0].focus();\n        document.addEventListener('keydown', onKey);\n      }\n\n      function closeMenu() {\n        menu.classList.remove('is-open');\n        menu.setAttribute('aria-hidden', 'true');\n        menuBtn.setAttribute('aria-expanded', 'false');\n        document.body.style.overflow = '';\n        document.removeEventListener('keydown', onKey);\n        if (lastFocus) lastFocus.focus();\n      }\n\n      function onKey(e) {\n        if (e.key === 'Escape') { closeMenu(); return; }\n        if (e.key === 'Tab') {\n          var f = focusable();\n          if (!f.length) return;\n          var first = f[0], last = f[f.length - 1];\n          if (e.shiftKey && document.activeElement === first) {\n            e.preventDefault(); last.focus();\n          } else if (!e.shiftKey && document.activeElement === last) {\n            e.preventDefault(); first.focus();\n          }\n        }\n      }\n\n      menuBtn.addEventListener('click', openMenu);\n      closeBtn.addEventListener('click', closeMenu);\n      menu.querySelector('[data-close]').addEventListener('click', closeMenu);\n      menu.querySelectorAll('[data-mlink]').forEach(function (l) {\n        l.addEventListener('click', closeMenu);\n      });\n    })();\n  \u003c/script>\n\n\u003c/body>\n\u003c/html>\n"},
  {name:"Smart Hide", desc:"Blendet beim Runterscrollen aus, beim Hochscrollen ein; feine Scroll-Progressline.", file:"m8-smart-hide.html", html:"\u003c!DOCTYPE html>\n\u003chtml lang=\"de\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\" />\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1\" />\n\u003ctitle>MAISON AURELIE - Feinste Juwelierkunst aus Duesseldorf\u003c/title>\n\n\u003c!--\n  ============================================================================\n  MAISON AURELIE - Duesseldorf\n  Konzept: \"Bordeaux & Gold\" - MODERNE Ausfuehrung 2025\n  Navbar-Konzept M8: \"Smart Hide + Scroll-Progress\"\n  ----------------------------------------------------------------------------\n  - Glas-Leiste blendet beim Herunterscrollen sanft aus, beim Hochscrollen\n    sofort wieder ein (smart hide/reveal), rAF-gedrosselt.\n  - Sehr feine Gold-Fortschrittslinie am unteren Leistenrand zeigt die\n    Scroll-/Lese-Position der Seite.\n  - Wordmark links, Links mittig, \"Termin\"-CTA rechts (magnetisch \u003c=6px).\n  - A11y: Skip-Link, semantik (header/nav aria-label), Navbar bleibt bei\n    Tastatur-Fokus immer sichtbar, Mobile-Menue mit aria-expanded/controls,\n    ESC, Schliessen-Button, Fokus-Trap, :focus-visible, Touch >=44px.\n  - prefers-reduced-motion: kein Auto-Hide (immer sichtbar), Progress ohne\n    Transition.\n  - Standalone / offline lauffaehig (nur Google-Fonts via CDN-Link).\n  - PROD: next/font lokal statt Google-Fonts-Link verwenden.\n  ============================================================================\n-->\n\n\u003c!-- PROD: next/font lokal -->\n\u003clink rel=\"preconnect\" href=\"https://fonts.googleapis.com\" />\n\u003clink rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin />\n\u003clink\n  href=\"https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap\"\n  rel=\"stylesheet\"\n/>\n\n\u003cstyle>\n  :root {\n    --bg: #1A0A0E;\n    --bg2: #240D13;\n    --panel: rgba(255, 255, 255, 0.05);\n    --text: #F6ECE6;\n    --text-2: #C9A7AD;\n    --gold: #E6C07A;\n    --gold-2: #C99A4E;\n    --line: rgba(255, 220, 190, 0.12);\n\n    --ease: cubic-bezier(0.22, 1, 0.36, 1);\n    --t-fast: 180ms var(--ease);\n    --t-med: 220ms var(--ease);\n    --t-slow: 260ms var(--ease);\n\n    --nav-h: 72px;\n    --radius-pill: 999px;\n    --radius-2xl: 28px;\n    --radius-xl: 20px;\n    --maxw: 1180px;\n  }\n\n  * { box-sizing: border-box; }\n\n  html { scroll-behavior: smooth; }\n\n  body {\n    margin: 0;\n    background:\n      radial-gradient(1200px 800px at 80% -10%, rgba(230, 192, 122, 0.10), transparent 60%),\n      radial-gradient(900px 700px at -10% 10%, rgba(201, 154, 78, 0.08), transparent 55%),\n      linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);\n    background-attachment: fixed;\n    color: var(--text);\n    font-family: \"Inter\", system-ui, -apple-system, sans-serif;\n    font-size: 17px;\n    line-height: 1.65;\n    -webkit-font-smoothing: antialiased;\n    overflow-x: hidden;\n  }\n\n  a { color: inherit; text-decoration: none; }\n\n  h1, h2, h3 { font-family: \"Space Grotesk\", system-ui, sans-serif; line-height: 1.1; margin: 0; }\n\n  ::selection { background: rgba(230, 192, 122, 0.28); color: var(--text); }\n\n  /* ---------- Skip-Link ---------- */\n  .skip-link {\n    position: fixed;\n    top: 10px;\n    left: 50%;\n    transform: translate(-50%, -160%);\n    z-index: 200;\n    background: var(--gold);\n    color: #2A0E13;\n    font-weight: 600;\n    padding: 12px 20px;\n    border-radius: var(--radius-pill);\n    transition: transform var(--t-med);\n  }\n  .skip-link:focus {\n    transform: translate(-50%, 0);\n    outline: 2px solid var(--text);\n    outline-offset: 2px;\n  }\n\n  /* ---------- Navbar ---------- */\n  .navbar {\n    position: fixed;\n    top: 14px;\n    left: 50%;\n    transform: translateX(-50%) translateY(0);\n    width: min(calc(100% - 28px), var(--maxw));\n    z-index: 100;\n    transition: transform var(--t-slow), box-shadow var(--t-med), background var(--t-med);\n    will-change: transform;\n  }\n  /* Hidden state (smart hide) */\n  .navbar[data-hidden=\"true\"] {\n    transform: translateX(-50%) translateY(calc(-100% - 24px));\n  }\n\n  .navbar__inner {\n    position: relative;\n    height: var(--nav-h);\n    display: flex;\n    align-items: center;\n    gap: 18px;\n    padding: 0 12px 0 22px;\n    border-radius: var(--radius-pill);\n    border: 1px solid var(--line);\n    background: rgba(36, 13, 19, 0.55);\n    backdrop-filter: blur(18px) saturate(140%);\n    -webkit-backdrop-filter: blur(18px) saturate(140%);\n    box-shadow: 0 18px 50px -22px rgba(0, 0, 0, 0.75);\n    overflow: hidden;\n  }\n\n  /* ---------- Wordmark ---------- */\n  .wordmark {\n    display: inline-flex;\n    align-items: center;\n    gap: 11px;\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    letter-spacing: 0.16em;\n    font-size: 14px;\n    text-transform: uppercase;\n    white-space: nowrap;\n    padding: 8px 4px;\n    border-radius: 12px;\n  }\n  .wordmark__dot {\n    width: 22px;\n    height: 22px;\n    border-radius: 50%;\n    background: radial-gradient(circle at 32% 28%, var(--gold), var(--gold-2) 75%);\n    box-shadow: 0 0 0 1px rgba(230, 192, 122, 0.35), 0 6px 16px -6px var(--gold-2);\n    flex: none;\n  }\n  .wordmark b { font-weight: 700; }\n  .wordmark span { color: var(--gold); }\n\n  /* ---------- Nav links (center) ---------- */\n  .nav-links {\n    display: flex;\n    align-items: center;\n    gap: 4px;\n    margin: 0 auto;\n    list-style: none;\n    padding: 0;\n  }\n  .nav-links a {\n    position: relative;\n    display: inline-flex;\n    align-items: center;\n    min-height: 44px;\n    padding: 0 16px;\n    border-radius: var(--radius-pill);\n    color: var(--text-2);\n    font-weight: 500;\n    font-size: 15px;\n    letter-spacing: 0.01em;\n    transition: color var(--t-fast), background var(--t-fast);\n  }\n  .nav-links a::after {\n    content: \"\";\n    position: absolute;\n    left: 16px;\n    right: 16px;\n    bottom: 9px;\n    height: 1.5px;\n    border-radius: 2px;\n    background: linear-gradient(90deg, var(--gold), var(--gold-2));\n    transform: scaleX(0);\n    transform-origin: left;\n    transition: transform var(--t-med);\n  }\n  .nav-links a:hover { color: var(--text); background: rgba(255, 255, 255, 0.04); }\n  .nav-links a:hover::after { transform: scaleX(1); }\n\n  /* ---------- CTA ---------- */\n  .nav-cta {\n    position: relative;\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    min-height: 46px;\n    padding: 0 22px;\n    border-radius: var(--radius-pill);\n    background: linear-gradient(135deg, var(--gold), var(--gold-2));\n    color: #2A0E13;\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    font-size: 15px;\n    letter-spacing: 0.02em;\n    white-space: nowrap;\n    box-shadow: 0 10px 26px -10px rgba(230, 192, 122, 0.55);\n    transition: transform var(--t-fast), box-shadow var(--t-med), filter var(--t-fast);\n    flex: none;\n  }\n  .nav-cta:hover { box-shadow: 0 16px 34px -10px rgba(230, 192, 122, 0.7); filter: brightness(1.04); }\n  .nav-cta:active { transform: scale(0.97); }\n  .nav-cta svg { width: 16px; height: 16px; }\n\n  /* ---------- Progress line ---------- */\n  .nav-progress {\n    position: absolute;\n    left: 16px;\n    right: 16px;\n    bottom: 7px;\n    height: 2px;\n    border-radius: 2px;\n    background: rgba(255, 220, 190, 0.10);\n    overflow: hidden;\n  }\n  .nav-progress__bar {\n    height: 100%;\n    width: 100%;\n    transform-origin: left;\n    transform: scaleX(0);\n    border-radius: 2px;\n    background: linear-gradient(90deg, var(--gold-2), var(--gold));\n    box-shadow: 0 0 10px -1px rgba(230, 192, 122, 0.7);\n  }\n\n  /* ---------- Mobile toggle ---------- */\n  .nav-toggle {\n    display: none;\n    align-items: center;\n    justify-content: center;\n    width: 46px;\n    height: 46px;\n    border-radius: var(--radius-pill);\n    border: 1px solid var(--line);\n    background: rgba(255, 255, 255, 0.04);\n    color: var(--text);\n    cursor: pointer;\n    flex: none;\n    transition: background var(--t-fast), transform var(--t-fast);\n  }\n  .nav-toggle:hover { background: rgba(255, 255, 255, 0.08); }\n  .nav-toggle:active { transform: scale(0.94); }\n  .nav-toggle svg { width: 22px; height: 22px; }\n\n  /* ---------- Mobile menu panel ---------- */\n  .mobile-menu {\n    position: fixed;\n    inset: 0;\n    z-index: 110;\n    display: none;\n    padding: 90px 16px 24px;\n  }\n  .mobile-menu[data-open=\"true\"] { display: block; }\n  .mobile-menu__overlay {\n    position: absolute;\n    inset: 0;\n    background: rgba(8, 3, 5, 0.6);\n    backdrop-filter: blur(6px);\n    -webkit-backdrop-filter: blur(6px);\n    opacity: 0;\n    transition: opacity var(--t-med);\n  }\n  .mobile-menu[data-open=\"true\"] .mobile-menu__overlay { opacity: 1; }\n  .mobile-menu__panel {\n    position: relative;\n    max-width: 460px;\n    margin: 0 auto;\n    border-radius: var(--radius-2xl);\n    border: 1px solid var(--line);\n    background: rgba(36, 13, 19, 0.85);\n    backdrop-filter: blur(22px) saturate(140%);\n    -webkit-backdrop-filter: blur(22px) saturate(140%);\n    box-shadow: 0 30px 70px -28px rgba(0, 0, 0, 0.85);\n    padding: 18px;\n    transform: translateY(-12px);\n    opacity: 0;\n    transition: transform var(--t-slow), opacity var(--t-med);\n  }\n  .mobile-menu[data-open=\"true\"] .mobile-menu__panel { transform: translateY(0); opacity: 1; }\n\n  .mobile-menu__head {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    margin-bottom: 8px;\n  }\n  .mobile-menu__close {\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    width: 46px;\n    height: 46px;\n    border-radius: var(--radius-pill);\n    border: 1px solid var(--line);\n    background: rgba(255, 255, 255, 0.04);\n    color: var(--text);\n    cursor: pointer;\n    transition: background var(--t-fast), transform var(--t-fast);\n  }\n  .mobile-menu__close:hover { background: rgba(255, 255, 255, 0.08); }\n  .mobile-menu__close:active { transform: scale(0.94); }\n  .mobile-menu__close svg { width: 22px; height: 22px; }\n\n  .mobile-menu__links { list-style: none; margin: 6px 0 0; padding: 0; }\n  .mobile-menu__links a {\n    display: flex;\n    align-items: center;\n    min-height: 54px;\n    padding: 0 14px;\n    border-radius: var(--radius-xl);\n    color: var(--text);\n    font-family: \"Space Grotesk\", sans-serif;\n    font-size: 19px;\n    font-weight: 500;\n    border-bottom: 1px solid var(--line);\n    transition: background var(--t-fast), padding-left var(--t-fast);\n  }\n  .mobile-menu__links li:last-child a { border-bottom: 0; }\n  .mobile-menu__links a:hover { background: rgba(255, 255, 255, 0.04); padding-left: 20px; }\n  .mobile-menu__cta {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    min-height: 54px;\n    margin-top: 14px;\n    border-radius: var(--radius-pill);\n    background: linear-gradient(135deg, var(--gold), var(--gold-2));\n    color: #2A0E13;\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    font-size: 17px;\n  }\n\n  /* ---------- Focus-visible ---------- */\n  :focus { outline: none; }\n  a:focus-visible,\n  button:focus-visible {\n    outline: 2px solid var(--gold);\n    outline-offset: 3px;\n    border-radius: var(--radius-pill);\n  }\n\n  /* ---------- Layout ---------- */\n  main { width: 100%; }\n  .wrap {\n    width: min(calc(100% - 40px), var(--maxw));\n    margin: 0 auto;\n  }\n\n  /* ---------- Hero ---------- */\n  .hero {\n    position: relative;\n    padding: 180px 0 90px;\n    text-align: center;\n  }\n  .hero__glow {\n    position: absolute;\n    top: 40px;\n    left: 50%;\n    transform: translateX(-50%);\n    width: 760px;\n    max-width: 110%;\n    height: 520px;\n    background: radial-gradient(closest-side, rgba(230, 192, 122, 0.20), transparent 70%);\n    filter: blur(20px);\n    pointer-events: none;\n    z-index: 0;\n  }\n  .hero > * { position: relative; z-index: 1; }\n  .eyebrow {\n    display: inline-flex;\n    align-items: center;\n    gap: 9px;\n    padding: 8px 16px;\n    border-radius: var(--radius-pill);\n    border: 1px solid var(--line);\n    background: var(--panel);\n    color: var(--gold);\n    font-size: 13px;\n    font-weight: 500;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    margin-bottom: 26px;\n  }\n  .eyebrow::before {\n    content: \"\";\n    width: 7px; height: 7px;\n    border-radius: 50%;\n    background: var(--gold);\n    box-shadow: 0 0 10px var(--gold);\n  }\n  .hero h1 {\n    font-family: \"Fraunces\", \"Space Grotesk\", serif;\n    font-weight: 500;\n    font-size: clamp(40px, 8vw, 84px);\n    letter-spacing: -0.02em;\n    margin-bottom: 22px;\n  }\n  .hero h1 em { font-style: italic; color: var(--gold); }\n  .hero p {\n    max-width: 620px;\n    margin: 0 auto 36px;\n    color: var(--text-2);\n    font-size: clamp(16px, 2.4vw, 19px);\n  }\n  .hero__actions { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; }\n  .btn {\n    display: inline-flex;\n    align-items: center;\n    gap: 9px;\n    min-height: 52px;\n    padding: 0 28px;\n    border-radius: var(--radius-pill);\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    font-size: 16px;\n    transition: transform var(--t-fast), box-shadow var(--t-med), background var(--t-fast);\n  }\n  .btn--primary {\n    background: linear-gradient(135deg, var(--gold), var(--gold-2));\n    color: #2A0E13;\n    box-shadow: 0 14px 34px -12px rgba(230, 192, 122, 0.6);\n  }\n  .btn--primary:hover { transform: translateY(-2px); box-shadow: 0 20px 42px -12px rgba(230, 192, 122, 0.72); }\n  .btn--ghost {\n    border: 1px solid var(--line);\n    background: var(--panel);\n    color: var(--text);\n  }\n  .btn--ghost:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); }\n\n  /* ---------- Media placeholder ---------- */\n  .hero__media {\n    position: relative;\n    margin: 64px auto 0;\n    max-width: 980px;\n    aspect-ratio: 16 / 8;\n    border-radius: var(--radius-2xl);\n    border: 1px solid var(--line);\n    background:\n      repeating-linear-gradient(135deg, rgba(255, 220, 190, 0.05) 0 12px, transparent 12px 24px),\n      linear-gradient(160deg, rgba(230, 192, 122, 0.08), rgba(36, 13, 19, 0.4));\n    box-shadow: 0 40px 90px -40px rgba(0, 0, 0, 0.8);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    overflow: hidden;\n  }\n  .media-tag {\n    padding: 8px 16px;\n    border-radius: var(--radius-pill);\n    border: 1px dashed rgba(230, 192, 122, 0.5);\n    background: rgba(26, 10, 14, 0.5);\n    color: var(--text-2);\n    font-size: 13px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n  }\n\n  /* ---------- Section ---------- */\n  .section { padding: 72px 0; }\n  .section__head { max-width: 640px; margin-bottom: 40px; }\n  .section__head .eyebrow { margin-bottom: 18px; }\n  .section h2 {\n    font-size: clamp(28px, 5vw, 46px);\n    letter-spacing: -0.02em;\n    margin-bottom: 14px;\n  }\n  .section h2 span { color: var(--gold); }\n  .section__head p { color: var(--text-2); margin: 0; }\n\n  /* ---------- Bento grid ---------- */\n  .bento {\n    display: grid;\n    grid-template-columns: repeat(6, 1fr);\n    gap: 18px;\n  }\n  .card {\n    position: relative;\n    border-radius: var(--radius-2xl);\n    border: 1px solid var(--line);\n    background: var(--panel);\n    backdrop-filter: blur(10px);\n    -webkit-backdrop-filter: blur(10px);\n    padding: 28px;\n    overflow: hidden;\n    transition: transform var(--t-med), border-color var(--t-med), background var(--t-med);\n  }\n  .card:hover { transform: translateY(-4px); border-color: rgba(230, 192, 122, 0.32); background: rgba(255, 255, 255, 0.07); }\n  .card::after {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background: radial-gradient(420px 220px at 100% 0%, rgba(230, 192, 122, 0.10), transparent 60%);\n    opacity: 0;\n    transition: opacity var(--t-med);\n    pointer-events: none;\n  }\n  .card:hover::after { opacity: 1; }\n  .card--lg { grid-column: span 4; }\n  .card--sm { grid-column: span 2; }\n  .card--half { grid-column: span 3; }\n  .card__icon {\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    width: 50px; height: 50px;\n    border-radius: 16px;\n    background: linear-gradient(135deg, rgba(230, 192, 122, 0.2), rgba(201, 154, 78, 0.08));\n    border: 1px solid var(--line);\n    color: var(--gold);\n    margin-bottom: 18px;\n  }\n  .card__icon svg { width: 24px; height: 24px; }\n  .card h3 { font-size: 22px; margin-bottom: 10px; }\n  .card p { margin: 0; color: var(--text-2); font-size: 15px; }\n  .card__media {\n    margin-top: 20px;\n    aspect-ratio: 16 / 7;\n    border-radius: var(--radius-xl);\n    border: 1px dashed rgba(230, 192, 122, 0.4);\n    background:\n      repeating-linear-gradient(135deg, rgba(255, 220, 190, 0.05) 0 10px, transparent 10px 20px);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    color: var(--text-2);\n    font-size: 12px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n  }\n\n  /* ---------- Stats ---------- */\n  .stats {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 18px;\n  }\n  .stat {\n    border-radius: var(--radius-xl);\n    border: 1px solid var(--line);\n    background: var(--panel);\n    padding: 26px;\n    text-align: center;\n  }\n  .stat b {\n    display: block;\n    font-family: \"Space Grotesk\", sans-serif;\n    font-size: clamp(30px, 6vw, 44px);\n    color: var(--gold);\n    line-height: 1;\n    margin-bottom: 8px;\n  }\n  .stat span { color: var(--text-2); font-size: 14px; letter-spacing: 0.04em; }\n\n  /* ---------- CTA band ---------- */\n  .cta-band {\n    position: relative;\n    border-radius: var(--radius-2xl);\n    border: 1px solid var(--line);\n    background:\n      radial-gradient(600px 300px at 80% 0%, rgba(230, 192, 122, 0.16), transparent 60%),\n      rgba(36, 13, 19, 0.5);\n    padding: 56px 40px;\n    text-align: center;\n    overflow: hidden;\n  }\n  .cta-band h2 { font-size: clamp(28px, 5vw, 44px); margin-bottom: 14px; }\n  .cta-band p { color: var(--text-2); max-width: 520px; margin: 0 auto 28px; }\n\n  /* ---------- Footer ---------- */\n  footer {\n    border-top: 1px solid var(--line);\n    margin-top: 40px;\n    padding: 44px 0;\n  }\n  .footer-grid {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 24px;\n    justify-content: space-between;\n    align-items: center;\n    color: var(--text-2);\n    font-size: 14px;\n  }\n  .footer-grid nav { display: flex; gap: 20px; flex-wrap: wrap; }\n  .footer-grid a:hover { color: var(--text); }\n\n  /* ---------- Responsive ---------- */\n  @media (max-width: 860px) {\n    .nav-links { display: none; }\n    .nav-cta { display: none; }\n    .nav-toggle { display: inline-flex; }\n    .navbar__inner { padding-right: 12px; }\n    .card--lg, .card--sm, .card--half { grid-column: span 6; }\n    .stats { grid-template-columns: repeat(2, 1fr); }\n    .hero { padding-top: 150px; }\n  }\n\n  @media (max-width: 460px) {\n    body { font-size: 16px; }\n    .wrap { width: calc(100% - 28px); }\n    .navbar { width: calc(100% - 20px); top: 10px; }\n    .section { padding: 56px 0; }\n    .cta-band { padding: 40px 22px; }\n  }\n\n  /* ---------- Reduced motion ---------- */\n  @media (prefers-reduced-motion: reduce) {\n    html { scroll-behavior: auto; }\n    * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }\n    .navbar { transition: none !important; }\n    .navbar[data-hidden=\"true\"] { transform: translateX(-50%) translateY(0) !important; }\n    .nav-progress__bar { transition: none !important; }\n  }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\n\u003ca class=\"skip-link\" href=\"#main\">Zum Inhalt springen\u003c/a>\n\n\u003c!-- ============ NAVBAR (M8: Smart Hide + Scroll-Progress) ============ -->\n\u003cheader class=\"navbar\" id=\"navbar\" data-hidden=\"false\">\n  \u003cnav class=\"navbar__inner\" aria-label=\"Hauptnavigation\">\n    \u003ca class=\"wordmark\" href=\"#top\" aria-label=\"Maison Aurelie, Startseite\">\n      \u003cspan class=\"wordmark__dot\" aria-hidden=\"true\">\u003c/span>\n      \u003cspan>\u003cb>MAISON\u003c/b> AURELIE\u003c/span>\n    \u003c/a>\n\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#kollektion\">Kollektion\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#atelier\">Atelier\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#service\">Service\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#kontakt\">Kontakt\u003c/a>\u003c/li>\n    \u003c/ul>\n\n    \u003ca class=\"nav-cta\" id=\"navCta\" href=\"#kontakt\">\n      Termin\n      \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n        \u003cpath d=\"M5 12h14M13 6l6 6-6 6\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n      \u003c/svg>\n    \u003c/a>\n\n    \u003cbutton class=\"nav-toggle\" id=\"navToggle\" aria-label=\"Menue oeffnen\" aria-expanded=\"false\" aria-controls=\"mobileMenu\">\n      \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n        \u003cpath d=\"M4 7h16M4 12h16M4 17h16\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n      \u003c/svg>\n    \u003c/button>\n\n    \u003cdiv class=\"nav-progress\" aria-hidden=\"true\">\n      \u003cdiv class=\"nav-progress__bar\" id=\"navProgress\">\u003c/div>\n    \u003c/div>\n  \u003c/nav>\n\u003c/header>\n\n\u003c!-- ============ MOBILE MENU ============ -->\n\u003cdiv class=\"mobile-menu\" id=\"mobileMenu\" data-open=\"false\" role=\"dialog\" aria-modal=\"true\" aria-label=\"Navigationsmenue\">\n  \u003cdiv class=\"mobile-menu__overlay\" id=\"mobileOverlay\">\u003c/div>\n  \u003cdiv class=\"mobile-menu__panel\">\n    \u003cdiv class=\"mobile-menu__head\">\n      \u003cspan class=\"wordmark\">\u003cspan class=\"wordmark__dot\" aria-hidden=\"true\">\u003c/span>\u003cspan>\u003cb>MAISON\u003c/b> AURELIE\u003c/span>\u003c/span>\n      \u003cbutton class=\"mobile-menu__close\" id=\"mobileClose\" aria-label=\"Menue schliessen\">\n        \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n          \u003cpath d=\"M6 6l12 12M18 6L6 18\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n        \u003c/svg>\n      \u003c/button>\n    \u003c/div>\n    \u003cul class=\"mobile-menu__links\">\n      \u003cli>\u003ca href=\"#kollektion\">Kollektion\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#atelier\">Atelier\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#service\">Service\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#kontakt\">Kontakt\u003c/a>\u003c/li>\n    \u003c/ul>\n    \u003ca class=\"mobile-menu__cta\" href=\"#kontakt\" id=\"mobileCta\">Termin vereinbaren\u003c/a>\n  \u003c/div>\n\u003c/div>\n\n\u003c!-- ============ MAIN ============ -->\n\u003cmain id=\"main\">\n  \u003cspan id=\"top\">\u003c/span>\n\n  \u003c!-- HERO -->\n  \u003csection class=\"hero\">\n    \u003cdiv class=\"hero__glow\" aria-hidden=\"true\">\u003c/div>\n    \u003cdiv class=\"wrap\">\n      \u003cspan class=\"eyebrow\">Juwelier seit 1924 . Duesseldorf\u003c/span>\n      \u003ch1>Schmuck, der \u003cem>Geschichten\u003c/em>\u003cbr />fuer Generationen erzaehlt\u003c/h1>\n      \u003cp>Handgefertigte Unikate aus dem Herzen der Koenigsallee. Bordeaux trifft Gold, Handwerk trifft Vision. Willkommen bei Maison Aurelie.\u003c/p>\n      \u003cdiv class=\"hero__actions\">\n        \u003ca class=\"btn btn--primary\" href=\"#kontakt\">Beratung anfragen\u003c/a>\n        \u003ca class=\"btn btn--ghost\" href=\"#kollektion\">Kollektion ansehen\u003c/a>\n      \u003c/div>\n      \u003cdiv class=\"hero__media\">\n        \u003cspan class=\"media-tag\">Bild-Platzhalter . Hero-Visual 16:8\u003c/span>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- KOLLEKTION (Bento) -->\n  \u003csection class=\"section\" id=\"kollektion\">\n    \u003cdiv class=\"wrap\">\n      \u003cdiv class=\"section__head\">\n        \u003cspan class=\"eyebrow\">Kollektion\u003c/span>\n        \u003ch2>Stuecke mit \u003cspan>Charakter\u003c/span>\u003c/h2>\n        \u003cp>Jedes Schmuckstueck wird in unserem Atelier von Hand gefertigt. Entdecken Sie eine Auswahl unserer Linien.\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"bento\">\n        \u003carticle class=\"card card--lg\">\n          \u003cdiv class=\"card__icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\">\u003cpath d=\"M12 2l3 6 6 1-4.5 4.5L18 20l-6-3-6 3 1.5-6.5L3 9l6-1z\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/>\u003c/svg>\n          \u003c/div>\n          \u003ch3>Signature Ringe\u003c/h3>\n          \u003cp>Verlobungs- und Trauringe in 18 Karat Gold, gefasst mit Diamanten aus verantwortungsvoller Herkunft.\u003c/p>\n          \u003cdiv class=\"card__media\">Bild-Platzhalter . Ringe\u003c/div>\n        \u003c/article>\n        \u003carticle class=\"card card--sm\">\n          \u003cdiv class=\"card__icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\">\u003ccircle cx=\"12\" cy=\"12\" r=\"8\" stroke=\"currentColor\" stroke-width=\"1.6\"/>\u003ccircle cx=\"12\" cy=\"12\" r=\"3\" stroke=\"currentColor\" stroke-width=\"1.6\"/>\u003c/svg>\n          \u003c/div>\n          \u003ch3>Colliers\u003c/h3>\n          \u003cp>Feine Ketten, die Eleganz unterstreichen.\u003c/p>\n        \u003c/article>\n        \u003carticle class=\"card card--sm\">\n          \u003cdiv class=\"card__icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\">\u003cpath d=\"M12 3v18M5 8l7-5 7 5\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\u003c/svg>\n          \u003c/div>\n          \u003ch3>Ohrschmuck\u003c/h3>\n          \u003cp>Von dezent bis statement.\u003c/p>\n        \u003c/article>\n        \u003carticle class=\"card card--half\">\n          \u003cdiv class=\"card__icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\">\u003crect x=\"4\" y=\"4\" width=\"16\" height=\"16\" rx=\"4\" stroke=\"currentColor\" stroke-width=\"1.6\"/>\u003cpath d=\"M9 12l2 2 4-4\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\u003c/svg>\n          \u003c/div>\n          \u003ch3>Massanfertigung\u003c/h3>\n          \u003cp>Ihre Idee, unsere Handwerkskunst. Wir begleiten Sie vom ersten Entwurf bis zum fertigen Unikat.\u003c/p>\n        \u003c/article>\n        \u003carticle class=\"card card--half\">\n          \u003cdiv class=\"card__icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\">\u003cpath d=\"M3 7l9 5 9-5M3 7l9-4 9 4M3 7v10l9 4 9-4V7\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/>\u003c/svg>\n          \u003c/div>\n          \u003ch3>Erbstuecke\u003c/h3>\n          \u003cp>Restaurierung und Neufassung. Wir bewahren den Wert, der ueber Generationen weitergegeben wird.\u003c/p>\n        \u003c/article>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- ATELIER -->\n  \u003csection class=\"section\" id=\"atelier\">\n    \u003cdiv class=\"wrap\">\n      \u003cdiv class=\"section__head\">\n        \u003cspan class=\"eyebrow\">Atelier\u003c/span>\n        \u003ch2>Handwerk seit \u003cspan>vier Generationen\u003c/span>\u003c/h2>\n        \u003cp>In unserer Werkstatt verbinden wir traditionelle Goldschmiedekunst mit moderner Praezision. Was in den Zahlen steckt, sehen Sie im Detail jedes Stuecks.\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"stats\">\n        \u003cdiv class=\"stat\">\u003cb>1924\u003c/b>\u003cspan>Gegruendet\u003c/span>\u003c/div>\n        \u003cdiv class=\"stat\">\u003cb>4\u003c/b>\u003cspan>Generationen\u003c/span>\u003c/div>\n        \u003cdiv class=\"stat\">\u003cb>2.800+\u003c/b>\u003cspan>Unikate\u003c/span>\u003c/div>\n        \u003cdiv class=\"stat\">\u003cb>100%\u003c/b>\u003cspan>Handarbeit\u003c/span>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- SERVICE (Bento) -->\n  \u003csection class=\"section\" id=\"service\">\n    \u003cdiv class=\"wrap\">\n      \u003cdiv class=\"section__head\">\n        \u003cspan class=\"eyebrow\">Service\u003c/span>\n        \u003ch2>Mehr als ein \u003cspan>Kauf\u003c/span>\u003c/h2>\n        \u003cp>Unsere Begleitung endet nicht an der Ladentheke. Wir sind fuer Sie da, ein Schmuckleben lang.\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"bento\">\n        \u003carticle class=\"card card--half\">\n          \u003cdiv class=\"card__icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\">\u003cpath d=\"M12 21s-7-4.5-7-10a4 4 0 017-2.5A4 4 0 0119 11c0 5.5-7 10-7 10z\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/>\u003c/svg>\n          \u003c/div>\n          \u003ch3>Persoenliche Beratung\u003c/h3>\n          \u003cp>Ein Termin in ruhiger Atmosphaere, ganz ohne Eile. Wir nehmen uns Zeit fuer Ihre Wuensche.\u003c/p>\n          \u003cdiv class=\"card__media\">Bild-Platzhalter . Beratung\u003c/div>\n        \u003c/article>\n        \u003carticle class=\"card card--sm\">\n          \u003cdiv class=\"card__icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\">\u003cpath d=\"M12 6v6l4 2\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"/>\u003ccircle cx=\"12\" cy=\"12\" r=\"9\" stroke=\"currentColor\" stroke-width=\"1.6\"/>\u003c/svg>\n          \u003c/div>\n          \u003ch3>Reinigung\u003c/h3>\n          \u003cp>Lebenslange Pflege Ihrer Stuecke.\u003c/p>\n        \u003c/article>\n        \u003carticle class=\"card card--sm\">\n          \u003cdiv class=\"card__icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\">\u003cpath d=\"M4 7h16v13H4zM4 7l4-4h8l4 4\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/>\u003c/svg>\n          \u003c/div>\n          \u003ch3>Garantie\u003c/h3>\n          \u003cp>Zertifikat fuer jedes Unikat.\u003c/p>\n        \u003c/article>\n        \u003carticle class=\"card card--sm\">\n          \u003cdiv class=\"card__icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\">\u003cpath d=\"M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/>\u003c/svg>\n          \u003c/div>\n          \u003ch3>Versicherung\u003c/h3>\n          \u003cp>Beratung zum Schutz Ihrer Werte.\u003c/p>\n        \u003c/article>\n        \u003carticle class=\"card card--half\">\n          \u003cdiv class=\"card__icon\" aria-hidden=\"true\">\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\">\u003cpath d=\"M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/>\u003c/svg>\n          \u003c/div>\n          \u003ch3>Concierge\u003c/h3>\n          \u003cp>Ein direkter Draht zu Ihrem persoenlichen Ansprechpartner, auch nach Jahren noch.\u003c/p>\n        \u003c/article>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- KONTAKT / CTA -->\n  \u003csection class=\"section\" id=\"kontakt\">\n    \u003cdiv class=\"wrap\">\n      \u003cdiv class=\"cta-band\">\n        \u003ch2>Vereinbaren Sie Ihren Termin\u003c/h2>\n        \u003cp>Besuchen Sie uns an der Koenigsallee oder lassen Sie sich digital beraten () || menuOpen || y \u003c 80) {\n        navbar.setAttribute(\"data-hidden\", \"false\");\n      } else if (y > lastY + SHOW_THRESHOLD) {\n        navbar.setAttribute(\"data-hidden\", \"true\");  // runter -> verstecken\n      } else if (y \u003c lastY - SHOW_THRESHOLD) {\n        navbar.setAttribute(\"data-hidden\", \"false\"); // hoch -> einblenden\n      }\n    } else {\n      navbar.setAttribute(\"data-hidden\", \"false\");\n    }\n\n    lastY = y;\n    ticking = false;\n  }\n\n  function onScroll() {\n    if (!ticking) {\n      ticking = true;\n      window.requestAnimationFrame(update);\n    }\n  }\n\n  window.addEventListener(\"scroll\", onScroll, { passive: true });\n  window.addEventListener(\"resize\", onScroll, { passive: true });\n\n  // Navbar bei jedem Fokus-Wechsel sofort sichtbar machen, wenn Fokus drin.\n  document.addEventListener(\"focusin\", function (e) {\n    if (navbar.contains(e.target)) {\n      navbar.setAttribute(\"data-hidden\", \"false\");\n    }\n  });\n\n  update();\n\n  /* ---------------- Magnetischer CTA (\u003c=6px) ----------------------------- */\n  if (!reduceMotion.matches && navCta && window.matchMedia(\"(pointer:fine)\").matches) {\n    var MAG = 6;\n    navCta.addEventListener(\"mousemove\", function (e) {\n      var r = navCta.getBoundingClientRect();\n      var dx = (e.clientX - (r.left + r.width / 2)) / (r.width / 2);\n      var dy = (e.clientY - (r.top + r.height / 2)) / (r.height / 2);\n      navCta.style.transform =\n        \"translate(\" + (dx * MAG).toFixed(2) + \"px,\" + (dy * MAG).toFixed(2) + \"px)\";\n    });\n    navCta.addEventListener(\"mouseleave\", function () {\n      navCta.style.transform = \"translate(0,0)\";\n    });\n  }\n\n  /* ---------------- Mobile Menu (a11y) ----------------------------------- */\n  var toggle = document.getElementById(\"navToggle\");\n  var menu = document.getElementById(\"mobileMenu\");\n  var overlay = document.getElementById(\"mobileOverlay\");\n  var closeBtn = document.getElementById(\"mobileClose\");\n  var lastFocused = null;\n\n  function focusables() {\n    return Array.prototype.slice.call(\n      menu.querySelectorAll('a[href], button:not([disabled])')\n    ).filter(function (el) { return el.offsetParent !== null; });\n  }\n\n  function openMenu() {\n    lastFocused = document.activeElement;\n    menu.setAttribute(\"data-open\", \"true\");\n    toggle.setAttribute(\"aria-expanded\", \"true\");\n    document.body.style.overflow = \"hidden\";\n    navbar.setAttribute(\"data-hidden\", \"false\");\n    window.requestAnimationFrame(function () {\n      if (closeBtn) closeBtn.focus();\n    });\n    document.addEventListener(\"keydown\", onKeydown);\n  }\n\n  function closeMenu() {\n    menu.setAttribute(\"data-open\", \"false\");\n    toggle.setAttribute(\"aria-expanded\", \"false\");\n    document.body.style.overflow = \"\";\n    document.removeEventListener(\"keydown\", onKeydown);\n    if (lastFocused && lastFocused.focus) lastFocused.focus();\n  }\n\n  function onKeydown(e) {\n    if (e.key === \"Escape\") {\n      e.preventDefault();\n      closeMenu();\n      return;\n    }\n    if (e.key === \"Tab\") {\n      var items = focusables();\n      if (!items.length) return;\n      var first = items[0];\n      var last = items[items.length - 1];\n      if (e.shiftKey && document.activeElement === first) {\n        e.preventDefault();\n        last.focus();\n      } else if (!e.shiftKey && document.activeElement === last) {\n        e.preventDefault();\n        first.focus();\n      }\n    }\n  }\n\n  toggle.addEventListener(\"click\", openMenu);\n  closeBtn.addEventListener(\"click\", closeMenu);\n  overlay.addEventListener(\"click\", closeMenu);\n\n  // Link-Klick im Mobile-Menue schliesst das Menue.\n  Array.prototype.forEach.call(\n    menu.querySelectorAll('a[href^=\"#\"]'),\n    function (a) { a.addEventListener(\"click\", closeMenu); }\n  );\n\n  // Bei Verbreiterung ueber Breakpoint Menue schliessen.\n  window.matchMedia(\"(min-width: 861px)\").addEventListener(\"change\", function (ev) {\n    if (ev.matches && menu.getAttribute(\"data-open\") === \"true\") closeMenu();\n  });\n})();\n\u003c/script>\n\u003c/body>\n\u003c/html>\n"}
];
  const list = document.getElementById('list');
  const frame = document.getElementById('frame');
  const fName = document.getElementById('fName');
  const fDesc = document.getElementById('fDesc');
  const counter = document.getElementById('counter');
  let active = 0;

  VARIANTS.forEach((v, i) => {
    const b = document.createElement('button');
    b.className = 'opt'; b.type = 'button'; b.setAttribute('role','tab');
    b.innerHTML = '<span class="n">Design '+String(i+1).padStart(2,'0')+'</span>'+
      '<span class="t">'+v.name+'</span><span class="d">'+v.desc+'</span>';
    b.addEventListener('click', () => select(i));
    list.appendChild(b);
  });

  function select(i){
    active = (i + VARIANTS.length) % VARIANTS.length;
    const v = VARIANTS[active];
    [...list.children].forEach((el, idx) => el.setAttribute('aria-current', idx === active ? 'true' : 'false'));
    fName.textContent = v.name;
    fDesc.textContent = v.desc;
    counter.textContent = String(active+1).padStart(2,'0') + ' / ' + String(VARIANTS.length).padStart(2,'0');
    frame.srcdoc = v.html;
    const cur = list.children[active];
    if (cur && cur.scrollIntoView) cur.scrollIntoView({block:'nearest', inline:'nearest'});
  }

  document.getElementById('prev').addEventListener('click', () => select(active-1));
  document.getElementById('next').addEventListener('click', () => select(active+1));
  document.getElementById('fs').addEventListener('click', () => {
    const w = window.open('', '_blank');
    if (w) { w.document.open(); w.document.write(VARIANTS[active].html); w.document.close(); }
  });
  window.addEventListener('keydown', (e) => {
    if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
    if (e.key === 'ArrowRight') { select(active+1); e.preventDefault(); }
    if (e.key === 'ArrowLeft')  { select(active-1); e.preventDefault(); }
  });

  select(0);
</script>
